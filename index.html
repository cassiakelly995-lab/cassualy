osto no ombro delicado de Ing. Ela depositou um beijo na pele macia exposta pelo roupão que não fechava direito, e então deslizou os lábios pela curva do ombro enquanto o roupão escorregava até os cotovelos de Ing.","O movimento revelou imediatamente aos olhos de Napatr seu busto arredondado, que não era pequeno apesar de sua estatura diminuta. \"Ei... pare.\" Ing disse, segurando o rosto de Napatr e levantando seu queixo com ambas as mãos para afastá-la imediatamente, antes que aqueles lábios perversos pudessem descer mais do que seus seios.","\"Ok, ok. Vou parar.\" \"Você está tão cansado que mal consegue ficar acordado, mas mesmo assim continua aprontando.\"","Ing balançou a cabeça, resmungando em tom de brincadeira antes de descer do colo forte e puxar o roupão de volta para se cobrir. \"Não durma ainda. Vou buscar seu pijama.\" Ao ver Napatr se aproximar dos travesseiros com os olhos tão pesados que quase se fechavam, Ing teve que dar um aviso. Como elas estavam vestindo apenas roupões de banho, ela não quis dormir assim, com medo de que a mulher mais alta pegasse um resfriado. \"Não posso simplesmente dormir assim? Já dormimos nus juntos antes.\" \"Patr!\" Ing se perguntou por que Napatr estava agindo como uma criança mimada de oito anos. A outra mulher desapareceu debaixo do edredom imediatamente após falar, apenas para reaparecer com a cabeça e os ombros nus, jogando o roupão descartado no lado vazio da cama. \"Você vai me ouvir, sim ou não?\" \"Certo, vou esperar o pijama.\" Napatr se encostou na cabeceira da cama. Ao ver a mulher pequena corar enquanto pegava o roupão jogado no chão, Napatr deu uma gargalhada. \"Ainda não se acostumou?\"","\"Você está acostumado a me ver nu? Suas orelhas e seu rosto estavam vermelhos como brasa há apenas um segundo.\" Ela retrucou antes de entrar direto no closet. Ela tinha visto exatamente como o rosto e as orelhas de Napatr ficaram vermelhos quando ela viu o peito de Ing, mesmo que ela estivesse prestes a proválo de qualquer maneira. \"Quem conseguiria se acostumar com isso?\", sussurrou Napatr para si mesma. De repente, uma voz doce ecoou pelo ar. \"Viu? Você mesmo não está acostumado com isso!\" Napatr só conseguia rir dos gritos adoráveis, pensando em como, em apenas algumas horas juntos, toda a confusão e o caos haviam desaparecido. Ing realmente tem poderes mágicos. Napatr observou a mulher baixinha retornar, agora devidamente vestida com pijamas e trazendo outro conjunto para ela. Ela não conseguia desviar o olhar das pernas de Ing até que a outra mulher parou ao lado da cama, tocando levemente a ponta do nariz de Napatr com o dedo.","\"Já não está com sono, hein?\" Napatr sempre a olhava com olhos brilhantes quando Ing usava uma de suas camisas para dormir sem permissão. Ing entregou o pijama e virou as costas, fingindo estar ocupada no armário novamente porque não queria ver Napatr se vestir. Mas Napatr percebeu tudo. Ela sabia que Ing já tinha arrumado tudo e estava apenas fingindo estar ocupada. \"Menina, venha para a cama.\"","A voz suave e afetuosa fez Ing morder o lábio. Ela não queria particularmente ser uma \"garota\" aos olhos de Napatr, mas não podia negar que era mais jovem, de qualquer forma.","Ing se virou para olhar para Napatr, que ainda estava deitada onde ela estivera. O quarto espaçoso estava agora completamente escuro, as luzes apagadas e as cortinas fechadas para impedir que qualquer luz externa perturbasse o sono delas.","Ela viu Napatr mexer brevemente no celular antes de colocá-lo na mesa de cabeceira e olhar nos seus olhos com um sorriso. Desta vez, foi Ing quem abriu os braços, convidando a outra mulher para um abraço. Ela queria consolar a mulher mais alta de quem havia fugido ontem, movida por um persistente sentimento de culpa.","Seus corpos estavam próximos um do outro, e a leve fragrância que emanava do corpo de Napatr, juntamente com o calor que irradiava entre eles, fez com que Ing se sentisse à vontade e satisfeita. Ela também sentiu uma indescritível sensação de alívio. Ela quase perdeu tudo por causa do próprio medo e dos seus erros. Sua mão delicada acariciou suavemente os cabelos na altura dos ombros de Napatr. Ela baixou o olhar para a mulher mais alta, que sorria levemente com os olhos fechados contra o peito, e um sorriso afetuoso curvou seus lábios. Ela depositou um beijo suave em sua testa lisa antes de encostar a bochecha nela. \"Desculpe, Patr.\" Napatr inclinou a cabeça para trás para olhar para a pequena mulher cujos olhos estavam cheios de culpa. Ela não gostou daquilo. Napatr balançou a cabeça, oferecendo seu sorriso gentil de sempre. \"Chega de desculpas.\" Ela depositou um beijo no pescoço macio onde escondia o rosto, e então se inclinou para cima para capturar os lábios carnudos antes que Ing pudesse reagir. Foi um beijo suave, mas Ing retribuiu com doçura e imediatamente. Enquanto suas línguas se entrelaçavam, Napatr se moveu, virando Ing de costas. Ela se posicionou sobre ela, acariciando seu pequeno rosto para aprofundar o beijo em algo mais íntimo.","Doce e apaixonada ao mesmo tempo. Quanto mais ela chupava e mordiscava os lábios de Ing, mais audível se tornava a respiração pesada de Ing.","\"V-você precisa descansar\", Ing sussurrou no instante em que seus lábios se separaram. Napatr olhou para ela com os olhos semicerrados antes de se inclinar para beijar seu pescoço. \"Ah, isso dói!\" Napatr sugou a pele dela até sentir uma mistura de dor e uma estranha sensação de formigamento. Ing mordeu o lábio para abafar um som embaraçoso, sabendo que a outra mulher estava desabotoando vários botões da camisa. \"Patr...\" Ela tentou segurar o rosto de Napatr para interromper o rastro de beijos e lambidas em seu pescoço, mas seu corpo se arqueou instintivamente, convidando a mais contato. \"P-por que você está tão teimosa hoje? Desde quando você virou uma menininha?\"","Napatr sorriu, mas não a soltou. Depois de provar a pele macia e inalar o perfume de Ing, não foi fácil se afastar. \"Sim. Eu sou a garotinha.\" Ing ficou paralisada com a resposta, depois soltou um gemido suave quando seu seio exposto foi reivindicado pela 'menininha'. O toque malicioso da língua de Napatr a fez se contorcer de prazer.","Ainda assim, quando seus olhos atordoados finalmente viram as horas, Ing teve que acariciar suavemente os cabelos de Napatr, um contraste gritante com o toque exigente de Napatr. Ing deslizou a mão por baixo da camisa de pijama que Napatr vestia, traçando levemente as unhas nas costas da mulher que se recusava a soltá-la. Com a outra mão, continuou a acariciar os cabelos de Napatr, na esperança de fazê-la dormir.","A língua maliciosa finalmente diminuiu o ritmo e parou. Mesmo dominada pelo desejo, a preocupação com a mulher que não dormia desde o dia anterior tornou-se prioritária.","Ing sabia exatamente a quais toques Napatr era vulnerável, aqueles que a fariam perder as forças e adormecer rapidamente. Não era a primeira vez que fazia isso, embora fosse a primeira vez que não cedia ao desejo físico pelo bem de Napatr.","Ela olhou para a mulher mais alta, cuja respiração agora se acalmava contra seu peito. Deu um sorriso resignado; Napatr havia adormecido, mas seus lábios ainda estavam maliciosamente presos ao seio de Ing. Então era isso que significava ser acolhido. Ing se mexeu um pouco. A mulher mais alta, instintivamente, apertou os braços, puxando Ing ainda mais para perto. Ing riu afetuosamente. Seu plano de ir ao banheiro foi abandonado.","O abraço caloroso do qual ela estivera afastada por um dia inteiro; o abraço seguro que ela tanto almejara e que jamais pensou que voltaria a receber. Ela nunca mais se deixaria escapar daquele abraço. Ing olhou mais uma vez para o rosto adormecido. Seus dedos finos roçaram a bochecha macia com carinho antes de ela depositar um leve beijo na testa da outra pessoa. \"Boa noite.\" Ela não pediu nada além disso. Que essa pessoa dormisse bem, livre de preocupações e pensamentos excessivos, isso por si só já era suficiente. \"Então, quantos anos você tem exatamente, Patr?\" Ing perguntou, com um tom cansado, enquanto abotoava delicadamente a camisa branca da outra mulher.","Napatr vestia apenas uma regata justa, segurava a camisa branca que Ing havia separado e saiu para encontrar Ing no sofá, onde ela se entretinha assistindo à TV grande para dar privacidade a Napatr enquanto se vestia. Mesmo assim, Napatr foi direto até ela apenas para que ela abotoasse a camisa. \"31.\"","Ing ergueu as sobrancelhas e sorriu ao ouvir aquela voz suave revelar sua idade pela primeira vez. Ela inclinou o rosto de Napatr para cima para inspecioná-lo; era impecável, exceto por uma única imperfeição na testa. \"Estou velho?\" \"Mais velho do que eu.\"","\"Bem, você é apenas uma criança.\" \"Humph. Então, quem é o garoto aqui?\" Ing riu ao ver a mulher mais alta perder a compostura. Ela beliscou levemente a bochecha de Napatr antes de se inclinar para encostar o nariz naquela bochecha avermelhada.","O rosto de Napatr ficou quente. Ficou vermelho como um tomate porque Ing estava rindo tanto que seus doces olhos se enrugaram lindamente. Napatr adormeceu de exaustão por volta das 11 da manhã, embora seus lábios ainda estivessem constrangedoramente colados ao belo seio da outra, parecendo exatamente a criancinha que lhe haviam dito. Ela puxou a pequena figura para mais perto antes de enterrar seu nariz pontudo nas bochechas macias de Ing para provocá-la. Quanto mais ouvia aquela voz doce protestando em tom de brincadeira em meio às risadas, mais encantada se sentia. Ela adorava estar com Ing assim; apreciava tanto o sorriso quanto a risada da mulher pequena e queria tê-los só para si. Napatr deu um beijo suave nos lábios delicados de Ing. Ing, em resposta, fez um biquinho para um beijo doce e adorável. Napatr a abraçou forte contra o peito, balançando para frente e para trás com os olhos fechados, encostando a cabeça na de Ing com um sorriso.","\"Eng.\" \"Sim?\"","Ing olhou para Napatr, que retribuía o olhar com olhos cheios de ternura e carinho. Era tão doce que Ing foi imediatamente tomada pela timidez. Ela teve que fingir estar ocupada com a gola da camisa branca, agindo como se estivesse tirando poeira dos ombros, antes de finalmente envolver os braços no pescoço de Napatr e pressionar a bochecha contra o peito dele para se esconder daquele olhar.","Ela era tímida demais para suportar o olhar daqueles olhos. \"Você quer namorar comigo?\" O coração de Ing, já acelerado, batia ainda mais forte. O mesmo acontecia com a mulher alta. O coração de Napatr batia tão violentamente que a mulher mais baixa, que estava encostada em seu peito, conseguia senti-lo. \"Quero você comigo todos os dias. Quero seu sorriso só para mim. Tenho ciúmes até da sua risada. Quero que você seja meu amor.\" \"...\" \"Eu sei que pode ser cedo demais. Mas os sentimentos que eu tive, e os que estou tendo agora, são reais. Eu te amo muito. Eu te amo por ser você. Eu amo tudo em você. Ing... você quer namorar comigo?\" Ing afastou o rosto do peito de Napatr para encontrar seu olhar. Apesar da timidez, ela queria ver. Queria observar Napatr falar; queria ver o brilho em seus olhos quando Napatr confessasse seus sentimentos, e queria se lembrar disso por muito tempo.","Sua mão delicada se ergueu para acariciar o rosto corado da mulher mais alta. Ela retribuiu com um sorriso doce ao ver os olhos cheios de significado, saudade e um visível nervosismo.","As mãos de Napatr, que estavam em volta da cintura dela, tremiam visivelmente. O coração de Napatr batia forte como o dela, e Ing colocou a mão sobre o peito da outra, acariciando-a suavemente para ajudar Napatr a se acalmar um pouco.","\"Embora eu não tenha flores nem nada para te oferecer agora, exceto meus sentimentos... Ing, você consideraria meu pedido?\" As doces palavras foram sussurradas enquanto estavam sentados juntos na espaçosa casa. O rosto de Ing ficou quente e lágrimas brotaram incontrolavelmente antes que ela abraçasse a mulher alta, tomada por uma alegria indescritível. Ela nunca havia sido convidada para um relacionamento com tanta sinceridade e palavras tão belas. O toque, o olhar e a voz firme e calorosa a faziam se sentir tão bem que nada se comparava àquela sensação. \"Hum-hum!\"","Ing assentiu com a cabeça e respondeu baixinho no ombro de Napatr. A outra mulher ficou em silêncio por um instante, antes de Ing ouvir uma risada fraca. \"Isso significa sim?\" \"Não estou dizendo isso.\"","\"Por que?\" \"Eu sou tímido, sabia?\" Napatr deu uma gargalhada antes de apertar o abraço em torno da mulher delicada e pequena mais uma vez. Ela sorriu amplamente, sentindo-se verdadeiramente feliz. A pequena tensão persistente havia desaparecido por completo. As dúvidas persistentes e as várias histórias do passado foram todas resolvidas em seu coração, deixando-a com uma sensação de conforto e alívio indescritíveis. Ela inclinou a cabeça e puxou a mulher pequena ligeiramente para trás para olhá-la. Ao ver aqueles olhinhos doces se encherem de lágrimas, ela só pôde oferecer um sorriso tranquilizador. \"Não sei como uma boa namorada deveria ser, mas não vou te fazer sofrer como você já sofreu antes.\"","\"Do jeito que você é, já basta, Patr.\" Ing sorriu em meio às lágrimas para seu novo namorado, que retribuiu o sorriso da mesma forma.","Os dedos de Napatr enxugaram delicadamente suas lágrimas antes que seus lábios tomassem conta, os mesmos pelos quais Ing era tão atraída. Ela a beijou por todo o rosto até que Ing a abraçou com força pelo pescoço, puxando-a para mais perto. Ing pressionou os lábios contra os belos e macios dedos que ainda conservavam o sorriso gentil que ela sempre achava tão reconfortante. Ela depositou um beijo suave ali antes de se dirigir ao canto da boca de Napatr, como que para um toque final. Em seguida, deu outro beijo em sua bochecha e esboçou um sorriso doce, demonstrando abertamente seu afeto. Era a primeira vez que ela concordava em namorar alguém e se sentia tão segura. Não parecia superficial como antes. Foi também a primeira vez que ela escolheu estar com alguém porque ambos sentiam o mesmo. \"Patr.\" \"Hum?\" \"P'Patr.\" A palavra 'P'Patr' pronunciada naquela voz suave, acompanhada por um doce sorriso que agora lhe pertencia somente, deixou Napatr atônita e sem palavras. Ela sorriu radiante, o rosto corando ao ouvir aquilo, desejando ouvir Ing chamá-la assim para sempre.","\"Adoro isso.\" \"Você gosta de ser chamado de 'P'?\"","\"Gosto disso, e gosto muito de você também.\"","Ing torceu o nariz para ela em tom de deboche. Ela não sabia onde a outra tinha praticado o uso de tais palavras, mas, mesmo assim, adorava ouvi-las. Entretanto, Napatr jamais imaginou que estar em um relacionamento com alguém que amava lhe traria tanta felicidade. E sua felicidade cresceu ainda mais porque a pessoa que ela amava... a amava também. O doce sorriso de Ing, aquele que ela certa vez chamou de um doce sorriso com um toque de veneno, continuava sendo apenas isso. Era um veneno incrivelmente doce, e ela o aceitava com prazer. Porque, independentemente de tudo, era ela quem possuía tanto a beleza quanto o seu lindo sorriso, tudo só para ela. . sunyan"],"wordCount":2857},{"title":"18. Sem Saída","paragraphs":["Ing conduziu o carro até a vaga de estacionamento reservada para Napatr dentro do grande hospital onde a mulher mais alta trabalhava. A placa com o nome pendurada acima da barraca deixou Ing inexplicavelmente nervoso. A outra mulher havia lhe dito repetidas vezes que era médica, mas Ing não acreditou completamente.","Afinal, Napatr parecia ter muito mais tempo livre do que qualquer médico que ela já tivesse conhecido. Talvez fosse apenas a natureza de trabalhar em um hospital particular; ela não tinha certeza. \"Você aceitaria jantar comigo?\" \"Você não está trabalhando?\" Ing olhou para o relógio no painel do carro antes de se virar para a mulher alta, que apoiava o cotovelo no apoio de braço entre os assentos, com o queixo apoiado na mão enquanto Ing a observava. O sorriso de Napatr a deixou tão sem jeito que ela teve que desviar o olhar.","\"Sim, estou. Pode esperar cerca de uma hora enquanto faço minhas rondas?\" \"Posso sim. Mas você está com fome? Quer um sanduíche para matar a fome? Posso ir buscar um para você.\" Ao perceber que a loja de conveniência por onde havia passado mais cedo ainda estava aberta, Ing se manifestou, preocupada com seu amado. Sim, meu amor. Napatr era realmente o namorado dela agora; o relacionamento deles, que havia começado recentemente, era oficial havia menos de duas horas.","\"Por que você está corando de repente?\" Napatr riu, usando o dedo para acariciar levemente a bochecha da namorada, que estava com uma maquiagem discreta. Ela não resistiu à tentação de se inclinar e encostar o nariz naquela bochecha. \"Você...\" \"Você é tímido(a)?\" \"Hum, é que...\" Ing mordeu o lábio antes de acariciar o rosto de Napatr. A visão daqueles olhos doces e brilhantes a fez depositar um beijo suave neles. Mas então, a outra mulher segurou a nuca dela, aprofundando o contato. \"Patr...\" \"Não vai mais me chamar de P'Patr?\"","\"Não me provoque.\" \"Eu amo isso.\"","Napatr sorriu, seu nariz roçando delicadamente o nariz arrebitado da outra antes de depositar um beijo suave e demorado em seus lábios adoráveis. Ela adorava ver esse lado fofo da Ing. Ela adorava poder tocar na Ing sem ter que se preocupar com o status delas. \"Então, você quer um sanduíche ou não?\"","\"Quer ir comprar comigo? Ainda tenho mais de meia hora antes das rodadas.\"","Ing assentiu com a cabeça. Ela checou seu reflexo no espelho para ter certeza de que estava apresentável, depois olhou para os lábios da mulher alta para ver se estavam manchados com o batom dela após o beijo recente.","\"Outro beijo, meu bem?\" \"Pare de flertar, Patr.\" \"Só digo isso para a minha namorada. Como isso é flertar?\" Napatr permaneceu imóvel, permitindo que a pequena mulher usasse um lenço de papel para limpar delicadamente a mancha de batom deixada pela doce troca de palavras. \"Você normalmente não é assim.\" \"Você não gosta que eu te chame assim?\" Ing mordeu o lábio novamente. Ela ergueu os olhos para o rosto de Napatr depois de ouvir a pergunta. Os olhos da pessoa à sua frente mostraram um lampejo de curiosidade e incerteza.","Embora fosse sutil, Ing era observadora, especialmente quando se tratava da pessoa à sua frente, e percebeu isso instantaneamente. \"Eu sou apenas tímido, querido. Então... estamos namorando agora, certo?\"","\"Hum-hum.\"","Napatr sorriu e acenou com a cabeça para a pequena mulher que estava ajeitando suas roupas. Então, aqueles doces olhos se voltaram para os dela novamente. \"Vamos parar de nos referir apenas a nós mesmos por apelidos.\"","\"...\"","Napatr ficou paralisada, pensando nos novos termos que Ing queria que ela usasse. O que ela deveria usar então? O relacionamento deles havia mudado rapidamente, mas eles não se sentiam nem um pouco constrangidos em expressar seus sentimentos um ao outro. Talvez fosse porque já agiam dessa forma naturalmente antes de tudo se tornar oficial. \"Boa noite, Dr. Napatr.\"","\"Boa noite.\" Ing observou a mulher alta cumprimentar pessoa após pessoa, desde o estacionamento até a loja de conveniência à frente. Sua mão estava envolta no aperto caloroso da mulher alta. Ela se sentia tímida sob os olhares curiosos dos transeuntes e se perguntava por que todos pareciam tão respeitosos e até um pouco intimidados por Napatr. \"Você é alguma celebridade?\" \"Suponho que sim.\"","Ing fez uma careta para a mulher ao seu lado, que não negou nada. Ouvir a risada suave de Napatr só a deixou mais irritada. \"Você vai mesmo ficar comigo até amanhã?\" \"Não quero ficar sozinha. Quer que eu vá para casa?\" \"De jeito nenhum. Só tenho medo que você fique entediado. Além disso, não é tão confortável quanto a cama da nossa casa.\"","Ing conduziu a mulher alta até a loja de conveniência, que era muito maior do que as lojas de esquina que ela costumava ver. Ela realmente não queria ficar sozinha em casa, assim como havia dito à outra mulher. Não era apenas medo; eles tinham acabado de superar um mal-entendido. Mesmo que tudo estivesse esclarecido e a situação entre eles estivesse clara, seria errado ela querer estar com seu amante? Não era como se ela fosse interferir no trabalho de Napatr. Napatr havia lhe dito pessoalmente que tinha uma sala de descanso privada. Ing só queria esperá-la lá.","\"Estou te incomodando?\" Napatr estava prestes a responder à mulher baixinha quando viu alguém de uniforme de enfermeira e blazer azul correndo para segurar o braço de Ing. Um sorriso.","imediatamente se espalhou pelo rosto de Napatr. \"Olá, Dr. Napatr. Pensei que o senhor estivesse de folga hoje.\" \"Olá, Mind. Estou bem, então decidi entrar.\" Napatr sorriu para Mind, cujo braço agora estava em volta do pescoço da pequena mulher que olhava de um jeito adorável e confuso para o outro, entre Napatr e sua amiga.","\"Podem conversar vocês dois. Eu vou dar uma olhada por lá, Ing.\" Ing acenou com a cabeça para Napatr antes de voltar sua atenção para sua melhor amiga, que a arrastou em direção ao freezer de sorvetes e começou a cochichar animadamente. \"Quando liguei e vocês não atenderam, o que vocês dois estavam fazendo?\" \"Dormir! Só isso, tá bom?\" \"Ah, por favor! Depois de uma briga, pensei que você estaria fortalecendo o vínculo. É assim que deveria ser, Ing, faça seu marido te amar, faça-a ficar obcecada por você.\" \"Qual é o seu problema, bobinho? Você está no próximo turno?\" Mind balançou a cabeça com tanta força que seu boné quase caiu. Ela estava apenas comprando algumas coisas enquanto esperava seu parceiro buscá-la. Sinceramente, ela achava que o Dr. Napatr estaria de folga hoje; corriam boatos de que o médico e Ing haviam brigado, e o estado do médico ontem certamente parecia corroborar isso. \"Ah, esqueci de te contar uma coisa.\"","\"O que?\" Ing franziu a testa ao ver a expressão séria da amiga. Começou a se preocupar: será que Napatr havia escondido mais alguém naquele hospital?","\"Corre o boato de que Patr e eu estamos namorando em segredo esse tempo todo.\" Que bom que você está aqui. Vá em frente, reivindique seu lugar. Deixe que saibam que você é a esposa dela, a esposa do dono do hospital. Ing ficou paralisada. Ela se perguntou quantas coisas mais desconhecia. Descobrir que Napatr era médico já tinha sido chocante o suficiente. Descobrir que era dona do hospital foi ainda mais surpreendente. Ela sabia que aquela era apenas a segunda filial; a primeira, no centro da cidade, era igualmente famosa. \"Eles ainda estão fofocando sobre isso, Mind?\" Napatr estava parada não muito longe das duas mulheres. Ela não tinha ouvido Ing dizer nada, então caminhou até elas preocupada, chegando bem a tempo de ouvir o que Mind havia dito a Ing momentos antes. \"Sim, especialmente ontem, quando nossos turnos não coincidiram. Os boatos se espalharam como fogo em palha seca.\" Napatr assentiu com a cabeça antes de se virar para a mulher baixinha, que parecia ter mil perguntas. Napatr aproximou o rosto do de Ing. \"Você está bem?\" \"Eu... eu estou bem.\"","Mind observava os dois, que a ignoravam completamente, mesmo ela estando bem ali.","Parecia que sua melhor amiga estava se vingando daquela manhã, quando Mind passou tanto tempo beijando sua parceira que Ing escapou sem que ela percebesse.","Quando Mind lhe enviou uma mensagem mais cedo, Ing simplesmente respondeu com uma foto das costas da Dra. Napatr enquanto ela caminhava pela casa, uma resposta que fez Mind soltar uma risadinha de inveja divertida. \"Ei, Ing, você deixou algumas coisas no meu apartamento. Na verdade, são as coisas que você deixou comigo, doutor. Preciso ir agora, minha namorada está aqui. Tchau, Ing!\"","Vamos conversar mais tarde.\"","Ing observou sua amiga desaparecer em direção ao caixa e sair da loja rapidamente. Ela voltou seu olhar para seu alto namorado, que estava parado ali com um ar inocente. De repente, os dedos de Ing beliscaram a pele do braço de Napatr. \"Ai, fui beliscado.\" \"Por que você devolveu minhas coisas?\" \"Bem, você me devolveu as chaves do carro.\" Hum! Ing soltou o braço de Napatr e se afastou. Ela ouviu o som dos passos de Napatr logo atrás e percebeu que já havia memorizado o ritmo e o peso do andar da outra mulher.","Ela fingiu não se importar com a franqueza com que Napatr falava de si mesma. Provavelmente era apenas um hábito, e Ing acreditava que Napatr um dia usaria algo mais especial.","\"Aquele era um carro; claro que eu tive que devolvê-lo.\" Os lábios de Ing se moviam enquanto ela falava, suas mãos escolhendo lanches e sanduíches que ela sabia que a outra mulher gostava e colocando-os na cesta preta que Napatr carregava enquanto a seguia. Napatr não se parecia em nada com o médico alto que era dono do hospital naquele momento. Ing acabou tentando recuperar a cesta, com medo de que os outros olhassem mal para Napatr.","\"Eu levo comigo.\" \"Eu carrego para você.\" \"Tem gente olhando. Deixa que eu levo.\" \"Deixe que olhem. Estou carregando para minha namorada.\"","Napatr sabia que elas eram o centro das atenções, mas não se importava com o que os outros pensavam. A única pessoa com quem se importava era a pequena mulher ao seu lado. Com a mão livre, Napatr puxou Ing para mais perto, inclinando-se para apoiar o queixo no ombro dela. Ela sussurrou suavemente, querendo que a namorada se concentrasse apenas nela, e não nas pessoas que preocupavam Ing. \"Querida, você quer um refrigerante?\" \"Mas você não bebe isso.\" \"Para você beber lá em cima. No meu quarto não tem refrigerante, só água pura.\" \"Então vou pegar bastante, para amanhã também.\" \"Você também vem amanhã?\" \"Não posso?\"","\"Claro que pode. Sempre. Ter minha namorada me esperando na sala de espera dos médicos parece maravilhoso.\" Ing se afastou imediatamente do abraço de Napatr para pegar os itens. Ela estava tão perturbada com a palavra \"namorada\" saindo da boca da mulher alta que não conseguiu continuar ouvindo aquela conversa doce. Era uma cena estranha, o Dr. Napatr, herdeiro do hospital, caminhando tão intimamente com alguém assim. Os sorrisos e risos espontâneos compartilhados entre eles alimentaram ainda mais os rumores, em comparação com a proximidade que Napatr demonstrara com a enfermeira Mind, do departamento de cirurgia. \"Parece que as pessoas aqui são obcecadas por fofoca.\" \"Todo mundo vira assunto de conversa. Eu realmente não ligo.\" Ing observou a mulher alta trancar a porta da sala de descanso no extremo oposto do prédio, que era claramente separada do escritório de Napatr por uma porta de ligação que ela acabara de trancar.","Ela finalmente acreditou que Napatr era o dono do lugar. O escritório era enorme, e os móveis eram ainda mais luxuosos do que a decoração sofisticada do lado de fora. A sala de descanso interna era praticamente um apartamento. Havia uma cama, o sofá que Ing estava ocupando no momento e um pequeno guarda-roupa ao lado da porta do banheiro, que era de vidro fosco, o que fez Ing franzir a testa, confusa.","\"Por que a porta do banheiro é de vidro?\" \"Nunca pensei que traria uma namorada aqui. Nunca trouxe ninguém antes. Você é a primeira.\"","\"Você age como se nunca tivesse tido uma namorada.\" Napatr riu antes de se sentar ao lado da namorada, a primeira pessoa com quem namorava em quatro anos. Ing era a primeira namorada que ela trouxera para cá, aquela para quem estava gradualmente abrindo todos os cantos da sua vida. Apesar de alguns erros terem ocorrido em relação à sua família, ela sabia que Ing não se importava. Além disso, a origem familiar de Ing não era nada comum; os negócios da família eram igualmente prósperos. Ela pegou a mão da pequena mulher na sua antes de olhar para o rosto adoravelmente corado da sua amada. Inclinou-se para beijar ternamente o dorso da mão de Ing.","\"Estou falando sério sobre você. Você não precisa se importar com outras pessoas. Você pode se importar apenas comigo? Com nós dois?\" Napatr estava preocupada que sua namorada, de estatura pequena, pensasse demais ou se deixasse afetar pelas fofocas. Ela não podia impedir as pessoas de falarem, mas elas podiam escolher não se importar. Ela estava profundamente preocupada com Ing. Enquanto falava, Ing olhou nos olhos de Napatr. Ela entendia, mas não conseguia deixar de se preocupar com a imagem de Napatr. Saber o quanto sua parceira era o centro das atenções ali a deixava nervosa.","\"Você não precisa ter medo do que os outros vão pensar de você. Não há nada de errado em você aos meus olhos. Eu te amo. Eu te amo por ser você. Então não pense demais nisso, meu bem.\"","Ing a abraçou imediatamente enquanto Napatr a olhava com um olhar suplicante. Ela acenou com a cabeça contra o ombro da mulher alta. Sempre que estavam juntas, seus pensamentos perturbadores desapareciam instantaneamente. Napatr era simplesmente Napatr, a mulher que sempre pensava nela primeiro, mesmo antes de começarem a namorar. Ing sentia-se grata por tudo o que as havia unido.","\"Obrigada... Querida.\" Napatr ficou paralisada ao ouvir a doce palavra. Ela queria se afastar do abraço para olhar para a namorada que acabara de sussurrá-la em seu ouvido, mas Ing a segurou firmemente pelo pescoço.","\"Não.\"","\"P-por quê?\" \"Estou envergonhado!\"","A voz abafada contra seu pescoço fez Napatr rir e sorrir diante da fofura de sua namorada baixinha. Ing já era fofa antes de começarem a namorar, mas agora que o relacionamento era oficial, ela estava ainda mais adorável. \"Como é que eu vou conseguir ir para outro lugar? Você é tão fofo(a).\" \"Exatamente. Não vou deixar você ir a lugar nenhum.\" \"De qualquer forma, não vou a lugar nenhum... a não ser para trabalhar.\"","Ing soltou os braços do pescoço da outra pessoa. Assim que a libertou, virou o rosto, corando com o termo que acabara de usar. Ela só queria agradar Napatr e usar um termo gentil, mas não esperava ficar tão envergonhada.","Napatr sorriu amplamente e inclinou o queixo da namorada para que a encarasse. Seus olhos brilhantes fitaram o belo e doce rosto que a havia encantado desde o primeiro instante. O doce sorriso de Ing iluminava seu rosto, e seus olhos semicerrados a faziam parecer bela e preciosa. Napatr inclinou-se, pressionando o nariz contra a bochecha macia e corada da namorada, e depois roçou o nariz de brincadeira no de Ing. Rapidamente, ela apoiou as costas de Ing enquanto a mulher menor se acomodava em seu colo, envolvendo os braços em volta do pescoço de Napatr.","Ing deu um leve beijo nos lábios de seu amado antes de oferecer o doce sorriso que Napatr tanto amava. Seus dedos roçaram os cabelos na nuca de Napatr, amontoando-os levemente enquanto Napatr começava a beijar seu pescoço de forma brincalhona. Ing teve que recuar, temendo que a outra mulher ficasse travessa e faltasse ao trabalho. \"Você deveria voltar ao trabalho.\" \"Suponho que sim.\" Sempre que estavam perto, Napatr sentia-se tão cativada que queria ser travessa e ficar. Mas ela sabia que não devia. Era médica e tinha de cuidar dos seus pacientes da melhor forma possível.","\"Vou pedir o jantar para nós.\"","\"Vou pedir. No meu lugar de sempre; eles entregam aqui.\" \"Hum.\"","Ing desceu do colo do amado e ajeitou a camisa de Napatr, que estava amassada por causa da proximidade. Ficou na ponta dos pés para beijar o queixo de Napatr com ternura, sabendo que era hora de ir embora. \"Vou esperar aqui.\" Napatr assentiu com a cabeça e inclinou-se para pressionar seus lábios contra os de Ing mais uma vez. Ver aquelas belas sobrancelhas se juntarem e as bochechas vermelhas de Ing fez seu coração se encher de alegria.","Ela estava tão feliz por estar com Ing assim. Ing observou as costas do seu amado desaparecerem do quarto, antes de pegar uma almofada do sofá e abraçá-la com força contra o peito. Um sorriso tímido surgiu em seus lábios. O toque, os sorrisos e o olhar de Napatr a deixaram incrivelmente feliz.","Apesar de dizer a si mesma que queria dar descanso ao seu coração, apesar de dizer que queria amar a si mesma primeiro, ela havia se perdido completamente para Napatr.","Ela nunca esperou que Napatr a emocionasse tanto, mas de alguma forma ela se entregou completamente, sem nem mesmo perceber quando tudo começou. .","sunyan"],"wordCount":2873},{"title":"19. A palavra 'amor'","paragraphs":["Napatr estacionou o carro ao entrar em casa. Seu portão da frente estava escancarado porque alguém que conhecia sua rotina de trabalho o havia deixado aberto para esperá-la. Ela sorriu ao ver seu próprio carro, que sua namorada baixinha vinha usando no último mês, estacionado em seu lugar de sempre. Hoje foi seu último plantão noturno. Depois de sair do trabalho, apesar de estar sonolenta e exausta devido a uma cirurgia de emergência de quatro horas na noite anterior, chegar em casa e encontrar alguém esperando por ela fez com que toda aquela fadiga desaparecesse instantaneamente. Parecia que ela não tinha passado a noite inteira trabalhando duro. O sorriso que estivera em seus lábios desde que chegara se alargou quando a porta de vidro da garagem deslizou para o lado, no mesmo instante em que o portão se fechou atrás dela. O belo rosto de sua namorada, de estatura pequena, surgiu imediatamente em sua visão. \"Patr.\"","Napatr amparou a mulher baixinha que se atirou em seu abraço e riu baixinho. Ing ainda estava com seu pijama fofo. Seu cabelo vermelho-vinho havia sido tingido de castanho-caramelo na semana passada porque sua namorada disse que gostava mais dessa cor. Ing perguntou a opinião dela sobre qual cor ela preferia ou se gostava do novo tom, mas Napatr simplesmente respondeu que, independentemente da cor do cabelo de Ing, ela o amava da mesma forma. Você está cansado? Ing inclinou a cabeça, pressionando as palmas das mãos contra o rosto de seu alto amante. Napatr sempre oferecia aquele mesmo sorriso gentil. Ing ficou na ponta dos pés para dar um leve beijo nos lábios sem maquiagem do médico.","Na noite anterior, Napatr havia lhe contado sobre uma cirurgia de emergência que levaria pelo menos quatro horas, dependendo da complexidade. Ing não entendia completamente a parte médica, mas ouviu atentamente e sabia exatamente o quão talentoso era seu amado. era. Napatr balançou a cabeça antes de entrar na casa com a mulher franzina em pé sobre seus pés. Ing era tão leve que Napatr conseguia carregá-la pela casa sem se cansar.","Apesar de ser tão pequena, quando ficava zangada, aqueles dedinhos finos podiam beliscar de forma bastante dolorosa. \"Você... você adora me tratar como uma boneca.\" Ing envolveu os braços no pescoço de seu alto amante, que a carregara até o banheiro privativo no quarto. Era uma distância considerável. Ao chegarem, Napatr a ergueu e a sentou na bancada da pia como se ela não pesasse nada.","\"Você é uma gracinha, igualzinha a uma boneca.\"","\"Que boca suja você tem.\" \"É doce?\" \"É doce.\"","\"Doce como...?\" Ing balançou a cabeça e riu baixinho das brincadeiras da sua amada. Sempre que Napatr trabalhava vários dias seguidos, ela aprendia cantadas ou piadas sem graça para usar com ela. Provavelmente algo que tinha aprendido com a melhor amiga de Ing ou ouvido de algum colega. \"E por que você me trouxe ao banheiro?\" Ing sabia muito bem que Napatr geralmente tomava banho assim que chegava em casa, embora fosse raro ela convencer Ing a fazer o mesmo.","Normalmente, Ing tomava banho primeiro e depois esperava Napatr ir para a cama, já que ultimamente vinha trabalhando no bar todas as noites, apenas para equilibrar o tempo que passava com a mulher à sua frente. \"Quer tomar banho comigo?\" \"Seus músculos estão doloridos? Gostaria de uma massagem hoje? Você está de folga amanhã, não é?\" Napatr vinha trabalhando sem parar há meses. Ing já não ficava com ela no hospital como fazia no início; tinha o seu próprio trabalho para fazer, então ia e vinha, mas ultimamente preferia esperar pela amada em casa.","\"Vou me encontrar com Wan amanhã.\"","\"...\" \"Sobre o sofá.\" Hum! Ing imediatamente estendeu a mão e deu um leve beliscão na orelha do seu amado. O sofá já havia sido substituído, assim como vários outros móveis. Ela só descobriu na semana passada que Napatr simplesmente resolvera o problema com dinheiro.","Ela mandou transportar o sofá grande e as peças combinando para a casa de Wan e, em seguida, encomendou peças de reposição online para serem entregues em um dia por uma quantia absurda de dinheiro. Ela sabia que Napatr era rico, mas o motivo da mudança era demais.","Tudo havia sido substituído por um único momento íntimo que eles compartilharam ali.","Naquela época, Napatr achava que talvez nunca se reconciliassem ou alcançassem a clareza que tinham agora, então ela se desfez de tudo e comprou novos, simplesmente.","porque ela não conseguia parar de ver Ing naquele espaço, sobreposta à lembrança do sofá antigo.","Na verdade, Ing entendeu. Mas a decisão fora tão impulsiva, tão diferente da natureza calma e ponderada de Napatr. \"Se brigarmos de novo, você vai vender a casa?\" \"Vamos brigar de novo?\" \"Somos como uma língua e dentes.\" \"Bem, são órgãos muito importantes. Assim como você.\" \"É claro que sou importante.\" \"Estou falando sério, Ing. Como minha namorada, você é muito importante para mim.\" O que foi isso agora há pouco? Ing balançou a cabeça e deu um sorriso doce para sua amada, cujas mãos estavam ocupadas em seus quadris. Ela fez beicinho, esperando por um beijo, querendo mimá-la.","\"Você está ficando tão adorável.\" Ing enterrou o rosto no ombro forte de Napatr enquanto beijava seu pescoço. Ela ouviu uma risada suave antes que seu pijama fosse rapidamente abaixado até a cintura. \"E você também ficou muito mais travessa.\" \"Senti a sua falta.\" \"Sentiu falta de quê exatamente, querida?\" Ing sabia exatamente o que ela queria dizer. Desde que concordaram em namorar, suas atividades no quarto haviam sido adiadas devido aos seus horários de trabalho. Ela sentiu pena da mulher alta que agora olhava para seu torso nu com olhos brilhantes.","Ing teve que puxar a outra mulher para um abraço, pois não queria encarar um olhar que parecia querer devorá-la por inteiro.","\"Senti sua falta. Senti falta da sua voz.\" \"Dr. Napatr, você é muito travesso.\" \"Um médico também tem desejos.\"","Ing riu e balançou a cabeça novamente. Puxou o pescoço do amado para baixo, recebendo um beijo de desejo. Seus lábios se pressionaram, nenhum dos dois disposto a ceder.","Suas mãos delicadas deslizaram do pescoço de Napatr para desabotoar a camisa de cima a baixo, removendo-a até restar apenas a regata. Ing usou as mãos para empurrar os ombros de sua amada, que estava prestes a se inclinar para frente. Ela moveu a mão para colocar um dedo sobre os lábios de Napatr, rindo baixinho quando as sobrancelhas da mulher alta se franziram em confusão. \"Com pressa?\" \"N-não.\"","Napatr respondeu hesitante. Ela estava com pressa? Não exatamente. Ela apenas sentia muita falta de tudo em sua linda namorada. Principalmente com aqueles olhos brilhantes a encarando agora, ela queria saborear cada parte dela para satisfazer o desejo, mas não queria apressar ou forçar a barra como lhe haviam pedido. \"Não vou a lugar nenhum. Posso ir preparar algumas coisas primeiro?\" \".....\"","\"Querida, você pode preparar o banho para mim?\" \"Você não vai demorar, né?\" \"Não vou.\"","A bela namorada de Napatr deu um último beijo na bochecha dela antes de sair do espaçoso banheiro. Provavelmente, ela ia preparar as roupas e ligar o ar-condicionado, como de costume. Ing era adorável e extremamente responsável. Pequenos detalhes que Napatr às vezes deixava passar eram coisas que sua namorada jamais negligenciava, especialmente se envolvessem Napatr. Napatr havia sido repreendida pela grande quantidade de café que bebia diariamente devido ao trabalho, mas Ing continuava sendo gentil. Mesmo sem poder trazer pessoalmente, pedia que o cardápio favorito de Napatr fosse entregue todos os dias. Era um cuidado extra que Napatr adorava. Quem não gostaria? Talvez alguém, mas certamente não Napatr. Os rumores sobre elas se espalharam pelo hospital e chegaram à mãe dela e à sua avó, que moram no exterior, desde o segundo dia em que Ing a acompanhou no hospital.","Ela agradeceu a atenção de todos em informar sua mãe antes mesmo que ela tivesse tempo de encontrar as palavras certas para lhes dizer isso. Mas sua mãe e sua avó não disseram nada de negativo. Elas estavam felizes e sempre respeitaram suas decisões, grandes ou pequenas. Sempre a ensinaram a amar quem ela quisesse amar, a não forçar seu coração e a não ser impaciente.","Mamãe disse que, quando estava cortejando sua mãe, foi incrivelmente paciente, comprando café e anexando bilhetes todos os dias durante meses até que sua mãe aceitasse seu amor. Outra coisa pela qual Napatr se sentia mais sortuda do que a mãe era que sua esposa não era tão feroz quanto a esposa da mãe, que era tão feroz que até a tia Mol se sentia intimidada e temia a mãe. Até hoje, Napatr ainda não entendia por que a tia Mol temia mais a mãe do que a própria esposa.","\"O que está em sua mente?\" Napatr se virou e viu sua namorada, que havia aparecido sem que ela soubesse quando. Ing estava de costas para tirar o roupão, exibindo um corpo esguio e nu que fez Napatr engolir em seco. Ing era de fato pequena, mas suas curvas eram enganosamente voluptuosas, tornando-a incrivelmente sexy. Seus seios arredondados, com belos mamilos salientes, permaneciam firmes, fazendo Napatr engolir em seco por reflexo. Aquelas belas pernas caminhando em sua direção quase fizeram Napatr prender a respiração quando Ing se sentou na borda da banheira perto dela.","O aroma do perfume que chegou ao seu nariz fez com que Napatr desviasse o olhar do peito da namorada para encontrar o olhar da pessoa sentada na beirada, mais alta que ela. Dedos finos deslizaram pelos ombros de Napatr, causando-lhe um arrepio que a fez enrijecer. Sua linda namorada tinha um jeito especial de encantá-la, fazendo-a ansiar por cada toque. Não era a primeira vez que elas tinham intimidade, mas Ing nunca havia usado um perfume tão sedutor para ela. Ou talvez fosse porque essa era a primeira vez que eles teriam intimidade desde que começaram a namorar oficialmente. Quanto mais pensava, mais tempo perdia. Napatr segurou o braço da namorada antes de pegar aquela mãozinha e beijar o dorso dela, como gostava de fazer, com ternura.","\"Eu estava pensando que neste Natal, quero te levar para casa.\" Ing sorriu e acenou com a cabeça, aceitando de bom grado o convite de seu amado. Dada a idade deles e o relacionamento atual, era algo sério e estável, não passageiro como os que haviam vivido antes. Levar o amante para conhecer a família era algo que ela também havia considerado; ela só estava esperando que o amante estivesse livre.","\"Vou levar essa nora para prestar homenagem às minhas mães. Vou levá-la para mostrar à minha mãe que minha namorada é muito bonita.\" \"Sua mãe também é muito bonita.\" E Ing só havia descoberto recentemente que a mãe de seu amante era professora de medicina, e não professora universitária como ela havia entendido inicialmente. Napatr não disse nada, apenas observou sua namorada, que se virou para a banheira, passando os braços em volta do pescoço de Napatr. Duas pernas esbeltas desceram para se alargarem nas costas da mulher alta, fazendo seus lábios se curvarem em um sorriso. Ela realmente amava esse lado de Ing, o lado que a impedia de pensar em qualquer outra coisa, completamente fascinada por tudo o que Ing era. Napatr ergueu os olhos para o belo rosto de sua amada, agora corado de um vermelho intenso. A outra mulher provavelmente estava tímida em relação ao que fazia, mas era algo encantador, apaixonado e incrivelmente sensual. Ela se virou para encarar sua amada, mas aquelas mãos delicadas rapidamente se moveram para cobrir a área sensível na altura dos olhos de Napatr, fazendo-a rir. E, no entanto, os lábios de Napatr começaram a beijar as coxas lisas e finas que, de bom grado, abriram caminho para que seu corpo se movesse entre elas. \"Por que você está encobrindo isso?\" \"Eu sou tímido.\" \"Mas você é tão sexy. Não pode se cobrir?\" Ing balançou a cabeça em sinal de negação. Mesmo tendo sido ela quem se sentou primeiro para ficar a cavalo sobre a outra mulher na banheira, quando encontrou os olhos brilhantes de Napatr, ficou tão envergonhada que precisou se cobrir assim. Ela conhecia bem as preferências de Napatr. A outra mulher adorava fazer amor e ter intimidade no banheiro muito mais do que na cama espaçosa. Ela adorava tocar Ing com os lábios em todos os lugares, e Ing adorava isso tanto quanto ela.","Napatr cedeu aos seus desejos. Seus lábios traçaram um rastro de beijos desde os joelhos, sua língua deslizando até a parte interna das coxas, aproximando-se da pequena mão que escondia seu belo ponto sensível.","Ela olhou para a namorada, sem nunca desviar o olhar, antes de passar a língua intencionalmente pelos dedinhos que cobriam levemente o que ela sentia falta.","Sua língua saboreou a umidade de Ing, que escorria e se espalhava entre seus dedos, fazendo os lábios de Napatr se contraírem em um sorriso satisfeito. Ela pressionou intencionalmente os lábios contra o dorso da mão de Ing, forçando a palma da mão de Ing a pressionar aquele ponto até ouvir um leve gemido. \"P-Patr... v-você é travesso.\" Ing repreendeu em tom de brincadeira antes de afastar a mão da área sensível que, de qualquer forma, acabaria nas mãos do seu amante. Envergonhada, Ing levou a mão ao rosto e, com a outra, apoiou-se na borda da banheira para manter o equilíbrio.","Ela sentia vergonha porque a umidade em seu corpo denunciava o quanto sentia falta do toque do parceiro. Sentia vergonha porque, não importava quais métodos ou olhares Napatr usasse, ela sempre acabava perdendo. \"Você é linda.\" Napatr depositou um leve beijo na área sensível e úmida de sua amada, com os olhos fixos naqu para frente e para trás bem diante dela.","Com os olhos arregalados, Napatr ficou paralisada, sem saber o que fazer. Ao ouvir os gemidos, seu coração disparou descontroladamente.","Ing afastou os dedos de sua própria área sensível antes de usar dois dedos para traçar os lábios ligeiramente entreabertos de sua amada. No instante em que seus dedos tocaram aqueles lábios, a língua perversa da pessoa sentada mais abaixo, ao nível de sua área sensível, imediatamente se moveu para lamber seus dedos. Ing afastou a mão antes de usar a outra para tocar seu ponto sensível mais uma vez. Ao ver para onde sua amada olhava, a parte do corpo que ela queria que visse, não pôde deixar de sorrir satisfeita. Napatr sentiu como se fosse parar de respirar ao se deparar com essa versão apaixonada e sedutora de sua namorada. Os dedos finos que a acariciavam estavam de volta ao lugar, e Napatr queria ver o que sua namorada sexy faria.","Os dedos indicador e médio de Ing foram pressionados entre as duas dobras antes de as separar, fazendo o coração de Napatr disparar ao ver o belo e proeminente mamilo sensível. O caminho estava repleto de desejo, a umidade fluía como um riacho que Napatr não pôde deixar de engolir. \"Lambe.\" Nesse momento, se sua namorada lhe dissesse para mergulhar o rosto na água, ela provavelmente o faria. Napatr aproximou o rosto da área sensível e molhada, imediatamente deslizando a língua pelo caminho percorrido por Ing. Quanto mais ouvia os gemidos doces, mais gostava. Seu queixo e lábios ficaram úmidos com o néctar do desejo da namorada, e ela sentiu que ia desmaiar.","Napatr passou a língua pelos lábios, umedecendo-os com a saliva, alternando entre sugar os lábios e inclinar a cabeça para sugar os lábios da namorada.","caminho sem querer se desviar. Mãos delicadas a arranhavam, empurravam e a pressionavam contra si, encorajando ainda mais Napatr. Sua língua deslizava para cima e para baixo, arrastando-se intencionalmente para baixo para encontrar a fonte da umidad ","\"Querida... eu... hmph... eu...\" \"Hum... você gostou?\" \"Você consegue ir mais rápido? Ah!\"","Seu pedido não foi ignorado como ela temia. Seu ápice foi estimulado pela língua veloz até que seus quadris não conseguissem mais se manter na borda da banheira, movendo-se instintivamente ao encontro da língua e dos lábios de seu amante. Ao ouvir o zumbido na garganta da mulher alta, Ing sentiu ainda mais prazer. Enquanto sua amante usava as mãos para acariciar seus quadris e lamber rapidamente, Ing atingia o ápice novamente. Ing se tensionou, seu corpo se contraindo contra os lábios do amante enquanto chegava ao clímax mais uma vez. Estava sem fôlego após as duas rodadas consecutivas, quase incapaz de respirar. Percebeu que havia liberado seu desejo até que ele se espalhasse por seus quadris, que o amante segurava perto de seus lábios. Seu ponto sensível, que estava sendo estimulado continuamente, pulsava visivelmente. Ing só então percebeu que estava sendo amada em uma posição nova e mais apaixonada quando o belo rosto de seu amante, manchado com o néctar de Ing, ergueu o olhar para encontrar o dela depois de soltar suas pernas.","Napatr beijou sua amada no instante em que deixou aquelas pernas torneadas tocarem o fundo da banheira, sentando-se entre elas como antes. A pequena língua de Ing lambeu os lábios de Napatr, que estavam úmidos com seu próprio néctar, de forma sedutora. Os dedos finos de Napatr, que apertavam as coxas lisas, deslizaram perto da área sensível que ainda tremia levemente por ter acabado de gozar duas vezes.","Seus dedos indicador e médio esmagaram o ápice úmido até que sua namorada puxou seu pescoço para um beijo. Ing chupou seus lábios, alternando entre os de cima e os de baixo, antes que sua língua travessa provocasse a de Napatr de forma sensual.","Essa foi a primeira vez que fizeram amor e liberaram o desejo que sentiam um pelo outro sem reservas, e ela adorou. \"Hum... Q-querida...\" Ing afastou os lábios e abraçou o pescoço do amado com força ao sentir os longos dedos de Napatr deslizarem por sua intimidade úmida. A outra mulher moveu dois dedos para dentro e para fora suavemente antes de os mergulhar fundo na base, fazendo com que Ing fechasse os olhos e gemesse no ouvido da sua amada, incapaz de se conter.","\"Dói?\" Ing balançou a cabeça, gemendo baixinho enquanto seu amante movia seu pulso delicadamente.","Então, Napatr baixou o rosto até os seios de Ing, que balançavam com o movimento do pulso abaixo. Ela soltou um gemido alto quando a língua travessa roçou rapidamente os mamilos que se erguiam firmes, carregados de emoção. A intensidade do movimento abaixo aumentou até que seus gemidos se tornaram incoerentes. Napatr sorriu e afastou os lábios dos belos seios da namorada antes de beijar os lábios franzidos e ofegantes. Os olhos úmidos e turvos encontraram os dela antes de desviarem o olhar rapidamente.","O corpo da sua linda namorada estava corado e macio em todos os lugares que ela tocava. Napatr mordiscava intencionalmente os mamilos, alternando com chupadas conforme seu humor ditava, antes de mover o pulso para levar sua namorada ao ápice mais uma vez rapidamente.","Ing abraçou seu amado alto com força enquanto atingia o êxtase novamente tão rapidamente que chegava a ser constrangedor. Seus lábios estavam entreabertos, a respiração curta e ofegante, o coração acelerado mesmo sem ter feito nenhum esforço. Então, ela foi erguida pelo seu amado e colocada na mesma posição em que era carregada, com o corpo flutuando. Ela teve que entrelaçar as pernas firmemente na cintura fina de Napatr. Ao fazer isso, sua área sensível pressionou firmemente contra o abdômen forte de Napatr. A outra mulher sabia disso, então apertou ainda mais os quadris de Ing e os pressionou contra seu abdômen até que Ing soltou um gemido. \"Minha pequena Ing está tão molhada.\"","Ing beliscou o ombro do seu amante, que se dirigira a ela de maneira diferente.","Ing vinha pedindo isso ao longo do último mês, mas Napatr nunca se autodenominava 'P', porém, durante o ato sexual, ela usou esse prefixo e isso fez com que Ing quisesse lhe dar um tapa até que ela ficasse toda vermelha. E era verdade o que Napatr tinha dito. Embora pretendessem ficar juntas na banheira, ela só ficou molhada em alguns lugares. Primeiro, sua área sensível, pressionada contra o abdômen de sua amante, estava tão molhada que ela não conseguia distinguir o que era seu próprio néctar e o que era a saliva da outra mulher.","A outra parte eram os seios dela, pressionados contra o amante enquanto Napatr a carregava para algum lugar. Estavam encharcados com a saliva de Patr, pois a mulher alta havia passado um bom tempo usando a língua ali. \"O-onde você está me levando?\" Ela não discutiu porque não conseguia escapar da verdade de que estava mesmo molhada, como seu amante havia provocado.","\"Para trocar de lugar. Eu também quero ficar perto de você, Ing.\" O humor de Napatr estava melhorando constantemente, e ela não conseguia se acalmar a menos que se agarrasse à namorada franzina que carregava em direção à pia. contador. \"Você é tão doce e fala pelos cotovelos enquanto faz amor.\"","Ing mordeu o lábio enquanto suas pernas se abriam mais uma vez. O corpo nu e musculoso de sua amada estava bem à sua frente. Ing só conseguia acariciar os ombros fortes de Napatr e segurar seus braços enquanto suas partes íntimas se pressionavam, uma posição habilmente arranjada por Napatr. \"Sou boa de papo mesmo sem fazer amor.\" Ing corou ao ouvir o gemido profundo da outra mulher enquanto pressionavam suas áreas sensíveis. Sentindo prazer, Ing ergueu os quadris e abriu bem as pernas para facilitar as estocadas de Napatr. Quanto mais Napatr inclinava a cabeça para trás até que os músculos do pescoço ficassem à mostra, mais inquieta Ing ficava. Ela não entendia como sua namorada podia ser tão atraente.","Aqueles olhos penetrantes e nebulosos fitavam o horizonte com um leve sorriso, seus lábios soltando suspiros irregulares enquanto seus quadris continuavam a se mover, roçando e se movendo sem parar. Ing sentiu como se fosse parar de respirar por causa de tudo naquela pessoa à sua frente. \"Humph... D, querida... Eu... Eu estou...\" Como ela recebia amor sem parar, atingiu o auge rapidamente. O som do néctar delas ecoava no espaçoso banheiro. Parecia lascivo, mas ela adorava ouvi-lo. Ela adorava como sua amada demonstrava o quanto a desejava.","Ela adorava ser amada por Napatr. \"P'Patr quase lá também.\"","A palavra 'sis' e a palavra 'there', incluindo o som da respiração ofegante, fizeram com que Ing levantasse os quadris para receber o toque, ansiando por alívio da mesma forma. Mas então ela teve que abraçar o pescoço do seu amante com força quando Napatr se inclinou para sugar e lamber rapidamente seus seios, que se moviam com as investidas lascivas da pessoa acima, antes que finalmente alcançassem o êxtase juntos.","Napatr ofegava com a boca entreaberta contra o peito da namorada, os quadris se movendo suavemente, ainda pressionados um contra o outro. O néctar delas estava úmido e escorria por suas pernas, provando o quanto elas apreciavam o toque uma da outra.","Ela se ergueu para beijar a bochecha de Ing, seu queixo e seus pequenos lábios, fitando aqueles doces olhos ainda turvos pela paixão, antes de abrir um sorriso.","\"Amor, eu te amo.\" De \"gostar\", rapidamente se transformou em \"amar\" em apenas alguns meses. Napatr não achava que fosse rápido demais, pois seus sentimentos estavam claros desde o início. E ela mal podia esperar, esperar para ouvir a palavra \"amor\" de sua namorada baixinha também. Os olhos de Ing se encheram de lágrimas ao ouvir a palavra \"amor\" misturada ao som de exaustão e à voz trêmula da mulher alta. Embora fosse uma confissão em um momento inoportuno, seu coração disparou ao ouvi-la. \"C... confessando... hum... agora?\" \"Sempre que eu te digo que te amo.\" Ing só conseguia abraçar com força o corpo alto do seu amado. As palavras doces, o olhar firme e sério, misturados com o calor e a segurança, contrastavam fortemente com os quadris que ainda se esfregavam contra sua área sensível. Ing não sabia por quanto tempo seu amado, movendo-se contra ela e sussurrando em seu ouvido, continuaria a amá-la assim. Mas Ing adorava ser amada e ouvir a palavra 'amor' naquele momento.",". sunyan"],"wordCount":4697},{"title":"20. Ouro rosa","paragraphs":["Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026","Cópia: . . Você está acordado? Ing se virou na direção da voz. Napatr estava deitada de lado, apoiando a cabeça na palma da mão, a poucos centímetros de distância. Ing sorriu antes de estender a mão para abraçar o pescoço da amada, erguendo a cabeça para depositar um beijo suave no queixo de Napatr antes de fechar os olhos novamente.","\"Que horas são?\" Ela perguntou com a voz abafada. Sentiu o toque suave dos lábios de Napatr pressionando repetidamente sua testa até que não conseguiu conter o sorriso, mesmo com os olhos ainda fechados.","\"Três da tarde.\" \"Humph... você... P'Patr, a que horas você acordou?\" O rosto de Ing corou. Ela se sentiu tímida ao usar essa nova forma de se dirigir a ela, chamando deliberadamente sua amada de 'P', tão tímida que enterrou o rosto no peito nu de Napatr.","\"Na verdade, P'Patr ainda não dormiu.\"","Napatr sorriu, rindo carinhosamente da sua namorada baixinha, que estava corada da cabeça aos pés, mesmo que Ing tivesse sido quem iniciou o novo termo assim que acordou.","\"Por que você não dormiu?\" Ing afastou o rosto do peito de Napatr e deitou-se de lado, passando os dedos pelo rosto liso do amado, onde um sorriso permanecia fixo. \"Eu queria ajustar meu horário de sono.\" Ing assentiu com a cabeça antes de se sentar na cama. O cobertor escorregou, quase expondo seu torso nu, obrigando-a a segurá-lo rapidamente. Nesse processo, o rosto de seu amado acabou escondido sob o cobertor.","Apesar de sua intenção de se esconder daqueles olhos brilhantes, um erro por descuido fez com que seu amante visse seu peito de qualquer maneira. \"Como você conseguiu esconder e ainda assim me deixar ver?\"","Napatr riu, puxando o pequeno corpo da namorada para um abraço. Seu rosto estava pressionado contra a lateral daqueles seios arredondados e descobertos. Ela encostou o nariz neles, inalando o perfume, antes de distribuir beijos por todo o belo peito da pequena mulher.","\"P...Patr.\" \"P'Patr.\"","\"Humph!\" \"Ou prefere me chamar de 'Querida', como fez esta manhã?\" Ing queria repreender e dar um tapa em seu amante brincalhão e travesso. As provocações de Napatr faziam seu rosto e pescoço queimarem incontrolavelmente. Enquanto o nariz e os lábios de Napatr percorriam seu peito, enviando arrepios por todo o seu corpo, Ing sentiu uma onda de irritação divertida.","\"Você não vai... você não vai comer?\" \"Há algo ainda mais delicioso aqui.\" Napatr afastou os lábios e olhou para a namorada, que acabara de abrir o cobertor para lhe fazer a pergunta. Seus doces olhos estavam cheios de significado, brilhantes e encantadores.","Seus lábios carnudos estavam mordidos com força porque Napatr estava demorando perto de seus belos e firmes seios. Napatr não sabia se aqueles \"kumquats\" estavam firmes por causa dela ou por causa do ar-condicionado. \"Kumquats.\" \"O que você quer dizer com kumquats?\" Napatr respondeu com um beijo nos kumquats, nome que lhes dera arbitrariamente, antes de entreabrir os lábios para levar um à boca, chupando-o suavemente.","\"Ah, ah! P... P'Patr!\" Ing deu um tapa nas costas da mulher alta com toda a sua força enquanto Napatr rastejava sobre ela, chupando seus seios e lambendo-os rapidamente.","Uma onda de prazer percorreu seu corpo, do peito até a parte inferior do abdômen. Ing apertou as pernas enquanto sua excitação atingia o ápice. Ela queria beliscar as orelhas grandes da sua amada para se vingar por ela ter sido tão atrevida a ponto de dar um nome assim aos seus seios.","\"P-por que kumquats?\" Ela tentou manter a compostura, segurando o queixo da amada para afastá-la de seus mamilos. Napatr não resistiu. Apenas sorriu, com os lábios úmidos, antes de se erguer para que seus rostos ficassem na mesma altura. \"Porque são de cor laranja.\"","\"Você é muito travesso.\" \"Só com a minha esposa.\" Ing queria elogiá-la por ser tão adorável a ponto de chamá-la de \"esposa\", mas não queria dar muito crédito àquela mulher alta e teimosa. Ela acariciou o rosto de Napatr e deu um beijo leve naqueles lábios travessos. \"Você está muito travesso(a). O que você quer comer? Eu preparo para você.\" \"Você.\" \"Com licença?\"","\"Nong Ing.\" Ouvir o nome 'Nong Ing' ser chamado com uma voz tão suave, calorosa e cheia de afeto tornou sua resposta óbvia, e a deixou completamente sem jeito. \"Ah! Você! Por que suas mãos são... hum... tão rápidas?\" \"Você já está molhada.\"","Ing agarrou os ombros da sua amada enquanto as pontas dos dedos de Napatr começavam a percorrer sua área sensível, que estava reagindo e ficando encharcada com o toque da mulher alta. Ela respirava fundo e ritmicamente, mas os longos dedos de Napatr não cooperavam. Mesmo sendo um toque leve, obrigava Ing a expirar pesadamente para aliviar o prazer insuportável. Ing empurrou os ombros de Napatr para trás, sentou-se e afastou a mão de Napatr de entre suas pernas, empurrando-a para baixo, deitada na cama. Ela rastejou por cima do abdômen forte da outra mulher, mas teve que se segurar nos ombros da pessoa em quem estava sentada, porque Napatr se ergueu para se apoiar na cabeceira da cama com uma risada que merecia um tapa. \"Sua menstruação está para chegar?\"","Napatr estendeu a mão para massagear os seios da namorada, depois parou para contar mentalmente o próprio ciclo menstrual antes de balançar a cabeça. Ela sorriu diante da adorável suposição da namorada. Napatr simplesmente sentia muita falta de cada parte da pequena mulher. Ing balançou a cabeça e sorriu, arqueando as costas para oferecer de bom grado o peito para que seu amante o massageasse. Ela sentiu prazer com os seios nas palmas das mãos de Napatr e prazer com sua intimidade úmida pressionada contra os músculos do abdômen de Napatr. Ao ver aqueles olhos brilhantes cheios de desejo, o sorriso dela só aumentou. Ver o quanto seu amante gostava de tocá-la e o quanto ela o desejava fez com que Ing se sentisse satisfeita. Ing pressionou a mão sobre a de Napatr, que apertava seu peito para controlar o ritmo, antes que seus quadris começassem a se mover, girar e pressionar sua área sensível contra o abdômen de sua amada no ritmo que ela preferia. Os ouvidos de Napatr zumbiam e sua visão ficou turva quando a mulher menor moveu os quadris contra seu abdômen. O contato suave e úmido com o ponto sensível de Ing produziu sons fracos, o calor viscoso se espalhando por seu estômago até que ela mal conseguia respirar. O rosto corado da outra, aqueles olhos brilhantes fixos nela, e seus lábios carnudos presos entre os dentes, Sua linda namorada era tão sexy que Napatr não conseguia descrever em palavras o fascínio que sentia. \"Querido.\" \"Sim, querido?\" \"Devo fazer isso por você?\" Ing balançou a cabeça e sorriu, inclinando-se para acariciar os próprios seios, apertando-os suavemente antes de oferecer seus mamilos firmes aos lábios de Napatr, querendo mimar seu amante excitado. \"Você não queria me comer?\"","\"...\" \"Então coma. Coma bastante, mas não faça maldade.\"","Napatr não a fez esperar. Ela reuniu os belos mamilos que a aguardavam e os levou imediatamente à boca. Fechou os olhos, chupando e lambendo seus pontos favoritos, enquanto 'Pequena Ing' se esfregava contra seu estômago sem restrições.","Napatr adorava tocar sua parceira com os lábios e com o corpo, e adorava o quão sexy sua linda namorada ficava contra sua barriga. Mas agora, Napatr queria comer Ing em outro lugar. Os quadris de Ing tremeram; ela estava quase chegando ao clímax. Mas então, seu amante afastou os lábios de seu peito, fazendo com que Ing envolvesse seus seios com as mãos para oferecê-los novamente.","Em vez disso, a outra mulher a levantou e deslizou para baixo até que seu rosto estivesse na altura da área sensível de Ing, num movimento rápido, porém constrangedor.","\"P'Patr...\" \"Abaixe-se.\" O rosto de Ing ardeu. Seu coração disparou ao ver o rosto de seu amado em tal situação embaraçosa. Mas, movida pelo desejo de agradá-lo e por estar pronta para se entregar às suas emoções, ela lentamente se aproximou dos lábios receptivos de Napatr. Napatr quase se esqueceu de respirar quando ouviu o doce gemido da namorada no instante em que seus lábios tocaram aquele ponto sensível, lindo e úmido. Ela fechou os olhos, lambendo suavemente, chupando e beijando com obsessão. Quanto mais tocava, mais lubrificado ficava, mais ouvia os gemidos doces e mais sua namorada esfregava os quadris contra sua língua de forma sensual.","Napatr deslizou a língua mais para baixo antes de entrar no caminho da namorada. Ela manteve a língua firme e não se decepcionou; Nong Ing imediatamente começou a","Mova-se suavemente para cima e para baixo contra a língua dentro dela.","Seus lábios e a ponta do nariz estavam úmidos de néctar. Napatr não se importou; ela adorou. Envolveu os quadris de Ing com os braços, erguendo levemente a cabeça para sugar o ponto sensível até que um gemido incontrolável ecoou pelo quarto.","Quanto mais ela ouvia, e quanto mais as pernas que segurava começavam a tremer, mais ela lambia e chupava até que o corpo da namorada se tensionasse e se contraísse em ritmo, sinalizando que ela havia levado Ing ao paraíso com seus lábios.","\"E, chega, querida.\" Napatr atendeu ao pedido, depositando um último beijo suave na área sensível. Ing desabou, ofegante de exaustão, sem se importar que o rosto de Napatr ainda estivesse em suas coxas, percorrendo-as com beijos do nariz e dos lábios. Napatr buscou a umidade novamente. Agora que Ing estava exausta e não oferecia resistência, Napatr abriu bem aquelas pernas esbeltas antes de se aproximar para dar um beijo em seus lábios ofegantes. Ela olhou para sua própria área sensível e para a de Ing por um instante antes de pressioná-las juntas, sem deixar nenhum espaço. Ing olhou para seu amado com olhos turvos enquanto Napatr esboçava um pequeno sorriso. Ela soltou um gemido fraco, sem forças para impedi-lo. Ela só conseguia abrir bem as pernas, facilitando para a mulher alta se mover, se esfregar e roçar suas áreas sensíveis até que sons lascivos pudessem ser ouvidos.","Suas mãos delicadas agarraram os ombros de Napatr antes de puxá-la para um abraço apertado, até que seus peitos se pressionaram um contra o outro. \"É bom?\" \"Hum... ah... está bom. Um pouco mais rápido, querida?\"","Mais uma vez, sua amante atendeu prontamente ao pedido. Ing gemeu incoerentemente, agarrando-se à namorada que a penetrava e se esfregava contra ela sem diminuir o ritmo.","\"Você... você está perto?\" \"Eu... eu estou perto.\"","\"Então comigo.\" O corpo de Ing se contraiu, gemendo e soluçando com o amor que lhe era dado, seguido imediatamente por seu amante se tensionando e soltando um gemido profundo e prazeroso. Assim que terminaram, Napatr desabou sobre a namorada. Continuou a se esfregar suavemente contra ela, os lábios ofegantes pelo ritmo, enquanto descansava no pescoço de Ing.","Sua mão esbelta e bonita acariciou as costas úmidas de suor da outra pessoa antes de deslizar até seus quadris, apertando-os em um ritmo que fez Napatr sorrir. \"Nem pense em reclamar.\" \"Não me provoque... ah.\" Não era como se seu amante fosse o único que a desejasse; ela desejava o amor de P'Patr tanto quanto ele. Ing não sabia por quanto tempo seu amante continuaria a comê-la em vez de refeições, mas ela estava mais do que feliz em deixar P'Patr se fartar. O relógio digital marcava '19:00'. Ing observava sua namorada comer em silêncio do outro lado da mesa. Elas tinham acabado de acordar às 18h, depois de um dia inteiro de amor intenso. Ela teve que pedir comida para entrega e saiu para comer de roupão, daquele jeito. Seu rosto corou ao ver que o robe de Napatr estava aberto o suficiente para que seus músculos ficassem claramente visíveis.","\"Não é bom?\" \"É bom.\" \"Ou você está cansado?\"","\"P'Patr...\" Napatr sorriu. Ela adorava ouvir a palavra \"P\" na voz doce da namorada. Seu olhar vagou pelo pescoço liso e pela curva do busto da pequena mulher, observando os hematomas rosados. Ela não pôde deixar de esboçar um sorriso de satisfação.","\"Por que você está sorrindo?\" \"Gosto das marcas no seu corpo.\" \"Quem os fez?\" \"Eu fiz.\" Hum! Ing balançou levemente a cabeça. Ela não reclamou nem demonstrou desgosto. Essa não foi a primeira vez que a outra mulher deixou marcas de chupão intencionalmente em seu corpo. Todas as vezes, Napatr as deixava em lugares escondidos.","\"Você é um psicopata?\" \"Não.\" Napatr sorriu quando sua namorada respondeu. Ela abriu a boca para aceitar um pedaço de bife que Ing havia cortado e oferecido a ela. Os gestos carinhosos, os nomes, o olhar sincero e doce, o toque gentil e o sorriso encantador que recebeu fizeram Napatr desejar ter férias o ano todo.","Ela não queria ir trabalhar nem a lugar nenhum; queria estar com aquela mulherzinha vinte e quatro horas por dia. \"Preciso ir verificar o bar hoje. Você vem?\" \"Posso ir com você?\" \"Claro. Então se apresse e coma. Vou preparar uma roupa para você.\" \"Está tudo bem. Eu consigo. Você está cansado. Eu faço isso sozinho.\"","Em seu relacionamento, Napatr sentia que não deveria ser apenas uma pessoa fazendo tudo, embora sua namorada o fizesse sempre que possível. Ela não queria que Ing se cansasse. Queria fazer por Ing o que costumava fazer por si mesma.","Ter outra pessoa em sua vida era maravilhoso, mas ela não queria que a mulher que amava com todo o seu coração fizesse tudo sozinha. Ela queria retribuir o favor.","\"Que tal eu escolher uma roupa para você enquanto você toma banho, Nong Ing?\" \"Eu não acho.\" \"Por que não?\"","\"Que tal trocarmos de lugar?\" Ing sugeriu. Ela queria que seu amado participasse da escolha. Trocar de roupa assim parecia divertido, e ela queria ver que tipo de roupa seu amado escolheria para ela.","Napatr sempre usava camisas, até para dormir. Ela se perguntava qual escolheria. Apesar do apelido carinhoso que Napatr usava deixar Ing incrivelmente tímida, a outra mulher agia com tanta naturalidade que era invejável. Ing não conseguia controlar o coração sempre que os ouvia.","Chamar Napatr de 'P' e ser chamada de 'Nong' em troca fazia Ing se sentir amada e pequena, e seu rosto corava a cada vez. E ela queria continuar ouvindo seu amado chamá-la daquele jeito, com aquela voz suave, para sempre. Napatr olhou para a roupa que sua linda namorada havia escolhido para ela e sorriu. Uma camisa preta de mangas compridas e calças largas da mesma cor.","O som de chinelos se aproximando a fez se virar. A mulher baixinha estava de roupão. Seus longos cabelos cor de caramelo, com as pontas cacheadas, estavam molhados. O aroma de sabonete líquido e xampu chegou a Napatr antes mesmo de Ing alcançar a penteadeira. \"Você gosta disso?\" Ing perguntou ao seu alto amante, que estava de pé diante do grande espelho. Seus olhares se encontraram através do vidro. Nas mãos fortes de Napatr estava a roupa que Ing havia escolhido. \"Sim, e você gosta do seu?\" Ing olhou imediatamente para a roupa que seu amado havia escolhido para ela. Um vestido preto que combinava com o de Napatr, mas com as costas abertas até os quadris. Ela ergueu uma sobrancelha. \"Este?\" Ela perguntou surpresa, caminhando até seu amado, que estava sentado em uma poltrona perto da penteadeira. A princípio, ela não entendera por que havia uma poltrona tão confortável no closet, mas combinava perfeitamente. \"Hum-hum. Você não gosta?\" Napatr apoiou as costas de Ing no instante em que ela se sentou em seu colo. Napatr sorriu e beijou os pequenos lábios que lhe foram oferecidos com um biquinho. \"O Nong gostou. Só não esperava que o P'Patr escolhesse essa.\"","O coração de Napatr disparou ao ouvir os apelidos carinhosos. Chamar a si mesma pelo nome era fofo, mas se autodenominar \"Nong\" era ainda mais adorável. \"Por que seu rosto está vermelho?\"","\"Até quando você vai me fazer me apaixonar por você?\" \"A Dra. Napatr já não consegue manter a compostura.\" Ing riu, abraçando o pescoço da amada com força. Acariciou o rosto liso de Napatr com ternura antes de pressionar o nariz contra a bochecha dela num beijo suave. \"Preciso ficar com ele? Estou com minha esposa.\" \"Agora você está se dedicando de verdade.\" Napatr riu e abraçou a namorada, balançando-a levemente de um lado para o outro, feliz. Ela era feliz sempre que estava com Ing assim. Desde o momento em que a situação deles era incerta até agora, quando está mais clara do que nunca, a felicidade que ela sentia só aumentou. Ela afastou a mão dominante do abraço. Ing observou sua mão abrir uma gaveta próxima. Napatr procurou o objeto que ela havia colocado ali, retirando um estojo de veludo azul-marinho antes de fechar a gaveta.","Os olhos de Ing se arregalaram ao ver sua amada tirar uma pequena caixa. Ela sabia o que havia dentro. Seu coração disparou ao pensar no que a mulher mais velha estava prestes a fazer. O braço direito de P'Patr a sustentava como antes, com a caixa em sua mão bem à frente deles.","Napatr empurrou a caixa, abrindo-a. Um anel simples de ouro rosa apareceu diante deles. Ela sorriu, ouvindo o coração da namorada acelerar porque o rosto de Ing estava pressionado contra seu peito. Ela pegou o anel com cuidado entre os dedos e olhou para a namorada, que estava completamente corada, antes de rir carinhosamente. \"Quero ser sua primeira opção. Quando você estiver pronto, quando me amar e quando nossos corações se alinharem, poderemos dar o próximo passo. Posso esperar, estou disposto a esperar.\"","Os olhos de Ing se encheram de lágrimas enquanto ela ouvia o longo discurso de seu amado. Mesmo sem Ing dizer muito, Napatr sempre a entendia perfeitamente. Sempre fora assim. Ela passou o braço direito em volta do pescoço de Napatr para se equilibrar antes de estender a mão esquerda em sua direção como resposta, sem dizer uma palavra. Lágrimas de gratidão e felicidade caíram incontrolavelmente, uma após a outra, até que seu amado deslizou o anel por todo o seu dedo e beijou ternamente o dorso de sua mão, como ela sempre gostava de fazer. Ing acariciou o rosto do seu amado com ambas as mãos, olhando naqueles olhos cheios de uma devoção doce e brilhante. Ela olhou para o sorriso que Napatr sempre lhe dirigia, para o rosto da pessoa por quem ela havia perdido completamente o coração. Ela abraçou sua amada com força enquanto estava sentada em seu colo, ouvindo Napatr sussurrar repetidamente para que ela não chorasse, enquanto a mão de Napatr acariciava seu ombro em um gesto reconfortante.","Ing fechou os olhos, saboreando a felicidade e o momento. Então, beijou a orelha macia que estava ficando adoravelmente vermelha e sussurrou as doces palavras que seu amado provavelmente ansiava ouvir, os sentimentos que já lhe eram claros há algum tempo. \"P'Patr...\" \"Hum?\" \"Eu te amo.\" Ela a amava com todo o seu coração. Ela a amava sem perceber que havia entregado seu coração a alguém. Ela amava a pessoa que jamais imaginou amar. Ela amava muito o P'Patr. . sunyan"],"wordCount":3188},{"title":"21. Não há permissão para","paragraphs":["parar de amar","Nook observou sua filha entrar no bar Wine You, de braços dados com alguém que ela não reconheceu. Ela nunca tinha visto o rosto dessa pessoa, mas havia ouvido rumores há algum tempo de que sua única filha estava conversando com alguém e, claramente, eles tinham passado de \"conversar\" para \"namorar\". Nook não sabia bem o que sentir. Ela não era excessivamente protetora, mas quando Ing se apaixonou por sua melhor amiga, Nook ficou mais preocupada do que qualquer outra coisa. Ao vê-los lá embaixo, debruçados um sobre o outro e cochichando no balcão do bar, ela sentiu uma estranha sensação, como se alguém estivesse roubando seu bem mais precioso.","Apesar da imagem impecável que a acompanhante de sua filha apresentava, sua postura, sua compostura, seu rosto, até mesmo o jeito de andar, como se não encontrasse absolutamente nada de errado... Ela ainda apertava o peito ao ver sua única filha se inclinar para sussurrar perto do rosto da outra mulher, antes de roçar o nariz em sua bochecha enquanto caminhavam de braços dados. \"Por que essa cara triste?\" Aun caminhou até seu amante. Ela estava em Bangkok a trabalho hoje e decidiu parar para tomar um drinque no bar de sua irmã mais nova, onde sua filha era sócia.","Aun seguiu o olhar do seu amado até o chão do bar aconchegante. Ela estreitou os olhos ao ver uma jovem que parecia notavelmente...","parecida com ela mesma, mas com um nível de sensualidade que superava em muito o seu próprio.","\"Essa é a nossa filha. E quem é essa?\" \"Não sei. Talvez a namorada dela?\" \"Aquela de que você me falou?\" O namorado dela acenou com a cabeça antes de puxá-la para perto da janela de vidro. Eles observaram a filha e o estranho trocarem gestos carinhosos lá embaixo. Aun não conseguiu conter o sorriso. \"Sinto um calor estranho no peito.\"","\"Você está sendo uma mãe protetora? Eu acho eles fofos. Nunca vi a Ing sorrir assim ou olhar para alguém com tanta ternura, exceto para gatos de rua.\"","Nook soltou uma risada. Sua filha era gentil, uma característica que herdara completamente da mãe. E Aun tinha razão; ela nunca vira Ing tão feliz, dava para ver a alegria estampada em seu rosto. A outra mulher também tinha um olhar terno, repleto de afeto evidente. O contato físico e a química entre eles pareciam completamente naturais. Se sua única filha amasse alguém, ela só esperava que essa pessoa nunca a machucasse, nem no coração nem no corpo. E aquele que estava ao seu lado agora era mais do que suficiente. \"A Ing não sabe que estamos aqui, sabe?\" Nook perguntou ao seu amado, que olhava com um doce sorriso para a filha deles, que estava lá embaixo demonstrando afeto por outra pessoa.","\"Ela não liga. A Ing não nos ligou nenhuma vez desde que se mudou para Bangkok, depois que aquele negócio com a amiga dela foi resolvido.\" No dia em que a assembleia de acionistas foi convocada para destituir a amiga íntima da filha da sociedade, Aun não permitiu que Ing comparecesse.","Ela temia que a bondade, a gentileza ou o senso de amizade da filha a levassem a proteger o agressor novamente. Inicialmente, Aun temia que sua filha ficasse com o coração partido pelo que estava acontecendo com sua melhor amiga, mas a situação acabou sendo exatamente o oposto.","Sua filha não demonstrou nenhum sinal de tristeza; simplesmente disse: \"A decisão é sua\", antes mesmo de pedir à mãe que vendesse o carro que sua amiga estava usando sem permissão. \"Se eu soubesse desde o início que a Ing gostava do Amp, não a teria mimado tanto.\"","\"Ah, qual é. Você não pode parar o coração. Nem eu consegui parar de te amar.\"","Aun torceu o nariz para sua parceira mais jovem, que tinha sido sua companheira de vida por muito tempo, antes de dar um beijo afetuoso em Nook. nariz.","Seus olhos voltaram-se para sua filha e para uma certa pessoa lá embaixo, duas pessoas que permaneciam alheias ao fato de que mamãe e mamãe observavam suas adoráveis interações sem piscar. Aun então estendeu a mão para acariciar o peito da mãe de seu filho, que tinha uma expressão de dor ao ver Ing nos braços de outra pessoa. \"Você pretende impedir que nossa filha ame alguém?\" Aun perguntou com uma risadinha. Ela entendia bem sua amada; Nook havia criado e amado a garota desde pequena, então não era estranho que ela agisse dessa maneira.","\"Ing estava usando aquilo-\" \"A roupa de anjo rosa na bicicleta com rodinhas? Querida, neste momento sua filha está usando um vestido preto sem costas, e o 'namorado' dela está com a mão na pele nua dela. Você precisa aceitar a realidade, querida.\"","Aun riu enquanto sua co
