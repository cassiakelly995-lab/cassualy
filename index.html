mpanheira apertava o peito com uma expressão triste, como se alguém tivesse levado sua filha para abraçá-la em seu lugar. Tanto Aun quanto Ing estavam cansados do fato de que a mamãe jamais conseguiria esquecer a imagem da filha quando criança, vestida de anjo. Mesmo que Ing tivesse mudado seu estilo para se adequar à sua idade há muito tempo, aquela lembrança permanecia tão vívida quanto um enorme retrato pendurado na parede da sala de estar. . . Enquanto isso, o casal do andar de baixo permanecia completamente alheio ao fato de que estava sob o olhar atento da família dos proprietários do bar de vinhos havia algum tempo.","Napatr sentou-se num banco alto atrás do caixa, não muito longe de seu amante, que estava sentado ao lado dela trabalhando em uma tela de computador; Napatr não entendeu absolutamente nada do que apareceu na tela. De repente, Napatr esboçou um sorriso suave quando sua namorada se virou para olhá-la e se inclinou para perto, como se buscasse afeto. \"Você é tão bonita.\" \"O que... o que deu em você?\"","Ing resmungou em tom de brincadeira. Desde que terminara de arrumar o cabelo e a maquiagem, de casa até o bar, seu namorado não parava de elogiá-la.","\"Mas você realmente é.\" Não era a primeira vez que Napatr elogiava a mulher de baixa estatura daquela forma. Ela achava Ing linda mesmo quando o relacionamento delas ainda não estava definido. Na verdade, ela a achou linda desde o primeiro momento em que viu sua foto de perfil no aplicativo.","\"O que você quer, me bajulando desse jeito? E não me dê uma resposta maliciosa; estou cansada\", disse Ing, desviando o rosto ao ver o brilho travesso naqueles olhos penetrantes logo após sua pergunta.","De repente, sua cintura foi abraçada delicadamente. Aqueles lábios macios e sedutores deixaram um toque doce em seu ombro, fazendo-a largar o teclado do computador para acariciar o rosto da outra pessoa com ternura. \"Tão grudento.\" \"Porque eu te amo.\"","\"Humph, tanto faz. Deixa eu terminar isso primeiro. Mamãe não vai chegar tão cedo.\"","Napatr sorriu ao dar uma olhada na tela do computador, que estava repleta de linhas de números e letras que a deixaram tonta. Ela apoiou o queixo em um ombro delicado, observando o rosto da namorada refletir o brilho da tela. A luz realçava a maquiagem cintilante, daquelas que Napatr não reconhecia, fazendo a mulher pequena parecer ainda mais radiante. Ela não resistiu e pressionou o nariz contra a bochecha macia. \"A mamãe está passando mal? Devo ir ver como ela está?\" \"Você é ginecologista-obstetra?\" \"Ela vai ter um bebê?\" \"Hum-hum. Mamãe vai ter um bebê para a tia Ink.\" Ing sorriu amplamente, lembrando-se da voz animada da tia Ink quando ela ligou para compartilhar a boa notícia no início daquela noite, enquanto seu namorado estava no chuveiro. Sua mãe vinha tentando ter outro filho há muito tempo sem sucesso, mas finalmente, um pequeno estava crescendo dentro da barriga da mãe de Ayre. \"Você quer um?\"","Ing não respondeu, mas seu rosto corou intensamente quando seu amado sussurrou a pergunta contra sua bochecha. E se ela não estivesse pensando demais, a voz da pessoa que apoiava o queixo em seu ombro estava carregada de súplica.","\"Se eu pudesse gerar um bebê, você provavelmente já estaria grávida há muito tempo.\"","\"Você é sempre tão atrevido.\" \"Vamos fazer um depois que nos casarmos?\" \"P'Patr...\"","\"Hum? Você não vai se casar comigo?\" \"Pensei que você tivesse dito que podia esperar?\" Ing se virou para encarar sua amada. Olhando por cima dos ombros fortes da mulher alta, viu os funcionários do bar lançando olhares furtivos com sorrisos tímidos. Ing imediatamente se sentiu constrangida, tendo se esquecido completamente da intimidade e proximidade que demonstravam.","Contudo, seu queixo estava levemente erguido para encontrar o olhar do seu amado. Ing não teve escolha senão desviar o olhar. Naquele momento, sua atenção estava voltada para a pessoa à sua frente, mais do que para qualquer outra pessoa. \"Posso esperar. Estou apenas planejando para o futuro.\"","\"Isso ainda está muito longe de acontecer.\"","\"É tão longe assim?\"","\"Sim. Com você sendo tão atrevido, é muito longe.\" \"Você quer que eu vá para bem longe?\"","\"Não me provoque.\" \"Então você quer que eu fique por perto?\" \"Por que não nos fundimos em uma só pessoa?\", provocou Ing. Se estivessem mais perto, seriam praticamente uma só, ou ela estaria sentada no colo dela. Já estavam perto o suficiente para sentirem o hálito uma da outra e o cheiro de brilho labial, tão perto que ela queria beijar aqueles lábios provocantes só para acabar com a travessura.","\"Como fizemos esta noite, meu bem?\" A imagem deles se unindo no início daquela noite passou claramente pela sua mente. Ing mordeu o lábio, tirou a mão do trabalho e deu um tapa forte na coxa do amante. Ela não sabia como Napatr, que sempre tinha um sorriso gentil, havia se transformado nisso.","\"Você adora ser atrevido comigo.\" Napatr riu da reação fofa e corada da namorada. Ela adorava provocá-la assim, adorava ver o rosto da mulher pequena ficar rosado e adorava quando aquelas mãozinhas que ela podia fechar nas suas a tocavam por timidez.","Na verdade, não importava o humor em que Ing estivesse, ela adorava cada momento. \"Ausente.\" A voz do gerente da loja interrompeu a música e a conversa dos clientes, fazendo com que Ing se afastasse do trabalho e dos braços do namorado. O rosto de Mint, a gerente que trabalhava com ela há anos, estava sombrio, demonstrando preocupação, o que fez Ing franzir a testa. \"O que é isso, Hortelã?\" \"Queria te avisar que a Madame Nook e a Madame Aun estão no bar hoje. Elas estão lá em cima.\"","Ing ficou boquiaberto, em choque. Ao contrário de seu namorado, que manteve um sorriso educado e discreto para Mint, a gerente estava corada e inquieta. A preocupação de Ing desapareceu instantaneamente, substituída por uma emoção diferente. Ela lançou um olhar severo para seu amado, que estava parado ali com um semblante inocente. \"Obrigado. Irei vê-los assim que terminar aqui.\" Ing agradeceu com um sorriso antes de perceber que a gerente ainda encarava seu namorado sem piscar. \"Ah, esqueci de te apresentar ao Patr.\" Napatr ergueu uma sobrancelha ao ver o sorriso da namorada, que parecia estranhamente ameaçador. Ela engoliu em seco instintivamente. \"Esta é a Patr, minha namorada. Provavelmente vocês nos verão juntas por aqui com frequência. Patr, esta é a Mint, nossa gerente do bar.\" \"Olá, Mint. Prazer em conhecê-la.\" \"Prazer em conhecê-lo(a) também.\"","Mint recuou a mão e, instintivamente, fez um wai educado para a namorada de seu chefe. Inicialmente, ela ouvira rumores de que Ing era bastante feroz e rigorosa, mas nunca ouvira dizer que Ing era tão protetora com sua namorada incrivelmente elegante e bonita.","Antes, todos comentavam em segredo que Amp, o melhor amigo do chefe, parecia estar namorando com ela, mas não era verdade; Mint tinha visto Amp levando homens diferentes ao bar e nunca pagando, deixando Ing sempre arcar com as despesas.","Ninguém se atreveu a interferir porque Ing havia deixado claro que não deveriam. Mas agora, a proteção de Ing era dez vezes maior, deixando Mint apenas com um sorriso sem graça, pois ela havia sido momentaneamente cativada por ele(a) sem querer.","O sorriso encantador da namorada de Ing. Napatr retribuiu prontamente a saudação. De repente, um bracinho a envolveu com firmeza, segurando-a com força. Ela podia até sentir as unhas impecavelmente feitas da namorada cravando em sua pele através da blusa.","\"Bem, vou voltar ao trabalho.\" Quando Mint saiu, apenas o casal permaneceu, ainda de pé, abraçado.","Ing olhou para sua amada, que retribuiu o olhar, fitando-a nos olhos. De repente, a outra mulher lhe deu um beijo rápido nos lábios, fazendo com que Ing erguesse os olhos para o andar de cima na mesma velocidade. Mesmo que não pudesse vê-las, ela sabia que mamãe e mãe estariam na sala de vidro, uma sala onde pessoas de fora não podiam ver o interior, mas quem estava dentro podia ver tudo claramente. Ela não sabia se eles já tinham presenciado a intimidade deles. \"PP'Patr.\" \"Hum?\" Napatr murmurou baixinho antes de puxar sua linda namorada para um abraço apertado. Ela pressionou seus lábios repetidamente contra o ombro liso dela. O aroma do perfume de Ing a fazia nunca mais querer soltá-lo. \"Mamãe e mamãe podem estar nos observando.\"","\"Aqui?\" \"Hum.\" Ing mordeu o lábio enquanto se apressava para terminar o trabalho à sua frente. Ela ainda tinha muitos documentos em sua mesa no escritório para finalizar, uma tarefa que havia assumido.","acabou para a mamãe, que estava sofrendo de fortes enjoos matinais em casa. \"Quero cumprimentá-los.\" \"Mamãe é muito protetora comigo\", avisou Ing. Ela sabia que a mamãe sempre a olhava com carinho e preocupação. Quando a mamãe Nook descobriu que Ing já havia tido sentimentos por sua amiga, ela suspirou profundamente, não proibindo, mas temendo que Ing se machucasse. Ing frequentemente ia chorar com ela, e às vezes, ambas acabavam chorando juntas.","Ing chorou por causa de outra pessoa; mamãe chorou porque viu Ing sofrendo.","Ing sabia muito bem o quanto eles se importavam. Apesar de viver com cautela, ela mantinha uma víbora ao seu lado há muitos anos. Não era estranho que ambos estivessem preocupados e protetores. Mas desta vez, com esse amor, a pessoa que ela amava sentia o mesmo. Napatr cuidava dela tanto quanto sua família. Ela era sempre atenciosa, sempre colocandoa em primeiro lugar (exceto quando lidava com pacientes no trabalho). Napatr nunca a fez se sentir desconfortável ou desconfiada. Eles eram verdadeiramente compatíveis em todos os sentidos, capazes de conversar e trocar ideias sobre tudo, exatamente o que Ing havia tentado encontrar em outra pessoa. Mas com essa pessoa, ela não precisou implorar nem procurar. Napatr, seu amante, era tudo o que ela sempre sonhou que um parceiro deveria ser. E com esse amor, ela não preocuparia sua família e não derramaria mais lágrimas. Era verdade que eles não sabiam o que o futuro reservava, mas cada dia era tão bom e constante que ela nem conseguia imaginar uma discussão ou um problema, porque não havia nenhum desde o início. Além disso, Napatr fez com que ela enxergasse o futuro deles com clareza, tanto por meio de ações quanto de palavras que permaneceram constantes durante todo o tempo.","\"Farei com que confiem em mim, mostrarei a eles que não têm nada com que se preocupar ou de que se proteger.\" \"Sempre tão cheio de conversa fiada.\" \"Porque estou falando sério sobre você.\" Ing conduziu seu amado escada acima, até o lugar onde antes costumavam sentar-se bebendo, próximos um do outro, e trocando carinhos durante boa parte da noite. Seu coração batia forte no peito, tomado pelo nervosismo. Suas palmas estavam úmidas de suor; ela nunca havia apresentado ninguém à sua família como seu namorado dessa forma.","Ela se virou para olhar para seu amado, que a encarava de volta. Napatr apertou sua mão fria, uma mão que permanecia sempre quente, como se para tranquilizá-la de que não havia nada a temer. \"Preparar?\" \"Você vai me levar para ver a mamãe e a vovó, ou vai me levar para outro lugar?\"","Ing não conseguiu evitar lançar um olhar fulminante para seu amado, que não parecia nem um pouco nervoso e até perguntou com uma risadinha. Napatr ainda ostentava aquele mesmo sorriso caloroso e atraente, o que ajudou a aliviar significativamente a ansiedade de Ing. Uma mão esguia deslizou a porta de vidro escuro, abrindo-a. No sofá espaçoso estavam sentadas mamãe e mãe, dividindo uma garrafa de vinho. Ambas imediatamente fixaram o olhar no casal. Napatr soltou a mão da namorada para cumprimentar educadamente as duas pessoas mais importantes na vida de Ing com um wai. Ela esboçou um leve sorriso antes de se apresentar brevemente. \"Olá. Eu sou Napatr.\" \"Olá, querida. Sente-se.\"","Aun olhou para a mulher alta, que estava vestida com elegância e respeito, e ergueu as mãos em um wai para cumprimentá-la e ao seu parceiro, antes de oferecer um sorriso gentil. Ela então se virou para sua companheira, que já havia aberto os braços para abraçar a filha com carinho. Ao olhar para trás e ver a pessoa que sua filha havia trazido consigo, com a expressão de Nook perfeitamente serena, Aun não conseguiu conter o riso.","Ainda tentando bancar o durão? \"Você bebe?\" Nook perguntou à pessoa que sua filha trouxera, antes de chamar um funcionário para lhe servir uma bebida, sem esperar por uma resposta. \"Querido,\" Aun disse, balançando a cabeça em sinal de reprovação pela incapacidade do parceiro de parar de ser severo com alguém importante para o filho deles.","Ela não disse mais nada, voltando sua atenção para a filha, que se aproximava com um sorriso suplicante. \"Então, meu pequeno encrenqueiro. Agora que você tem uma namorada, não liga mais para suas mães?\" \"Mãe...\"","Ing abraçou a mãe, escondendo o rosto no ombro de Aun enquanto lançava olhares furtivos para a mamãe e seu amante, que já brindavam com taças de vinho. \"Mamãe está tentando embebedar minha filha.\" \"Sua garota, hein?\" \"Você está chateada, mãe?\"","\"Ela te ama?\" \"Ela diz que sim.\" \"E você a ama?\" Aun riu quando sua filha assentiu com a cabeça contra seu peito. A mão que criara e acariciara sua única filha acariciou suavemente os cachos claros de Ing antes de Aun lhe dar um beijo carinhoso na cabeça. Embora criar Ing tenha sido difícil no início, pois ela teve que fazer tudo sozinha, ela não teve total azar; ela teve a ajuda dos pais, o apoio da irmã mais nova e, eventualmente, um namorado que surgiu para lhe dar amor.","Isso permitiu que Ing se tornasse uma linda jovem que fora amada com pura sinceridade desde a infância. Aun não sentia a sensação de perda da qual a mãe de Ing frequentemente falava.","Ver alguém entrar na vida da filha, alguém que a amava, que a ensinaria o significado do amor e se tornaria parte da família, a tranquilizou. Aliviou as preocupações que a atormentavam no último mês, principalmente aquelas relacionadas à melhor amiga da filha. Ela olhou para a pessoa que agora significava tanto para sua filha, aquela a quem Ing acabara de confessar que amava com todo o seu coração. E Napatr também não parava de olhar para a namorada, mesmo enquanto respondia às perguntas ocasionais da mamãe. \"Posso te chamar de mamãe, como a Ing faz, por favor?\" Nook contemplou o rosto bonito e impecável da mulher que fez o pedido com uma voz cheia de respeito e um toque de doçura. Ela permaneceu em silêncio por um momento antes de suspirar e acenar com a cabeça sem dizer uma palavra.","Ouvir sua linda esposa provocá-la ao som da música suave só aumentou o clima um pouco constrangedor entre ela e sua nora. \"Já chega de provocar a namorada da nossa filha.\" \"G-namorada? Então vocês estão namorando oficialmente agora, Ing?\"","\"Sim...\" \"Mamãe, aconteceu alguma coisa?\" Assim que Nook apertou o peito, Napatr correu para se sentar perto da mãe de sua namorada. Com a testa franzida, ela perguntou incessantemente sobre os sintomas enquanto verificava os batimentos cardíacos de Nook. \"Você trabalha com o que?\" \"Eu sou médico.\" Napatr respondeu e explicou sua especialidade. Nook assentiu com a cabeça antes de dizer à namorada da filha que estava tudo bem. Ela estava simplesmente chocada que sua filha tivesse uma segunda \"parceira\" desde que começara a criá-la. O primeiro era um menino, filho de um operário, com quem Ing costumava brincar; ele a pediu em namoro quando tinham dez anos, mas terminaram naquela mesma noite porque não conseguiam chegar a um acordo sobre quem ficaria com o balde de brinquedo vermelho. A segunda pessoa era esta, que parecia muito séria e falava em termos médicos que Nook não entendia. \"Estou bem. Só sinto que minha filha está compartilhando seus sentimentos com outra pessoa.\" Napatr ficou boquiaberta antes de se afastar imediatamente da mamãe.","Ela olhou para a namorada, que estava sentada ao lado da mãe. De repente, abriu um largo sorriso, pois ambas competiam em beleza e doçura, sendo tão parecidas que eram quase indistinguíveis. A única diferença era o nível de sensualidade, que sua namorada possuía em muito maior medida. Napatr pegou sua taça de vinho e a virou de uma vez só para disfarçar o constrangimento por sua reação anterior. Ao ouvir as risadas suaves dos três, ela abaixou ainda mais a cabeça.","\"Eu ainda amo a mamãe do mesmo jeito, sabe? Eu amo a mamãe do mesmo jeito também. Só que agora o P'Patr é uma adição bem-vinda. Isso não tem problema, mamãe?\"","Ing perguntou, apoiando o queixo na mão e olhando para a mamãe, que agora sorria suavemente. Foi o primeiro sorriso genuíno desde que o casal entrara na sala. \"Se você a ama, não pode parar de amá-la. Assim como eu amo sua mãe. Desde o momento em que a amei, nunca pensei em parar.\" \"O que você está falando?\" \"É verdade. Desde que te amei, nunca pensei em parar.\" Napatr observou os dois anciãos expressarem seu amor com sorrisos e olhares de admiração. Ela sentiu um calor indescritível. Ela pressentia que eles eram gentis e sempre haviam demonstrado amor incondicional por Ing. Era por isso que Ing era tão encantadora em seus modos, em sua fala e em tudo o mais. \"Se a mamãe e a mãe permitirem, posso cuidar da Ing?\" Ing apertou o braço da mãe com força, baixando a cabeça ao ver o olhar sério nos olhos do seu amado.","Ela nunca havia conhecido ninguém tão honesto com seus sentimentos, tão claro em suas ações e palavras, quanto Napatr. Além disso, ela nunca havia recebido um amor tão sincero e constante de ninguém além dessa mulher. \"O que você diz, mamãe? Eu dei minha permissão há muito tempo.\"","Aun se virou para perguntar à sua companheira, que parecia estar com dificuldade para engolir antes de esvaziar o copo. Um funcionário que estava por perto rapidamente se apressou em reabastecê-lo. \"Você vai amá-la e cuidar dela assim como a mamãe e a mãe fizeram, Patr?\" \"Sim...\"","\"Eu te dou permissão para amá-la, mas não te dou permissão para parar.\" Você entende, garota? \"Eu... eu entendo, mamãe. Obrigada a vocês duas.\" Napatr sorriu amplamente, virando-se para olhar para sua amada, que estava sentada com o rosto corado encostado em sua mãe. Napatr soltou uma risada suave de alívio. Ela nunca teve a intenção de deixar de amar Ing, assim como a mamãe nunca teve a intenção de deixar de amar a mãe.","Seus olhares se encontraram.","Embora não estivessem sentados juntinhos ou trocando carícias como de costume, o amor e a sinceridade que compartilhavam podiam ser sentidos apenas com o olhar.","Eles disseram um ao outro \"eu te amo\" mesmo sem que as palavras saíssem de seus lábios ou fossem sussurradas como antes. Disseram isso com os olhos fixos um no outro, sem jamais vacilar.","O amor que compartilharam hoje, o calor e a ternura deste momento, ambos o guardarão com carinho e farão com que todos os dias sejam iguais a hoje.",". sunyan"],"wordCount":3992},{"title":"22. O Pinheiro","paragraphs":["Jingle bell, jingle bell, jingle bell rock Jingle bells chime in jingle bell time. Napatr sorriu suavemente ao ouvir a doce voz de sua namorada cantarolando junto com a música ambiente do shopping, que havia sido alterada para combinar com a temporada de Natal que se aproximava na semana seguinte. Isso apesar do clima estar tão escaldante quanto numa tarde de meados de abril.","Na verdade, essa foi a primeira vez que Napatr ouviu Ing cantar. A voz da namorada já era doce o suficiente, mas ela não esperava que, quando aqueles belos lábios se movessem em canção, o som se tornasse ainda mais claro e encantador.","\"Que lindo!\"","\"Hum? O quê?\" Ing desviou o olhar da roupa de um manequim que estavam passando enquanto caminhavam em direção à seção de árvores de Natal, voltando sua atenção para seu amado, que estava vestido com uma roupa casual naquele dia.","\"Nunca te ouvi cantar antes. Você tem uma voz linda.\" \"Eu nem sequer comecei a cantar ainda.\" \"Agora mesmo, Jingle Bell~\" O rosto de Ing ficou vermelho. Ela se sentiu tímida por seu namorado tê-la flagrado cantarolando a música que tocava no shopping. Ela olhou para Napatr de relance,","cujos olhos brilhavam com um afeto radiante. Ing soltou o braço da outra apenas para afastar o queixo da mulher mais alta, forçandoa a olhar para outro lado. \"Por quê? Você está com vergonha?\" \"Humph! Não fale sobre isso, ok?\" \"Está bem, eu não vou.\"","Ing queria beliscar a mulher alta até que ela ficasse roxa. Ultimamente, sua amada estava se tornando uma verdadeira provocadora. Bastava olhar para ela agora: Napatr pressionava os lábios em uma linha fina depois de prometer não falar, mas seu rosto e olhos brilhavam com travessura enquanto ela reprimia um sorriso só para provocá-la. \"P'Patr, não me provoque.\" \"Mas você me disse para não falar.\" Suspirar!","Ing balançou a cabeça antes de puxar o braço do amado para que caminhassem um pouco mais rápido, pois não conseguia encontrar mais palavras para retrucar. Havia árvores de Natal de vários tamanhos e alturas para escolher, tantas que a namorada de Napatr se virou para olhá-la com uma expressão pesada e indecisa.","\"P'Patr.\" \"Sim, querida?\" \"Você tem uma lábia incrível.\" Napatr sorriu diante da acusação carinhosa. Sempre que falava docemente ou a provocava, era recebida com essa repreensão suave e um rosto corado. Ela adorava ver isso.","O rosto de Ing ficou ainda mais vermelho. Ela puxou a amada para mais perto, ficando lado a lado com ela, e olhou para ela novamente em busca de ajuda para tomar a decisão.","\"Qual árvore devemos escolher?\" \"Oh?\" \"Ajude Nong a escolher, por favor, P'Patr.\" Ing soltou uma risada ao ver o rosto de sua amada corar. Napatr imediatamente franziu os lábios quando Ing falou naquele tom suplicante e afetuoso.","Napatr não estava acostumada aos termos carinhosos que Ing usava; sempre que Ing se referia a si mesma como Nong, a outra mulher reagia dessa forma. Mas Ing sabia que sua amada gostava disso. Bastou um pouco de conversa fiada para fazer Napatr perder a compostura.","\"Qual tamanho meu amor gostaria? Este serve? Talvez seja mais fácil para você decorar.\"","\"Você está me insultando?\" Ing olhou para a árvore que sua amada havia apontado e imediatamente voltou seu olhar para ela. O que ela quis dizer com \"mais fácil de decorar\"? Quem poderia ser tão alta quanto um poste de luz como ela? \"Estou preocupada que você tenha dificuldades. Vamos ver... Quanto custa? Hum, não é muito caro. Este serve?\" Napatr caminhou ao redor da árvore em exposição para verificar o tamanho e as decorações antes de virar uma etiqueta de preço do tamanho de uma folha A4 horizontal. \"Vamos usar esta. Não precisaremos comprar uma nova no ano que vem; podemos simplesmente usar esta de novo. O que você acha?\"","Ing se virou para pedir novamente a opinião de seu amado. Mas quando viu Napatr parada em silêncio, aparentemente perdida em pensamentos, ela teve que se aproximar e tocar suavemente seu rosto. Sua amada atraiu seu olhar de volta com seu sorriso caloroso de sempre. Mesmo assim, Ing percebeu aquele lampejo de hesitação, ainda que por uma fração de segundo. \"P'Patr.\" \"Hum?\"","\"Seja este ano, no próximo ano ou em qualquer outro ano, estarei aqui com você. Não pense demais nisso.\" Ela repousou a mão no rosto da amada, sustentando seu olhar para confirmar que não repetiria os erros do passado. Ela não deixaria Napatr sozinha nunca mais.","\"E ficarei com você todos os anos até você se cansar.\" Napatr puxou a cintura fina de Ing para mais perto antes de se inclinar para beijar seus cabelos cor de caramelo, soltando um suspiro suave. \"Como eu poderia ficar entediado?\" \"?\" \"Quando eu te amo tanto assim.\" \"Ah...\" \"Você está corando?\" \"...\" Ing riu ao olhar para cima e ver sua amada sorrindo amplamente, com o rosto corado. Até mesmo suas orelhas, que despontavam por entre os cabelos na altura dos ombros, eram de um tom carmesim profundo e adorável.","\"Agora você entende por que eu disse para você não falar, certo?\"","Napatr assentiu com a cabeça. Ela finalmente entendeu a regra da namorada. Naquele momento, não queria que a outra dissesse mais nenhuma palavra provocativa, pois estava envergonhada demais para ouvi-las. \"Eu te amo.\" \"O quê? Vá pagar pela minha árvore agora!\" Ing riu carinhosamente da namorada, que de repente voltara a ser tímida. Napatr assentiu de bom grado e foi pagar pela árvore de Natal, como solicitado.","\"Patr, devemos comprar um pinheiro de verdade para plantar?\" \"Na casa?\"","\"Hum. Vi alguns vasos vazios perto da sala de ginástica.\" Ultimamente, Ing vinha passando mais tempo na casa da namorada do que em seu próprio apartamento, alternando com viagens semanais de volta para Chonburi. Ela sempre tinha um motorista charmoso — sua namorada — para levá-la até lá. Mamãe e P'Patr se tornaram muito próximos rapidamente. Ing não tinha certeza se era o álcool que havia fortalecido tanto o vínculo entre eles. Ela se lembrava claramente da vez em que ambos ficaram tão bêbados que não conseguiram voltar para casa, e os funcionários tiveram que ligar para ela e para a mãe para que os buscassem. Ela e a mãe decidiram deixá-los dormir no bar do resort como castigo. Desde então, parece que os dois mudaram suas sessões de bebida do bar do resort para a casa, para que pudessem encontrar o caminho de volta para seus quartos com mais facilidade quando estivessem bêbados. Ainda assim, ambos mereciam uma bronca. Ing não sabia se a mãe tinha repreendido a mamãe, mas não conseguia se obrigar a repreender sua amada. Ela não queria que ela sentisse nem a menor dor. Até mesmo ver a pele clara do seu amado com uma picada de mosquito deixava Ing infeliz.","Napatr estava pensando nos vasos vazios que sua namorada havia mencionado. Ela se lembrou de ter plantado rosas ali com sua mãe quando a casa ficou pronta.","Mas aquelas rosas murcharam porque ela não tinha tempo para cuidar delas — pelo menos não até que mamãe encontrasse uma mulher bonita para ajudar a cuidar da casa como fazia agora. \"Ah... hum. Quantas panelas há?\" \"Três, eu acho.\" Napatr sorriu e olhou para sua namorada, que estava escolhendo enfeites de Natal para colocar no carrinho que empurrava. Ing prestava atenção a tudo relacionado a ela e a elas. Nenhum detalhe, por menor que fosse, escapava à atenção da namorada, o que demonstrava o quanto ela era importante para Ing. E Ing era igualmente importante para ela. \"Claro. Devemos plantar algumas na casa da mamãe também?\"","\"Sua mãe?\" \"Não, sua mãe.\" \"Sua mãe já voltou?\" Há algum tempo que Ing queria prestar suas homenagens à Mamãe e à Mãe, mas seu amado disse que elas estavam no Japão e se recusavam a voltar para casa. Ing brincou dizendo que provavelmente estavam em lua de mel para dar um irmãozinho ou irmãzinha para Napatr, mas recebeu uma resposta tão ácida que teve que ir embora.","Nesse caso, deveríamos voltar da nossa lua de mel com um mini Nong Ing e um mini P'Patr? Aquelas palavras provocantes sussurradas em seu ouvido sobre o futuro a deixaram tão tímida que ela tentou fugir. Mas não conseguiu escapar dos braços do amado, pois Napatr a abraçou rapidamente por trás e a mimou com palavras doces.","\"Eles voltaram ontem à noite. Mamãe tinha um compromisso urgente.\" Ing assentiu com a cabeça. Colocou uma caixa de luzes decorativas no carrinho e virou-se para olhar para a outra mulher, que aguardava sua resposta. Aqueles olhos penetrantes e gentis sempre a faziam sentir-se acolhida e segura. O olhar do seu amado estava sempre repleto de amor, e agora, brilhava de expectativa.","\"Hum, ok. Seu carro passa por entre as árvores?\" \"Podemos deixar esses carros primeiro em nossa casa e depois trocar para outro.\" \"Estou cansado de ver como você é rico.\" \"Minha futura esposa e meus filhos não precisarão passar por dificuldades.\" \"Lá vai você de novo.\" \"O quê de novo?\" Ing desviou o rosto quando a outra mulher mencionou casualmente o futuro delas, usando até mesmo aquela palavra com tanta naturalidade. E ela não podia negar a verdade, porque pertencia a Napatr há muito tempo. \"Do que sua mãe e sua avó gostam? Elas estão curtindo alguma coisa especial ultimamente?\"","Ing perguntou. Ela queria comprar alguns presentes para eles, mesmo já tendo conversado com eles por videochamada antes. Sempre que Napatr falava com a família, ela virava a tela para que Ing também pudesse falar com eles.","\"Mamãe gosta da mamãe. Mamãe gosta da mamãe.\" \"...\"","\"Sério, você não precisa comprar nada.\" \"Está tudo bem? Não me parece certo.\"","\"Acredite em mim. Só de mostrar seu lindo rostinho para a mamãe, ela já vai abrir um sorriso de orelha a orelha.\"","A mãe dela repetia constantemente o quanto gostava de Ing. Toda vez que ligava, perguntava pela nora antes mesmo de perguntar se Napatr já tinha comido. Até a mãe parecia satisfeita por ela estar realmente apaixonada por alguém e queria que ela se estabelecesse e formasse uma família logo.","\"Ah, você...\" Napatr não disse nada, mas ofereceu seu sorriso habitual, querendo que Ing se sentisse à vontade e não ficasse nervosa perto de sua família. A mãe dela certamente não era tão feroz quanto a mãe da Ing. A mãe era gentil e queria que ela tivesse alguém para amar há muito tempo. Na verdade, a mamãe tinha sussurrado ao telefone que queria comprar algumas lembrancinhas do Japão para a Ing, se a mãe não tivesse ouvido e corrido para beliscá-la.","\"Eng.\" \"Sim?\"","\"Mamãe disse que ia comprar lembrancinhas para nós, e eu fico me perguntando se ela comprou mesmo.\"","\"Hum, e daí?\"","Ing não entendeu. De repente, sua amada exibiu um brilho travesso nos olhos e um sorriso estranho e brincalhão. Ela disse isso do nada, depois de ligar o carro e se inclinar para colocar o cinto de segurança de Ing, como gostava de fazer. \"São brinquedos.\"","\"Brinquedos?\"","Ing repetiu a palavra, tentando se lembrar de que tipo de brinquedos ela estava falando. Ela encarou o rosto de Napatr enquanto esta girava o volante habilmente, com um sorriso no rosto.","ainda pairando em seus lábios. Mamãe comprou brinquedos. Mamãe foi para o Japão. Ing ficou boquiaberta ao finalmente entender o que seu amado queria dizer. Seus dedos finos beliscaram imediatamente a coxa da outra. Ouvir a gargalhada alta e ver o sorriso largo e travesso e os olhos brilhantes só a fez beliscar com mais força.","\"P-por que você é assim? Eu não estou usando isso!\" \"Não vai? Wan disse que elas ajudam a aumentar o prazer de fazer amor.\" \"Não é necessário!\" \"Por que minha Ing está levantando a voz?\" \"Humph!\" Ing endireitou-se e estendeu a mão para cobrir a boca do seu amado. Virou o rosto, mas continuou encostando a cabeça naqueles ombros fortes. \"Prefiro o que você costuma fazer. Não precisamos dessas coisas.\" Foi Napatr quem acabou perdendo esta rodada. Seu rosto ficou vermelho de vergonha. Ela tirou a mão do volante para afastar a mão macia da namorada, a que usava o anel de ouro rosa, de seus lábios, distribuindo beijo após beijo com profunda afeição e um desejo de protegêla. \"Você também tem lábia, Ing.\"","\"Sou um doce por inteiro. Você me diz isso o tempo todo.\" Ing deu uma gargalhada quando sua amada ficou sem jeito novamente. Ela se inclinou para dar um beijo leve em sua bochecha antes de beijar seu queixo carinhosamente. O rosto vermelho da sua amada era simplesmente adorável. Cinco pequenos pinheiros foram levados para um canto da casa pelo jardineiro. Depois que Napatr abriu o tronco e retirou apenas uma árvore, o jardineiro","Correu imediatamente para ajudá-la. \"Onde a senhora gostaria que eu as plantasse, jovem senhorita?\" \"Eu mesmo farei isso. Obrigado, tio.\" Ing cumprimentou educadamente o tio que acabara de ajudá-los com um \"wai\". Ela olhou para o namorado com admiração. Sempre ouvira e lera que, ao namorar alguém, era importante observar como essa pessoa tratava aqueles em posições de subordinação, seja em lojas, dirigindo ou em geral. Se eles ainda estivessem namorando, o namorado dela teria passado no teste desde o primeiro dia. Todas essas características foram o que fizeram Ing se apaixonar por ela sem nem perceber. Seu namorado sempre se mantinha calmo ao dirigir, mesmo quando Ing se frustrava com motoristas grosseiros que a fechavam no trânsito. Seu namorado apenas ria e dizia para ela manter a calma. E em seu tratamento com os outros, Napatr sempre foi humilde. Era o mesmo no hospital onde trabalhava; ela cumprimentava os mais velhos e falava com todos educadamente, especialmente com seus pacientes. Ing já tinha visto e ouvido isso muitas vezes, inclusive agora, e nunca deixava de impressioná-la. Napatr a conduziu para dentro da grande casa. Assim que ela entrou, o perfume das flores a envolveu. Ing sorriu timidamente, olhando para seu amado, que retribuiu o sorriso ao avistarem as figuras importantes que aguardavam não muito longe. \"Olá...\" \"'Mãe', por favor. Me chame de mãe, assim como Patr faz, Ing.\" \"Olá, mãe, mamãe.\" Ing era tão tímida que mordeu o lábio. A família do seu namorado a recebeu com tanto carinho, nada parecido com as novelas sobre as quais sua melhor amiga, Mind, sempre reclamava quando conversavam.","A mãe passou o braço em volta da cintura dela e a conduziu até o sofá na sala de estar, onde água e lanches já estavam preparados. Ing sentou-se ao lado da mãe, que manteve seu sorriso acolhedor, antes de olhar para sua namorada, que se aproximava conversando com a mãe.","As duas eram tão parecidas que era difícil distingui-las, exceto pelo fato de Napatr ser mais alta. Além disso, Napatr herdara um pouco da beleza da mãe, o que fazia com que seu rosto fosse notavelmente bonito de uma forma difícil de descrever. \"Por que você comprou tanta coisa, querida? Só o Patr já te trouxe para me ver já é suficiente. O Patr tem sido teimoso ou te deixou desconfortável de alguma forma?\" \"De jeito nenhum, mãe. O Papai Noel é muito carinhoso comigo.\" Ing sentiu-se tímida ao responder, seu rosto corando enquanto olhava para o chão, sentindo o calor daquela família direcionado a ela de uma só vez. \"Você vai passar a noite aqui? Está com pressa para ir embora?\" Nine perguntou à filha dela e ao namorado da filha, que estava sentado elegantemente ao lado de seu companheiro. Ambas estavam tão radiantes que ela se pegou olhando por um longo tempo antes de voltar o olhar para sua única filha, que sorria suavemente para a namorada.","\"Está tudo bem para você, querida? Tem tido muitos clientes ultimamente? Napatr me contou um pouco sobre o que você faz. Você deve ser muito boa em administração para ajudar tanto sua família.\"","\"Estou bem. E, bem, eu não sou muito bom nisso, mãe.\" Que humildade.","Pleng ficou bastante impressionada com o namorado de sua única filha. Ela ouvira rumores no hospital de que sua filha estava tão doente que precisou se automedicar com soro intravenoso.","Ela havia investigado (com outras pessoas) e ouvido dizer que Napatr estava namorando uma enfermeira, mas Mamãe tinha visto essa enfermeira com outra pessoa. Depois de investigar por um tempo, ela descobriu a verdade.","Os amantes sempre têm seus atritos. Pleng e seu parceiro sempre souberam que a filha estava tendo problemas, mas não interferiram. Apenas observaram.","Se eles não se amassem de verdade, mesmo que a filha se machucasse, isso fazia parte do amor. Deixaram que Napatr aprendesse por si mesma. \"Nesse caso, passe a noite aqui. Napatr, para onde você vai para a contagem regressiva? Chonburi, o hospital ou aqui em casa conosco?\" \"Hum... se você estiver livre, gostaria de fazer a contagem regressiva comigo?\" \"Hum?\" Nine soltou um som de surpresa. Ela não esperava que sua nora os convidasse assim. Mas Ing era adorável; seu convite para comemorar o Ano Novo juntos mostrava que ela era uma pessoa muito atenciosa que priorizava a família de seu amado.","\"O resort não estará aberto para hóspedes durante o Ano Novo. Se você estiver livre, adoraria que comemorasse conosco.\" Ing vinha pensando nisso há algum tempo. Sua própria família havia mencionado o assunto e até mesmo estendido um convite por meio de Napatr, mas eles simplesmente não sabiam se as mães de Napatr estariam disponíveis. \"Estou livre. E você, mãe?\" \"Napatr.\" \"Sim?\" Napatr se virou para a mãe, que a chamou de repente com voz severa. Era raro sua mãe usar aquele tom. Napatr engoliu em seco. Olhou para o rosto da namorada, que parecia ainda mais chocado que o dela.","\"Gosto muito da sua namorada. Nem pense em terminar com ela. Se não for com ela, não dou permissão para mais ninguém.\" \"Mãe...\" \"Quaisquer desentendimentos que vocês dois tenham tido no passado são normais para pessoas apaixonadas. Não guardem mais as coisas para si. Conversem e tudo ficará bem.\" \"Preciso construir uma casa nova para eles?\" Nine sorriu, observando sua amada acariciar os cabelos de Ing com carinho. Era óbvio o quanto ela estava apaixonada por sua nora, assim como sua filha, Napatr, que estava tão claramente perdidamente encantada que Nine só conseguiu balançar a cabeça em divertimento. \"Isso parece ótimo, P'Nine. Eles não precisarão dirigir tanto. Hum... devo construir um hospital em Chonburi? Caso a Ing queira ficar por lá. Afinal, a Patr é bem apegada à namorada dela. O que você acha?\" \"Sem problemas.\" \"Vou mencionar isso na reunião de amanhã. Ing, você gostaria de me ajudar a administrar isso? Quanto à contagem regressiva, mamãe e eu iremos. Eu irei-\" Napatr observava sua mãe e sua namorada conversando animadamente sobre vários assuntos, como se fossem amigas íntimas há anos. Nesse momento, Ing estava convidando sua mãe para fazer suas unhas. Quando a mãe trouxe um pequeno túnel para secar as unhas, Napatr e a mãe ficaram boquiabertas.","Napatr sabia que sua mãe sempre se cuidava muito bem, tanto em relação à aparência quanto à alimentação e aos diversos rituais de beleza. Mas ela não tinha ideia de que existiam tantos esmaltes e cores diferentes. Havia também coisas que ela não reconhecia, mas os olhos da namorada brilharam de interesse no momento em que a mãe pediu aos funcionários que trouxessem o equipamento.","Ao que tudo indicava, Ing e sua mãe se davam muito bem no que dizia respeito à beleza. E Napatr gostava de observá-los tanto quanto a mamãe, que permanecia sentada com um sorriso sereno. \"Pai, eu e a mamãe provavelmente vamos passar uma hora fazendo as unhas. Você pode plantar as árvores para mim? Não posso fazer isso agora, senão minhas unhas vão estragar.\" Ing tagarelava em direção ao seu amante sem olhar, sabendo que a outra mulher estava sentada não muito longe dela e de sua mãe, que estavam fazendo as unhas juntas havia um bom tempo. Ela não sabia que suas palavras haviam arrancado sorrisos afetuosos de todos que as ouviram, dirigidos à pessoa mais jovem da casa. \"Você quer que eu plante todas elas sozinho?\" \"Quando eu terminar, vou regá-las.\" \"Você consegue sequer levantar a mangueira? Seus braços são tão pequenos.\"","Ing suspirou, agindo como se não houvesse uma mangueira para maior praticidade naquela casa enorme.","\"Não me provoque. Vou te dar um tapa... oh, desculpe.\" Ing esqueceu completamente de quem era a manicure e em qual casa estava. Ela se desculpou com um sorriso sem graça para a mãe e a avó, que ainda sorriam, sorrisos muito parecidos com o do seu amado. \"Vá em frente, querida. Patr é teimosa. É bom que você seja firme com ela. P'Nine, vá ajudar sua filha. Ing e eu iremos ver quando terminarmos.\" \"Oh?\" \"Não me venha com 'oh' .\"","Napatr e Nine ficaram atordoados quando seus parceiros os mandaram plantar árvores. Mas eles aceitaram a tarefa, plantando as árvores juntos sem reclamar. Em vez disso, só houve risos e conversas.","\"Quão sério você está sobre isso, Patr?\" \"Meu futuro está cheio dela, aconteça o que acontecer. Você gosta dela, mamãe?\"","\"Quem você ama, nós também amamos. Ela é adorável. Sua mãe gosta muito dela.\"","Após terminar o plantio, Nine se ergueu em toda a sua altura. Ela se virou para sua única filha, que também acabara de terminar. \"Obrigada, mamãe.\" \".....\"","\"Por tudo. E por me ajudar a plantar os pinheiros.\" \"Não é nada. Nossas esposas nos disseram para fazer isso juntos, não disseram?\" Nine deu de ombros e riu alto. Recuou um passo para observar os cinco pinheiros enfileirados ao lado das roseiras de sua bela esposa. Ela tocou delicadamente uma pétala de rosa branca, sorrindo ao se lembrar dos dias anteriores ao seu casamento com a mãe de seu filho. Ela se virou para olhar para a filha, que a observava. Napatr certa vez perguntara por que a casa delas estava tão cheia de rosas brancas. Sua resposta permaneceu a mesma: porque sua mãe as adorava, e eram as flores que Nine costumava comprar para ela o tempo todo. Eram flores com muitos significados ocultos.","\"Mamãe ainda gosta de rosas brancas.\"","\"Hum. Igualzinha à mamãe, que continua gostando e amando rosas brancas, sem mudar nada.\" Napatr sorriu amplamente. Ela ouviu as vozes familiares das duas pessoas que amava caminhando em sua direção, de braços dados. As palavras de mamãe haviam deixado uma profunda impressão nela, como sempre acontecia.","No passado, Napatr se perguntava se conseguiria amar alguém pelo mesmo tempo que Mamãe amava a Mãe. Ela se perguntava se teria alguém para amar e respeitar como Mamãe amava a Mãe. Mas hoje, essas dúvidas haviam sido dissipadas. E quanto à resposta, agora ela sabia se ela existia ou não. A pessoa que a fizera amar e querer amar para sempre caminhava em sua direção. O sorriso doce e gentil que a outra pessoa lhe dirigiu foi uma resposta clara e brilhante que já estava ali há muito tempo. Quanto a quem seria a pessoa que ela amaria, estimaria e respeitaria para sempre... Embora a história delas talvez não tivesse uma flor característica como a da mãe e da mamãe, a única resposta que ela tinha era a mulher pequena parada bem na sua frente.","Você está cansado? \"De jeito nenhum.\"","Napatr nunca se sentiu cansada desde que se apaixonou. Nunca, desde o momento em que a conheceu. E com uma namorada tão adorável como essa, como ela não a amaria? Como ela não se sentiria atraída por ela? .","sunyan"],"wordCount":3913},{"title":"23. Natal","paragraphs":["Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026","Cópia: . . \"Patr, será que os funcionários nos deram a caixa errada?\"","\"Hum? Por que você diz isso?\" Napatr largou o iPad que estava usando para revisar o caso de um paciente compartilhado no grupo de bate-papo com seus colegas. Ela caminhou até sua namorada, que havia mencionado meia hora antes que montaria a árvore de Natal na sala de estar enquanto Napatr resolvia alguns assuntos importantes. Mas quando viu a namorada sentada no tapete, com a árvore de Natal que tinham comprado no dia anterior ao lado de sua pequena figura, Napatr não conseguiu conter o sorriso. Ela olhou para a roupa da namorada, tão fofa, quase juvenil.","Os shorts curtos e desfiados subiram enquanto ela estava sentada daquele jeito, e a pequena regata colava em seu corpo, delineando suas curvas. E ela percebeu que sua namorada não estava usando sutiã. \"O que você está olhando?\" Napatr ergueu uma sobrancelha, seus olhos questionando de forma brincalhona se ela deveria mesmo responder. Mesmo assim, o olhar feroz nos belos olhos de Ing a fez...","Napatr riu enquanto se abaixava para sentar-se em frente a ela. \"Você está muito sexy.\" \"São férias e eu estou em casa. Você não gosta disso?\" \"Eu? Como eu poderia não gostar?\"","Ing deu um sorriso de canto. Ela sabia exatamente o que sua amada gostava e o que não gostava. Napatr nunca interferia em suas escolhas de moda; quer ela usasse roupas com as costas nuas ou cortes reveladores, Napatr sempre a elogiava, dizendo que ela ficava linda em tudo. Sentia como se tivesse encontrado uma raridade em uma parceira. \"P'Patr, você é um pervertido.\" Napatr não negou. Ela simplesmente se inclinou para a frente, apoiando as mãos no tapete para dar um beijo suave nos pequenos lábios de Ing, que se ergueram para encontrar os seus com a mesma delicadeza. \"Bem, deixe-me ver o que há de errado com isso.\" Napatr perguntou enquanto se sentava novamente, olhando para a pobre árvore caída no chão. \"É maior do que aquela que escolhemos. Olha, se a gente colocar em pé, ela é mais alta do que eu.\"","Napatr observava a pequena mão apontar da ponta da árvore até a base, rindo do jeito fofo de falar da namorada. \"E vai ser difícil para mim decorar. Será que escolhi a caixa errada ou será que pegaram a caixa errada?\" \"Provavelmente escolhi a errada. Mas eu ajudo. Eu mesma cuido das partes mais altas. Tudo bem, meu bem?\" Ing observou sua amada desviar o olhar. Só isso já lhe dizia que Napatr não culparia os funcionários pelo erro, mesmo que Ing tivesse conferido o recibo antes de perguntar.","Ela se levantou e caminhou até sua amada, sentando-se em seu colo como fazia todos os dias. Ing adorava estar nos braços da amada; sempre se sentia pequena e amada quando estava aconchegada nos braços de Napatr. Ing envolveu o pescoço forte com seus braços esguios. Sentiu os braços de Napatr a envolverem pela cintura, enquanto lábios macios pressionavam repetidamente seu ombro, fazendo-a inclinar a cabeça para olhar o amado nos olhos. \"P'Patr...\" \"Sim?\" \"Eu vi o recibo. Sei que não foi porque você escolheu o errado.\" Napatr deu um sorriso gentil e pressionou seus lábios contra os de Ing. Ela sabia o quão honesta e meticulosa Ing era. Provavelmente, Ing não gostava de receber o item errado quando não era culpa dela. \"Está tudo bem. É só um pouquinho maior, querida. Olha, suas sobrancelhas estão todas franzidas.\" Ela beijou a ponte da testa levemente maquiada de Ing antes de Ing a abraçar com força.","\"Eu te amo muito. Não vá a lugar nenhum.\" \"Para onde eu iria? Vou estar com você todos os dias.\" Ing assentiu com a cabeça antes de se afastar o suficiente para beijar os lábios que estavam sempre tão cheios de palavras reconfortantes.","Suas línguas se entrelaçaram enquanto inclinavam as cabeças para encontrar o ângulo perfeito. Ing acabou tendo que se afastar do calor doce. Quando se separaram, os olhos semicerrados de Napatr brilhavam com uma mistura de amor e desejo descarado.","Uma mão delicada deslizou por baixo da blusa de Ing, acariciando suas costas. Ing riu baixinho antes de beijar afetuosamente o queixo de seu amado. Ela inclinou o rosto","Encostada ao ombro forte, seus dedos brincavam com os cabelos na nuca de Napatr.","\"Primeiro, me ajude a decorar a árvore.\" \"Ah... tá bom.\" Napatr respirou fundo para se acalmar. Sempre que estavam tão perto, sempre que trocavam a doçura de seus lábios, ela se perdia no ritmo. Ela queria intimidade; queria fazer amor com aquela mulher todas as vezes.","\"Eu também comprei uma roupa nova.\"","\"Que tipo de roupa?\" \"Eu vou usar para você depois que terminarmos a árvore. Tudo bem?\"","\"Hum. Aposto que é deslumbrante.\" Ing não respondeu, mas riu alegremente. Ela tinha toda a intenção de deixar que apenas seu amado a admirasse.","As duas passaram mais de uma hora decorando a árvore. Napatr ficou encarregada dos enfeites no topo, que Ing não conseguia alcançar. A mulher alta tentou ajudá-la a subir, mas as pequenas caixas de presente que Ing segurava pareciam nunca chegar aos galhos. Sempre que Napatr a levantava, acabava prensando Ing contra a parede para lhe dar um beijo apaixonado, fazendo com que as decorações escorregassem dos dedos fracos e trêmulos de Ing. O que deveria ter sido uma tarefa simples levou uma hora. \"Vou acender as luzes.\" \"Hum, pode prosseguir.\"","Napatr recostou-se no sofá, de braços cruzados, observando sua namorada se virar e lhe dar um sorriso doce antes de caminhar tranquilamente até a árvore de Natal que elas acabavam de decorar juntas para acender as luzes. No instante em que o interruptor foi acionado, suaves luzes brancas se acenderam ao redor da árvore. Napatr sorriu para si mesma, abrindo os braços no momento em que seu amado se aproximava apressadamente, meio caminhando, meio correndo, pronto para se jogar em seus braços.","\"É bonito?\" \"Hum, muito bonito.\" Ing sorriu radiante para a árvore que haviam decorado juntos, sentindo uma inexplicável sensação de felicidade. Ela encostou as costas no peito de Napatr. Os braços de Napatr a envolveram frouxamente pela cintura, seus rostos tão próximos que Ing não pôde deixar de sorrir e encostar o nariz em uma bochecha macia.","Essa foi a primeira vez que Ing decorou uma árvore de Natal com um parceiro. Na verdade, ela nunca tinha levado um relacionamento tão a sério com ninguém antes. Essa pessoa a ensinou o que era o amor, como era a sensação de ter um amor verdadeiro, onde não se sentia exausta nem precisava se esforçar demais. Ela se pegou agradecendo a Napatr repetidamente em seu coração. Obrigada por ter entrado na minha vida e por ter dedicado tempo para nos conhecermos, aos poucos, até chegarmos aqui. \"Vamos pedir o jantar hoje à noite? Minha namorada não deveria se cansar cozinhando.\"","Ing se virou para encarar seu amado, que ultimamente se tornara duas vezes mais falante e carinhoso. Meu bem, meu amor, querida, Ing... não era que ela não gostasse de ouvi-los. Não importava o nome que Napatr lhe chamasse, ela adorava. Quem não gostaria de ser amado, especialmente por alguém tão atencioso quanto Napatr?","\"Vamos fazer isso. Quer que eu peça ou você pede?\" \"Vamos fazer o pedido juntos.\" \"Hum, por que você é tão fofo(a)?\" Sua mão delicada repousou suavemente na bochecha da mulher mais alta, acariciando-a com cuidado. O jeito como aqueles olhos a fitavam, doces e transbordando amor, só fazia com que ela quisesse continuar olhando. Aqueles lábios, sempre lhe oferecendo um sorriso caloroso, fizeram Ing abrir um largo sorriso antes de se inclinar para dar um beijo suave no canto delicado da boca dela. O sorriso de Napatr se alargou ao ver o adorável rubor no rosto de Ing. Ela olhou para o relógio na prateleira, que havia recolocado recentemente em seu lugar original, atendendo ao pedido fofo de Ing.","Wan havia reclamado em voz alta quando Napatr moveu abruptamente os móveis e o sofá naquela vez, e depois reclamou novamente quando ela os colocou de volta no lugar tão rapidamente porque o mal-entendido não havia durado tanto quanto temia.","\"Sério? Você move isso para cá quando briga com sua esposa e depois move de volta quando fazem as pazes? Minha casa virou um depósito?\" Naquele momento, a resposta interna de Napatr foi \"Sim\", mas ela apenas respondeu entregando à sua melhor amiga um vale-presente de hotel que sua linda namorada havia enviado como agradecimento e pedido de desculpas em seu nome. \"Vou regar nossas árvores.\" \"Os pinheiros?\" \"Hum-hum.\"","\"Eu também vou.\" Ing entrelaçou o braço no de Napatr enquanto caminhavam para fora, até o local onde haviam plantado os três pequenos pinheiros perfumados no dia anterior. Desta vez, Ing","Não havia deixado Napatr fazer isso sozinha, embora Napatr ainda não a deixasse fazer muito além de ficar parada e lhe entregar as coisas para garantir que as mãos de Ing permanecessem limpas.","Além disso, Napatr havia dito ao jardineiro que ela mesma cuidaria daquelas três árvores. O jardineiro a provocou, dizendo-lhe para ter cuidado para que elas não murchassem.","Aquelas palavras pareciam ter despertado algo em seu amado; agora ela acordava cedo para regá-las todas as manhãs e corria para fazer o mesmo todas as noites.","\"Se você tiver um turno noturno, eu cuido desses três.\" \"Não estou mais fazendo turnos da noite.\"","\"Ah, é? Isso é permitido?\" \"Claro. O professor Pleng me deu ordens para ficar com a minha namorada.\" Ing ficou em silêncio. Ela havia se esquecido momentaneamente de que seu amante não era apenas médico, mas também dono do hospital. Sua família tinha poder mais do que suficiente para providenciar que outros cobrissem seus turnos. \"Será que a mãe disse mesmo isso?\" \"Sim. Quer que eu ligue para ela e pergunte de novo?\" Napatr riu quando Ing balançou a cabeça negativamente. Suas mães já estavam se preparando para entregar as ações da empresa para dar as boas-vindas à nora e também estavam ansiosas para apresentá-la ao seu círculo social. Depois de regar os vasinhos, Napatr ficou de pé com os braços cruzados, sorrindo. Já fazia muito tempo que ela não cuidava de plantas assim. Isso lhe trazia paz, e como essas árvores tinham um significado especial para ela e seu amado, essa paz era repleta de imensa felicidade. \"Eles vão crescer muito até o ano que vem.\"","\"Sim. Com certeza, eles estarão muito mais fortes e altos no ano que vem.\" \"No próximo Natal, vamos ficar aqui e olhar para esses três pinheiros novamente.\" \"Em todos os Natais do futuro, estarei aqui com você, P'Patr.\" Nenhuma árvore poderia crescer tão rápido quanto o amor em seus corações. Napatr prometeu a si mesma que continuaria a nutrir a árvore do seu amor dessa mesma maneira. \"Vou me trocar. Depois vamos tirar fotos com a árvore, tá bom?\" Napatr lançava olhares frequentes em direção ao quarto. Ing havia lhe dito para preparar a câmera e esperar, mas ela já estava fora há muito tempo, tempo suficiente para o coração de Napatr começar a acelerar enquanto sua imaginação tomava um rumo travesso. Ela já havia tirado uma dúzia de fotos da árvore. Tirara fotos de si mesma parada, depois deitada ao lado da árvore... sua linda namorada ainda não tinha aparecido. Por fim, Napatr teve que ir até a porta do quarto e ficar parada ali. \"Querida, você está bem?\" Ela perguntou baixinho, pressionando a maçaneta. Piscou surpresa ao perceber que estava trancada. A porta se abriu de repente e a pessoa que estava dentro apareceu. O patr congelou.","Seus olhos percorreram a tiara de chifres de rena na cabeça de Ing, descendo por seu belo rosto com maquiagem leve e batom delicado, até o colar branco fofo com um pequeno laço vermelho. Então, ela viu o vestido vermelho sem alças com finas fitas escarlates que se agarravam aos belos ombros de Ing. O vestido era tão curto que mal chegava às suas coxas. Finalmente, seus olhos se ergueram mais uma vez para encontrar o rosto de sua namorada. \"Por que você está me encarando assim? Eu também trouxe um chapéu para você. Incline-se para a frente.\"","Ing estava visivelmente corada enquanto seu amado passava quase dois minutos a observando da cabeça aos pés antes de finalmente encontrar seu olhar. O rosto de Napatr estava igualmente vermelho. Seus olhos penetrantes brilhavam com fervor enquanto ela, obedientemente, se inclinava para que Ing colocasse o gorro de Papai Noel em sua cabeça.","\"Vamos tirar fotos.\" Napatr havia perdido a voz. Se sua namorada lhe dissesse para fazer qualquer coisa naquele momento, ela faria. Se Ing dissesse que um búfalo podia voar, ela acreditaria — sem necessidade de teorias, artigos ou pesquisas. Eles tiraram tantas fotos. Ing sorria docemente em todas elas, fazendo Napatr brilhar de alegria enquanto as olhava. \"Olhando fixamente de novo. Será que não estou com uma boa aparência?\"","Ing desviou o olhar da câmera, que agora estava repleta de fotos do casal. Ela a colocou sobre a mesa de vidro à sua frente e, em seguida, virou-se para encontrar o olhar da mulher sentada ao seu lado no grande sofá bege que Wan e seu parceiro haviam ajudado a recolocar no lugar.","\"Você é linda. Você é linda em tudo.\" E você também é linda sem nada, acrescentou Napatr em silêncio. Ela sabia que se dissesse aquilo em voz alta, Ing franziria o nariz adoravelmente e a repreenderia por ser indecente novamente. \"Ou você quer usá-lo?\" Ing provocou, querendo se vingar do seu amado pela primeira vez. Ela olhou para o gorro de Papai Noel na cabeça de Napatr e sorriu amplamente, pois Napatr parecia incrivelmente adorável. Napatr balançou a cabeça. Aquele vestido definitivamente não era o seu estilo. Ela sorriu ainda mais ao ouvir a risada de Ing. \"O Papai Noel deveria ser o Patrício; combina mais com você.\"","\"Então eu precisaria de uma barba.\"","\"Uma barba branca? Devo colocar uma em você?\"","Ing não esperou por uma resposta. Começou a se levantar do sofá para procurar uma barba falsa, mas foi repentinamente puxada para baixo e sentada no colo do seu amado. Ela se ergueu para olhar para Napatr, que parecia confuso, antes de mudar de posição. Ela passou as pernas sobre o colo de Napatr, fazendo com que sua saia, já curta, subisse consideravelmente. Quando as mãos de Napatr se moveram para os quadris dela, acariciando-os suavemente, as sobrancelhas de Napatr se ergueram ao perceber o que Ing estava vestindo por baixo. O rosto de Ing ficou completamente vermelho. Ela estava determinada, claro que estava. Na verdade, ela tinha planejado fazer isso por seu amado desde o início. \"Querida...\" \"Sim?\"","O coração de Napatr batia forte contra as costelas. Enquanto suas palmas acariciavam aqueles quadris lindos, ela não sentia nada. Mas quando sua mão deslizou até aquela cintura fina, prendeu-se em uma alça delicada que a circundava, indicando que sua namorada estava usando \"algo minúsculo\". Por um instante, ela sentiu que ia desmaiar. Ing estava usando uma tanga por baixo da fantasia de Papai Noel. A roupa era sexy, mas o que estava por baixo era devastador. \"V-você... gosta disso?\" Napatr assentiu com a cabeça antes de pressionar os lábios contra a curva do peito de Ing, que transbordava do vestido vermelho e branco. Deixou o nariz roçar a pele de forma lúdica. Estava completamente obcecada por essa versão sedutora de sua namorada.","\"Vamos para a cama?\" Ing perguntou, apertando os lábios quando sua amada balançou a cabeça em sinal de recusa. Sua mão delicada deslizou da cintura para pegar o pequeno controle remoto e fechar as cortinas. Embora a casa estivesse cercada e ninguém do lado de fora pudesse ver o interior, a outra mulher sabia que Ing preferia privacidade caso fossem ter um momento íntimo.","\"As luzes...\" Napatr afastou-se do pescoço de Ing apenas o suficiente para apagar as luzes principais. Restaram apenas a luz fraca do exterior e o brilho suave e colorido da árvore de Natal.","\"Você está tão linda hoje. Essa roupa de Papai Noel combina muito bem com você. Obrigada, querida.\"","Napatr apoiou o queixo na curva do peito de Ing, que estava na altura dos seus olhos. Então ela se inclinou e deu um beijo nos lábios carnudos que lhe sorriam docemente, como um gesto de agradecimento. Obrigado por tudo. Pelo passado deles e pelo amor que estavam prestes a criar.","\"Se me cai tão bem, por que você tem tanta pressa em tirá-lo?\" Ing segurou o rosto do seu amado. Seus narizes se roçaram, suas respirações quentes se misturando.","Com um movimento leve, seus lábios se uniram instantaneamente. \"Não vou tirar.\" A resposta de Napatr fez o rosto de Ing corar intensamente, pois ela conseguia imaginar claramente que seu amado certamente faria amor com ela enquanto ela ainda estivesse vestindo aquela roupa. \"Não precisa tirar. Você é linda mesmo sem nada.\"","\"V-você e seu papo furado de novo...\" \"Quer provar?\"","Antes que Ing pudesse responder, seu amado uniu seus lábios aos dela imediatamente para que ela pudesse provar se suas palavras eram tão doces quanto pareciam.","Ing só conseguiu soltar um gemido abafado na garganta devido à onda de prazer que surgiu rapidamente quando suas línguas se entrelaçaram em sua boca. As palmas de Napatr acariciavam e apertavam suavemente os quadris de Ing, fazendo com que ela não conseguisse ficar parada em seu colo enquanto pressionava os quadris contra o abdômen de Napatr.","Segue o texto com o espaçamento entre parágrafos ajustado, mantendo a redação original inalterada: Napatr afastou os lábios quando as mãos travessas e delicadas de sua namorada começaram a desabotoar completamente a camisa de Napatr. Ing abriu as bordas da camisa, expondo o abdômen de Napatr, antes de pressioná-la novamente contra a pele, fazendo Napatr soltar um sibilo entre os dentes diante da intensidade da namorada. A saia vermelha incrivelmente curta já estava amontoada em volta da cintura fina de Ing. Mesmo enquanto Napatr se recostava nas almofadas do sofá, ela podia sentir claramente a umidade da mulher pequena em seu colo contra seu próprio corpo.","Napatr olhou para a namorada com olhos semicerrados enquanto Ing começava a rebolar suavemente, acompanhada por um gemido doce e melodioso. Napatr soltou-a para deslizar pelas finas fitas que sustentavam a roupa de Santy, e a pequena mulher cooperou perfeitamente. Seus seios arredondados apareceram diante dos olhos de Napatr. Os belos mamilos estavam cobertos por adesivos de silicone, permitindo que Napatr se inclinasse e inalasse seu perfume, deslizando a ponta da língua e distribuindo beijos por toda parte. \"Querida, tire-as para mim.\"","Porque naquele momento, Ing desejava que sua amada tocasse seus mamilos sensíveis com os lábios mais do que qualquer coisa. Seu desejo aumentou rapidamente apenas com o beijo profundo e a forma como estavam pressionados um contra o outro. Eles sempre se desejaram. Napatr atendeu ao pedido. No instante em que os seios da namorada ficaram livres, ela levou um deles à boca, chupando e girando a língua. Ouviu os gemidos doces e melodiosos enquanto a mulher pequena esfregava os quadris contra a barriga de Napatr sem parar.","\"Você pode se machucar... quer tirar isso primeiro?\" Temendo que Ing se machucasse ao esfregar os quadris daquela maneira, Napatr teve que afastar os lábios para puxar o cordão da calcinha da namorada.","Ao ver o quão encharcada estava a pequena peça de roupa, e percebendo que era feita de renda vermelha, ela só pôde cerrar os dentes antes de se inclinar imediatamente para sugar os seios da mulher em seu colo. Ing só conseguiu abraçar a cabeça da sua amada enquanto arqueava o corpo para facilitar. Ela se apoiou nos joelhos no sofá antes de soltar um gemido suave quando dois dos longos dedos de Napatr começaram a deslizar lentamente para dentro de seu canal úmido e quente.","\"Hum... querido...\" \"Tão macio.\"","Napatr sussurrou, movendo os dedos suavemente dentro do corpo de Ing antes de usar a mão livre para segurar o quadril de Ing, deixando que sua namorada se movesse sozinha. \"V-você adora me provocar... ah!\" \"Adoro observar você.\" Ing mordeu o lábio e fechou os olhos, escondendo-se do seu amado, cujos olhos brilhavam com tanta intensidade que ela se sentiu tímida.","Ela se movia suavemente para cima e para baixo sobre os dedos perversos inseridos nela, e o ritmo tinha que continuar aumentando à medida que seus seios eram estimulados por uma língua que se movia rapidamente, até que ela ficou tão dominada pelo prazer que mal conseguia suportá-lo. \"Eu... eu não tenho mais forças.\" \"Já?\" Ing assentiu com a cabeça antes de erguer o rosto do seu amado para um beijo profundo, tentando aliviar a sensação intensa, mas esta não diminuiu nem um pouco. Ela se ajoelhou no sofá para dar espaço para que o amado pudesse mover os dedos dentro dela sem precisar dizer uma palavra. Ela não precisou esperar muito; seu canal sensível foi penetrado imediatamente, sem que ela precisasse pedir. Ouvir os sons úmidos só a deixou mais envergonhada, e enquanto sentia a língua do seu amante roçando seus mamilos, ela sentiu que estava prestes a perder o controle. Napatr amparou o pequeno corpo que desabou em seu colo, beijando-a carinhosamente enquanto ela continuava a se contorcer suavemente após atingir o ápice, com a respiração adoravelmente ofegante. Ela retirou lentamente os dedos, que estavam encharcados até a palma com os vestígios do amor deles. A mulher pequena gemeu baixinho, mas ajoelhou-se para abrir um espaço, permitindo que Napatr deslizasse e se sentasse no chão imediatamente. \"PP'Patr,\" Ing sussurrou, sentindo-se incrivelmente tímido com a situação em que se encontravam.","Sua amante estava sentada no chão, embaixo, com o rosto posicionado bem entre as pernas ainda úmidas de Ing. Quando Ing olhou para baixo e viu aquela língua percorrendo suavemente suas partes sensíveis, sentiu tanta vergonha que mal conseguiu se segurar no encosto do sofá. De estar sentada no colo do seu amado momentos atrás, agora ela tinha que se apoiar nos joelhos no sofá, com as pernas de cada lado do rosto dele.","\"Segure-se firme.\" \"Isso... isso está bem para você?\" Apesar do constrangimento, ela perguntou, preocupada.","\"Hum.\" Napatr se moveu ligeiramente antes de usar a língua para percorrer o centro do calor da namorada. Ela alternou entre carícias leves e beijos intensos até que os sons preencheram o ar. Enquanto Ing gemia docemente, Napatr girava a língua mais rápido, sugando as dobras delicadas. Enquanto Ing movia os quadris ao encontro do toque, Napatr roçava a ponta da língua rapidamente no clitóris sensível. \"Ah! Q-querida!\" Ing sentia como se todo o seu corpo estivesse em chamas. Sua amante deslizou a língua macia contra seu canal úmido até que os sons se tornassem audíveis. O jeito como seu amante chupava, como se fosse incrivelmente delicioso, só a deixava mais envergonhada, mas ela gostava tanto que precisava rebolar os quadris para receber.","As unhas que ela havia feito outro dia cravaram no encosto do sofá devido ao intenso prazer. Ela inclinou o rosto para cima e fechou os olhos, gemendo com o toque do amante, perdida demais na paixão para encontrar uma saída. \"Estou perto.\" \"Hum.\" A mandíbula de Napatr se mexia, sua língua e lábios se movendo contra os quadris delicados que balançavam contra ela. Finalmente, sua namorada soltou um doce gemido, seu corpo se tensionando e tremendo enquanto se afastava do toque dos lábios de Napatr, sinalizando que havia chegado ao clímax. Ing gemeu incoerentemente, ofegando e se contorcendo incontrolavelmente após atingir o ápice. Ela tentou afastar os quadris, mas seu amante a segurou.","abaixou-se para continuar a sugar, enviando sensações por todo o corpo que ela mal conseguia suportar. \"Eu não consigo... ahh... P'Patr!\"","Napatr deu um último beijo e deslizou sua língua macia mais uma vez antes de se afastar. Em seguida, ajudou a namorada a se deitar de costas no sofá e imediatamente rastejou por cima dela para unir seus lábios novamente. Ing envolveu os braços no pescoço do amado. Pelo jeito como seus lábios se pressionavam, ela sabia que ele certamente faria amor com ela por uma longa noite. E ela estava mais do que disposta a deixar que ele a tocasse, fosse íntimo e a amasse completamente.","Era verdade que tinham começado com sexo, mas desde que concordaram em ser um casal, o sexo entre eles se tornara duas vezes mais apaixonado. Ing estava completamente cativada pela forma como Napatr a amava, tão intensa, tão ardente, e ainda assim terna. Neste Natal, o Papai Noel que brincava com o corpo dela certamente lhe daria um presente precioso que ela jamais esqueceria. .","sunyan","Epílogo Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026","Cópia: . . A brisa marítima da noite roçou seu rosto, fazendo com que seus cabelos na altura dos ombros esvoaçassem ao vento. A luz do sol poente mudava em belos tons enquanto o som rítmico das ondas quebrando na costa se misturava com a conversa distante e as risadas de suas duas famílias, sentadas não muito longe de onde Napatr e Ing estavam aninhados na areia.","Napatr virou-se para olhar a mulher delicada ao seu lado, que estava colocando uma mecha de cabelo atrás da orelha. Hoje, o rosto doce de Ing estava adornado com uma maquiagem leve, diferente do seu visual habitual, e seus lábios carnudos exibiam um tom sutil de batom incrivelmente atraente. Napatr não resistiu e se inclinou para dar-lhes um beijo terno.","A princípio, Ing ficou surpresa, mas logo fechou os olhos e aceitou de bom grado o toque do seu amado. Eles estavam sentados em silêncio havia meia hora, observando o sol se pôr no horizonte, sentindo-se perfeitamente à vontade sem trocar uma única palavra. Ela não esperava que seu amado se virasse e lhe oferecesse um gesto tão doce de repente. Quando se separaram, Ing acariciou o rosto de Napatr com delicadeza. Napatr sorriu radiante, seus olhos expressando tudo, o que levou Ing a pressioná-la.","Seus lábios se encontraram com os do seu amado mais uma vez. Seus narizes se roçaram de forma lúdica enquanto compartilhavam uma série de beijos doces e demorados, incapazes de se separar completamente.","\"V-você acha que nossos pais podem nos ver?\" \"Tenho quase certeza que sim.\" \"Hum... naquela época, a mamãe também nos viu nos beijando bem aqui.\" Ing se lembrava claramente do dia em que a mãe perguntou quem era Napatr, pois estava atenta à segurança da filha e acabou vendo-a aos beijos com um estranho na praia, em frente ao... recorrer.","\"Hã? Sério? Mamãe me repreendeu naquela época?\" \"Ela me pediu para te convidar para jantar em casa.\" \"Você nunca me convidou.\"","\"Bem, nós ainda não estávamos namorando naquela época.\"","Napatr sorriu e expirou suavemente, relembrando os tempos em que as coisas não eram tão claras quanto agora. Naquela época, ela achava que era feliz o suficiente, mas não se comparava a isso. Agora, com um status definido tanto por ações quanto por palavras, sua felicidade transbordava. Ela se sentia mais realizada, mais sinceramente amada. E, mais importante, sua visão do futuro estava mais clara do que nunca. \"Por que esse suspiro? Você está se sentindo pressionada? Já se cansou de mim agora que me tem?\" \"O que você está dizendo, querida?\" Napatr puxou Ing pela cintura para perto. O aroma do perfume dela, do xampu e da sua pele natural sempre lhe trazia uma sensação de paz indescritível. Mesmo com a brisa do mar soprando, a fragrância da sua amada permanecia inconfundível.","\"Eu jamais me cansaria de você. Jamais.\" Ela abraçou o corpo macio de Ing com força, rindo encantada ao ver o adorável biquinho em seu lindo rosto. \"É melhor que seja verdade.\"","\"Você não acredita em mim? Mesmo eu te amando tanto assim?\" \"Eu acredito em você, de verdade.\"","Ing estava apenas brincando. Ela sabia desde o início que o suspiro não era de tédio ou exaustão, mas sim do conforto de estarem juntos daquela forma. Além disso, o termo carinhoso usado por Napatr a deixou tímida demais para continuar a discussão. O crepúsculo se aprofundava. O sol, embora se escondendo sob as ondas, continuava a cumprir sua função de iluminar, pintando o céu e o mar com suaves tons alaranjados, tão belos como sempre fora desde que Ing se lembrava. Ing observava o sol se pôr ali desde criança.","Antigamente, ela costumava sentar-se aqui com a mãe e a avó. Mas agora, quem estava sentado ali observando o 'pôr do sol', como ela o chamava desde a infância, era seu amado, alguém com quem ambas as famílias esperavam que ela ficasse por muito tempo. Ing também esperava isso, esperava que o amor de seu amado por ela nunca mudasse. \"Você vai me amar do jeito que a mamãe ama a mamãe? Do jeito que sua mãe ama sua mãe?\" Napatr ergueu uma sobrancelha em surpresa, mas o sorriso nunca deixou seus lábios. Hoje foi o último dia do ano. Suas famílias estavam juntas desde a tarde.","A mãe de Ing chegou a enviar um carro com motorista para buscar a família de Napatr, abrindo as portas do resort para que eles pudessem ficar o tempo que quisessem, recebendo-os com calor e simpatia.","Napatr já havia ficado impressionada antes, mas ver como suas mães se davam bem, e como sua mãe e a mãe de Ing bebiam bem juntas, lhe proporcionou uma incrível sensação de alegria. Na verdade, a mãe dela já havia pedido formalmente a mão de Ing em casamento novamente. Ing simplesmente não estava presente para testemunhar o momento porque insistiu em dirigir até a casa da tia Ayre e da tia Ink para buscá-las pessoalmente.","\"E por que eu deixaria de te amar?\" \"Eu fiz uma pergunta e você não está respondendo.\" \"Eu te amarei... até você me dizer que não posso mais te amar.\" Ing fitou os olhos que brilhavam com o amor que seu amado acabara de declarar. Ela teve que desviar o olhar quando um rubor lhe subiu ao rosto. Ouvir a risada suave de Napatr só a deixou mais tímida, até que finalmente se levantou para ir embora. \"Aonde você vai?\" Napatr sorriu, levantando-se rapidamente para segui-la. Ing podia ser pequena, mas andava tão rápido que Napatr teve que quase correr para alcançá-la. \"E você?\" \"Quanto a mim?\" Ing se virou para perguntar enquanto caminhavam de mãos dadas. Ela colocou uma mecha de cabelo desgrenhada atrás da orelha. A gola da camisa havia escorregado do ombro com o vento, mas ela não queria soltar a mão de Napatr para ajeitá-la. \"Você vai me amar como a mamãe ama a mamãe? Como a minha mamãe ama a minha mãe?\" \"Se eu não te amar, quem mais eu poderia amar?\" \"...\" \"Eu só amo o P'Patr, sabe?\" \"Oh...\"","Ing sorriu radiante até que seus olhos se curvaram em crescentes ao ver o rosto corado de sua alta amada. Os lábios finos de Napatr se comprimiram timidamente, levando Ing a usar a mão livre para acariciar suavemente sua bochecha com carinho. \"Você está com vergonha por minha causa?\"","Napatr assentiu com a cabeça, encostando a bochecha na palma da mão de Ing como um gatinho carente. Ver o brilho de amor naqueles lindos olhos encheu seu coração de alegria. Ela pegou a mão de Ing na sua, contemplando o rosto pelo qual se apaixonara à primeira vista. Estava cativada por aquela mulher delicada desde o primeiro encontro, elogiando constantemente sua beleza, tanto em pensamento quanto em voz alta.","Desde que começaram a namorar, Napatr nunca mais guardou seus pensamentos para si mesma. Ela a elogiou porque sua namorada era realmente bonita.","Ela disse 'Eu te amo' porque amava tanto o Ing que não conseguia guardar esse sentimento para si. O amor e a felicidade que ela sentia agora a faziam querer valorizar cada toque e cada segundo, desejando roubar todo o tempo de Ing para que pudessem ficar juntos para sempre.","\"Nong Ing.\" \"S-sim?\" \"Na verdade... a mamãe já pediu a sua mão em meu nome para a sua mãe e para a sua mãe.\"","Ing ficou sem palavras. Um calor percorreu seu corpo instantaneamente. Ela só conseguiu morder o lábio e desviar o olhar do brilho intenso da pessoa à sua frente.","Ela quase desejou poder desaparecer quando seus olhos rebeldes se desviaram para o bolso da camisa de Napatr, imaginando se havia algo escondido lá dentro.","Napatr observou o olhar doce e tímido com um sorriso. Sua namorada era tão preciosa e encantadora que ela nem sabia como descrever sua adoração.","\"E o que disse a minha família?\" \"Disseram-me para perguntar a você pessoalmente.\"","Ing olhou para o seu amado, que a observava com aquele mesmo sorriso terno que ela via todos os dias, o mesmo desde o primeiro encontro. Se havia alguma diferença, era a doçura e a sinceridade que ela sentia ainda mais intensamente agora.","Era um sorriso que Ing queria ver e receber para sempre. Ela nunca se cansaria dele.","\"N-Nong Ing...\" \"Hum... não, não diga isso.\" Napatr soltou uma gargalhada alta, mal conseguindo se recompor a tempo quando a mulher franzina se atirou em seus braços para um abraço. A voz de Ing estava abafada contra seu pescoço, suas palavras quase ininteligíveis. Seu rosto, que Napatr vislumbrara, estava carmesim até o pescoço, e suas orelhas estavam igualmente vermelhas. Napatr abraçou sua namorada pequena com força, fechando os olhos para absorver o calor que emanava entre elas enquanto se pressionavam uma contra a outra. Napatr as embalou de um lado para o outro, depositando um beijo no ombro delicado onde a alça da regata branca de Ing repousava. O coração dela estava acelerado, e ela podia sentir o coração de Ing batendo contra o seu, tão rápido quanto. Era a prova de que ambos estavam tímidos e nervosos com o que estava prestes a acontecer, e Ing claramente sabia o que estava por vir.","\"Você não quer que eu diga isso?\"","Napatr sussurrou. Agora, os únicos sons eram as ondas, os pássaros, o farfalhar das folhas e o vento que passava entre eles. \"P'Patr...\" Ing enterrou o rosto ainda mais no pescoço da amada. Estava tímida demais para ouvir mais palavras doces. Chamou-a pelo nome baixinho, a voz trêmula de constrangimento.","\"Você não vai ouvir primeiro? Só depois poderá levar em consideração.\" \"Não seja piegas!\" Napatr caiu na gargalhada novamente com a acusação de sua namorada tímida. Ela segurou os braços de Ing antes de deslizar as mãos para baixo, segurando delicadamente as mãos pequenas e macias de Ing.","Seu polegar deslizou pelo dorso da mão de Ing, onde o anel simples de ouro rosa ainda estava, o mesmo que ela colocara ali desde o primeiro dia. Ela se inclinou, desejando encontrar aqueles olhos doces, cheios de timidez e amor. Sorriu, dando um beijo leve naqueles lábios carnudos antes de roçar o rosto na bochecha macia de Ing, incapaz de resistir à sua fofura. \"Você quer estar comigo tanto quanto eu quero estar com você, Nong Ing?\" \"P'Patr...\" \"Você quer passar seu futuro comigo todos os dias, assim como eu quero passar o meu com você?\" Ing tentou conter um sorriso tímido. Por mais que quisesse se esconder daquele olhar amoroso e brilhante, ela desejava ainda mais olhar naqueles olhos gentis enquanto perguntas tão importantes eram feitas. \"E se eu pedisse a permissão de Nong Ing para passar todos os dias de nossas vidas juntos a partir de agora... você consideraria meu pedido?\"","\"Eu te disse para não ser brega!\" \"Nong Ing, você quer casar comigo?\"","O coração de Napatr disparou enquanto ela implorava. Ela sorriu com a bronca carinhosa, mas ainda queria ouvir uma resposta clara da mulher pequena à sua frente.","\"D-Querida.\" \"Não faço promessas, mas vou te amar todos os dias, assim como te amo agora. Vou sim,\"","\"Humph! Não, pare de falar!\" Ing a abraçou imediatamente, antes que ela pudesse terminar a doce frase, sentindo-se tímida demais para ouvir o resto. Mesmo que Napatr não tenha falado, mesmo que ela não tenha feito votos como outros casais, Ing sentiu tudo. Em cada gesto carinhoso, em cada demonstração de sinceridade e em cada \"eu te amo\" que ouviu desde o início do relacionamento. Napatr era alguém que sempre trazia conforto e felicidade. Ing nem precisava pedir. Independentemente de tudo, a resposta dela era clara desde o primeiro dia em que começaram a namorar. \"Mas,\" \"Se não for você, eu não me casarei. Se não for P'Patr, eu não amarei. E se não for você, eu não quero passar minha vida com mais ninguém até o fim.\" Ing se afastou do abraço para olhar para seu amado, que havia ficado em silêncio após sua resposta. O rosto bonito e anguloso de Napatr estava corado até as orelhas. Seus lábios se abriram em um sorriso largo e belo. Ing não conseguiu conter o riso afetuoso.","\"Então, você está disposto a me amar até que esse dia chegue?\"","\"Estou mais do que disposto.\" Napatr pegou a mão da namorada, apertando-a antes de levantá-la para depositar um beijo no dorso da mão dela, como um juramento. Ela contemplou o belo rosto da mulher que estava prestes a se tornar sua companheira para a vida toda, e então se inclinou para beijar os lábios pelos quais estava obcecada desde o primeiro toque. O beijo deles hoje foi repleto de doçura, emoção e alegria. Foi tão lindo que eles não queriam se separar. Um beijo cheio de amor. \"Eu te amo, Ing. Eu te amo muito, muito mesmo.\" Ing sorriu ao ouvir o \"Eu te amo\" sussurrado contra seus lábios. Ela beijou a ponte do nariz de Napatr antes de lhe dar outro beijo suave nos lábios. \"Eu também te amo, P'Patr. Obrigada por ficar. Obrigada por amar alguém como eu.\"","\"Só existe uma pessoa como você neste mundo. Eu te amo por ser você. Se não fosse por você, eu não amaria ninguém.\" \"Mais uma conversa fiada.\" \"Quer provar de novo?\" \"Não!\" Napatr sorriu enquanto Ing balançava a cabeça, corando. Ela roçou o focinho na bochecha macia mais uma vez antes de se ajoelhar na areia para tirar as sandálias de Ing.","\"Eu as carregarei para você.\" Ela viu a mulher franzina tentando sacudir a areia que havia entrado em seus
