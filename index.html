<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casualmente</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap');

/* ── TOKENS ── */
:root{
  --bg:#0d0d12;--surface:#16161f;--card:#1e1e2a;--border:#2a2a3a;
  --accent:#c9a96e;--accent2:#e8c99a;--text:#e8e3d8;--muted:#6e6a7a;
  --green:#6ec98a;--highlight:rgba(201,169,110,.15);--red:#c96e7a;
  --fd:'Playfair Display',Georgia,serif;
  --fb:'Lora',Georgia,serif;
  --fu:'Inter',system-ui,sans-serif;
  --r:10px;--rs:6px;--t:.2s ease;
  --rs:1.05rem;--rl:1.9;
}
body.sepia{--bg:#1b1710;--surface:#221e14;--card:#2a261a;--border:#3a3425;--text:#e4d9c0;--muted:#7a7060}
body.light{--bg:#f4f0e8;--surface:#ece6da;--card:#e0d9cc;--border:#cec7b8;--text:#2a2520;--muted:#7a7060;--highlight:rgba(160,120,60,.12)}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;transition:background .3s,color .3s}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
.sidebar{width:285px;min-width:285px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width var(--t),min-width var(--t),transform var(--t)}
.sidebar.collapsed{width:0;min-width:0;border-right:none}
.sb-header{padding:20px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-family:var(--fd);font-size:1.05rem;color:var(--accent);font-style:italic}
.sb-meta{font-family:var(--fu);font-size:.68rem;color:var(--muted);margin-top:3px;letter-spacing:.05em;text-transform:uppercase}
.sb-search{padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;color:var(--text);font-family:var(--fu);font-size:.78rem}
.sb-search input:focus{outline:none;border-color:var(--accent)}
.sb-search input::placeholder{color:var(--muted)}
.ch-list{overflow-y:auto;flex:1;padding:5px 0}
.ch-list::-webkit-scrollbar{width:3px}
.ch-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ch-item{padding:9px 16px 9px 18px;cursor:pointer;border-left:3px solid transparent;font-family:var(--fu);font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:7px;transition:all var(--t)}
.ch-item:hover{background:var(--card);color:var(--text)}
.ch-item.active{background:var(--highlight);border-left-color:var(--accent);color:var(--accent2)}
.ch-item .bk{color:var(--accent);font-size:.7rem;flex-shrink:0;opacity:0;transition:opacity .2s}
.ch-item.bkd .bk{opacity:1}
.ch-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ch-wc{font-size:.65rem;color:var(--muted);flex-shrink:0}

/* ── STATS PANEL (sidebar bottom) ── */
.sb-stats{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;font-family:var(--fu);font-size:.72rem;color:var(--muted)}
.stat-row{display:flex;justify-content:space-between;margin-bottom:6px}
.stat-bar-wrap{background:var(--border);border-radius:3px;height:3px;margin-top:2px}
.stat-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s ease}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar.hidden{display:none}
.tb-title{flex:1;font-family:var(--fd);font-size:.88rem;color:var(--accent2);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:6px 9px;cursor:pointer;font-size:.75rem;line-height:1;transition:all var(--t);display:flex;align-items:center;gap:4px;font-family:var(--fu);white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--highlight);border-color:var(--accent);color:var(--accent)}
.zoom-ctrl{display:flex;align-items:center;gap:3px}
.zbtn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:5px 8px;cursor:pointer;font-family:var(--fu);font-size:.8rem;font-weight:600;line-height:1;transition:all var(--t)}
.zbtn:hover{border-color:var(--accent);color:var(--accent)}
.zval{font-family:var(--fu);font-size:.68rem;color:var(--muted);min-width:32px;text-align:center}

/* ── SETTINGS ── */
.settings{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:none;flex-wrap:wrap;gap:16px;align-items:center}
.settings.open{display:flex}
.sg{display:flex;align-items:center;gap:7px;font-family:var(--fu);font-size:.75rem;color:var(--muted)}
.sg label{white-space:nowrap}
select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:4px 7px;font-family:var(--fu);font-size:.75rem;cursor:pointer}
select:focus{outline:none;border-color:var(--accent)}
.sbtn{background:var(--border);border:none;color:var(--muted);border-radius:4px;padding:3px 7px;font-family:var(--fu);font-size:.7rem;cursor:pointer;transition:all var(--t)}
.sbtn.on{background:var(--highlight);color:var(--accent)}
.sbtn:hover{color:var(--text)}

/* ── INLINE SEARCH ── */
.isearch{background:var(--card);border-bottom:1px solid var(--border);padding:8px 20px;display:none;align-items:center;gap:8px}
.isearch.open{display:flex}
.isearch input{flex:1;background:none;border:none;color:var(--text);font-family:var(--fu);font-size:.82rem;outline:none}
.isearch input::placeholder{color:var(--muted)}
.isearch-info{font-family:var(--fu);font-size:.7rem;color:var(--muted);white-space:nowrap;min-width:60px}
.ibtn{background:var(--border);border:none;color:var(--text);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:.78rem;transition:background var(--t)}
.ibtn:hover{background:var(--highlight)}

/* ── AUDIO BAR ── */
.audiobar{background:var(--card);border-bottom:1px solid var(--border);padding:9px 20px;display:none;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.audiobar.open{display:flex}
.audio-ctrl{display:flex;align-items:center;gap:6px}
.playbtn{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;color:#0d0d12;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background var(--t);flex-shrink:0}
.playbtn:hover{background:var(--accent2);transform:scale(1.07)}
.audio-info{flex:1;min-width:120px}
.audio-lbl{font-family:var(--fu);font-size:.68rem;color:var(--muted);margin-bottom:4px}
.aprog-wrap{background:var(--border);border-radius:3px;height:3px;cursor:pointer}
.aprog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s}
.aspeed{display:flex;align-items:center;gap:4px;flex-shrink:0}

/* ── FAB (floating play) ── */
.fab{position:fixed;bottom:24px;right:22px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#0d0d12;font-size:1.2rem;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:150;transition:transform .15s,background var(--t)}
.fab:hover{background:var(--accent2);transform:scale(1.07)}
.fab.show{display:flex}
.fab.focus-mode{display:none!important}

/* ── READING PROGRESS ── */
.rdprog{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:300;pointer-events:none;transition:width .1s}

/* ── CONTENT ── */
.content-wrap{flex:1;overflow-y:auto;position:relative;-webkit-overflow-scrolling:touch}
.content-wrap::-webkit-scrollbar{width:5px}
.content-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ch-content{max-width:720px;margin:0 auto;padding:44px 32px 80px}

/* focus mode */
body.focus .topbar,.focus .settings,.focus .isearch,.focus .audiobar,.focus .sidebar,.focus .rdprog{display:none!important}
body.focus .fab{display:flex!important}
body.focus .ch-content{padding-top:60px}

.ch-top{margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.ch-title{font-family:var(--fd);font-size:clamp(1.3rem,3vw,1.9rem);color:var(--accent);font-weight:400;line-height:1.25;margin-bottom:10px}
.ch-meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--fu);font-size:.7rem;color:var(--muted)}
.tag{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 7px}
.bk-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);padding:3px 8px;cursor:pointer;font-family:var(--fu);font-size:.7rem;transition:all var(--t)}
.bk-btn:hover{border-color:var(--accent);color:var(--accent)}
.bk-btn.on{background:var(--highlight);border-color:var(--accent);color:var(--accent)}

/* PARAGRAPHS */
.para{font-size:var(--rs,1.05rem);line-height:var(--rl,1.9);color:var(--text);margin-bottom:1.4em;border-radius:4px;padding:3px 8px;margin-left:-8px;transition:background .18s,color .18s;cursor:pointer;position:relative}
.para:hover{background:rgba(255,255,255,.025)}
.para.speaking{background:rgba(201,169,110,.12);color:var(--accent2)}
.para mark{background:rgba(201,169,110,.3);color:var(--accent2);border-radius:2px;padding:0 2px}
.para.has-note::before{content:'📝';position:absolute;right:-22px;top:4px;font-size:.75rem;opacity:.6}

/* NOTE POPUP */
.note-popup{position:fixed;background:var(--card);border:1px solid var(--accent);border-radius:var(--r);padding:14px;z-index:400;width:280px;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none}
.note-popup.open{display:block}
.note-popup textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:.82rem;padding:8px;resize:vertical;min-height:80px;outline:none}
.note-popup textarea:focus{border-color:var(--accent)}
.note-popup-actions{display:flex;gap:7px;margin-top:8px}
.np-btn{flex:1;border:1px solid var(--border);border-radius:var(--rs);padding:6px;cursor:pointer;font-family:var(--fu);font-size:.75rem;transition:all var(--t)}
.np-save{background:var(--accent);color:#0d0d12;border-color:var(--accent)}
.np-save:hover{background:var(--accent2)}
.np-del{background:var(--card);color:var(--muted)}
.np-del:hover{border-color:var(--red);color:var(--red)}
.np-close{background:var(--card);color:var(--muted)}
.np-close:hover{color:var(--text)}

/* NAV */
.ch-nav{display:flex;justify-content:space-between;margin-top:44px;padding-top:22px;border-top:1px solid var(--border);gap:10px}
.navbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--r);cursor:pointer;font-family:var(--fu);font-size:.78rem;transition:all var(--t);max-width:47%;text-align:center;line-height:1.4}
.navbtn:hover{border-color:var(--accent);color:var(--accent)}
.navbtn:disabled{opacity:.3;cursor:not-allowed}
.navbtn span{display:block;color:var(--muted);font-size:.67rem;margin-bottom:2px}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;padding:40px 24px}
.welcome-icon{font-size:3.2rem;margin-bottom:16px}
.welcome h1{font-family:var(--fd);font-size:clamp(1.7rem,4vw,2.5rem);color:var(--accent);font-style:italic;margin-bottom:8px}
.welcome p{color:var(--muted);font-size:.9rem;max-width:360px;line-height:1.7}
.wcta{margin-top:22px;background:var(--accent);color:#0d0d12;border:none;padding:11px 24px;border-radius:var(--r);font-family:var(--fu);font-weight:600;font-size:.85rem;cursor:pointer;transition:background var(--t)}
.wcta:hover{background:var(--accent2)}
.resume-cards{display:flex;flex-direction:column;gap:7px;width:100%;max-width:340px;margin-top:10px}
.resume-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;cursor:pointer;text-align:left;font-family:var(--fu);font-size:.78rem;color:var(--text);transition:all var(--t);display:flex;align-items:center;gap:8px}
.resume-card:hover{border-color:var(--accent);color:var(--accent)}

/* STATS MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto}
.modal h2{font-family:var(--fd);color:var(--accent);font-size:1.3rem;font-style:italic;margin-bottom:20px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px;text-align:center}
.stat-num{font-family:var(--fd);font-size:1.6rem;color:var(--accent);display:block}
.stat-desc{font-family:var(--fu);font-size:.7rem;color:var(--muted);margin-top:3px;display:block}
.modal-close{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:8px 20px;cursor:pointer;font-family:var(--fu);font-size:.8rem;transition:all var(--t);margin-top:4px}
.modal-close:hover{border-color:var(--accent);color:var(--accent)}
.bk-list-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-family:var(--fu);font-size:.78rem;color:var(--muted)}
.bk-list-item button{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);padding:2px 7px;cursor:pointer;font-size:.7rem;transition:all var(--t);margin-left:auto}
.bk-list-item button:hover{border-color:var(--accent);color:var(--accent)}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--card);border:1px solid var(--accent);color:var(--accent);border-radius:var(--r);padding:9px 18px;font-family:var(--fu);font-size:.78rem;z-index:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FOCUS EXIT BTN */
.focus-exit{position:fixed;top:16px;right:16px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:var(--rs);padding:6px 10px;cursor:pointer;font-family:var(--fu);font-size:.72rem;z-index:400;display:none;transition:all var(--t)}
body.focus .focus-exit{display:block}
.focus-exit:hover{border-color:var(--accent);color:var(--accent)}

/* MOBILE */
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:200;transform:translateX(0);transition:transform var(--t);width:285px!important;min-width:285px!important}
  .sidebar.collapsed{transform:translateX(-282px)}
  .ch-content{padding:28px 16px 100px}
  .zval{display:none}
  .modal{padding:20px}
}
</style>
</head>
<body>

<div class="rdprog" id="rdprog"></div>
<div class="toast" id="toast"></div>
<div class="note-popup" id="notePopup">
  <div style="font-family:var(--fu);font-size:.72rem;color:var(--muted);margin-bottom:7px">📝 Anotação neste parágrafo</div>
  <textarea id="noteText" placeholder="Escreva sua nota aqui..."></textarea>
  <div class="note-popup-actions">
    <button class="np-btn np-save" onclick="saveNote()">Salvar</button>
    <button class="np-btn np-del" onclick="deleteNote()">Apagar</button>
    <button class="np-btn np-close" onclick="closeNote()">Fechar</button>
  </div>
</div>
<div class="overlay" id="statsOverlay" onclick="if(event.target===this)closeStats()">
  <div class="modal" id="statsModal"></div>
</div>
<button class="focus-exit" onclick="toggleFocus()">✕ Sair do foco</button>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-title">Casualmente</div>
      <div class="sb-meta">miww_ss • 23 capítulos</div>
    </div>
    <div class="sb-search"><input type="search" placeholder="🔍 Buscar capítulo..." id="sbSearch"></div>
    <div class="ch-list" id="chList"></div>
    <div class="sb-stats" id="sbStats"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar" id="topbar">
      <button class="btn" id="btnSb">☰</button>
      <div class="tb-title" id="tbTitle">Casualmente</div>
      <div class="tb-right">
        <div class="zoom-ctrl">
          <button class="zbtn" id="zOut">A−</button>
          <span class="zval" id="zVal">100%</span>
          <button class="zbtn" id="zIn">A+</button>
        </div>
        <button class="btn" id="btnIS">🔍</button>
        <button class="btn" id="btnAudio">🎧</button>
        <button class="btn" id="btnFocus" title="Modo foco">⛶</button>
        <button class="btn" id="btnStats">📊</button>
        <button class="btn" id="btnSettings">⚙️</button>
      </div>
    </div>

    <div class="settings" id="settings">
      <div class="sg">
        <label>Tema</label>
        <select id="themeSelect" onchange="setTheme(this.value)">
          <option value="dark">🌙 Noturno</option>
          <option value="sepia">📜 Sépia</option>
          <option value="light">☀️ Claro</option>
        </select>
      </div>
      <div class="sg">
        <label>Espaçamento</label>
        <button class="sbtn" onclick="setLH(1.6)">Compacto</button>
        <button class="sbtn on" id="lhNorm" onclick="setLH(1.9)">Normal</button>
        <button class="sbtn" onclick="setLH(2.3)">Espaçado</button>
      </div>
      <div class="sg">
        <label>Voz</label>
        <select id="voiceSel"></select>
      </div>
    </div>

    <div class="isearch" id="isearch">
      <span style="color:var(--muted)">🔍</span>
      <input type="text" id="isInput" placeholder="Buscar no capítulo...">
      <span class="isearch-info" id="isInfo"></span>
      <button class="ibtn" onclick="isNav(-1)">↑</button>
      <button class="ibtn" onclick="isNav(1)">↓</button>
      <button class="ibtn" onclick="closeIS()">✕</button>
    </div>

    <div class="audiobar" id="audiobar">
      <div class="audio-ctrl">
        <button class="btn" id="aPrev">⏮</button>
        <button class="playbtn" id="aPlay">▶</button>
        <button class="btn" id="aNext">⏭</button>
        <button class="btn" id="aStop">⏹</button>
      </div>
      <div class="audio-info">
        <div class="audio-lbl" id="aLbl">Clique em qualquer parágrafo para ouvir</div>
        <div class="aprog-wrap"><div class="aprog-fill" id="aProgFill" style="width:0%"></div></div>
      </div>
      <div class="aspeed">
        <span style="font-family:var(--fu);font-size:.68rem;color:var(--muted)">Vel:</span>
        <button class="sbtn" onclick="setRate(.8)">.8×</button>
        <button class="sbtn on" onclick="setRate(1)">1×</button>
        <button class="sbtn" onclick="setRate(1.3)">1.3×</button>
        <button class="sbtn" onclick="setRate(1.6)">1.6×</button>
        <button class="sbtn" onclick="setRate(2)">2×</button>
      </div>
    </div>

    <div class="content-wrap" id="cWrap">
      <div class="ch-content" id="chContent">
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-icon">📖</div>
          <h1>Casualmente</h1>
          <p>Romance tailandês • 23 capítulos • 78.000 palavras</p>
          <p style="font-size:.78rem;margin-top:6px;color:var(--muted)">Clique em um parágrafo para ouvir • Segure para anotar</p>
          <button class="wcta" onclick="loadChapter(0)">Começar do início ›</button>
          <div id="resumeCards" class="resume-cards"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>const BOOK_DATA = [{"title":"01. Confusão","paragraphs":["Livro: CASUALLY Autor: miww_ss Lançamento: 01 de junho de 2026 Envie um e-mail para: daphne.shn@gmail.com",".","Compartilhe este livro GRATUITAMENTE - sol . O amor é simplesmente... amor.","Nada mais, nada menos. . . \"Você não está levando esse caso de uma noite a sério, está?\" Aquela voz doce e rouca permaneceu em sua mente, misturando-se ao zumbido do moedor de café e ao jazz suave que vinha do saguão do hotel. Napatr havia descido do quarto meia hora antes.","Napatr teve que admitir que a voz da mulher pequena que ecoava em sua mente era incrivelmente perturbadora. Ela não conseguia evitar suspirar repetidamente. Na verdade, ela já havia perdido a conta de quantas vezes suspirara desde que saira do quarto. Certa vez, ouvira dizer que suspirar com frequência encurta a vida. Napatr nunca tinha visto nenhuma pesquisa séria sobre o assunto. Ela sabia que era falso e costumava descartá-lo como um absurdo.","Mas agora, ela pensava que talvez fosse verdade. Cada vez que suspirava enquanto aquela mesma frase se repetia em sua mente, sentia uma estranha sensação de vazio no peito.","Não era exatamente arrependimento...","Mas também não era uma aversão. O sentimento mais próximo era o de decepção, embora ela não soubesse porquê. Naquele momento, ela não havia dado uma resposta. Em vez disso, simplesmente fez uma pergunta. \"Como você vai voltar para casa?\" \"Não quero incomodar.\" A resposta foi fria, sem oferecer qualquer complemento à pergunta que ela acabara de fazer. Era tão diferente de antes, quando ela estava tão ansiosa para vê-la.","Foi tão diferente da noite anterior, quando ela implorou para que Napatr a tocasse tão profundamente. Ela tinha uma pele excepcionalmente clara e longos cabelos cor de mel com as pontas encaracoladas que emolduravam perfeitamente seu rosto doce. Possuía um nariz arrebitado e teimoso e lábios carnudos adornados com um batom de alta qualidade. Quando sorria, seus olhos se curvavam num atraente formato de crescente. Ela era tão encantadora que Napatr ficou sem fôlego logo no primeiro instante em que a viu. de.","Eles se conheceram por meio de um aplicativo de namoro.","Mas Napatr jamais imaginou que eles acabariam em uma cama de hotel enorme como essa. Ela nunca havia tido um relacionamento profundo com ninguém sem um vínculo formal. Essa mulher encantadora foi a primeira.","Ela foi a primeira pessoa com quem conversou por meio de um aplicativo, nunca a tendo conhecido ou visto pessoalmente, apenas em fotos, até ontem à noite.","A primeira pessoa que transformou sua vida linear em algo sinuoso e um pouco colorido. De uma conversa casual, sugerida por suas amigas, surgiu um encontro de uma noite.","Partindo do fato de conhecerem apenas os nomes uma da outra, uma coincidência levou Napatr a perceber que a outra mulher também era amiga de alguém em seu local de trabalho. Em vez de deixar isso passar, ela se viu querendo saber ainda mais sobre quem Ing realmente era. Será que o doce sorriso que fez seu coração palpitar era realmente o veneno que ela imaginava? . \"Você não está levando esse caso de uma noite a sério, está?\" Napatr parou de recolher as roupas do chão com as mãos e se endireitou. Virou-se para olhar a grande cama onde, a princípio, a mulher franzina havia desaparecido sob o cobertor e caído num sono profundo quase imediatamente após atingir o ápice da última rodada, meia hora atrás.","Um braço esguio estendeu-se para acender o abajur ao lado da cama, a fim de fornecer luz suficiente, provavelmente para conversar com ela. Ela puxou o cobertor macio para proteger a pele nua, como se Napatr não tivesse passado a noite vendo cada centímetro dela. Napatr, que a observava em silêncio do meio da sala, sentiu-se envergonhada e desviou o olhar.","Os lábios de Napatr se curvaram num sorriso. Ela optou por não responder. Não que não quisesse, mas a pergunta da outra mulher lhe ofereceu uma oportunidade.","Sem escolha.","\"Patr.\" \"Como você vai voltar para casa?\"","\"Não quero incomodar.\" A voz doce e rouca que sussurrara em seu ouvido a noite toda tornara-se áspera. Napatr apertou o nó do roupão antes de se virar para a mulher franzina que se agarrava ao cobertor com força mais uma vez. Teria ela esquecido que Napatr já a havia tocado e visto todo o seu corpo sedutor? Agora, de repente, ela se tornara possessiva em relação a ele. Apesar de Napatr ter pedido repetidamente, a outra mulher estava mais do que disposta a deixar as coisas chegarem a esse ponto. Foi algo que Napatr não esperava de forma alguma. \"Nesse caso, vamos tomar um banho primeiro.\" \"OK...\" A resposta foi tão breve que fez Napatr sorrir, mas um estranho vazio se espalhou por seu peito. Inúmeras perguntas surgiram em sua mente, questionando o porquê. Embora soubesse a resposta até certo ponto, no fundo ela se recusava a aceitá-la.","\"Quando terminarmos, cada um segue seu caminho. O que mais há para conversar? Enfim, nos vemos na sala de jantar.\" Napatr esperou até que a outra mulher terminasse a ligação, com quem ela supôs estar falando, uma amiga próxima que Napatr também conhecia bem. Ela permaneceu por um tempo, fingindo que não tinha ouvido a conversa, antes de se desculpar e ir sentar-se na cafeteria do hotel, onde permanece até hoje. .",". Ela suspirou, levando a xícara de café quente aos lábios enquanto olhava para a tela do celular. Eram quase nove da manhã, mas não havia sinal de nenhuma notificação do aplicativo, como de costume. Mas como poderia haver? A pessoa que lhe mandava mensagens todos os dias deixou claro, tanto na frente dela quanto pelas costas, que não queria levar o relacionamento adiante. Ela não queria mais conversar. Napatr não era a única a suspirar repetidamente; a outra mulher fazia exatamente a mesma coisa. Ing olhou fixamente para o seu reflexo, a maquiagem disfarçando impecavelmente seu cansaço.","De repente, o rosto marcante e belo da outra mulher surgiu em sua mente, o nariz arrebitado e aqueles olhos suaves e encantadores, tão cativantes quanto a voz rouca que sussurrara preocupação em seu ouvido com genuíno sentimento.","Ela se lembrou da própria voz, sussurrando o nome de Napatr entre respirações trêmulas enquanto a outra mulher permanecia entre suas coxas, saboreando-a sem sequer levantar o olhar. \"Patr...\" Houve apenas um leve zumbido na garganta como resposta, sincronizado com a maneira embaraçosa como seus quadris se ergueram para acompanhar aqueles lábios macios. Nossa... Por que ela continuava pensando nela daquele jeito? Ing balançou a cabeça e olhou-se novamente no espelho do banheiro perto da sala de jantar do hotel. Ela acabara de se despedir de sua amiga íntima, que estava hospedada no hotel.","Ela acabara de conduzir aquela mesma pessoa para outro cômodo e suspeitava que Mind, sua amiga íntima, também estivesse hospedando alguém. Ela pegou seu batom de alta qualidade e retocou meticulosamente os lábios, ajeitando o cabelo antes de guardar suas coisas na pequena bolsa. Ao conferir sua aparência no grande espelho, ela notou uma leve marca rosada no peito. A marca estava localizada bem abaixo, mas o decote do vestido que usava era profundo o suficiente para que ela a visse. \"Sua pele fica marcada com facilidade.\"","\"Então não se esqueça de deixar um.\" O rosto de Ing ficou vermelho como um tomate. Ela apertou os lábios recém-pintados com força. A imagem da mulher alta e da conversa entre elas passou pela sua mente, irritada.","Ela não estava irritada com Napatr. Ela estava irritada consigo mesma por não ter impedido aquilo, por ter deixado aquelas marcas aparecerem de propósito e pela frequência com que o rosto de Napatr surgia em seus pensamentos. O mesmo elevador que a levara ao quarto de hóspedes a trouxe de volta ao térreo. O espelho do elevador refletia seu rosto, tênues marcas vermelhas revelando emoções muito anormais, impossíveis de esconder. Ing imediatamente olhou para os próprios pés. O olhar penetrante que ela havia encontrado antes permanecia vívido em sua memória. Ela se lembrava claramente de como a outra mulher a olhara com tanta admiração e paixão.","Era enlouquecedor que ela não parasse de pensar nela. No entanto, a pessoa em que ela pensava estava sentada, com a postura ereta, perto da recepção. Ing não conseguiu evitar caminhar em sua direção.","Napatr vestia a mesma roupa que usara naquela manhã. Suas longas pernas estavam cruzadas de forma atraente, e seu rosto, mesmo sem a maquiagem leve que usara na noite anterior, continuava tão bonito como sempre. . \"Patr?\" \"Aqui está um pouco de café.\"","\"Obrigado. E você?\" \"Você está finalizando a compra?\"","\"Sim.\"","Ing sentiu um lampejo de confusão quando Napatr se ofereceu para cuidar do caixa, gesticulando para que ela esperasse no sofá que Napatr acabara de desocupar. Ela olhou para a xícara de café de marca em sua mão e, em seguida, observou as costas da mulher alta até que ela retornasse após terminar a tarefa. \"Você estava me esperando?\" \"Pode-se dizer isso.\" \"Por que?\"","\"Não sei. Como você vai voltar? De táxi?\" \"Suponho que sim.\"","Napatr lutou para impedir que seus lábios se curvassem em um sorriso. Ela lançou um olhar furtivo para o perfil da mulher franzina ao seu lado, que tomava um gole de café quente. O sol do final da manhã iluminava seus cabelos claros, fazendo-os brilhar. Mas então, aqueles doces olhos se voltaram para ela com suspeita e um toque de desagrado, fazendo com que Napatr desviasse o olhar imediatamente.","\"Você ainda não respondeu à minha pergunta desta manhã.\" \"Sobre isso?\" \".....\" Ing olhou Napatr diretamente nos olhos. Turistas, clientes e funcionários passavam por eles, e uma música suave tocava nos alto-falantes, mas nada conseguia distraí-los de se olharem nos olhos. Ela sabia muito bem que fora ela quem abordara Napatr primeiro. A outra mulher devia estar bastante confusa com a mudança repentina de comportamento dela da noite para o dia. Ela estava agindo como se fosse um \"atropelamento com fuga\", pegando o que queria e fugindo. Mesmo tendo passado quase a noite inteira embaixo dela. Tudo tinha virado de cabeça para baixo por culpa dela. Os olhos penetrantes e belos de Napatr refletiam sua confusão. Ing foi a primeira a desviar o olhar, tomando um gole repentino e defensivo do café que Napatr havia comprado para ela.","\"E se eu levasse isso a sério, isso te incomodaria?\" Napatr não respondeu diretamente. Em vez disso, fez uma pergunta. E se ela estivesse falando sério? E se não estivesse? Não era como se elas tivessem começado a conversar ou se conhecido ontem à noite. Embora não tivesse passado muito tempo, nem mesmo um mês, e eles não soubessem muito mais do que os apelidos um do outro, isso não significava que ela não sentisse absolutamente nada.","Ing mordeu o lábio e suspirou baixinho antes de encontrar novamente o olhar da pessoa ao seu lado.","\"Você ouviu isso ontem à noite. Antes de eu chamar seu nome... eu chamei o de outra pessoa.\" \".....\" Dessa vez, Napatr ficou em silêncio, absorta em pensamentos. Ela se lembrou de que a outra mulher de fato havia chamado outro nome, exatamente como ela havia dito, antes de Napatr lhe pedir que dissesse seu nome especificamente. Mas ela também se lembrou da mulher franzina lhe dizendo que não tinha mais ninguém.","Napatr assentiu com a cabeça, compreendendo.","Ela fingia entender, embora não entendesse absolutamente nada.","Ing observou a pessoa ao seu lado se levantar, ficando em sua altura total. Napatr permaneceu em silêncio, com o rosto tão impassível que Ing não conseguiu decifrar seu estado de espírito.","Quando Napatr se virou para sair, a mão de Ing se moveu mais rápido do que seus pensamentos, segurando Napatr pelo pulso. O rosto sereno se virou novamente, uma sobrancelha bem cuidada arqueando-se levemente em sinal de interrogação.","\"Você vai embora?\" Ing sabia que era uma pergunta bastante estúpida. A outra mulher parecia querer conversar e tinha muitas perguntas a fazer, mas Ing foi quem as ignorou completamente. No entanto, no momento em que Napatr estava prestes a ir embora, a mente tola de Ing não queria que ela fosse. E você? Já está pronto para ir? \"...\" \"Você quer que eu me sente e espere com você?\" \"Você não precisa ir trabalhar?\"","Ing perguntou, porque durante a última semana, a outra mulher tinha trabalhado quase todas as manhãs. Ela nunca tinha perguntado o que Napatr fazia para viver, nem tinha partilhado quaisquer detalhes pessoais seus. As conversas deles no aplicativo giravam em torno de assuntos gerais. Embora Napatr fosse uma mulher de poucas palavras, mesmo por mensagem de texto, ela nunca demonstrara falta de cuidado ou interesse no diálogo. Ela nunca se intrometeu, manteve-se consistente e foi honesta de uma forma que Ing nunca tinha visto em mais ninguém. \"Hoje é meu dia de folga. Quer que eu chame um táxi para você?\" Napatr deu um passo para trás e sentou-se novamente ao lado da mulher franzina que ela não compreendia totalmente. A mão delicada de Ing ainda segurava seu pulso, como se tivesse esquecido de soltá-lo. O aroma sedutor do mesmo perfume da noite anterior persistia, despertando algo no coração de Napatr. \"Eu mesmo posso chamar um de meu.\"","\"Devo pedir à recepcionista para ligar para você?\" \"Por que?\" Ela se virou para olhar para a mulher mais alta, que já a observava.","O olhar de Napatr baixou-se, e o rosto de Ing corou enquanto ela instintivamente levava a mão ao peito para protegê-lo.","\"É visível. Dói?\" A mesma pergunta da noite anterior foi feita novamente, mas o tom havia mudado para um mais suave, desprovido da luxúria que estivera presente na cama king-size. O rosto de Ing ficou vermelho enquanto ela assentia, sinalizando que não doía. \"Usar um gel frio ajudará a mancha a desaparecer mais rapidamente.\"","\"OK...\" \"Nesse caso, vou chamar um carro para você.\"","\"Como você vai voltar, Patr?\" \"Eu dirigi até aqui ontem à noite.\"","Mais uma vez, Ing assentiu. E mais uma vez, a outra mulher se levantou, erguendo-se em toda a sua altura. Ing mordeu o lábio pensativamente. Mesmo tendo sido ela quem afastara Napatr desde o início, uma sensação inexplicável a dominou.","\"Patr.\" Napatr esboçou um leve sorriso antes de se virar para a mulher franzina, que parecia temerosa de ser deixada para trás. Desta vez, Napatr não se sentou novamente, mas simplesmente se virou para encará-la. \"Se você estiver livre hoje, você se importaria de me dar uma carona?\" Napatr assentiu com a cabeça e estendeu a mão para a mulher franzina, cuja mente mudava tão rápido que ela mal conseguia acompanhar. Ing hesitou por um instante antes de colocar a mão na de Napatr e se levantar. Ela era realmente um mistério que deixou Napatr com mais perguntas do que respostas. .","sunyan"],"wordCount":2460},{"title":"02. Complicado","paragraphs":["Napatr pegou o pequeno porta-retratos que o dono do quarto havia virado com a face para baixo uma hora antes e o colocou de volta no lugar. Ela se encostou na cabeceira da cama, passando a mão pelos cabelos na altura dos ombros enquanto observava o quarto de tons claros. Havia poucos sinais de uso. Talvez o lugar mais desarrumado fosse a cama kingsize. O quarto estava limpo e agradável aos olhos, sugerindo que aquele apartamento, onde ela havia deixado Ing mais cedo naquela manhã, não era um lugar onde a outra mulher se hospedava regularmente. Provavelmente, ela apenas ia e voltava. Ela olhou para a foto novamente, estudando as três pessoas nela. Um leve sorriso surgiu quando viu o sorriso brilhante e radiante da dona do quarto na fotografia. Ing vestia um uniforme impecável de escola conventual com gravata, um contraste marcante com a mulher glamorosa e sensual em que havia se transformado. Talvez por ser menor que as outras duas, ela estivesse no meio. Mesmo assim, sua mão delicada segurava a menina ao seu lado de um jeito doce e afetuoso, revelando a proximidade entre elas. Napatr ergueu uma sobrancelha, curiosa, mas a enorme porta do quarto se abriu, obrigando-a a desviar o olhar da foto. A mulher franzina, vestida com roupas casuais e enxugando os cabelos úmidos com uma toalha, caminhou em sua direção.","Você está acordado? Quer tomar banho primeiro? Ing perguntou a Napatr, que estava encostada na cabeceira da cama. Ela vislumbrou rapidamente os ombros largos e nus de Napatr antes de fingir que ia até o grande guardaroupa perto da cama para pegar uma toalha para sua convidada. \"Que horas são?\"","\"Três da tarde.\" \"Está com fome?\" Napatr perguntou à pequena dona do quarto, que se recusou a encará-la. Ela estendeu a mão para pegar a toalha macia antes de sair da cama sem olhar para a outra mulher, já que estava completamente nua. Ing balançou a cabeça em resposta, mesmo sabendo que Napatr estava de costas. A outra mulher havia saído de debaixo das cobertas enquanto Ing estava sentada aos pés da cama. A visão daquele físico alto, esguio, porém tonificado e nu, chamou sua atenção. O rosto de Ing corou facilmente, e ela não sabia por que estava reagindo daquela maneira.","Afinal, elas haviam estado intimamente próximas por alguns instantes. Os dedos dela haviam traçado os músculos esguios da outra mulher, assim como as mãos delicadas de Napatr haviam explorado seu corpo com paixão. Napatr vestiu as calças e usou a toalha para cobrir a parte superior do corpo antes de se virar para a pequena dona do quarto, que havia ficado em silêncio e não respondera à sua pergunta. \"Eng.\" \"Sim?\" \"Você é tímido(a)?\" Ing lançou-lhe um olhar irritado, sem fazer qualquer esforço para esconder sua irritação. Ver o leve sorriso nos lábios de Napatr só fez seu rosto arder ainda mais. \"Você também não fica tímido(a) perto de mim?\"","\"Não é a primeira vez que você me vê nu.\" Ing apertou os lábios carnudos com força. Virou o rosto e se endireitou, voltando-se para a mulher seminua, para dizer mais uma vez que ela fosse tomar banho.","\"O banheiro é por ali. Vou esperar lá fora.\" Napatr observou as costas da mulher que saía apressada do quarto com um sorriso divertido. Para onde teria ido a gostosa Ing, que momentos antes estava esfregando os quadris nos lábios dela? Ela não sabia por que tinham deixado as coisas chegarem a esse ponto novamente. Seria por causa dos braços esguios que a envolviam com força? Seria o sofá grande na sala de estar, ou seria o perfume sedutor da outra mulher? Seus lábios exerciam uma atração magnética irresistível, e nenhum dos dois tentara resistir a ela minimamente. \"Um beijo de despedida?\"","Napatr fitou aqueles olhos doces, que agora estavam ainda mais vidrados de desejo por estarem tão perto. Ela pressionou os lábios, esmagando lentamente os lábios carnudos da mulher pequena que estava recostada no grande sofá. Braços delicados envolveram seu pescoço, puxando-a para mais perto. Suas línguas se entrelaçaram no calor de suas bocas, fazendo com que Napatr inclinasse a cabeça para aprofundar o beijo com a pessoa sob ela. O paletó dela foi descartado rapidamente, seguido pelo mesmo vestido que a mulher perfumada usava, que agora estava jogado no chão, ignorado independentemente de estar amassado ou manchado. Napatr cobriu seu peito macio de beijos, demorando-se nas tênues marcas rosadas que ela havia feito antes, antes de beijar os pontos sensíveis e belos que se contraíam com as crescentes emoções da dona. \"Patr...\" \"Você quer que eu vá embora?\" Nenhuma voz doce e rouca respondeu. Apenas uma palma macia pressionou a nuca dela, puxando-a para baixo para reivindicar os mamilos sensíveis que ela acabara de beijar.","\"Patr...\"","Napatr não disse uma única palavra. Ela abriu bem as pernas da outra mulher antes de se inclinar e passar a língua pelo caminho úmido, continuando até que ambas estivessem satisfeitas.","Foi muito bom que o nome dela estivesse sendo pronunciado corretamente por aquela voz rouca e doce, em vez do nome de outra pessoa como na noite anterior, quando as emoções estavam à flor da pele.","As duas pareciam compartilhar muitos segredos. Ela não perguntaria se a outra não quisesse contar, mas estava pronta para ouvir se a outra precisasse. ventilação.","Pensar demais começou a lhe causar ansiedade. Ela se virou para olhar o porta-retratos na cabeceira da cama, que a dona do quarto havia virado de cabeça para baixo enquanto estava sentada em cima dela mais cedo. Ela soltou um suspiro suave antes de ir ao banheiro, como havia planejado inicialmente.","Napatr não ficou muito tempo no banheiro, embora tenha ficado um tempo confusa com a variedade de produtos antes de escolher uma marca de xampu que reconheceu, sem querer se intrometer nos pertences da outra pessoa. A toalha macia foi usada para cobrir a parte superior do corpo novamente, já que ela não havia trazido roupas para dentro. Seus dedos delicados usaram a borda da toalha para secar o cabelo. Sua mente estava surpreendentemente repleta de pensamentos sobre aquela mulher encantadora e baixinha. Pensamentos que não eram típicos dela. Ela até se perguntou se deveria convidar a outra mulher para jantar, ou se isso seria demais. \"Você toma banho rápido.\"","Ing fechou a grande porta do guarda-roupa antes de escolher uma camisa cinza-clara e entregá-la à mulher alta, que ainda cobria frouxamente a parte superior do corpo nu com a toalha macia.","Ela se ocupou colocando a camisa branca e o paletó de Napatr sobre o próprio braço. Mas, como Napatr permaneceu em silêncio, Ing olhou para cima novamente.","A mulher alta segurava a camisa cinza-clara que acabara de receber, permanecendo imóvel até que Ing ergueu uma sobrancelha em questionamento sobre seu comportamento. \"Você não gosta disso?\" \"Não, não é isso. Bem... posso mesmo pegar isso emprestado?\" Ela olhou para a camisa em sua mão e depois para o rosto da dona da casa, buscando uma resposta. Era óbvio que a camisa não pertencia à mulher franzina à sua frente. Ela perguntou porque não queria causar nenhum constrangimento.","\"Pertence a um amigo que costumava ficar aqui em casa. Você se importa?\" \"De jeito nenhum. Eu só estava um pouco preocupado.\" \"Eu lavo sua camisa para você.\" Napatr assentiu com a cabeça antes de virar as costas para a mulher franzina para vestir a camisa, um pequeno sorriso surgindo em seus lábios. Ela não sabia se a outra mulher havia se esquecido de sua própria declaração ao amanhecer, de que não desejava iniciar um relacionamento.","\"Você realmente não tem vergonha nenhuma.\"","Ing suspirou, resmungando baixinho. A outra mulher não parecia nada tímida, enquanto ela era quem se sentia envergonhada. A pessoa alvo da reclamação não respondeu, embora um sorriso tenha se formado em seus lábios. Um secador de cabelo grande foi oferecido a ela, e ela o aceitou de bom grado. \"Está com fome?\" A mesma pergunta foi feita novamente quando ela seguiu Ing até a sala de estar, que foi a primeira vez que ela teve a chance de realmente olhar ao redor. \"Você é?\" \"Um pouco. Você tem planos para depois disso?\"","A mulher de baixa estatura olhou para o relógio antes de balançar levemente a cabeça. Napatr estava prestes a convidá-la para comer, mas Ing se antecipou. \"Você pode esperar enquanto eu me troco e arrumo algumas coisas? Você está com muita fome?\" \"Siga em frente com seus negócios.\"","\"Você não vai esperar?\"","\"Vou esperar aqui mesmo.\" Napatr se deixou cair no sofá em resposta à pergunta da mulher de baixa estatura. Ela deu uma risadinha discreta assim que a grande porta do quarto se fechou. Aqueles olhinhos doces, que agora pareciam um pouco irritados e mimados, eram bem divertidos, misturados com uma fofura indescritível.","Essa mulher de estatura pequena tinha realmente muito a oferecer, e Napatr queria conhecê-la melhor. . .","O restaurante ao lado do beco do condomínio de luxo de Ing era a melhor opção no momento. Ambos estavam com fome, o que levou a um acordo mútuo de que era mais fácil encontrar algo simples para comer do que enfrentar o trânsito incômodo para chegar a outro lugar.","Napatr caminhava ao lado dela, segurando um grande guarda-chuva para proteger a mulher franzina do sol. Mesmo com roupas casuais, Ing continuava cativante. Seus longos cabelos claros estavam presos por causa do calor. Vestindo apenas uma camiseta branca bem ajustada e jeans desbotados, seu visual simples ainda fazia com que Napatr a olhasse com frequência. O aroma leve e agradável que emanava de sua pele era igualmente perturbador; desestabilizava o ritmo calmo que seu coração sempre mantinha.","\"O que está errado?\" \"O que você quer dizer?\" \"Você está me encarando.\" Ing disse para a mulher alta que caminhava ao seu lado. O ar do final da tarde estava sufocantemente quente. Ela protegeu os olhos do sol, observando o rosto impecável de Napatr, agora levemente coberto de suor, enquanto esperava. uma resposta.","Ela percebeu que Napatr a observava furtivamente desde que saíram do quarto. Mesmo quando chegaram ao restaurante onde tudo era feito na hora, Ing ainda conseguia sentir aquele olhar.","\"Você está com uma aparência um pouco diferente.\"","\"E é bom?\" \"Qual é a boa notícia?\"","Ing soltou um suspiro suave e acelerou o passo, cansada de ter que explicar suas próprias perguntas. Aquela mulher não era exatamente inocente; o desempenho de Napatr na cama era prova suficiente de que ela era tudo menos comum. Ela já havia deixado Ing fraca e sem fôlego duas vezes. A julgar por tudo, Ing deveria ter desaparecido e cortado contato, como planejava naquela manhã, mas já era noite e ela ainda estava indo jantar com ela. \"Eu simplesmente não entendo.\" Napatr disse, sentando-se em frente à mulher de baixa estatura. Ing havia escolhido instintivamente a mesa mais próxima do ventilador de parede. Napatr colocou a bolsa de tamanho perfeito de Ing, que ela se ofereceu para carregar, na cadeira vazia ao lado delas e pôs o grande guardachuva em cima da bolsa de grife. \"O que você gostaria? Manjericão-santo com carne de porco moída e um ovo frito?\" \"Sim.\"","Após conferir duas vezes, Ing fez o pedido para os dois. Não era que ela não soubesse o que Napatr costumava comer; embora fosse a primeira refeição deles juntos, eles vinham conversando há uma semana antes de as coisas chegarem a esse ponto.","Não foi longo, mas também não foi curto. Que confusão complicada! \"Eu quero um refrigerante. Você não quer, né?\" Napatr balançou a cabeça. Ela estava secretamente impressionada e não conseguiu conter um pequeno sorriso pelo fato de a mulher franzina se lembrar de seus gostos e desgostos. \"Só água, então.\" Disse Ing, levantando-se. Este restaurante era de autosserviço de bebidas. O refrigerador cheio de refrigerantes coloridos e várias marcas de água engarrafada ficava ao lado de um grande balde de gelo vermelho. \"Eu pego para você.\" \"Eu ajudo.\" Era quase fofo, mas Napatr não conseguia evitar uma sensação um tanto estranha. Ela não se sentia estranha em pegar sua própria água ou gelo em um lugar como aquele. Ela não teve nenhuma sensação estranha em relação ao restaurante.","Era a relação entre eles que parecia estranha. \"É bom.\" \"O que?\" Ing lançou um olhar para a mulher alta que, de repente, falara sem aviso prévio. Napatr sentou-se com as costas eretas, bebendo quase metade de uma garrafa de água antes de voltar seu olhar para Ing.","\"Aquilo que você perguntou antes. Você é muito fofo(a).\" \".....\" \"Hoje, quero dizer.\" \"Obrigado.\" \"Você estava linda ontem à noite.\" \"Patr!\" \"Só estou dizendo.\" E ela falava sério. A mulher baixinha da noite anterior tinha sido tão bonita e sexy que Napatr, ingenuamente, a seguiu até o hotel quando ela sugeriu. Mas agora Ing parecia fofa, inofensiva e livre da aura confusa que a envolvia mais cedo naquela manhã.","Ing mordeu o lábio, fingindo mexer no celular sem rumo, pois não queria cruzar o olhar com a outra mulher. Não que ela nunca tivesse recebido elogios antes, mas com Napatr, que era ou direta demais ou completamente silenciosa, ela não conseguia evitar se sentir tímida e um pouco sem jeito.","\"Ing, preciso atender esta ligação por um minuto.\" \"Vá em frente.\" Essa era outra coisa com a qual ela não estava acostumada. Napatr poderia simplesmente ter ido embora para responder, mas preferiu informá-la primeiro. Um sorriso se espalhou pelos lábios de Ing inconscientemente. Seus dedos percorreram o Instagram para passar o tempo enquanto esperava pela comida e pela mulher alta. Mas então, o sorriso desapareceu. Seus olhos vacilaram e seus dedos finos começaram a tremer levemente.","Sua melhor amiga havia postado uma foto com um homem que Ing nunca tinha visto antes, embora já tivesse ouvido falar dele há muito tempo. A legenda carinhosa anunciava o novo relacionamento deles.","Sinceramente, ela deveria ter ficado feliz pela sua melhor amiga. Mas, com essa amiga em particular, ela não queria ficar feliz por ela de jeito nenhum. Ela era sua melhor amiga do ensino médio, aquela por quem ela nutria sentimentos não correspondidos até aquele dia. A mesma amiga cuja foto ela havia virado de bruços na cabeceira da cama porque não queria gemer o nome dela enquanto estivesse perdida em êxtase com outra pessoa.","Ela não queria ter a sensação de que a garota da foto estava sorrindo para ela enquanto ela se divertia com outra mulher. Ela era a melhor amiga que sabia exatamente a profundidade dos sentimentos de Ing, mas continuou a iludi-la por tanto tempo, sem nunca a deixar ir. E foi justamente essa amiga que a incentivou a experimentar o aplicativo de namoro que a levou ao Napatr. A mesma amiga que havia combinado de se encontrar com ela naquela noite, mas cancelou o encontro momentos antes. Ing bloqueou a tela do celular. Seus olhos estavam vazios enquanto observava Napatr voltar em sua direção, justamente quando a comida que haviam pedido chegou. Ela olhou para o rosto de Napatr. Na noite anterior, a imagem da pessoa que ela amara por tanto tempo se sobrepusera à de Napatr de uma forma imperdoável. Ela gemera acidentalmente outro nome até que Napatr se afastou para lhe dizer um novo nome para chamar.","Mas, naquele momento, o rosto de Napatr pertencia somente a Napatr. Não coincidiu com mais ninguém. Ela era a única pessoa com quem Ing conseguia estar sem pensar em mais ninguém, a única pessoa que parecia realmente vê-la, olhá-la e se importar.","o suficiente para ver apenas ela. \"Aconteceu alguma coisa?\" Napatr perguntou à mulher franzina, que não havia desviado o olhar dela desde que terminara a ligação. Ing parecia miserável, seus doces olhos vazios e sem vida, embora Napatr tivesse se ausentado por apenas cinco minutos. \"Eu te machuquei? Ou você está com dor de estômago?\" Ela perguntou, temendo que a intimidade anterior entre eles pudesse ter lhe causado desconforto físico. \"Não, não é isso. Mas... você se importaria de me deixar na estação de vans mais tarde?\"","Como Napatr disse que estava livre hoje e a pessoa que ia buscá-la cancelou, viajar sozinha não era a pior coisa do mundo.","Napatr assentiu com a cabeça e a encorajou a começar a comer. Ela observou Ing beliscar a comida em vez de comê-la, e uma crescente sensação de preocupação começou a surgir dentro dela. \"Na verdade, também estou livre amanhã. Se não se importar, posso te dar uma carona.\" Você não precisa pegar a van.\"","Vendo Ing tão absorta em seus pensamentos, Napatr não queria que ela ficasse sozinha em uma viagem longa. Como o dia seguinte era seu dia de folga, não havia problema. \"É um longo caminho.\" \"Eu sou um bom motorista.\" \"Então simplesmente não reclame.\" \"É melhor do que deixar uma criança sentada sozinha, sem rumo.\" \"Patr!\"","Napatr deu de ombros e voltou a comer, ignorando o protesto. A camisa cinza-clara que Napatr estava usando pertencia àquela sua melhor amiga. No entanto, enquanto Napatr o usava, não restava nenhum vestígio daquela outra pessoa para Ing se lembrar. Com palavras que se recusavam a formar qualquer conexão e perguntas que não deixavam espaço para construí-la, descobriu-se que nenhum dos dois conseguia se separar. .","sunyan"],"wordCount":2867},{"title":"03. A Praia","paragraphs":["Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026","Cópia: . . \"Você não vai responder?\" Napatr desviou o olhar da estrada por um instante, lançando um olhar para a mulher franzina que permanecera em silêncio desde que saírem do apartamento dela. O elegante celular de Ing vibrava incessantemente, e Napatr não resistiu à tentação de perguntar. Deviam ser pelo menos dez chamadas perdidas que Ing se recusara a atender.","\"Não.\"","\"Você fez algum pedido? Pode ser um entregador.\" Irritada, Ing olhou com os olhos semicerrados para a mulher alta que fazia o papel de motorista. Elas estavam a quase cem quilômetros do apartamento, a caminho da casa dela.","Para surpresa de Ing, os olhos penetrantes de Napatr exibiam um brilho travesso que ela nunca tinha visto antes. Ing apertou os lábios para conter um sorriso, mas não conseguiu evitar uma risada com o comentário de Napatr.","\"Não é uma entrega. Não é... nada importante.\"","Não era importante, como ela mesma disse. Ou melhor, ela nunca tinha sido importante para essa sua melhor amiga, desde o início. Napatr assentiu com a cabeça, sem fazer mais perguntas. A mulher franzina ao seu lado parecia bastante absorta em pensamentos. Napatr não era de falar muito e não sabia bem como tirar Ing de sua melancolia, então se contentou com algumas observações oportunas. provocações.","Na verdade, Napatr descobriu que Ing era muito mais cativante e encantadora quando sorria do que quando parecia tão solitária como agora. \"Gosto quando você sorri.\" \"Hum?\" \"Você tem um sorriso lindo.\" \"Obrigado.\" \"Você deveria sorrir mais.\" \"Então você também deveria sorrir.\" \"Eu sorrio muito quando estou com você.\" O rosto de Ing ficou vermelho. Ela se virou para olhar pela janela, evitando o olhar de Napatr. Não era que ela nunca tivesse recebido elogios pelo seu sorriso antes; todos diziam que ela tinha um sorriso lindo. Mas com Napatr, que falava tudo de repente, a sensação era diferente. E, de alguma forma, tudo parecia estranho de novo. \"Se houver algo para sorrir, eu sorrirei. Sorrir para tudo parece falso.\"","Napatr assentiu com a cabeça, sem olhar para a mulher sentada ao seu lado. Seus olhos permaneceram fixos na estrada, mas um leve sorriso surgiu em seus lábios, e uma suave sensação de plenitude surgiu em seu peito.","No fundo, ela se sentiu bem ao ver Ing agindo como ela mesma; se não estivesse sendo muito convencida, Ing não parecia tão atordoada na última meia hora. Além disso, ela realmente estava sorrindo mais, exatamente como havia dito à mulher de baixa estatura.","\"Minha família tem um resort à beira-mar.\" Napatr arqueou uma sobrancelha, virando-se para olhar para Ing, que finalmente decidira colocar uma música suave para evitar que o ambiente ficasse muito silencioso. Honestamente, Napatr não se sentira desconfortável em nenhum momento, mas não tinha certeza quanto à outra mulher.","\"Você vai ficar na minha casa ou prefere o resort, Patr?\" Ing mordeu o lábio. Ela não havia dado muitas opções à mulher alta. Ao vislumbrar o sorriso de Napatr, Ing desviou o olhar, embora ainda esperasse por uma resposta. responder.","\"Você não vai me deixar voltar?\" \"É seu dia de folga. Você mesmo me disse. Além disso, dirigir é exaustivo. Está ficando tarde e você não dormiu muito. Você deveria passar mais uma noite aqui.\" \"Não dormir muito?\" \"Patr...\" \"Você também não dormiu muito. Provavelmente está mais cansado do que eu.\" \"Patr!\" Napatr riu quando Ing a chamou pelo nome, tornando-se um pouco mais severo, embora não fosse nada intimidante. \"O resort é melhor. Há alguma vaga?\" Napatr perguntou. Como era um resort à beira-mar, outros turistas poderiam tê-lo reservado, mesmo que ela estivesse viajando com o proprietário.","\"E se não houver?\" \"Então dormirei em outro lugar.\" \"Você quer dizer na minha casa?\" \"Outro resort.\"","\"Você não gostaria de apoiar um pouco o meu negócio?\"","\"Ah, é? Está me obrigando a ser seu cliente agora?\" \"Então, você não vai me apoiar?\" \"Eu nunca disse isso.\" Napatr caiu na gargalhada quando a mulher menor, de quem ela vinha zombando, lhe deu um tapa no braço esquerdo. Seu rosto doce e bonito estava fazendo beicinho, corado, com os lábios carnudos cerrados. Aqueles olhos doces lançaram-lhe um olhar mortal, tornando ainda mais difícil para Napatr parar de rir. \"Você é tão irritante\", resmungou Ing. \"Você perguntou, eu respondi.\" \"Mas você nunca responde quando pergunto algo sério.\" Quando chegou a hora de fazer silêncio, Napatr se calou. Mas, para coisas assim, ela tinha uma resposta para tudo. Ela era alguém que valia a pena conhecer, embora Ing soubesse que o relacionamento deles não deveria ir além disso. \"Você está falando da pergunta feita esta manhã?\" \".....\" \"Se eu estivesse falando sério, o que você diria?\"","Napatr lançou um olhar furtivo para o belo rosto que se tornara imóvel no instante em que ela fez a pergunta. Um pequeno sorriso permaneceu nos lábios de Napatr; ela estava curiosa para ver como Ing responderia. \"Ainda tenho alguém no meu coração.\" Mesmo que um futuro com aquela pessoa fosse impossível, Ing não queria ser egoísta. Ela foi quem começou esse relacionamento, transformando-o em algo mais intrincado do que as caóticas linhas de energia da Tailândia. \"Eu sei.\" Napatr sabia. Sabia muito bem o quanto Ing amava aquela pessoa. Não queria substituir ninguém, nem ser uma sombra. Mesmo antes de terem começado algo de verdade, ela já sabia a resposta: no fim das contas, quem sairia machucada, quem sairia perdendo, seria ela mesma. . . Quando chegaram ao resort de Ing, o sol já havia se posto. Napatr seguiu a mulher franzina por um caminho de pedra que levava a uma vila. A brisa do mar trazia o perfume de Ing e o aroma de sua pele, que permanecia impecável mesmo no crepúsculo. \"Este é o único que sobrou. Você pode ficar aqui?\" Ing destrancou a porta da última villa do resort, reservada para hóspedes especiais, e acendeu todas as luzes. A mulher alta olhou ao redor do interior antes de se virar para Ing com um leve sorriso. O olhar de Napatr era profundo e continha uma estranha faísca, fazendo-a hesitar em manter aquele olhar por muito tempo. \"Esta casa costuma estar vazia?\" Napatr perguntou porque ouvira a conversa dos funcionários enquanto tomava seu drinque de boas-vindas. Se não se enganava, a vila pertencia a...","A família de uma mulher de baixa estatura não estava aberta a turistas.","\"Na verdade, era a casa do casamento da minha mãe e da minha avó. Mas agora elas me deram.\" \"Dei-a a vocês como sua casa de casamento?\" \"Bem, se algum dia eu tiver alguém com quem queira me casar.\" Ing sentou-se numa cadeira próxima, observando a reação de Napatr ao ouvir a menção de suas duas mães. A mulher alta não pareceu nem um pouco chocada; pelo contrário, seu olhar suavizou-se ainda mais ao encarar Ing. \"Posso te perguntar uma coisa?\"","\"O que é?\" Ing endireitou as costas imediatamente. Ela admitiu que nunca havia conhecido ninguém como Napatr. Se quisesse perguntar algo, perguntava, mas nunca de uma forma que parecesse intrusiva ou deixasse Ing desconfortável. \"Se você não quiser responder, tudo bem. Quantos anos você tem?\" Ing ficou atônita com a pergunta. Ela olhou profundamente nos olhos de Napatr, tentando perceber se ela realmente queria saber ou se estava apenas preparando o terreno para outra pergunta.","Mas o olhar de Napatr não demonstrava nada além de genuína curiosidade sobre a idade dela. Eles se conheciam e conversavam havia uma semana, mas algo tão comum quanto a idade nunca havia surgido. Suas conversas sempre giravam em torno de assuntos gerais.","E, o mais importante, nunca eram entediantes. \"Tenho 26 anos.\"","Os olhos de Napatr, já gentis, suavizaram-se ainda mais e se enrugaram quando ela sorriu ao obter a resposta. Ing mordeu o lábio inconscientemente, sentindo o rosto esquentar por razões que ela não conseguia precisar.","\"Por que você pergunta?\" \"Só estou perguntando.\"","\"E você, Patr?\" \"Quanto a mim?\"","Napatr recostou-se no sofá, sem nunca desviar o olhar do rosto delicado da mulher. Que expressão tímida era aquela? Será que Ing não fazia ideia de como ela era adorável? \"Quantos anos você tem?\" Por mais que Ing quisesse suspirar ao ver a mulher alta, cuja postura lhe causava dores nas costas só de olhar, a curiosidade falou mais alto. \"Você ficará chocado?\" \"Você é mais jovem do que eu?\" \"Mais velho.\"","\"Por uma grande margem?\"","\"Hum, um pouco.\" \"28?\" \"Não.\"","\"Ah, Patr! Não quero saber mais nada. Você está se fazendo de difícil.\" O que você deseja para o jantar? Vou avisar os funcionários. \"Eu mesmo resolvo isso. Você deveria ir descansar.\" Napatr sentiu-se ao mesmo tempo afeiçoada e divertida com a mulher pequena que se ergueu em toda a sua altura e lhe lançou um olhar visivelmente irritado. Mas a hesitação naqueles","Seus belos olhos estavam claros, então Napatr endireitou-se para deixá-la descansar como planejado.","\"Mas você me trouxe até aqui.\"","\"Considere isso como minhas férias. Você pode voltar para casa, certo?\"","Napatr perguntou, percebendo que não havia outras casas por perto, apenas algumas vilas aconchegantes e privadas. Se Ing precisasse de uma carona para casa, Napatr estava pronto para desempenhar o papel novamente. \"Posso sim. Nesse caso, primeiro irei para casa.\"","Ao ver Napatr assentir firmemente, Ing saiu da imponente mansão. Ela fez questão de instruir a equipe da recepção a cuidar bem de sua hóspede, pois sentia-se inquieta, quase como se estivesse deixando Napatr completamente sozinha.","Napatr ocupava apenas uma das duas cadeiras gêmeas do lado de fora. Ela contemplava, absorta em seus pensamentos, o mar ao entardecer. A brisa a ajudava a relaxar. Estava acostumada a viajar sozinha e a ir a lugares por conta própria, mas agora sentia uma solidão inexplicável, uma vaga sensação silenciosa que não conseguia descrever com palavras.","A moldura da foto que ela tinha espiado antes ainda a incomodava. Naquela foto, Ing estava deitada exatamente na cadeira que Napatr ocupava naquele momento. A outra cadeira não estava vazia como esta.","Em vez disso, a mesma pessoa da foto na cabeceira da cama estava lá, sorrindo amplamente ao lado da mulher franzina.","Uma curiosidade imperdoável a invadiu. Os pensamentos que circulavam incessantemente em sua mente não eram algo em que ela devesse se concentrar.","O sorriso radiante, os olhos doces brilhando de felicidade, mesmo em uma fotografia, bastavam para mostrar o quão importante aquela mulher era para Ing.","Napatr expirou lentamente pelo nariz afilado. Deitada à beira-mar, ela deveria ter deixado sua mente e seu corpo descansarem durante o feriado, mas seus pensamentos se recusavam a obedecer.","cooperar. Ela não conseguia parar de pensar na mulher que tinha saído para casa menos de dez minutos antes. Ing era realmente perigosa. Eles só tinham passado um dia juntos, mas ela já havia deixado o coração de Napatr incrivelmente inquieto. Ing observava as costas de Napatr enquanto esta estava sentada sozinha na praia. Ela tinha saído correndo de casa, tão preocupada com a outra mulher que não conseguia se concentrar em nada. Ao ver Napatr sentado ali, bebendo à beira do resort, Ing não sabia se devia sentir alívio ou algo completamente diferente. Assim que terminou de pedir comida e bebida, suas pernas esbeltas a levaram em direção à outra mulher. Fazia muito tempo que ela não caminhava pela praia à noite; embora tivesse crescido perto do mar, as lembranças que preferia esquecer a mantinham afastada. \"Ing?\" \"Você tem bebido bastante.\" Ela disse, olhando para a garrafa no balde de gelo, agora quase vazia. Ela se deitou sobre o tecido fino que Napatr havia estendido primeiro para apenas uma pessoa.","Seu tamanho pequeno a obrigou a sentar-se bem perto da outra mulher, uma intimidade inevitável, mas ela não queria que a areia fina manchasse suas calças. \"O ambiente é agradável. Gostaria de uma bebida?\" \"Vou esperar por uma nova garrafa. Já fiz o pedido. Deve chegar em breve. Comprei a sua favorita também.\" \"Nuggets?\" Antes que pudéssemos responder, um funcionário chegou com bebidas frescas, alguns petiscos, uma pequena mesa e uma linda vela protegida por um vidro.","Lâmpada de furacão. A luz bruxuleante criava uma atmosfera estranha e localizada, só para os dois. Assim que tudo se acalmou, Napatr lançou um olhar furtivo para o rosto de Ing, que estava ao seu lado.","Ela sorriu levemente, observando as pequenas ondas quebrarem na costa. Respirou fundo, embora o suave perfume da mulher ao seu lado ainda permanecesse no ar.","Pareciam um casal num encontro. No entanto, na realidade, eram essencialmente estranhos. \"Onde você conseguiu isso?\" Ing perguntou depois de dar um gole na bebida alcoólica que Napatr havia convenientemente servido em um copo. Ela olhou para a bolsa ao lado de Napatr, que continha uma camisa havaiana. \"Seu resort.\" \"Tentando criar o clima?\" Ing lembrou que a área da recepção vendia roupas, chapéus e cartões-postais, embora ela não esperasse que Napatr fosse comprar alguma coisa. \"Eu não tinha roupa nenhuma. Na verdade, estou nua por baixo disso, minhas roupas estão na lavanderia lá na casa.\" Os olhos de Ing imediatamente se voltaram para o peito de Napatr, mas ela teve que desviar o olhar ao perceber que a camisa cinza estava desabotoada o suficiente para revelar sua pele. \"Você poderia abotoar a camisa? Está visível.\" \"Você já viu isso antes. Além disso, as únicas outras pessoas nesta praia são aqueles turistas ali. Eles não estão interessados em nós.\" Napatr olhou para um casal estrangeiro hospedado no resort, que estava envolvido em um beijo apaixonado, completamente indiferente a eles, exatamente como ela havia dito.","Ela se virou para a mulher pequena. O calor de seus corpos pressionados um contra o outro era indescritivelmente bom. Ela simplesmente ficou sentada ali, sorrindo para a areia, o mar, as pequenas ondas e a atmosfera noturna. Ing ficou boquiaberta, sem palavras. Napatr tinha razão em tudo, não lhe restando nada para contestar. Os turistas que antes se beijavam com tanta paixão tornaram-se ainda mais ousados: o homem agora estava deitado de costas na areia enquanto a mulher se sentava sobre sua barriga, cobrindo-o de beijos com ainda mais intensidade do que antes. \"Assim como nós esta manhã.\" \"Patr!\" Ing gritou o nome dela com um tom nervoso. Mais uma vez, Napatr estava certo. Era inegavelmente semelhante a como tinham estado no apartamento dela naquela manhã. Napatr riu baixinho. Eles ficaram sentados bebendo em silêncio, em meio à atmosfera aconchegante da praia. Ela sentiu uma paz inesperada; os pensamentos que a perturbaram o dia todo haviam se dissipado. Talvez fosse porque Ing estava sentada tão perto que ela não tinha espaço mental para pensar em mais nada. Garrafa após garrafa foram esvaziadas até às nove horas. A praia estava deserta agora. Só restavam os dois. E a essa altura, Ing estava claramente bastante bêbado.","\"Você usa esse aplicativo há muito tempo?\" A voz doce, mais arrastada que o habitual, deixou claro que a mulher franzina que apoiava a cabeça no braço estava bastante embriagada, embora não completamente fora de si.","\"Apenas um dia antes de combinarmos.\" \".....\"","\"Você foi a primeira pessoa com quem conversei lá. Eu nunca tinha mexido com coisas assim antes.\"","\"Realmente?\"","\"Você o utiliza com frequência?\"","\"Era a minha primeira vez também.\"","Napatr ficou em silêncio, sem saber o que dizer em seguida. Sua carreira não lhe deixava muito tempo para responder mensagens, mas, uma vez que conheceu Ing, mesmo que apenas por texto, dedicou todo o seu tempo livre e descanso a essa desconhecida.","Ela até abdicou das suas férias por causa de Ing, sem o menor arrependimento.","\"Mas vou parar de usá-lo.\"","Napatr quebrou o silêncio. Ela vinha pensando nisso desde que Ing fizera aquela pergunta sobre não insistir no assunto. Ela era quem estava em desvantagem emocional. Melhor não continuar.","Era um remédio eficaz para a solidão, mas ela temia que, se conversasse com outra pessoa, o resultado pudesse ser o mesmo, e Napatr não gostava particularmente dessa ideia.","\"Por que?\"","\"Não sei. Simplesmente não sei com quem mais eu conversaria.\"","\"Eu usei porque minha amiga me convenceu. Acho que ela queria que eu tivesse alguém.\"","Ing encostou a cabeça no ombro de Napatr. Ela não sabia porquê, mas estar com Napatr a fazia sentirse inexplicavelmente segura.","\"Seu amigo parece preocupado com você. Assim como os meus amigos.\"","\"Não é a mesma coisa. Você provavelmente não tem sentimentos pelo seu amigo como eu tenho.\"","\"Acho que não dá para forçar sentimentos.\" \"Você não parece surpreso com nada relacionado à minha vida.\" Ing apoiou o queixo no braço de Napatr e olhou para seus traços finos e perfeitos. Napatr a encarou com um olhar profundo e gentil, silenciosamente reconfortante, a ponto de Ing se ver envolvendo os braços no pescoço de Napatr sem pensar.","\"Não há nada de chocante. Não é nada estranho.\" Napatr disse suavemente, apoiando as costas de Ing enquanto a pequena mulher subia em seu colo. As pontas de seus narizes se roçaram antes que ela se afastasse, levando o copo aos lábios para desviar o olhar dos lábios carnudos e tentadores tão próximos dos seus.","\"Ela sabe... mas não me ama.\" \".....\" \"E aí ela me rejeita, dizendo para eu procurar outra pessoa. Mas aí, assim que estou com você, ela começa a me incomodar. Eu não entendo.\" A voz doce derramou seus sentimentos sem reservas. Napatr permaneceu em silêncio, absorvendo silenciosamente as emoções da outra mulher. Ing repousou o rosto na curva do pescoço dela e soltou um suspiro profundo, pesado o suficiente para Napatr senti-lo apesar da brisa do mar. Era uma cena estranha: elas estavam muito próximas, Ing sentada no colo dela com os braços em volta do pescoço, enquanto Napatr a abraçava com força. No entanto, a conversa girava em torno da pessoa que Ing amava. \"Você está com dor no peito?\"","Ing afastou o rosto do pescoço de Napatr para olhá-la. Ela não soltou os braços, mas franziu a testa, confusa.","\"Não sei se você já ouviu falar, mas um coração partido pode realmente matar. Eu estava apenas verificando seus sintomas.\" \"Você está agindo como um médico.\" \"Sou um médico.\" \"Você é?\" Ing riu, encostando a cabeça no ombro forte da mulher que fazia o papel de médica. Será que Napatr tinha algum talento especial? Mesmo quando Ing desabafava sua tristeza, a outra mulher conseguia mudar seu humor com uma rapidez inacreditável.","Ou talvez Napatr fosse realmente um médico, um médico cuja única função era curá-la. \"Quando você sorri, é lindo.\" \"Essa é a segunda vez que você me diz isso.\" \"Não quero que você fique triste.\" Ing olhou para Napatr novamente, apertando os braços em volta do pescoço dela. Mesmo tendo estado com aquela mulher alta apenas por um ou dois dias, parecia que se conheciam há uma vida inteira. \"Obrigado.\"","\"Para que?\" \"Por me animar.\" Assim que a mulher franzina terminou sua frase, seus lábios pareceram se unir com uma força estranha e magnética. Napatr pressionou seus lábios suavemente contra os belos lábios da mulher em seu colo. O beijo logo se aprofundou, tornando-se familiar e prolongado.","Mas ela não fazia ideia... em que estado eles estavam se beijando naquele momento.",". sunyan"],"wordCount":3181},{"title":"04. Alterar","paragraphs":["Era mais um dia em que Napatr dividia a cama com Ing. Ela lançou um olhar furtivo para a mulher franzina que ainda mergulhava em um sono profundo. Os doces olhos de Ing estavam bem fechados, seus cílios cuidadosamente arrumados de uma forma que era ao mesmo tempo encantadora e cativante. Seus lábios carnudos estavam ligeiramente entreabertos, sinal de sono profundo, ao contrário da manhã anterior, quando acordara com a língua afiada, pronta para atacar Napatr. Napatr soltou um suspiro suave enquanto ajeitava o roupão que usava para dormir e puxava o cobertor para cobrir o ombro liso e bonito da mulher absorta em sonhos. Momentos antes, quando Napatr se sentara, o cobertor escorregara, revelando a curva delicada do busto da figura pequena. Mais uma vez, elas haviam compartilhado uma conexão física íntima. Neste quarto, não havia foto na cabeceira da cama como havia no apartamento de Ing. No entanto, Napatr tinha visto Ing virar um pequeno porta-retratos com a face para baixo enquanto esperava que ela trancasse a porta da casa na noite anterior. Mesmo tão bêbada a ponto de Napatr ter que lavá-la, Ing ainda fez questão de esconder a foto de alguém que ela amara durante todo esse tempo, embora seus sentimentos nunca tivessem sido correspondidos. Napatr não sabia como definir o relacionamento atual entre eles. Embora Ing tivesse mencionado o nome de outra pessoa apenas uma vez por acidente, o coração de Napatr estava inexplicavelmente pesado. Ela sabia que o que estava fazendo naquele momento não estava certo. \"Ah... Amp...\" \"Patr. Pode me chamar de Patr.\"","\"P-Patr...\" Embora Ing nunca a tivesse chamado pelo nome errado durante as duas vezes em que tiveram intimidade, ela ainda não conseguia esquecer a primeira vez em que foi chamada pelo nome de outra pessoa. Ela olhou novamente para a mulher adormecida. Mesmo na penumbra, o rosto de Ing estava nítido, sem maquiagem. Napatr sorriu levemente, pensando no sorriso da outra mulher. Como aqueles olhos ficariam doces se ela semicerrasse os olhos um pouco e lançasse um sorriso caloroso para Napatr. Napatr mordeu o lábio pensativamente. Seus dedos afastaram delicadamente uma mecha de cabelo do belo rosto de Ing; ela queria vê-la com clareza. Seu peito parecia estranhamente vazio enquanto pensava no que pretendia fazer em seguida. Ela se inclinou e pressionou levemente e demoradamente a testa de Ing, a intimidade silenciosa, tomada sem que ela percebesse, tingida por uma sensação de vergonha. Então, ela se levantou silenciosamente para tomar banho e se trocar, preparando-se para voltar para casa sozinha, exatamente como havia planejado desde ontem.","Napatr havia refletido sobre isso: a história deles não tinha como ser possível, e não havia definição para o que eles eram. Nenhuma irmã compartilhava um laço físico como o delas, e ela não queria ser assim de qualquer forma. Se o relacionamento delas tivesse que ser nomeado, seria exatamente como Ing o havia chamado certa vez.","Uma aventura de uma noite.",". . Ing acordou tarde. Seus doces olhos percorreram a casa em busca da pessoa que estivera com ela nos últimos dois dias, mas só encontraram o vazio.","Ela se endireitou bruscamente, mas uma onda repentina de tontura a obrigou a cobrir o rosto com as mãos. A grande casa pareceu girar, fazendo-a inclinar-se para trás.","Encoste-se à cabeceira da cama e fique imóvel.","Seus olhos ardiam e seu rosto corou com um calor que ela não conseguia conter. Ela mordeu o lábio ao perceber que agora estava 'sozinha' na casa. As cortinas transparentes esvoaçavam na brisa da janela que eles haviam aberto na noite anterior e esquecido de fechar antes de adormecerem juntos. Ing não conseguia se lembrar exatamente de quando havia adormecido, mas a lembrança dos beijos carinhosos em seu ombro a fez sorrir. Se sua memória não lhe falhava, ela havia passado a noite toda nos braços de Napatr. A mão delicada de Ing apertou o roupão, o mesmo que ambas usavam no lugar de pijamas. Na pressa, ela não havia trazido roupas, preocupada demais com a mulher alta para pensar em qualquer outra coisa, com medo de deixar alguém tão gentil quanto Napatr sozinha. Os roupões do resort eram tudo o que tinham para se cobrir naquela noite. Embora já tivessem se visto nus e seus corpos estivessem bem familiarizados...","Procurando por vestígios no quarto, Ing viu as roupas que usara na noite anterior, dobradas cuidadosamente perto da cama. Ela se lembrou de como o álcool a deixara tão bêbada que não conseguia tomar banho sozinha. A tarefa coube a Napatr, enquanto Ing fizera o possível para cooperar.","Eles compartilharam um momento íntimo sob o chuveiro de efeito chuva no banheiro. O toque de Napatr foi cheio de carinho, sem pressa, fazendo-a se sentir tão confortada e amada. Embora o álcool tivesse alimentado a conexão física entre eles, Napatr nunca a tocou com sequer um indício de agressão. Ing avistou a camisa cinza-clara e lembrou-se bem de a quem pertencia. Napatr o havia usado ontem. Um pequeno post-it amarelo foi colocado no","Uma camisa cuidadosamente dobrada chamou sua atenção, fazendo-a levantar-se apressadamente da cama, ignorando a tontura que mal havia diminuído. A caligrafia desleixada tornou-se visível. As frases simples, repletas de cuidado mesmo nos traços irregulares, fizeram com que as lágrimas que se acumulavam desde que ela acordou finalmente transbordassem. . 'Todo o tempo que passei com você, fui muito feliz. Espero que você sempre tenha um sorriso radiante. Desejo que você não sinta nenhuma dor, física ou emocional. Obrigada e me desculpe. Napatr.' . Seus dedos percorreram instintivamente o nome na parte inferior do papel, tocando-o suavemente como se temesse que a tinta pudesse desaparecer. Ela estava confusa e inquieta, sem saber exatamente o que estava lamentando ou por que estava chorando.","Ela sentiu uma onda repentina de arrependimento e culpa. A resposta de Napatr era clara, mesmo que não tivesse sido dita diretamente. 'Você não está levando esse caso de uma noite a sério, está?' Ing se lembrava bem de como havia perguntado aquilo com um tom de repreensão nos olhos, mesmo enquanto Napatr lhe demonstrava um nível de carinho que ela nunca havia recebido de ninguém além de sua família.","Naquele momento, Ing ansiava pela resposta que queria ouvir, mas Napatr a esquivou, devolvendo a pergunta e permitindo que Ing a ignorasse completamente.","Mas agora,
