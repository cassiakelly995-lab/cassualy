Napatr havia respondido claramente: a história deles não tinha como continuar. Ing estava confusa e não se entendia. A outra mulher havia expressado exatamente o que Ing dizia querer, então por que ela sentia que não queria que terminasse daquela forma?","Ela guardou cuidadosamente o pequeno pedaço de papel com o nome de Napatr em sua bela carteira. Mordeu o lábio com força, olhando ao redor da vila, que agora parecia repleta de fantasmas da mulher alta sentada, sorrindo fracamente para ela.","Ing fechou os olhos e respirou fundo antes de decidir voltar para casa. Ela sentiu uma estranha sensação de perda ao dar as costas para sua própria casa. Ontem, ela havia caminhado por aqui ao lado de Napatr. Na noite passada, ela se agarrou ao braço dela durante todo o caminho.","Mas agora, só restava ela. .","\"Senhorita Ing, gostaria de tomar o café da manhã?\" Ing parou abruptamente quando a recepcionista a cumprimentou. Suas sobrancelhas sem maquiagem se franziram e seus lábios se comprimiram sem que ela percebesse. Ela nunca tomava café da manhã no resort. Mesmo quando se hospedava ali, sempre voltava para casa para tomar café com a mãe e a avó. \"Na verdade, a Srta. Napatr deixou um recado. Ela disse que você deveria tomar um café da manhã reforçado.\"","A funcionária deu um sorriso cúmplice e um olhar brincalhão, fazendo o coração de Ing palpitar. Não era por timidez perto da equipe, mas a sensação de vazio que a invadia naquele momento a fez prender a respiração inconscientemente. \"Ela disse isso?\"","Ing perguntou, com a voz rouca e seca. Era incrivelmente difícil forçar as palavras a saírem.","\"Sim, senhora, logo antes de ela ir embora. Faz muito tempo que a senhora não traz ninguém para se hospedar em nosso resort. Ontem, o pessoal do turno da noite me disse que a Srta. Napatr comprou roupas e vários cartões-postais para levar de volta.\"","\"Cartões-postais?\"","Ing só tinha visto a camisa havaiana. Napatr provavelmente a estava usando hoje. Era uma pena que ela não pudesse vê-la, embora na noite anterior, enquanto encostava o rosto no ombro forte de Napatr, tivesse dito a ela o quanto ficaria bem naquela camisa.","Apesar de ter dito isso sob o efeito do álcool, Ing se lembrava vividamente da cena.",". \"Você vai ficar tão linda.\" \"O que você quer dizer?\" \"Quero dizer, quando você veste aquela camisa havaiana.\" \"Qualquer pessoa pode usar uma.\"","\"Isso vale para qualquer um. Isso vale para você, Patr.\"",". O riso caloroso e o toque suave em sua bochecha ainda estavam nítidos em sua memória. Ing piscou para afastar a sensação de queimação nos olhos e engoliu em seco para conter um soluço, evitando o olhar do funcionário à sua frente.","\"Sim, senhora. Assim que ela descobriu que a senhora tinha tirado as fotos, a Srta. Napatr as comprou sem nem mesmo escolher. Ela comprou todas.\"","\"Cada um deles?\" \"Sim, senhora.\" O gerente do resort sorriu ao ver a reação da filha do proprietário. Ela estava ali há muito tempo, tendo crescido junto com as reformas do resort.","Ela via Ing desde que ela era uma menininha de mãos dadas com Madame Nook na praia, e agora ela era uma mulher linda, assim como sua mãe, Madame Aun.","Embora tivesse a intenção de voltar para casa rapidamente, o nome da pessoa que acabara de desaparecer não saía da sua cabeça. Isso destruiu sua determinação, levandoa a caminhar até a seção de cartões-postais. Estava visivelmente mais vazio. Havia muitas fotos que ela havia tirado para vender como cartões-postais para turistas, mas ela não esperava que Napatr comprasse todas. \"Quais ela comprou?\" Ing perguntou baixinho, com o olhar perdido. O belo rosto de outra pessoa havia invadido seus pensamentos e se recusava a partir. Inacreditavelmente, aquela que estava gravada em seu coração há anos havia sido substituída.","Mas Ing disse a si mesma que era apenas porque eles tinham passado dois dias juntos. Por isso, ela não conseguia parar de pensar nela. Ela acreditava que, com o tempo, Napatr desapareceria de sua mente. \"Cada uma que você tirou.\" A mão delicada de Ing deslizava distraidamente pelos cartões-postais que havia fotografado. Ela não resistiu à tentação de perguntar mais uma vez ao funcionário sobre a outra mulher.","\"Ela tomou café da manhã antes de sair?\" \"Só café. Gostaria de tomar o café da manhã agora, Srta. Ing?\" \"A que horas... ela saiu?\" \"Desde as sete da manhã.\" Ing ficou em silêncio. Ela havia acordado apenas meia hora antes, e já eram nove e meia. Ela não sabia se deveria chamar a outra mulher de cruel, mas se","Napatr esperou por ela antes de partir; ela não sabia se teria se sentido ainda pior.","\"Vou tomar café da manhã com a minha mãe. Obrigada.\" Ela não esperou que o funcionário dissesse mais nada. Pegou imediatamente um cartão-postal da praia. A praia onde eles estiveram sentados bebendo ao som das ondas na noite passada. A praia onde haviam trocado beijos apaixonados, sem que nenhum dos dois quisesse ceder.","A praia onde haviam deixado suas vidas pessoais para trás, como mero pano de fundo. A praia onde só existia a história dela e de Napatr. . . . O portão da frente estava se abrindo, e os olhos de Ing imediatamente se fixaram em seu próprio carro, estacionado em seu lugar de sempre. Ela soltou um suspiro cansado, apenas para ser surpreendida por uma onda repentina de surpresa. Ela nunca havia se sentido \"cansada\" ao pensar em ver sua melhor amiga antes.","Sua melhor amiga havia pegado o carro emprestado outro dia. Elas deveriam vir juntas. Amp queria visitar a mãe, mas aí o namorado dela quis levá-la para conhecer a própria família. Naturalmente, uma melhor amiga como Ing foi dispensada. Quanto à pessoa que se ofereceu para levá-la para casa, ela desapareceu nas primeiras horas da manhã. \"Por que você acordou tão tarde? Estou esperando desde as oito.\"","Ing fechou a porta do carro, segurando a sacola com a camisa cinza que Napatr havia deixado na casa. Ela se virou para sua melhor amiga, cuja voz chegou antes mesmo de seu rosto aparecer. Embora a camisa pertencesse a Amp, sua amiga mais próxima, uma mulher alta e esbelta de rosto bonito, fora Ing quem a comprara. Uma onda repentina de possessividade a invadiu, um desejo irracional de não devolvê-la. \"Você precisa de alguma coisa?\"","Ing perguntou imediatamente. Elas eram amigas há anos, e Ing a amava há o mesmo tempo. Amp nunca a procurava primeiro, a menos que precisasse de algo.","\"P'Pun queria vir à praia.\" \"Você trouxe seu namorado aqui?\" O coração de Ing deu um salto ao ver o brilho de felicidade nos olhos de Amp. Amp estendeu a mão para segurar o braço de Ing, apertando-o suavemente, seu toque irradiando o quanto ela estava feliz por estar falando sobre seu namorado. Diferentemente dela, a dor já não era tão aguda como antes, o que parecia quase estranho, embora ainda persistisse. Mesmo assim, empalidecia diante da consciência de que alguém havia partido dela momentos antes. \"Sim, eu quero que o P'Pun fique no seu resort.\" \"Não creio que haja vagas disponíveis.\" Ing entrou em casa, sentindo o olhar da mãe. Sua mãe não sabia o segredo de seus sentimentos por Amp, mas sua mãe sabia. A mãe estava tomando café, sentada em frente a um homem bonito, sem dúvida o namorado de Amp.","Ele se endireitou, mostrando toda a sua altura, e ofereceu um sorriso amigável, embora para Ing isso não significasse nada. Ela retribuiu com um sorriso educado e formal e apertou a mão do homem que deveria ser a pedra no seu sapato.","Ele era apenas um espinho, mas já não a irritava tanto quanto antes. \"Olá, P'Pun.\" \"Olá, Eng. Desculpe pelo transtorno de hoje.\" Ing não respondeu. Observou a mãe se desculpar para ir trabalhar e, em seguida, cruzou o olhar com a mãe, a mulher que havia deixado o emprego para ajudar nos negócios da família desde que Ing estava no ensino médio. \"Um aviso prévio teria sido bom, Amp. Não temos nenhuma villa disponível no momento. Acabei de verificar.\" O carinho na voz da mamãe fez com que Ing se movesse rapidamente para sentarse bem perto dela. A mamãe sempre a protegera desde que ela se lembrava, e claramente percebeu o desconforto de Ing. \"Que pena. Mas eu já fiquei numa casa grande com a Ing antes. Na sua casa, você se lembra, Ing?\" \"Passei a noite lá. Ainda não foi limpo.\" Ing rejeitou a ideia imediatamente, apesar de ter dito a Amp, quando ainda era obcecada por ela, que poderia se hospedar no resort quando quisesse.","\"Você ficou lá sozinho?\" \"Preciso te contar tudo?\" \"Você nunca terá segredos comigo.\"","\"Você sequer tem tempo para ouvir minhas histórias, Amp?\" \"Mas você disse que eu podia vir quando quisesse, Ing. Você se esqueceu?\" \"Eu me referia apenas a você, não para você trazer outra pessoa assim!\"","Ing estava sem fôlego depois de gritar com a amiga. As lágrimas que ela vinha segurando transbordaram, fazendo com que sua mãe saísse do escritório para perguntar o que estava acontecendo. Ela se sentia sufocada pela sobreposição de emoções; não conseguia evitar a comparação. Essa melhor amiga vinha se intrometendo em sua vida o tempo todo, mas agora Ing não queria que ela invadisse seu espaço privado, um espaço que agora continha vestígios de outra pessoa completamente diferente. Diferentemente de outra pessoa, que nunca havia ultrapassado os limites ou se intrometido em sua vida. Essa pessoa simplesmente ficava sentada em silêncio por perto, esperando que Ing fosse quem a puxaria para o seu mundo particular.","\"Você...\" \"Acho que você deveria ir primeiro, Amp. Vou providenciar um carro para te levar aonde você quiser ir.\" Nook passou um braço em volta do ombro da filha, acariciando-lhe as costas suavemente. Ela olhou para o parceiro, que se apressava em direção a Ing, igualmente preocupado.","Ela havia criado a filha desde pequena, desde os dias em que mal conseguia falar, vigiando cada passo que ela dava. É claro que ela não gostava de ver alguém machucar sua filha a ponto de fazê-la chorar, e acreditava que a mãe da criança não sentia nada diferente.",". \"Por que vocês dois estão brigando assim?\" Aun perguntou, pegando na mão da filha. Ela nunca tinha visto Ing e Amp terem uma discussão de verdade. Sua filha amava a amiga mais do que qualquer pessoa, defendendo-a mesmo quando não devia. Ela jamais imaginou que Ing levantaria a voz para a amiga de quem nunca reclamara.","\"Não aguento mais, mãe.\"","Aunyawee não entendia absolutamente nada. Ela olhou para o rosto de Nook enquanto esta segurava a filha, buscando respostas, mas a outra mulher apenas lhe deu um pequeno sorriso familiar, aquele que sempre usava quando Aunyawee se sentia inquieta.","Ela havia sido a responsável pelos cuidados de sua única filha por mais de vinte anos. Ing a amava e a reverenciava ainda mais do que aquela que lhe dera à luz.","\"Se você não consegue parar de amá-la, que tal parar de ser amigo dela?\" \"Mamãe!\" \"Estou falando sério.\"","\"Será que agora todos estão escondendo segredos de mim?\"","Aunyawee estava completamente perplexa com a conversa entre as duas pessoas que mais amava. Ela olhava de uma para a outra, procurando por um responder.","Seu companheiro, no entanto, evitava seu olhar, e sua única filha mantinha a cabeça baixa, recusando-se a encará-la. São iguais. Mereceram mesmo um bom beliscão por serem tão reservados.","\"Quem ama quem, Ing?\" \"Eu amo você e a mamãe.\" Ing se esquivou, escondendo o rosto no colo da mãe. Sua mãe não sabia a verdade sobre ela e Amp como a mamãe sabia. Mas também nunca lhe contara, pois não queria preocupá-la. Mamãe havia observado e percebido isso por si mesma. Além disso, tia Ink também estava ciente disso, mas nenhuma das duas jamais a repreendeu ou disse para ela terminar o relacionamento e desistir, como poderiam ter feito hoje.","A mão quente da mãe, acariciando suavemente seus cabelos, fez com que as lágrimas que haviam acabado de secar voltassem a brotar. Ing encostou o rosto na coxa da mãe, sem se importar com a idade dela. No fim, sempre que seu coração se partia, era sua família que permanecia ao seu lado. Era assim desde a infância, dos joelhos ralados à dor sufocante que sentia agora no peito.","\"Você está sendo gentil para me evitar. E você também tem um segredo. É sobre a nossa filha.\" Aun disse, virando-se para beliscar o braço de seu companheiro, que olhava para a filha com um olhar afetuoso e amoroso. \"Não se esqueça de trazer essa pessoa para jantar em nossa casa.\" Nook não respondeu ao seu amado, que ainda parecia confuso, e soltou uma risadinha suave. A filha deles não era diferente; Ing se afastou do colo da mãe, com a boca ligeiramente aberta, o rosto corando levemente enquanto enxugava timidamente as lágrimas. \"Quem?\" Aun perguntou a ambas com voz severa, mas não havia a menor chance de mãe e filha lhe darem ouvidos. \"Qual deles você quer dizer, mamãe?\" Ing perguntou a Nook com uma voz igualmente hesitante, pensando consigo mesma se havia alguma coisa em que Nook não estivesse um passo à sua frente. \"A praia ontem à noite.\" \"Quando vocês dois vão parar de me esconder segredos?\" Aun suspirou de exaustão, olhando para o rosto do seu amado, que ria de forma brincalhona, e depois para o rosto da filha, que estava vermelho de confusão.","Ing só conseguia gaguejar, sem conseguir encontrar as palavras certas. Ela baixou a cabeça profundamente para evitar o olhar inquisitivo da mãe e os olhos zombeteiros da mamãe. Mais uma vez, Napatr despertara seus sentimentos. Quer estivesse à beira das lágrimas ou já chorando, sempre que pensava na mulher alta, sua tristeza parecia se dissipar com a brisa do mar. \"Você nos viu, mamãe?\" \"Acabei de verificar as imagens das câmeras de segurança.\"","Ing franziu os lábios, imaginando se as câmeras de segurança teriam registrado o momento na praia em que ela se aproximou de Napatr na noite anterior. Ela olhou para o rosto de Nook para tentar decifrar sua reação, mas mamãe já havia levado a mãe para o escritório. Os dois provavelmente tinham muitas coisas para discutir em relação ao problema dela. Ing não era diferente, estava confuso e perturbado por todos os acontecimentos dos últimos dias. .","sunyan"],"wordCount":3456},{"title":"05. Abraçar","paragraphs":["Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026 Cópia: . . O ambiente noturno do renomado bar de vinhos era bastante animado, porém organizado, já que a maioria dos clientes chegava em pares. Aliás, Napatr também estava em um par, assim como as outras mesas, embora sua acompanhante fosse uma amiga próxima que, ao saber que ela havia terminado o trabalho, meio que a esperou, meio que a obrigou a ir tomar um drinque.","O som de um piano vindo de um canto do bar criava um ambiente ainda mais romântico. Com uma linda vela decorando o centro da mesa e a atmosfera acolhedora do lugar, definitivamente não era um local para se visitar apenas com um amigo. \"Por que não encontramos uma esposa e depois viemos para cá?\" Wan olhou ao redor da loja aconchegante antes de lançar um olhar para sua melhor amiga, alta e sentada à sua frente com uma expressão de cansaço do mundo. Napatr não respondeu; apenas suspirou para a amiga, entediada, e tomou um gole de seu vinho. Wan deu um sorriso irônico. Sua amiga parecia um tanto desolada, mas não exatamente abandonada. Embora a outra parte não tivesse dito muito, Wan percebeu que Napatr estava estranhamente quieta e parecia estar com muitos pensamentos na cabeça. \"Esse aplicativo é tão bom assim que você está aí suspirando para mim?\"","\"Não o uso mais.\" \"Porque você encontrou alguém que é exatamente o seu tipo?\" Exatamente o tipo dela?","Napatr franziu as sobrancelhas involuntariamente. Seu olhar caiu sobre a vela no centro da mesa, e um rosto lindo e doce imediatamente lhe veio à mente. Na verdade, o rosto daquela pessoa nunca havia desaparecido completamente de sua memória. Ela não tinha um tipo definido, mas não podia negar que a pessoa em quem pensava constantemente era encantadora. Mesmo depois de uma semana, essa pessoa ainda era habilidosa o suficiente para fazer Napatr se lembrar constantemente de suas palavras, seu toque e seu sorriso. Um sorriso doce, mas envenenado, exatamente como ela havia previsto. \"Ah? O que é isso? Distraído, perdido em devaneios, então você realmente encontrou alguém, não é?\" \"Não sei. Não estamos mais conversando.\"","\"O que?\" \"Sim. Vamos mudar de assunto.\" \"Espere, o quê?\" \"Você me convidou para beber, então vamos beber. Não vire um detetive.\"","\"Ei, Patr! Sou tailandesa, fofoca é vital para a minha alma!\" Napatr olhou para Wan, uma das poucas amigas próximas que tinha, com um olhar exausto. Na verdade, fora Wan quem lhe recomendara aquele aplicativo. Depois de usá-lo por apenas alguns dias, ela conheceu Ing, antes de decidir excluir o aplicativo e tentar deixar para trás todos aqueles sentimentos. No entanto, elas permaneceram, como se não pudessem ser apagadas tão facilmente quanto ela esperava.","\"Ela provavelmente não quer ter um relacionamento com alguém como eu.\" \"Huh?\" Os olhos de Wan se arregalaram. Ela quase espirrou vinho no rosto da amiga. Napatr geralmente era calma, indiferente aos outros, bem-comportada, não gostava de festas e certamente não era do tipo que seria ignorada por uma mulher. Dada a sua carreira, o fato de sua família ser proprietária de vários hospitais e os negócios de sua mãe, ela era imensamente rica. Normalmente, qualquer pessoa vinha correndo até ela. \"Não conversávamos sobre as coisas comuns que as outras pessoas costumam conversar. Eu nem sabia a idade dela até o segundo dia que passamos juntas.\" \"Ela não sabia o que você faz da vida?\" \"Não, ela não fez isso. Nós não conversamos desse jeito.\"","\"Então como? Era só conversa fiada?\" \"Quer! Sinceramente, você...\" Wan deu uma gargalhada quando o rosto estoico de sua amiga ficou subitamente vermelho. Embora Napatr não saísse muito, talvez por falta de tempo ou de interesse, ela bebia bastante, provavelmente por frequentar muitas reuniões familiares.","\"Você já se envolveu muito com ela, Patr. Eu sei disso. Senão, você não pareceria alguém que foi dispensado pela esposa.\" \"Chamá-la assim talvez não seja correto, Wan.\"","\"Não é preciso?\" Napatr apenas suspirou, baixando o olhar para a vela mais uma vez. A suave música de fundo a fez pensar ainda mais na outra mulher.","\"Foi apenas uma noite. Algo temporário.\" \"Mas mesmo assim você fica tão distraída assim? Ela é boa.\" \"...\"","\"Você gosta dela?\" \"Eu não tenho certeza.\"","\"Nossa, ela não está para brincadeira.\"","Wan estreitou os olhos para Napatr novamente. Os olhos tristes e solitários, juntamente com os suspiros frequentes, eram claramente um sinal de amor não correspondido. Ela se perguntou que tipo de pessoa poderia cativar alguém tão indiferente quanto Napatr a esse ponto.","Talvez tenha sido o efeito do vinho que fez Napatr desabafar seus sentimentos de angústia, ao contrário de sua habitual discrição. Napatr ficou em silêncio, refletindo sobre si mesma mais uma vez. Estaria ela realmente abalada? Será que ela realmente gostava da mulher baixinha que não via há uma semana? Ou seria porque se tratavam como amantes? O toque doce e profundo, os olhares ternos que trocavam, e o fato de que, naqueles momentos, só existiam os dois.","Seriam essas sensações que a mantinham perdida naquela névoa doce e fugaz? Seriam esses os motivos que a fizeram se apaixonar sem nem mesmo perceber? Não era que Napatr nunca tivesse namorado ou tido um namorado. Na verdade, ultimamente, ela não tinha se envolvido em um relacionamento sério. Com o trabalho consumindo todo o seu tempo, ela não tinha espaço para ninguém, e ninguém podia esperar por ela. E muitos a abordaram simplesmente pelo que ela possuía. Mas com Ing, não foi nada assim.","Eles nunca falavam sobre profissões, dinheiro ou o caos de suas vidas. O que eles trocavam eram suas comidas favoritas, coisas que gostavam de fazer, lugares que adoravam visitar, ou até mesmo sua marca de cerveja preferida. Talvez fossem essas coisas que os faziam se conhecer melhor. Ou talvez fosse tudo isso que a fazia sentir que conhecia Ing tão bem, especialmente seus corpos, já tão familiarizados um com o outro. Ela conhecia cada marca na pele da outra mulher e sabia quais partes eram tão cativantes que seus lábios sempre pareciam encontrar o caminho até elas. Ing realmente teve uma grande influência sobre Napatr. \"O dono deste bar de vinhos é muito gato. Olha só.\" Wan disse, gesticulando em direção ao outro lado da loja, onde o proprietário conversava com um funcionário. Napatr se virou para olhar, como sua amiga havia sugerido. No instante em que a viu, levou um susto. Ela estreitou os olhos para examinar cuidadosamente o rosto doce da dona da casa.","\"O dono?\" \"Sim, não sei quantos anos ela tem, mas ela continua tão bonita e jovem.\" Napatr observou as costas esguias da dona da casa até que ela desapareceu de vista. Seu rosto encantador, sorriso doce e olhos cor de mel tinham uma semelhança impressionante com alguém, o que a deixou confusa. Talvez o vinho que ela havia bebido a fizesse ver todos como Ing. Mas ela não podia negar que a dona do Wine You, onde estava bebendo naquele momento, se parecia muito com Ing. \"Não, você não pode.\"","\"O que você quer dizer?\" Napatr ficou confusa com a explosão repentina da amiga. \"Você não viu o namorado lindo da dona? Portanto, você não pode.\"","\"Wan, você está louco?\" \"Eu vi aquele brilho nos seus olhos.\" \"Você está louco.\"","\"Tive que reservar este lugar com bastante antecedência, Patr. As mesas estão sempre cheias porque o dono é muito gato.\" \"Não estou surpreso.\" \"Com certeza o namorado dela vai te dar um soco.\" \"Eu não pensava no dono dessa forma.\" \"Mas eu vi seus olhos!!\" Napatr estava cansada demais para discutir mais. Ela ergueu a taça de vinho e bebeu um gole, antes de observar a loja novamente, procurando por algo, embora não soubesse por quê ou o que ganharia com isso. Mas quando seu olhar se elevou para um mezanino fechado por vidro transparente no segundo andar, o cabelo comprido e as costas esbeltas pareceram surpreendentemente familiares, fazendo-a franzir a testa enquanto semicerrava os olhos para ter certeza. Era tão familiar que ela não conseguiu se conter e se levantou. \"Patr, que diabos?\" Wan viu sua melhor amiga se levantar, ficando da mesma altura que ela, e fez o mesmo, olhando na mesma direção, confusa. \"Você quer sentar lá em cima? Já está lotado. Temos sorte de ter este lugar.\" Além disso, eles não abrem essa área com muita frequência.\" \"Está aberto hoje?\" \"Não faço ideia.\"","Wan respondeu antes de puxar o braço da amiga para fazê-la sentar-se novamente, enquanto as mesas vizinhas se viravam para olhar, obrigando Wan a dar um sorriso forçado em sinal de desculpas.","\"Devo ter bebido demais. Onde fica o banheiro?\" \"Por ali. Você pode ir sozinho, certo?\" Napatr assentiu com a cabeça. O álcool em seu organismo a fazia sentir calor, apesar do ar condicionado. Sua mão delicada desabotoou a camisa para aliviar o calor enquanto caminhava em direção ao banheiro.","Ela sentiu tontura, vendo todos como se fossem aquela mulher em particular. Jogar um pouco de água no rosto dela pode ajudá-la a recuperar os sentidos. Familiar... parecida... parece com ela, mas certamente não é. A mulher franzina, cujos cabelos ela acariciara delicadamente certa vez, tinha cabelos castanhoclaros. Mas a que ela acabara de ver tinha cabelos ruivos. Era apenas uma semelhança; ela devia estar vendo coisas.","Napatr apoiou as mãos na bancada da pia, encarando o próprio reflexo no grande espelho. Gotas de água umedeciam os cabelos que ela havia cortado recentemente com a mãe. Não estavam mais curtos, mas sim penteados seguindo uma tendência popular do momento. Mesmo tendo que usar uma touca cirúrgica no trabalho, por algum motivo, talvez por causa do curto, porém doce, período que passou perto de alguém, Napatr decidiu mudar a si mesma, ainda que apenas um pouco. . . \"Esse penteado ficaria muito bem em você.\" \"Qual estilo?\" Napatr trocou olhares com a mulher franzina enquanto ambas estavam nuas. A outra mulher apoiou o queixo no peito de Napatr, seus belos e esbeltos seios.","dedos brincando delicadamente com as pontas do cabelo de Napatr. Ing pegou o celular, tocou na tela por um instante e então a virou para mostrar o penteado que queria. Napatr simplesmente sorriu e acariciou suavemente os cabelos macios da mulher mais baixa.","\"Quando você estiver livre do trabalho e quiser uma mudança, você deveria experimentar.\"","\"Você também vai cortar o seu?\" \"De jeito nenhum. Eu gosto de ter cabelo comprido.\"","\"Talvez eu queira deixar o meu crescer também.\" \"Você se irrita com muita facilidade. Não pense que eu não te conheço.\" . .","Napatr deixou escapar um sorriso involuntário ao se lembrar da conversa daquele dia. A outra mulher a conhecia bem; Napatr realmente se irritava com facilidade, exatamente como Ing havia dito. O som de uma grande confusão, como se fossem pessoas discutindo, fez Napatr franzir a testa. Ela olhou para baixo para lavar as mãos quando ouviu o som de saltos altos batendo no chão, cada vez mais perto.","Ela soltou um suspiro cansado, sem querer se envolver na discussão alheia. Precisava sair dali antes que os dois entrassem.","\"Pare de mexer comigo, Amp!\" \"Você nunca falou comigo assim! O que essa pessoa tem de tão especial para você me olhar desse jeito?\" \"Não estou irritado! Estou apenas entediado!\"","Ing torceu o pulso, afastando-se da amiga íntima que a arrastara para o banheiro. Amp a seguira até o bar da mamãe porque queria uma mesa no andar de cima, um lugar que a mamãe raramente abria para alguém. Ainda assim, Amp queria sentar-se ali e beber com o namorado e implorou a Ing que os levasse, pois ela era sócia e sobrinha biológica do dono.","\"Você nunca se recusou a me ajudar!\" Sempre que Amp queria algo ou se encontrava em apuros, não importava o quão pequenos ou grandes fossem, ela só precisava contar para Ing. Sua amiga íntima, que a via como mais do que isso, sempre lhe dava o que ela precisava ou resolvia as coisas sem hesitar ou reclamar. Mas agora, era estranho. Tudo havia mudado desde que Ing começara a conversar com alguém pelo aplicativo que a própria Amp a havia incentivado a usar. Mas quando o tratamento deixou de ser o mesmo e o que Amp costumava receber não estava mais disponível, mesmo que ela não considerasse Ing mais do que uma amiga, Amp não pôde deixar de sentir-se possessiva em relação ao que sempre recebera. Ing franziu os lábios. Pelo canto do olho, viu uma cliente parada em frente ao espelho do banheiro, o que a fez tentar sair rapidamente dali.","Ela não tinha certeza se o cliente sabia que ela era sócia daquele bar de vinhos, mas não queria que a imagem que havia construído ao longo dos anos fosse prejudicada por causa do drama entre ela e sua melhor amiga. Ela soltou um suspiro pesado. Há uma semana, Ing vinha se sentindo sobrecarregada, com o coração inquieto de uma forma que não conseguia explicar. Mas esse não era o tipo de turbulência que costumava sentir por causa de sua melhor amiga. Ela não chorava mais porque Amp estava namorando outra pessoa; em vez disso, começara a enxergar muitas coisas nessa amiga com mais clareza. E a mais notável era...","Egoísmo.","Amp sabia, não que ela não soubesse, como Ing se sentia. As tentativas ocasionais de Amp de conseguir algo dela sempre faziam Ing se comover e ceder, simplesmente porque ela sentia mais do que amizade e tinha uma boa vontade que excedia a de uma amiga comum. Embora muitos de seus amigos a tivessem alertado sobre isso, Ing sempre achou que não havia nada de errado se lhe fizesse bem. Mas quando a situação se tornava insuportável, ela se sentia desconfortável e dizia isso diretamente à outra pessoa. No entanto, o resultado sempre era o mesmo. Amp faria um escândalo e imploraria a ela, exatamente como ela estava fazendo agora. \"Pare de brincar com o meu coração. Eu sei que você sabe.\" Ing olhou para a amiga com olhos suplicantes. Um lampejo de choque surgiu no olhar de Amp por um instante fugaz. Os lábios de sua amiga íntima, que Ing costumava admirar por sua beleza e nos quais frequentemente aplicava batons caros, agora estavam cerrados com força. Ao ver o olhar trêmulo dirigido a ela, Ing desviou o rosto.","Era uma sensação de vazio, mas, estranhamente, também de alívio, algo que ela não conseguia descrever.","Amp sabia que Ing gostava dela. Amp sabia que Ing a amava. Mas Amp não gostava de mulheres. Na verdade, Amp simplesmente não gostava dela, não sentia o mesmo que ela. Isso foi tudo. . \"Ela simplesmente gosta de ter alguém como ela. Ela usa isso para conseguir que você faça o que ela quer, mas nunca te dá nada em troca, Ing.\" . As palavras de Mind para Ing ecoavam em sua memória. Ela havia pensado nisso o tempo todo, mas, por valorizar a longa amizade, fechara um olho e um ouvido para manter o vínculo. Na verdade, Ing havia deixado de esperar por um amor recíproco há muito tempo.","\"Pare de usar meus sentimentos para seu próprio benefício, Amp.\" \"Mas você estava disposto a me dar pessoalmente, Ing.\" \"Isso não vai mais acontecer.\" \"Você não conseguirá parar de pensar em mim dessa forma.\"","Amp disse isso porque sabia. Ela já tinha tido muitos namorados, e sempre que se machucava, Ing estava lá para apoiá-la. Ela não achava que para Ing importasse que ela não a amasse. Ing não respondeu, mas se virou para olhar para a amiga que ela pensava amar com todo o coração, com profunda decepção. Finalmente, Amp admitiu indiretamente que sabia de tudo o tempo todo, mas optou por ignorar. \"Estou te perguntando sério, Amp.\" \".....\" \"Você já me considerou realmente um amigo?\" Ing se lembrou de como se sentiu na primeira vez que viu Amp, e se lembrou com a mesma clareza de que a abordou com uma intenção desde o início, não para ser amiga, como fizera com os outros. Mas com o passar do tempo, apesar de todo o esforço que Ing havia feito, isso nunca se concretizou de verdade. No fim, ela teve que aceitar a palavra \"amiga\" que Amp usava para se referir a eles quando eram vistos juntos. Ela aceitou e admitiu que era a única que se sentia assim. Se havia alguém para culpar, provavelmente era ela, que sentia demais e esperava que Amp sentisse o mesmo.","No entanto, Ing nunca interferiu quando Amp conheceu alguém novo. Ela não se intrometeu nem demonstrou tristeza, mesmo que seu coração se partisse cada vez que Amp namorava outra pessoa.","Ela sempre estava lá para Amp quando ela estava triste. Mas quando Ing se sentia da mesma forma, mesmo por algo pequeno, Amp nunca estava lá para ouvi-la ou confortá-la.","Ing até permitiu que seu quarto se tornasse um \"ninho de amor\" para Amp e seu namorado, disposta a sentir a dor. Naquela época, o amor realmente a havia cegado. \"Ou será que é porque você sabe que eu gosto de você que pensa que pode me fazer fazer qualquer coisa, Amp?\" Ing conseguia aceitar não ser correspondida, mas não entendia por que não conseguia encontrar amizade na outra pessoa. \"Então posso falar livremente?\" O tom frio de sua melhor amiga fez Ing sorrir, um sorriso pesado de autopiedade, enquanto lágrimas brotavam até que o rosto da outra se tornasse um borrão. \"Normalmente, você nunca leva em consideração os sentimentos do ouvinte quando fala, Amp.\"","Ela nunca havia sido sarcástica com a amiga daquela forma. Era a primeira vez. Talvez fosse por causa dos vários acontecimentos que se acumularam, ou talvez os eventos da última semana tivessem feito Ing perceber que, na verdade, ela não amava mais a pessoa à sua frente como antes. \"Ser sarcástico comigo não vai te levar a lugar nenhum, Ing.\" \"...\" \"Sim, só sou sua amiga pelos benefícios, pelo dinheiro, pelas coisas que você tem. É bem conveniente, não acha, Ing? O amor que você me deu foi tão conveniente que já consegui sustentar vários homens sem problemas.\"","A ouvinte ficou paralisada com o que ouviu. Sentiu-se entorpecida da cabeça aos pés, observando sua melhor amiga se afastar depois de proferir aquela frase como alguém que havia perdido a cabeça.","Ing levou a mão à boca, com o coração apertado e acelerado pelo que acabara de ouvir.","Ela queria chorar, mas não conseguia. Sentia apenas decepção, dor e uma repentina perda de confiança, embora tudo o que Amp dissesse fosse verdade. \"Eng.\" A voz calorosa e gentil fez Ing se virar imediatamente. O rosto bonito e marcante da pessoa que estivera ausente por uma semana estava ali, bem diante dos seus olhos. Suas sobrancelhas escuras e bem definidas estavam franzidas, e seus olhos demonstravam uma preocupação evidente.","\"Patr.\" \"Você quer um abraço?\" \"...\" \"Você não precisa se conter comigo. Se quiser chorar, pode chorar à vontade.\" Naquele instante, as lágrimas que ela vinha contendo e as muitas emoções reprimidas em seu coração jorraram instantaneamente. Ing soluçou incontrolavelmente nos braços da outra mulher. Foi um abraço caloroso, seguro e aquele que ela tanto desejava.","Não importava quantas vezes acontecesse, Napatr continuava sendo a única que a fazia sentir-se amada e confortada por meio de suas ações, mesmo sem dizer uma única palavra. . sunyan"],"wordCount":3218},{"title":"06. Sem Motivo","paragraphs":["\"Primeiro vou mandar uma mensagem para meu amigo.\"","Napatr contou isso à mulher baixinha sentada em silêncio ao seu lado. Ela havia trazido Ing para sentar no carro porque o vento lá fora estava muito forte e elas estavam chamando muita atenção. Seu carro servia como um refúgio seguro, perfeitamente escondido de olhares curiosos.","Você veio acompanhado de um amigo? \"Sim, meu amigo próximo. Wan conseguiu reservar uma mesa, então viemos. E você? Veio com amigos?\" \".....\" \"Bem, me desculpe. Você não precisa responder.\" Napatr franziu os lábios, lançando um olhar para a outra mulher com um sentimento de culpa. Ela tinha visto Ing discutindo com alguém, provavelmente uma amiga, no banheiro, antes de irem para o estacionamento. Ela o seguira por preocupação, talvez ultrapassando os limites, apenas para ouvir coisas que Ing jamais deveria ter tido que enfrentar. \"Sou sócio aqui. Este é o bar da minha tia, então venho aqui com frequência.\"","\"Sua tia? Aquela mulher bonita?\" \"Lindo?\" \"Sim.\"","\"Você conheceu minha tia?\"","\"Wan me disse que ela é a dona.\" Napatr ergueu os olhos do celular e viu a pessoa ao seu lado a encarando, como se tentasse pegá-la em uma mentira.","\"O que é?\" \"Você acha minha tia bonita?\" \"Ela é. Bem, muito bonita.\" \"A tia Ayre já é casada.\" \"Isso não é nenhuma surpresa. Ela é deslumbrante.\"","\"Patr, você já elogiou a beleza da minha tia várias vezes.\" Dessa vez, Napatr ficou tão perplexa que não sabia como prosseguir. Ela procurou no rosto da mulher delicada uma resposta para o que havia dito de errado. Olhando naqueles olhos doces, ainda adoravelmente úmidos de lágrimas, encontrou apenas uma clara faísca de insatisfação. \"Você está com ciúmes em nome do seu tio por afinidade?\" Ing permaneceu em silêncio. O que havia de errado com ela? Aquele leve sorriso nos lábios finos de Napatr e aquele olhar brilhante e afetuoso, o que significavam? Ing só conseguiu desviar o rosto. Seu rosto ficou vermelho incontrolavelmente; tudo estava acontecendo tão rápido que ela não conseguiu se recompor. Há poucos instantes, ela estava soluçando no ombro de Napatr, com o coração partido por uma amiga tão próxima tê-la tratado daquela maneira, depois de toda a boa vontade que ela havia demonstrado. Mas agora, ela se sentia estranhamente incomodada com o fato de Napatr ter elogiado sua 'Mamãe' tantas vezes.","Ou será que, na verdade, ela estava com ciúmes em nome de outra pessoa?","Napatr manteve um sorriso nos lábios. Ela observava o perfil da mulher em quem pensara a semana toda. Os cabelos ruivos faziam Ing parecer ainda mais sexy, charmosa e ardente do que antes. Ela hesitou por um instante antes de decidir colocar a mão delicadamente na cabeça da mulher menor. O rosto doce se virou imediatamente para olhá-la, mas ela não a repreendeu nem afastou sua mão como Napatr temia. Napatr esboçou um sorriso terno, acariciando lentamente os cabelos macios, e falou em voz baixa, embora estivessem sozinhos no carro. \"Não chore mais, Ing.\" \".....\" \"Talvez você já esteja cansada de me ouvir dizer isso de novo, mas quando você sorri, você fica com a melhor aparência.\"","\"Obrigado.\" \"Eu acabei de te dizer para não chorar.\" \"Ei!\" Ing deu um tapinha brincalhão no ombro da outra mulher, que riu baixinho antes de envolvê-la em outro abraço reconfortante. Os olhos gentis e o sorriso caloroso de Napatr a emocionaram tanto que ela não conseguiu conter as lágrimas diante de sua companheira de conforto. Embora fosse uma frase simples que ela já tivesse ouvido de amigos ou outras pessoas, quando veio dessa pessoa, a mulher alta ao seu lado que agora acariciava seus cabelos com tanto carinho, fez com que ela se sentisse vulnerável e indescritivelmente segura ao mesmo tempo. . .","Os olhos de Wan quase saltaram das órbitas quando viu sua melhor amiga, alta e elegante, voltando com uma mulher charmosa e bonita. E, se não estivesse enganada, a mão esbelta e delicada da mulher que acompanhava Napatr havia acabado de soltar o braço dela um segundo antes.","\"Hum... olá.\"","Wan cutucou sua melhor amiga com o cotovelo justamente quando Napatr estava prestes a se sentar. Ela puxou a cadeira vazia ao lado e lançou um olhar significativo para Napatr, fazendo a mulher alta franzir a testa, confusa. \"Vá sentar-se com ela.\"","\"Oh, tudo bem.\" Napatr franziu os lábios, sentindo-se inexplicavelmente tímida, apesar de ter sido ela quem convidou Ing. \"Ing, esta é Wan, minha melhor amiga. Wan, esta é Ing. Ela é... bem, ela é...\" \"Olá, Wan. Eu sou Ing.\"","Ing rapidamente sorriu e cumprimentou Wan, que parecia ansiosa para ver como Napatr a apresentaria. Na verdade, ela também estava nervosa com a resposta.","Ela sentia-se esperançosa e, ao mesmo tempo, com medo de se decepcionar. Wan quase caiu na gargalhada ao observar a reação das duas mulheres sentadas lado a lado em silêncio. Napatr, que era uma pessoa gentil por natureza, parecia ainda mais meiga do que o normal. Seus olhos não estavam entediados ou indiferentes como de costume. Em vez disso, tinham um brilho inconfundível. Seu coração se enterneceu ao ver sua melhor amiga assim, como se estivesse se apaixonando. \"Você não parece entediado como quando estava bebendo comigo, Patr.\" \"Que tipo de cara estou fazendo?\"","\"Aquela que você está fazendo agora?\" Napatr assentiu com a cabeça, virando-se para olhar para a mulher franzina que chamava um funcionário para reabastecer o vinho e trazer outra taça para si. Ela deu um pequeno aceno de cabeça quando o funcionário sorriu, cumprimentando-a com um wai enquanto falava.","O brilho zombeteiro nos olhos do funcionário incomodou Napatr, e um calor subiu-lhe ao rosto, a ponto de ela ter que desviar o olhar. \"Você parece feliz. Como alguém apaixonado.\" \"Você está louco?\"","\"Estou certo, Ing? Napatr parece muito mais feliz do que quando estava sentada aqui comigo mais cedo.\" \"Isso é verdade?\"","Ing sorriu amplamente, virando-se para olhar para a mulher alta que permanecia sentada, agindo como se não soubesse de nada, embora suas orelhas, que despontavam por entre os cabelos, fossem de um vermelho vivo. Mesmo com a iluminação fraca e de tons quentes do bar, a cena ainda era claramente visível. Só agora Ing a observou com atenção. Napatr tinha um novo corte de cabelo; seus fios na altura dos ombros haviam sido repaginados, deixando a mulher alta incrivelmente charmosa e, de alguma forma, um pouco sedutora. A franja fina a fazia parecer anos mais jovem.","\"Patr, você cortou o cabelo.\" \"Está tudo bem?\" \"Com certeza.\" Ing sorriu para Napatr, que retribuiu o sorriso. Sentindo o olhar da pessoa à sua frente, Ing teve que tomar um gole de vinho para amenizar a timidez. \"Eu ainda estou aqui, sabia?\"","Wan interrompeu a atmosfera estranha do casal à sua frente. Ela encarou sua melhor amiga, que acabara de desviar o olhar do rosto de Ing. \"Não me admira que você tenha cortado o cabelo de repente.\"","\"É estranho?\" \"É verdade. Alguém como você não iria a menos que a Sra. Pleng a arrastasse para lá.\" Mas você disse que foi sozinha... Será que ela já pediu para você fazer um exame de sangue para verificar se há algo de anormal? \"Wan, você é muito dramática.\" \"Estou falando sério.\"","Ing ficou sentada em silêncio, sorrindo ao ouvir a troca de farpas entre Napatr e Wan. Encontrar Napatr por acaso, independentemente de ter ouvido ou não toda a discussão com Amp, deveria tê-la feito sentir vergonha daqueles insultos que expuseram o quão patética ela era.","Mas com Napatr, ela não sentia vergonha nem necessidade de guardar segredos. Eles eram abertos um com o outro, compartilhando histórias pessoais sem que lhe perguntassem. Nada parecia forçado; tudo acontecia naturalmente e, o mais importante, ela se sentia bem. Todos os problemas que ela enfrentara pareciam ter desaparecido com o vento. O peso que lhe dificultava a respiração uma hora antes havia sumido, e agora ela sentia que podia respirar sem preocupações. Que tipo de pessoa era Napatr? Como ela conseguia aliviar suas preocupações e tristezas tão facilmente em tão pouco tempo? \"Vamos subir e sentar lá em cima?\"","Ing convidou os dois, que estavam hilariamente envolvidos em uma disputa de olhares. Napatr assentiu em concordância, pois a mesa deles estava se tornando o centro das atenções.","Talvez fosse porque a maioria dos clientes eram frequentadores assíduos que conheciam Ing e seu papel como sócia. Ou talvez fosse a beleza estonteante de Napatr, ou de Wan, igualmente bela, com seu sorriso constante. De qualquer forma, ela percebeu que a pessoa ao seu lado estava começando a se sentir desconfortável.","Ing sabia que Napatr não gostava de ser o centro das atenções, apesar de se destacar por sua altura e aparência, e seu penteado atual certamente chamava a atenção.","\"Pode ir na frente, Patr. Acho que vou voltar primeiro.\"","Wan checou o celular novamente antes de sorrir para Ing, que estava sentada ao lado de sua melhor amiga, com uma aparência muito bonita.","\"Como você vai voltar? Você veio comigo. Quer pegar meu carro? Eu pego um táxi.\"","\"Tenho alguém que pode me deixar em casa.\"","Wan mostrou a tela do celular, exibindo o mesmo aplicativo que havia recomendado a Napatr no mês passado. Sua melhor amiga assentiu em compreensão antes de se virar para Ing e iniciar uma conversa.","Wan balançou a cabeça e riu baixinho do comportamento de Napatr. Ela adorava ver sua amiga tão cheia de vida.","\"Já vou indo, Patr. Até logo, Ing.\"","Wan contou para a amiga antes de estender a mão para cumprimentar a bela Ing com um aperto de mãos, oferecendo uma despedida educada antes de ir embora. A outra mulher deu um sorriso tão doce que Wan se sentiu momentaneamente deslumbrada e não conseguiu evitar sorrir também.","\"Se algum dia você quiser vir tomar um drinque, pode ligar para o meu número.\"","Ing disse, entregando um cartão de visitas a Wan. Wan sorriu e olhou para Napatr, que ouvia atentamente a conversa.","\"Se eu quiser uma mesa mais rápido, devo simplesmente dizer que sou Wan, amigo de Napatr?\"","\"O que isso tem a ver comigo?\" Napatr interrompeu a conversa, olhando de uma para a outra, confusa. Mesmo assim, ela gostava de ver sua melhor amiga conversando com Ing, que tinha um status que ela não conseguia definir, mas que lhe parecia muito importante.","\"Estou correto, Ing?\" Wan optou por não responder à amiga, pedindo novamente a Ing que a provocasse. O rosto doce e corado foi resposta suficiente; Napatr havia conquistado mais um admirador. Além disso, sua amiga parecia ainda mais cativada por Ing. \"Isso também serve. Até a próxima.\" \"Até logo. Tchau, Patr. Você precisa acordar cedo amanhã, então vá dormir logo.\"","\"O que você está falando?\" Wan se afastou. Agora, apenas ela e Ing permaneceram à mesa. A mulher franzina digitava rapidamente em seu celular, fazendo Napatr rir. \"O que é?\" Ing bloqueou a tela e se virou para a mulher alta que apoiava o queixo na mão, olhando para ela com um olhar estranho. \"Eu te vi fazendo beicinho agora há pouco e achei adorável.\" \"Então... vamos?\" \"Ir aonde?\" \"Lá em cima. Ou vai ficar aqui sentado bebendo sozinho?\" \"Isso é permitido?\" \"Você não vai comigo?\"","\"E o sócio do bar se sentará comigo?\" \"Patr!\" Ing estendeu a mão e beliscou o braço dela, incapaz de resistir à provocação. Quando Wan estava por perto, Napatr não era tão atrevida. \"Você é tão irritante.\" Napatr não respondeu, mas riu e agarrou a pequena mão de Ing para segurá-la. A outra mulher não se afastou; simplesmente ficou sentada, imóvel, encostada no braço de Napatr. O aroma de um perfume, que Napatr ainda não tinha certeza se podia chamar de familiar , chegou ao seu nariz. O cheiro de xampu e a fragrância da mulher a fizeram sorrir. Ela se sentia maravilhosa, mesmo sem ter certeza se já podia se sentir assim.",". . \"Você vai tomar outra bebida?\" Napatr perguntou à mulher franzina que caminhava em sua direção com uma taça de vinho fresco. Ing deixou-se afundar no mesmo sofá. Eles estavam sentados no andar superior, em uma área ainda mais reservada do que aquela que tinham visto de baixo. O cômodo não era grande, mas estava decorado nos mesmos tons do resto do bar. Era um espaço privativo que oferecia uma visão clara de todo o local. Napatr não se sentia desconfortável ou relutante em sentar-se perto dela. Pelo contrário, gostava. Sentia-se bem por estarem tão próximas, sentindo a sensação de seus corpos se tocando, às vezes intencionalmente, às vezes não. Ela nunca tinha sido assim com mais ninguém. Normalmente, ela não gostava de ser tocada ou que alguém iniciasse contato físico, mas com Ing era diferente.","\"Não posso beber? Escolhi este vinho especificamente para beber com você.\"","\"Comigo?\" \"Bem, somos só você e eu. Ou tem alguém com quem você preferiria beber?\"","\"E a sua tia?\" Ing franziu a testa e encarou o rosto de Napatr como se buscasse uma resposta. Ela sentiu um estranho arrepio no coração.","\"Você quer beber com a mamãe?\" \"Mamãe?\" \"Minha tia. Eu a chamo de Mamãe.\"","Napatr sorriu ao observar a mulher franzina servir vinho com destreza em uma taça e entregá-la a ela. Ela pegou a elegante taça para provar um pouco antes de acenar para Ing enchê-la novamente. \"Por que você está me olhando desse jeito?\" \"Não sei.\" \"Como você não sabe? Patr, você está olhando fixamente.\"","\"Não me é permitido olhar?\" Antes que a mulher franzina pudesse responder, ouviu-se uma batida rítmica na porta de vidro. A bela tia, dona do bar, apareceu com um sorriso que fez Napatr sorrir instintivamente. Napatr imediatamente se levantou para cumprimentá-la. \"Não sabia que a senhora tinha uma visita. Por favor, sinta-se à vontade, senhorita...?\" \"Napatr. Olá... er, mamãe?\"","\"Você precisava de alguma coisa, mamãe?\" Ing deixou escapar, lançando um olhar para a pessoa ao seu lado. Napatr sentou-se novamente com um leve sorriso, permanecendo em silêncio para deixar Ing ter seu momento a sós com a mãe. Ing teve muita vontade de dar uns tapinhas no ombro de Napatr. Aquele olhar brilhante de agora há pouco, e ela ainda a chamou de \"Mamãe\", assim como Ing fazia. Ninguém nunca tinha seguido o exemplo dela daquele jeito. \"Ainda não tive a oportunidade de conhecer a Srta. Napatr.\" Ayre sorriu amplamente, alternando o olhar entre Ing e Napatr. Não era que sua sobrinha nunca trouxesse ninguém ao bar, mas geralmente eram apenas as melhores amigas que Ayre já conhecia. Essa pessoa, porém, foi uma novidade. \"Mamãe...\" Ayre riu de forma brincalhona da cara emburrada da sobrinha. Observou o comportamento de Napatr. Naquele espaço familiar reservado, viu apenas um sorriso gentil e olhos brilhando com um olhar genuíno de afeto e admiração. Napatr parecia educada, arrumada e muito bem-comportada, nada parecida com a melhor amiga de Ing.","\"Ah, eu vim perguntar se você emprestou o carro para seu amigo de novo.\" \"Será que foi a mente?\"","\"Não, era a Amp. Eu vi você conversando com ela no bar lá embaixo mais cedo.\" Ing se virou imediatamente para olhar para Napatr. A outra mulher manteve uma expressão neutra, agindo como se não soubesse de nada. Ing confiava que Napatr não contaria uma palavra sobre ela e Amp para mais ninguém. Não era que Ing quisesse esconder segredos da família, mas simplesmente não queria que eles se preocupassem. Todos estavam apreensivos com a forma como ela tratava Amp, temendo que ela estivesse sendo explorada de todas as maneiras.","Ela sabia disso muito bem e, a partir daquele momento, não deixaria mais ninguém se preocupar com isso. \"Eu não deixei ela pegar emprestado. Ela provavelmente pegou sem me avisar.\" \"Com o namorado dela? Acho que isso é demais, Ing.\" \"Se o Amp não devolver o carro amanhã, vou denunciá-lo à polícia. Não se preocupe, mamãe.\"","Ing disse, dando um passo à frente para abraçar a tia carinhosamente. Ela sempre sentira o amor e a bondade de Mama Ayre, que cuidara dela desde antes mesmo de ela se lembrar. Era por isso que a amava e respeitava como uma segunda mãe.","\"Vocês brigaram, querida?\" \"Não é nada. A tia Ink provavelmente já está preocupada com você.\"","\"Ah, na verdade ela está conversando com a sua mãe sobre esse mesmo assunto agora.\"","Napatr sorriu ao observar a mulher franzina se transformar na \"Pequena Ing\", mimando sua mãe com gestos adoráveis. Ela tentou se controlar para não ouvir e não ver, mas sem querer captou toda a conversa e cada movimento.","Ela sentiu uma profunda culpa. De estranhas distantes que sabiam apenas o que a outra escolhia dizer, agora ela de repente sabia quase tudo sobre os problemas de relacionamento de Ing.","\"Você já bebeu metade da garrafa sozinho(a).\" Ing disse enquanto se sentava novamente ao lado de Napatr. Napatr não parecia nada bêbado. Ing só havia conversado com a mãe por pouco tempo, mas a outra mulher já tinha terminado seu vinho como se estivesse com sede de água. \"Como você consegue beber tanto?\"","\"Só por precaução, caso a gente vá beber de novo, assim eu posso cuidar de você\", disse Napatr com um sorriso. Ela viu a mão da mulher franzina parar quando ela estava erguendo o copo. Foi sutil, mas ela percebeu. \"Espero que seja verdade. Não é como se eu pudesse sequer entrar em contato com você.\"","\"Bem, eu já disse que ia parar de usar o aplicativo. Eu já te disse.\" \"Você é tão malvado. Voltou sem dizer nada.\" \"Eu vi que você estava dormindo tranquilamente.\" \"Senti como se estivesse sendo usada para um caso de uma noite e depois descartada.\" Napatr ficou boquiaberta com a declaração. A mulher franzina soltou uma risadinha e estendeu um dedo fino para erguer o queixo de Napatr. Aquele brilho travesso e os olhos doces enquanto ela ria ainda estavam lá, fazendo Napatr sorrir automaticamente.","\"Não, quer dizer, eu...\"","\"Dizer que você não terminou comigo seria estranho. Você realmente terminou comigo, Patr.\" \"Você está com raiva?\" \"Na verdade.\" Um pouco desanimada. Um pouco triste, como se algo em seu peito tivesse caído e desaparecido. A mulher franzina não disse mais nada. Ficou sentada bebendo e apreciando a música em silêncio. Por hábito, encostou as costas no peito de Napatr, deixando-o sem saber onde colocar as mãos.","\"Você pode me abraçar.\" \"Posso fazer isso?\"","\"Já fizemos mais do que isso antes, Patr. Não me importo.\" Napatr exalou suavemente. Passou o braço por trás da mulher pequena e a puxou para perto, aproximando ainda mais seus corpos. Inclinou-se e pressionou o nariz delicadamente contra o ombro nu de Ing, deixando um toque doce e prolongado, sem reservas.","\"Desta vez você nem perguntou.\" \"Por que você está me provocando?\"","\"Você é tão irritante.\" \"Você ainda está triste, Ing?\" A mão pequena e delicada que acariciava o braço de Napatr parou instantaneamente. Ing se virou para olhá-la com uma expressão peculiar antes de sorrir e balançar a cabeça levemente. \"Eu sei que você sabe quem era.\" \"Hum.\" Napatr murmurou em resposta antes de brindar com a outra mulher e tomar um gole. Ing não disse mais nada, mas se afastou do abraço apenas o suficiente para encher os copos novamente antes de retornar ao mesmo lugar nos braços de Napatr.","\"Estou triste porque ela agiu como se eu nem fosse amiga dela. Não estou triste porque ela não sentia o mesmo por mim.\" \"...\" \"Além disso, eu não a amo mais desse jeito. Nem sei quando isso parou.\"","\"Você provavelmente já enfrentou esse tipo de comportamento o suficiente para que o amor simplesmente desaparecesse.\"","\"Talvez. Pode ter sido há muito tempo, não tenho certeza. Mas estou triste porque o Amp nem sequer conseguiu me dar amizade. Sinto-me traído.\" \"Não sei como te consolar.\"","\"O simples fato de não desaparecer em lugar nenhum já é suficiente, Patr.\"","Ing admitiu que, quando estava com Napatr, nunca pensava nas coisas que lhe perturbavam o coração, nem nos problemas com sua melhor amiga, nem nas complexidades da situação delas.","Era como se o tempo tivesse parado. Parecia que, naquele momento e naquele lugar, só existiam os dois. E ela sentiu paz. \"Por que você a amava?\"","\"Será que o amor realmente precisa de um motivo?\"","\"Não...\"","\"Exatamente.\" \"Sim, você tem razão. Sem motivo.\" Amor é simplesmente amor. Nada mais, nada menos. E agora, Napatr havia encontrado sua própria resposta. Ela tinha certeza dos sentimentos que haviam crescido ao longo das últimas duas semanas. Ela gostava do Ing. Ela gostava dela, embora não tivesse certeza de quando se tornara tão cativada por ela. Tudo o que sabia era que agora, gostava muito daquela mulher pequena. .","sunyan"],"wordCount":3432},{"title":"07. Indefinido","paragraphs":["\"Você está com raiva?\"","\"N-não, eu não sou.\"","\"E foi bom?\" \"Hum, sim, foi bom.\" \"Mais uma vez?\" \"Chega. Você tem que trabalhar amanhã, lembra?\" Ing respirava pesadamente enquanto puxava um cobertor macio para cobrir seu corpo nu. Ela sorriu quando Napatr repousou a cabeça em seu peito, sentindo o toque suave dos lábios pressionando um beijo delicado contra seu mamilo. \"Patr...\" Napatr deu uma risadinha ao ouvir seu nome ser chamado num tom ligeiramente mais firme e doce. O corpo delicado de Ing se contraiu levemente ao toque antes que ela movesse a palma macia da mão para cobrir a boca de Napatr. \"Você não está mesmo com raiva?\"","\"Por que eu ficaria com raiva de você?\" \"Bem...\" \"Sobre nós fazermos sexo?\"","Napatr murmurou uma resposta em sua garganta antes de se virar de costas, apoiando a cabeça no travesseiro macio ao lado da mulher pequena, que se virara de lado para olhá-la, esperando uma resposta. Ainda assim, Ing não se esqueceu de ajeitar o cobertor para manter seu corpo macio escondido da vista de Napatr, o que fez Napatr sorrir com o gesto. \"Você estava chateada com aquela pessoa. Eu tinha medo que você ficasse brava por termos feito aquilo.\" Napatr evitou mencionar o nome da pessoa que fizera Ing chorar e evitou discutir explicitamente a intimidade recente entre eles, temendo que falar de forma muito direta pudesse magoar Ing. \"Você não fez isso sozinho. Se tivesse feito, significaria que eu não consenti. Você não faria uma coisa dessas, Patr.\" Ing continuou por um tempo antes de estender a mão para afastar os cabelos do rosto da mulher alta. Pelo que sabia do caráter de Napatr, será que ela faria alguma coisa sem pedir permissão primeiro? Ela pedia permissão até quando só queria fazer uma pergunta.","\"Eu não faria isso. Mas agora mesmo, eu não perguntei.\"","\"Algumas coisas não precisam ser perguntadas, Patr.\" Napatr riu novamente, depois segurou a pequena mão que acabara de lhe dar um tapa no ombro, com força suficiente para o som reverberar em sua pele. Ela a segurou, seus dedos traçando o contorno macio da mão de forma lúdica. \"Então, o que eu devo pedir?\" \"Ei, você está sendo atrevido de novo!\" \"Você não está mais cansado, está?\" Ing lançou um olhar imediato para o rosto de Napatr. Os olhos penetrantes que irradiavam calor já a encaravam, obrigando-a a desviar o olhar.","Os dedos de Napatr acariciaram sua mão, fazendo-a segurá-los para interromper o movimento. movimento.","\"Vá lavar as mãos.\"","Como percebeu que era a mão que a outra havia usado para explorar seu corpo por um longo tempo antes, ela disse a Napatr para ir se limpar. Mesmo assim, a mulher alta não pareceu disposta a cooperar.","Ela não respondeu, apenas ficou olhando fixamente para o rosto de Ing até que Ing franziu a testa diante de seu comportamento.","Napatr parecia ter muitas coisas que a intrigavam; isso transbordava nos olhos penetrantes que a observavam atentamente. Ing não resistiu e estendeu a mão para tocar delicadamente o rosto da mulher alta.","\"O que é isso? O que você está querendo saber?\"","\"Nada, na verdade.\"","\"Sabe, você pode perguntar. Não me importo.\"","\"Mas você vai responder?\"","\"Não estou respondendo só porque você está sendo irritante, Patr.\"","\"Eu simplesmente não quero te ver chorar de novo.\"","Napatr abriu os braços para que a mulher franzina se deitasse mais perto. Ing aproximou-se imediatamente e o braço que estava estendido puxou o corpo delicado para um abraço apertado.","\"Não vou chorar por ela de novo.\"","\"Você também não deveria chorar por outras coisas.\"","\"Será que as pessoas realmente conseguem se controlar?\"","\"Não dá. Acho que é como o coração, você não consegue pará-lo.\"","Assim como Napatr não conseguia impedir que seu coração vacilasse pela pequena mulher em seus braços, deixando-a sem saída para esses sentimentos. \"O que há de errado com você hoje? Por que você está sendo tão piegas?\" Napatr caiu na gargalhada novamente ao ouvir a pergunta, repleta de curiosidade. Ela olhou para a pessoa em seus braços antes de depositar um beijo terno na testa de Ing.","Ing imediatamente inclinou o rosto para olhar para a pessoa que havia deixado aquele toque caloroso sem permissão. Ela hesitou um pouco antes de se inclinar para frente e pressionar seus lábios contra a bochecha de Napatr em resposta. Ela era tímida e insegura, mas queria fazer isso. \"Você fez isso de livre e espontânea vontade?\"","\"Talvez não.\" \"Você é tão infantil, tão emburrado.\" Ing, que havia sido repreendido tão gentilmente, imediatamente deu um tapinha nas costas de Napatr. O que aconteceu com a Napatr hoje? Por que ela estava tão melosa e insistente em provocá-la?","\"Não sei com o que você está preocupado, mas não precisa se preocupar se for comigo.\"","\"...\"","\"Não sei se você quer saber, Patr, mas quero te contar. Eu nunca transei com ela.\"","Ela viu um misto de choque e surpresa brilhar nos olhos de Napatr quando seus olhares se cruzaram. As sobrancelhas escuras da mulher alta se franziram tanto que Ing teve que estender o dedo para acariciá-las delicadamente. Ela não gostava do jeito como a mulher alta pensava demais sobre ela.","Era verdade que Ing estava triste com o fim de seu relacionamento com Amp, mas sentiu-se mais aliviada por ter ouvido a verdade da boca da pessoa que ela pensava ter amado durante todo esse tempo. Foi como uma declaração, uma frase que desvendou tudo dentro dela, revelando-lhe como Amp realmente a via. No fim, mesmo que aquela mulher não pudesse oferecer nem mesmo amizade, Ing fora feliz nos momentos que passaram juntas. Mesmo que os conceitos de 'amizade' e 'amor' fossem coisas que ela havia imaginado sozinha. Não era que ela não tivesse desconfiado no passado, mas sua boa vontade e o amor que sentia fizeram com que Ing optasse por desviar o olhar. No entanto, Ing não tinha certeza absoluta do porquê de finalmente ter aceitado que tudo o que recebera nunca fora real.","\"Mas naquele dia, você gritou o nome dela.\"","\"Você pode simplesmente esquecer isso?\"","\"Era a nossa primeira vez.\"","\"Tudo o que aconteceu depois disso não foi bom? É por isso que você só se lembra daquele período?\"","Os doces olhos a fitaram, aguardando uma resposta. A expressão, o tom e o olhar eram tão exigentes que Napatr engoliu em seco automaticamente.","\"Foi bom todas as vezes. Eu simplesmente...\" \"Talvez eu a amasse naquela época. Mas agora, não a amo mais.\"","Ing interrompeu Napatr, deixando escapar a informação. Ela sabia que a outra mulher não lhe diria diretamente o que estava pensando. \"Ame-se mais.\"","Napatr assentiu com a cabeça antes de dizer à pequena mulher em seus braços, em voz baixa. Ela optou por parar de questionar e afastou as pequenas preocupações do seu coração. Ela queria se concentrar apenas em Ing neste momento. Enquanto a respiração de Ing roçava seu pescoço, ela só conseguiu sorrir, deixando Ing ter tempo para processar tudo o que acabara de vivenciar, sem pressa. Afinal, ela estaria ali para abraçá-la e confortá-la dessa forma. Ing permaneceu imóvel, encostada no ombro forte de Napatr em silêncio. Talvez por ter voltado sua atenção para si mesma, amando-se e buscando mais a própria felicidade, ela percebeu que tudo o que recebera até então não era real.","Algo havia mudado, e foi por isso que, desta vez, ela não ficou desapontada ou triste por muito tempo.","Ela percebeu que não era estranho se sentir triste. Seu relacionamento com Amp durou anos; eles estiveram presentes um para o outro em quase todos os momentos. Era natural se sentir assim quando nem sequer conseguiam manter a amizade.","Na verdade, quando ela pensou bem, era melhor não continuar. Todos os seres humanos são egoístas. Mamãe lhe dissera uma vez.","Naquele momento, Ing também estava sendo egoísta. Ela estava feliz com o que sabia ser a verdadeira felicidade. Mesmo que fosse temporária, mesmo que durasse apenas alguns dias, podia facilmente ser chamada de felicidade. Nesse momento, Ing sentia que estava recebendo muita felicidade de Napatr. \"Já é tarde. Vamos tomar banho e ir para a cama?\" \"Você tem que acordar cedo, não é?\" \"Sim.\" \"Vamos tomar banho juntos?\"","Ela viu um olhar de surpresa nos olhos de Napatr antes que ele se transformasse em outra coisa; a outra mulher claramente havia interpretado mal seu convite. \"Só um banho normal, Patr. Você trabalha cedo.\" \"Bem, bem, então vou tomar um banho.\"",". . Napatr havia adormecido. Isso aconteceu depois de terem tomado banho juntos, algo que Ing nunca tinha feito com ninguém além da mãe e da mamãe, e isso também já fazia muito tempo. O olhar brilhante de Napatr fez Ing desviar o olhar, permanecendo de costas para ela o tempo todo. Ela havia percebido algo nos olhos da mulher alta, mas, por causa do trabalho, não haviam deixado as coisas irem além, como de costume. Ela não entendia por que eles pareciam incapazes de resistir um ao outro sequer uma vez. Era como se houvesse uma atração magnética constante; apenas com o olhar, eles sentiam a conexão entre si instantaneamente. Além disso, a química sexual entre eles era incrivelmente compatível. Ing deitou-se perto do dono da casa, que havia adormecido há pouco tempo. Ela estudou o rosto impecável e encantador, observando os olhos agora cerrados. Ela se lembrava bem de que aqueles olhos sempre lhe transmitiam apenas bondade.","Ela não sabia por que Napatr era tão bom para ela. O relacionamento físico entre eles havia progredido tanto que ela não sabia como definir adequadamente o vínculo que os unia. Se ela chamava isso de \"amigos com benefícios\", era porque sentia que a conexão entre eles era mais profunda do que isso.","Se ela chamava aquilo de \"amigas\", a outra mulher parecia mais velha do que ela.","Se ela chamasse de 'irmãs', nenhuma irmã jamais agiria uma com a outra da maneira como elas agiram. \"Durma, minha garotinha.\"","A voz suave da pessoa que Ing pensava estar dormindo sussurrou bem perto de seu ouvido. Então, Napatr rapidamente a puxou para um abraço, assustando Ing tanto que ela teve que levantar os braços para criar um pequeno espaço entre eles. \"Pensei que você estivesse dormindo, Patr.\" \"Eu era.\"","\"Então por que você está acordado?\" \"Tem uma garota linda olhando para o meu rosto. Bom, vamos dormir. Estou cansado.\" Ing ficou paralisada em seus braços. Tentou levantar a cabeça para olhar o rosto de Napatr, mas a outra mulher pressionou sua cabeça contra seu pescoço e apertou o abraço com tanta força que ela não conseguiu se mover. \"Ei, Patr. Você está de ressaca?\" \"...\"","\"Você me elogiou.\" \"Você é linda, então preciso te elogiar. Aliás, eu sempre te elogiei. Boa noite, Ing.\"","Ing só conseguia ficar imóvel, com o rosto corando contra o peito de Napatr. Ela se lembrou agora de que Napatr a chamava de linda desde que começaram a conversar pelo aplicativo. Quando se conheceram, Napatr a elogiou com seus olhos brilhantes.","No resort, ela também a elogiou. Mas ela não sabia por que dessa vez se sentia tão tímida.","Será que foi por causa do seu abraço caloroso, ou o quê? Ela realmente queria perguntar, mas Napatr adormeceu de novo tão rápido. Se não fosse pelo fato de a outra mulher ter que acordar cedo para trabalhar, com certeza não teria se deixado ficar ali sozinha, pensando daquele jeito. . . 'Já saí para trabalhar. Ligo para você quando estiver livre.'","Ing sorriu ao ver um post-it amarelo brilhante com uma caligrafia quase ilegível. O dono da casa tinha saído para trabalhar em algum horário desconhecido, deixando o bilhete colado ao lado do elegante relógio digital na mesa de cabeceira.","Ela sorriu radiante e afundou o rosto em um travesseiro macio. Ing estava em um quarto limpo e branco; os móveis, as cortinas e todos os objetos de decoração eram brancos, fazendo-a se sentir relaxada e à vontade. Parecia mais um refúgio de férias do que dormir na casa de alguém.","Ela se virou de costas e viu um pequeno porta-retratos na mesa de cabeceira oposta.","Havia uma foto do dono da casa que tinha fugido para trabalhar. Ing prosseguiu e pegou a foto. A pessoa na foto tinha apenas um leve sorriso adornando aqueles belos lábios, os mesmos lábios que haviam coberto seu corpo de beijos durante toda a noite. Só de pensar nisso, seu rosto ficou vermelho. Ela deu um leve toque na cabeça da pessoa através do vidro com a ponta do dedo, em tom de brincadeira.","\"Como você consegue parecer tão tranquila agora, mas na cama... hmph!\"","Ela resmungou baixinho antes de puxar o cobertor macio sobre o rosto, tomada por uma timidez repentina, apesar de estar sozinha. Na noite passada, Napatr a tocou com tanta ternura, ainda mais doce e calorosa do que o habitual. Parecia que ela estava sendo consolada por meio de ações, e não de palavras. Era mais uma vez que ela acordava sozinha, mas parecia um mundo completamente diferente da semana anterior, quando haviam dormido juntos. Naquela época, ela sentira um vazio inexplicável no peito, como se tivesse perdido algo. Mas agora, não era nada assim. Ela se sentia realizada e completamente em paz.","Ela se perguntou se deveria chamar Napatr de \"habilidosa\" por ser capaz de transformá-la tanto. Já fazia cerca de um mês desde que Napatr se apresentou pela primeira vez. Muitas coisas aconteceram para que elas se conhecessem melhor. Mesmo tendo ficado separadas por uma semana, Ing agora sentia que a outra mulher não desapareceria novamente, assim como havia pedido na noite anterior. Napatr era tão gentil e atencioso que isso a surpreendeu. Antes, Ing havia nutrido o pensamento cínico de que talvez fosse apenas porque eles haviam acabado de compartilhar uma conexão íntima, ou porque Napatr queria manter seu status de parceiros sexuais. E, no entanto, mesmo quando nada de físico aconteceu, Ing ainda recebeu o mesmo cuidado e carinho. Isso a deixou se perguntando exatamente por que a outra mulher agiu daquela maneira. \"Talvez ela goste de mim simplesmente porque sou mais novo.\" Ing sussurrou para si mesma no quarto branco do proprietário. Ela suspirou antes de se sentar. Olhou em volta do amplo cômodo; esta casa isolada de Napatr tinha apenas um quarto.",". \"Minha casa só tem um quarto.\"","\"Eu vejo...\" \"Você tem que dormir comigo de novo.\" \"Você está agindo como se nunca tivéssemos dormido juntos antes.\" \"Receio que você se sinta desconfortável.\" \"Você está com medo de que eu fique desconfortável enquanto você está literalmente desabotoando meu sutiã, Patr?\"",". Astuta, indulgente consigo mesma, gentil e bondosa, às vezes como uma criança grande e travessa que não parava de implicar com ela. Ing piscou e soltou um leve suspiro ao pensar na dona da casa, que a havia abraçado a noite toda. Ela saiu da cama, sem se esquecer de arrumar o colchão largo que haviam compartilhado, o mesmo onde as coisas tinham chegado a um ponto bastante crítico. A camisa branca que ela usava como pijama chegava um pouco abaixo dos quadris quando ela se levantou, mostrando toda a sua altura.","De repente, o olhar brilhante de Napatr passou pela mente de Ing, fazendo-a morder o lábio inconscientemente. A outra mulher certamente a estaria olhando com aqueles olhos \"maldosos\" como na noite passada, se estivesse ali naquele momento. \"Que travesso.\" Ela repreendeu em voz baixa, embora a pessoa a quem repreendia não estivesse presente.","Ela não se esqueceu de pegar o celular, lembrando-se do bilhete rabiscado que dizia que Napatr ligaria. Ela ficou um pouco surpresa consigo mesma. Normalmente, ela checava o celular assim que acordava, percorrendo conversas e redes sociais, demorando-se demais no perfil de uma pessoa. Mas depois de conhecer Napatr, ela percebeu que não estava mais apegada ao celular. A outra mulher também não. Eles conversavam e davam mais atenção um ao outro do que às redes sociais que utilizavam.","A porta do quarto fechou-se suavemente atrás de Ing quando ela saiu. Seu olhar percorreu a espaçosa casa térrea, suas sobrancelhas franzindo-se ligeiramente.","Será que Napatr gostava tanto assim de branco?","A casa, os móveis, até mesmo a decoração, tudo era branco. E, no entanto, combinava perfeitamente com o dono, refletindo também a personalidade de Napatr. Suas pernas esbeltas a levaram pela área da cozinha sem muita dificuldade. Ela empurrou uma porta que supôs dar para o quintal. Uma piscina e uma academia com paredes de vidro foram as primeiras coisas que ela viu. Havia um pequeno jardim com uma árvore familiar de flores brancas, do mesmo tipo que as do seu resort: Frangipani. Ing sorriu e se recostou em uma espreguiçadeira à beira da piscina. A brisa fresca e suave lhe proporcionava uma estranha sensação de paz. Mesmo com o sol forte do final da manhã, ela se sentia revigorada. Talvez fosse a atmosfera encantadora da casa de Napatr, ou talvez fossem as boas histórias e os sentimentos que lentamente cresciam entre eles.","O telefone que estava sobre sua barriga vibrou, sinalizando uma chamada recebida. Ing viu um número desconhecido e franziu a testa. Verificando o horário, eram 9h30 da manhã. Um comentário bem-humorado do dono da casa passou pela sua mente. 'Talvez seja o número do entregador.' . Alguém a havia provocado dessa forma quando ela estava atordoada naquele dia. Mas agora, Ing sabia que não era o número de qualquer pessoa, e certamente não era o do entregador. Era o número do proprietário da casa que ela ocupava sozinha naquele momento.","Seu dedo fino deslizou o botão verde para a direita antes que ela levasse o telefone ao ouvido e atendesse com uma voz doce. . \"Olá?\" Você está acordado? Você está com fome? \"Como você conseguiu meu número?\" . Ing perguntou, lembrando-se de que ainda não tinham tido a oportunidade de trocar números de telefone ou outras informações de contato. Ela estava curiosa desde que viu o bilhete, mas tudo o que podia fazer era esperar.","A espera por Napatr não lhe pareceu um beco sem saída, como frequentemente acontecia com aquela mulher; ela não se sentiu mal com isso de forma alguma.",". [Eu pedi isso ao Wan.] Ao ouvir a resposta, Ing só conseguiu revirar os olhos. Passamos a noite toda juntos... \"Por que você simplesmente não me perguntou?\"","[Você estava dormindo. Então, está com fome? Tem comida fresca na cozinha, mas você vai ter que prepará-la. Isso será muito cansativo? Minha filhinha sabe cozinhar?]","\"Patr... Eu não sou tão infantil assim. Você já deveria saber disso.\"","Sua resposta sugestiva provocou imediatamente uma risada baixa e suave do outro lado da linha. Napatr era mesmo muito travesso. [Então eu te busco para almoçar ao meio-dia. Estou livre até às 14h.] \"Hum. Boa sorte no trabalho.\" [Sinta-se em casa, Eng.] \"Obrigado, Patr.\" . A ligação caiu, mas um sorriso permaneceu estampado em seus lábios. Ing sentiu que as coisas entre eles haviam mudado significativamente. A maneira como se tratavam e a atenção que ela recebia pareciam ter aumentado, juntamente com uma certa atmosfera \"bizarra\" entre eles.","Ela não queria se precipitar nem pensar muito sobre a situação deles naquele momento.","A felicidade que ela sentia naquele momento a tornou egoísta. Ela queria se apoderar dela.","Sem fazer mais perguntas. . sunyan"],"wordCount":3206},{"title":"08. Não querer um novo irmão ou irmã","paragraphs":["Napatr sorriu depois de desligar o telefone com Ing, que estava hospedada em sua casa até que ela pudesse buscá-la para o almoço. Ela girou o telefone na mão de forma brincalhona, seu leve sorriso se alargando em um largo sorriso. Ela se perguntava como Ing conseguia lhe trazer tanta felicidade e fazê-la sorrir tanto, apesar de se conhecerem há tão pouco tempo. \"Está tendo um bom dia, doutor?\" Napatr girou a cadeira na direção da voz. Ela estava de costas para a parede, sorrindo e rindo baixinho para si mesma. Quando viu quem era, assentiu com a cabeça, sem fazer nenhum esforço para esconder seu humor. \"Espero que Mathura continue assim.\" Mathura era uma linda enfermeira que trabalhava com ela desde que se tornou residente no segundo hospital da família. Mais importante ainda, a enfermeira era uma das amigas de Ing; Napatr tinha visto Mathura no mesmo elevador que Ing no dia em que se conheceram no hotel.","\"Apenas 'Mind' está ótimo.\"","\"Certo, Mind.\" \"Você ainda mantém contato com Ing?\" Mind perguntou. Ela se lembrou de ter visto aquele médico calmo e introvertido saindo com sua melhor amiga no início do mês passado. Ela ficou bastante surpresa e chocada ao descobrir que era o Dr. Napatr.","Mind estava preocupada, não com a amiga, porque sabia que Ing tinha outra pessoa no coração, mas sim com o médico alto sentado à sua frente. Ela temia que sua melhor amiga tivesse lançado um feitiço tão poderoso que o único herdeiro do hospital se apaixonaria perdidamente, sem saída, para acabar magoado. Mas, ao ver Napatr assim, essas preocupações desapareceram. Hoje, a Dra. Napatr estava rindo e sorrindo sozinha, um contraste total com a forma como estava na semana passada. \"Bem... acabei de ligar para ela.\" \"Vocês dois estão namorando?\"","\"N-não. Quer dizer, nós nos encontramos por acaso no bar da mãe dela ontem à noite.\"","Mind ergueu uma sobrancelha, estudando a Dra. Napatr com um olhar curioso. Quando as bochechas da alta médica coraram intensamente, ela não conseguiu conter o riso. Normalmente, Napatr raramente demonstrava qualquer emoção além da indiferença, exceto pelo lado gentil e amável que reservava para seus pacientes. Ver esse novo lado foi incrivelmente cativante. \"Ela é minha amiga, e você é o médico com quem eu trabalho.\" \".....\" \"Mas eu quero lhe dizer uma coisa, doutor.\"","\"O-o que é isso?\" \"Ing tem alguém em seu coração.\" \"Ah... eu já sei disso.\" Mind ficou atônita pela segunda vez naquela manhã. Sua melhor amiga realmente havia revelado algo tão pessoal ao Dr. Napatr, uma pessoa com quem ela supostamente só tinha um relacionamento casual?","Mind se lembrou do dia em que discutiram isso; Ing havia lhe dito explicitamente que não continuaria o relacionamento com o médico. \"Você também usa esse aplicativo?\" Napatr perguntou, recostando-se na cadeira enquanto a Enfermeira Mind se sentava em frente à sua mesa.","Ela se sentia estranhamente à vontade conversando com Mind, provavelmente porque sabia que Mind e Ing eram amigas. Ela queria conhecê-la melhor e se aproximar dela.","\"Eu também uso. A Ing me obrigou a jogar. Mas naquele dia no hotel, era um ex, não alguém do aplicativo.\" \"Um ex?\"","\"Sim. Vou voltar ao trabalho agora, doutor.\" \"...\"","\"Ah, e a Ing não usou esse aplicativo por muito tempo. Você provavelmente foi a primeira pessoa a dar match com meu amigo. Tchau!\" Napatr ficou sentada, sorrindo, observando a figura esguia de Mind desaparecer do escritório. Ela soltou um longo suspiro, balançando a cabeça e rindo baixinho da sequência de eventos que se desenrolaram neste mês.","Tinha sido um mês repleto de histórias. Sua trajetória de vida sempre fora uma linha reta e constante, mas desde que conheceu certa pessoa, sua vida se tornou bastante colorida.","Ela pegou o celular e salvou o número de Ing. De fato, ela havia pedido o número a Wan, exatamente como havia dito à mulher baixinha, porque não queria acordá-la naquela manhã.","Além disso, no fundo, ela tinha medo de não conseguir o número se perguntasse diretamente a Ing. Ela temia ser rejeitada novamente com aquelas palavras ríspidas. Mas, no fim das contas, Napatr estava apenas pensando demais.","Ing era muito mais gentil, amável e doce do que ela havia imaginado. . . Ao ouvir o portão da frente abrir e o carro de Napatr entrar na garagem, Ing lançou um olhar para o elegante relógio perto da grande TV. A mulher era incrivelmente pontual, uma característica que Ing admirava tanto que não conseguiu conter o sorriso.","Pouco depois, a porta da frente se abriu, acompanhada pela voz suave da pessoa que ela esperava. \"Por que você está vestida assim?\" Napatr perguntou à mulher franzina sentada de pernas cruzadas no grande sofá bege no meio da casa. Na mão delicada de Ing havia um controle remoto preto de TV que contrastava fortemente com sua pele. Ing não respondeu, mas manteve a TV ligada em um canal de notícias e se virou para olhála com um sorriso. Napatr retribuiu o sorriso automaticamente. Como é possível que o sorriso de Ing pareça tão doce e terno hoje? Você está cansado? \"N-não.\" Napatr sentiu uma sensação incomum de plenitude ao chegar em casa e encontrar alguém à sua espera daquela forma, especialmente alguém que perguntava com uma voz tão agradável se ela estava cansada. Talvez fosse porque Ing era alguém que a fazia sentir-se bem só de olhar para o seu rosto. Qualquer cansaço podia desaparecer instantaneamente. \"Deveríamos pedir comida aqui? Assim você não precisa ficar indo e voltando de carro.\"","Ing sugeriu, preocupada que Napatr pudesse estar cansada do trabalho e depois ter que dirigir novamente. \"Já reservei um restaurante.\" A resposta de Napatr fez Ing erguer uma sobrancelha em curiosidade, embora tenha assentido em concordância. Percebendo o olhar inquisitivo de Napatr enquanto percorria seu rosto e descia até suas pernas cruzadas, Ing decidiu provocá-la. Ela trocou as pernas de posição intencionalmente, mantendo os olhos fixos no rosto anguloso e belo de Napatr. \"Você é muito travesso.\" Ing repreendeu-a em tom de brincadeira porque Napatr não parava de olhar para as pernas dela.","Ao ver o rosto da outra mulher ficar vermelho como um tomate, ela caiu na gargalhada. Napatr finalmente se aproximou e sentou-se a um braço de distância, o que só fez Ing rir ainda mais. Napatr não sabia como se defender. Seus olhos a haviam traído, levando àquela repreensão zombeteira. Ela esfregou o rosto com a mão antes de olhar para a mulher pequena novamente. \"Você já viu meu sutiã de silicone?\" \"Huh?\" \"Foi você quem o tirou ontem à noite.\" \"Ah! Espere um segundo.\"","\"Não tive coragem de abrir seu armário, então fiquei esperando o dono da casa vestida assim.\" Ing explicou. Ela se levantou e seguiu a dona da casa de perto até uma prateleira perto da porta
