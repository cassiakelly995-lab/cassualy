 do quarto. Lá, o sutiã problemático que ela não conseguia encontrar estava nas mãos de Napatr. \"Este?\"","\"C-como isso foi parar aqui?\" \"Quer que eu explique?\" \"N-não, isso não é necessário!\"","Porque agora ela se lembrava exatamente de como seu sutiã tinha ido parar naquela prateleira. \"Não me deixe cair, tá bom?\" \"Eu nunca te machuquei.\" \"Ah!\" Seu corpo foi erguido, obrigando-a a entrelaçar as pernas na cintura da mulher alta. Ela sentiu uma língua quente e úmida percorrer seu peito, seguida por lábios macios distribuindo beijos por toda parte. \"Vou tirar isso, mas...\" \"Puxe-o.\" \"Não dói, né?\" \"Depressa... mm.\" Acompanhando o calor crescente, Napatr tirou o sutiã de silicone ao entrar no amplo quarto do outro lado da casa. Imediatamente, seus mamilos foram reivindicados.","Era uma mistura de intenso prazer e medo de cair, mas ela não tinha tempo para sentir mais nada por causa da língua que estava girando e sugando seu peito naquele instante.","Napatr sorriu, com o olhar fixo no belo e doce rosto de Ing, sem desviar o olhar. As bochechas da pequena mulher estavam coradas num tom carmesim profundo e adorável, o que levou Napatr a acariciá-las de forma lúdica com as costas da mão.","\"Suas bochechas estão tão vermelhas.\"","\"Não me provoque!\" \"Minha casa é como a sua. Não se preocupe. Você pode fazer o que quiser.\" \"Você diz isso agora, mas vai se arrepender se eu decidir te roubar completamente.\" \"Você não faria isso.\" Hum! Ing soltou um som suave na garganta. Napatr a conhecia muito bem, quase irritantemente. Mesmo assim, suas pernas esguias rapidamente acompanharam os passos largos da mulher mais alta. Sua mão envolveu o braço de Napatr. Hoje, Napatr vestia uma camisa de mangas compridas de cor clara combinada com calças bege, e estava incrivelmente atraente. Aliás, ela parecia tão elegante e madura que foi uma mudança refrescante. Napatr olhou para a mulher pequena que caminhava graciosamente ao seu lado, agarrada ao seu braço. Ela sorriu radiante, soltando uma risadinha ao ver a cena. Ing ainda vestia um roupão um tanto folgado, e Napatr sabia perfeitamente que ela não usava nada por baixo. Vê-la agir como uma criancinha doce tornou impossível para Napatr esconder o sorriso. A mão pequena e delicada que segurava seu braço irradiava uma sensação calorosa e adorável que viajava diretamente ao coração de Napatr. Ela apreciava esses toques, desejando guardar essa sensação de plenitude pelo maior tempo possível. \"Você deve conseguir vestir esta. E esta camisa também.\" Ing aceitou uma saia cinza-clara e uma camisa xadrez vermelha de mangas compridas da Napatr com um olhar de confusão e curiosidade. Ela examinou o cabideiro no grande closet enquanto Napatr a guiava pelo vestiário, que era separado do quarto por uma divisória. Ela notou um vestido curto roxo pendurado perto da roupa que Napatr havia escolhido.","\"Esta é da sua ex-namorada?\" A pergunta escapou-lhe mais rápido do que os pensamentos. As roupas que ela segurava e as que estavam no armário não eram nada do estilo de Napatr. Desde que conhecera a mulher alta, ela só a vira usando camisas e roupas em tons neutros e lisos. Além disso, Napatr usava calças com muito mais frequência do que saias.","\"Você está com ciúmes? Eu posso até usar a camisa do seu amigo, sabia?\" \"Você ainda a ama? É por isso que você guardou as roupas dela?\" \"E você já parou de amá-la?\" \"Ei, Patr! Você nunca me responde!\" Ing lançou-lhe um olhar irritado sem tentar disfarçar, e depois beliscou levemente a pele esguia do abdômen dela, sem exagerar, por pura irritação.","\"Então me responda primeiro.\" \"Você ainda não me respondeu, então eu não vou te responder.\" O semblante carrancudo de Ing fez Napatr cair na gargalhada antes de passar o braço em volta da cintura da mulher franzina e puxá-la para perto. Ela envolveu o pequeno corpo de Ing com um único braço. Quanto mais Ing usava a mão livre para empurrar o ombro de Napatr, mais Napatr se divertia.","\"Você não vai me ouvir?\" \"Ouvir o quê? Você está enrolando. Não quero saber mais nada!\"","Ing empurrou o ombro dela e tentou se desvencilhar do abraço, mas foi inútil. Ela sabia que Napatr era forte. Afinal, na noite anterior, ela tinha","Carregaram-na até o quarto de uma maneira bastante constrangedora, percorrendo uma distância considerável.","Ela finalmente cedeu e ficou parada, mas se recusou a encarar a pessoa que a olhava com um olhar tão peculiar. Aquele sorriso de Napatr fazia seu coração disparar.","\"Elas pertencem à minha mãe. Nunca trouxe uma namorada para casa antes.\" Então por que você me trouxe? Ing ficou curiosa, mas não perguntou. Ela encarou o rosto de Napatr enquanto ele se inclinava para mais perto, buscando a verdade. Aqueles olhos penetrantes não continham nada além de uma estranha faísca cintilante, obrigando Ing a desviar o olhar.","A ponte do nariz de Napatr aproximou-se até roçar a ponta do seu próprio, fazendo Ing franzir os lábios. Seu coração batia tão forte que ela precisou erguer as roupas da mãe de Napatr como uma barreira entre elas.","\"Vamos nos atrasar, Patr.\" \"Estou aguardando sua resposta.\" \"Não estou com ciúmes. Só não quero confusão.\" Se realmente pertencesse ao ex de Napatr, ela provavelmente sentiria um estranho desconforto no peito, algo que não queria admitir. Ela não queria se meter com as coisas de ninguém. Se alguém guardasse as roupas de um ex, geralmente significava que ainda se importava. Mas não era o que ela temia. \"Eu não amo mais meu ex.\"","\"O quê?\" \"Estou respondendo à sua pergunta.\" Ing mordeu o lábio e olhou novamente para a mulher mais alta. A mão que estava pressionando o ombro forte moveu-se para envolver o de Napatr.","pescoço, puxando-a um pouco mais para perto. Ver a expressão de suave choque e surpresa nos olhos de Napatr fez com que ela apreciasse ainda mais o momento. Eles já haviam estado próximos inúmeras vezes. Os aromas de seus perfumes e de suas peles naturais se misturavam, fazendo Ing sorrir intencionalmente para Napatr, que, como ela podia ver, estava naquele momento... Completamente perdido.","\"Eu também não a amo mais\", disse Ing. Ao terminar a frase, ela depositou um beijo suave e demorado nos lábios macios e saudáveis de Napatr. Em seguida, desvencilhou-se do abraço com delicadeza e correu para o banheiro, sem se esquecer de trancar a porta atrás de si. Napatr ficou ali parada, imóvel no mesmo lugar, depois que a mulher franzina pareceu se vingar dela, através do olhar, das ações e até mesmo das palavras.","Ela balançou a cabeça levemente antes de soltar outra risada. Mesmo tendo já ultrapassado tantos limites, estado tão próximos de maneiras que iam muito além, Napatr nunca se acostumara com isso. \"Eu também não a amo mais.\" E naquele instante, Napatr percebeu que estava sendo um pouco egoísta. Ela não conseguia explicar a felicidade que a invadia, o coração acelerado ao ouvir aquela voz doce responder à pergunta que havia deixado no ar momentos antes.","Aquilo a incomodava a semana toda. Ela estava com medo desde que percebeu o quanto gostava de Ing. Medo de que Ing não conseguisse se desapegar da pessoa que amava. Medo de estar se apaixonando por alguém que não tinha mais espaço no coração.","Mas Napatr não queria apressar as coisas. Ela estava feliz por estar com Ing assim, nesse espaço indefinido , até o dia em que a própria Ing se surpreendeu com a mudança dentro de si.",". .","Dez minutos depois, a mulher de baixa estatura saiu do banheiro com sua nova roupa.","Napatr guardou o celular, que estava cheio de mensagens de seus amigos médicos de outros hospitais, no bolso. Ela dedicou toda a sua atenção à Engenheira. \"Sua mãe é tão pequena.\"","\"Hum, sim, a mamãe é um pouco menor que você.\" \"Então seu pai deve ser alto. Porque você é alta.\" Napatr balançou a cabeça e pegou a mão delicada de Ing, conduzindo-a até sua mesa. Pegou um pequeno porta-retratos com uma foto de família para apresentar Ing às duas pessoas que ela mais amava. \"Este é meu pai. Ela é bonita?\" Ing ficou boquiaberta ao ver a pessoa na foto. Ela tinha uma semelhança impressionante com Napatr, embora Napatr também tivesse herdado certa delicadeza e beleza da mãe. \"Você tem uma 'mamãe' como eu?\" \"Sim. Mas eu a chamo de 'Mamãe'. Mamãe Nine e Mamãe Pleng.\" Você é filho único? \"Sim. Mas definitivamente não quero mais irmãos.\" \"O que você quer dizer com isso?\" \"Nada. Vamos comer. Está na hora.\" \"Ah! Você está com medo de que alguém roube todo o amor? Que infantilidade, Patr!\"","Ing riu, estendendo a mão para coçar o queixo da outra de forma brincalhona. Ela também era filha única e sempre quisera ter um irmão ou irmã para brincar. Mas sua família havia parado de ter filhos e deixado o \"fardo\" de ter mais crianças para a Tia Ink e sua mãe.","Embora ela desejasse ter um irmão ou irmã, entendia por que Napatr não o queria. Ela se sentiu à vontade o suficiente para provocar a mulher alta, que ria junto com ela.","\"Você sente falta da sua mãe, me vendo vestida assim com as roupas dela?\" \"Vocês não se parecem.\" Napatr observou a mulher franzina enquanto ela dava um passo para trás, permitindo que Napatr a visse por completo. Ela sabia que as roupas de sua mãe serviriam perfeitamente em Ing, e não estava enganada. A única diferença era que, quando a mãe usava as roupas, ela ficava linda e visivelmente mais jovem, a ponto de a mãe ficar mal-humorada e rondar a filha sempre que ela se arrumava.","Mas com Ing usando a mesma roupa... ela estava linda, sem dúvida. Napatr não podia negar. Ing era linda aos seus olhos desde a primeira vez que viu sua foto de perfil no aplicativo.","Mas agora, Ing exalava um charme que era ao mesmo tempo sedutor e doce, uma mistura indefinível de fofo e sexy. \"Claro que sim. Sua mãe é linda.\" \"Você também é linda.\" \"Me elogiando de novo?\" \"Porque é a verdade.\" Ing se virou e caminhou à frente para esconder o rosto. Suas bochechas ardiam incontrolavelmente. Por algum motivo, ela simplesmente não conseguia se acostumar com os elogios de Napatr.","\"Eng.\" \"Sim?\" Ing respondeu, estendendo a mão para pegar a de Napatr, que já a esperava. Napatr apertou-a suavemente. \"Eu realmente não quero mais irmãos.\" \"Eu já sei disso.\" \"Na verdade, você não sabe.\" \"Ei, Patr!\" \"Estou falando sério.\"","\"...\" \"Você não sabe.\" Napatr sabia que Ing não havia entendido o duplo sentido que ela tentava transmitir. Ao ver o olhar doce e confuso de Ing, Napatr não resistiu e se inclinou para lhe dar um beijo suave na testa. Ela sorriu ao ver as bochechas de Ing corarem antes de ser puxada em direção ao carro para o almoço.","Por ora, ela preferiu acreditar que Ing estava apenas tímida. A mulher baixinha estava irresistivelmente adorável assim. . sunyan"],"wordCount":2960},{"title":"09. Alguém","paragraphs":["Ing olhou para a mulher alta que caminhava ao seu lado, vestida com um terno que combinava com suas calças. Ela entrelaçou seu braço no de Napatr enquanto absorvia a atmosfera do restaurante. Ela não conseguia deixar de se perguntar por que tudo parecia tão formal. \"Você não vai fazer nada de estranho, vai?\" \"Hum? O que estou fazendo?\" \"Não sei. É só um palpite.\"","Ing sussurrou enquanto eram conduzidos a uma área de jantar bastante reservada. Havia apenas algumas mesas lá dentro, e o ambiente era tão romântico que ela instintivamente mordeu o lábio. O ar se enchia com um leve aroma de comida misturado a perfume, acompanhado por uma música suave que vinha de alto-falantes escondidos. \"É só uma refeição. Não complique as coisas.\" \"É tão luxuoso.\"","\"Bem, eu realmente queria ter uma refeição decente com você, pelo menos uma vez.\" Desde que se conheceram, Napatr percebeu que nunca havia levado Ing a um restaurante elegante. Geralmente, eles simplesmente escolhiam lugares próximos por conveniência. Pensando bem, eles só haviam compartilhado uma refeição séria perto do apartamento de Ing, sem contar a que estava prestes a acontecer. \"Você não precisa puxar a cadeira para mim.\"","Napatr parou quando chegaram à mesa reservada. Ela olhou para a mulher franzina, intrigada por como ela havia previsto o gesto. \"Como você sabia?\" \"Seus olhos me disseram.\"","\"Suponho que eu deva procurar um artigo científico sobre se os olhos realmente conseguem emitir sons.\" \"Você está agindo como um médico de novo.\" \"Sou um médico.\"","\"Você? Sério?\" \"Sim. Minha mãe também é professora.\"","\"Eu acredito nisso. Ela parece gentil e bonita.\" Ing pensou na mãe de Napatr na foto que vira meia hora antes. Mesmo em uma foto estática, ambos os pais pareciam gentis. Ela acreditava piamente que a mãe de Napatr teria uma profissão dedicada à educação. Napatr riu e inclinou levemente a cabeça. Ela não discutiu com a mulher franzina que ainda se recusava a acreditar no que ela fazia para viver. Ela se perguntou que tipo de aura emanava que deixava Ing tão cética, mesmo sendo a segunda vez que confirmava sua profissão.","\"Por que você não acredita em mim?\"","\"Não sei. Você parece ter muito mais tempo livre do que os médicos que eu conheci.\"","\"O tempo pode ser gerenciado... para as coisas que nos interessam.\" \"Você está dizendo que está interessado em mim?\"","O som da música e os aplausos vindos de outro canto do restaurante imediatamente desviaram a atenção deles um do outro. Napatr soltou um suspiro de alívio; ela não tinha preparado uma resposta e não sabia como responder a uma pergunta tão direta. Ela olhou para Ing, que sorria na outra mesa, e não conseguiu evitar sorrir também. \"Uma proposta, com certeza.\"","Ing disse, desviando o olhar do casal que se beijava para sua companheira de mesa. Napatr assentiu levemente antes de lançar a Ing um olhar significativo e brincalhão.","\"Você quer se casar?\" \"Com quem eu me casaria, afinal?\" Ing respondeu com uma risada à pergunta estranha. Napatr parecia bastante curiosa. Com quem mais ela se casaria? Seus dias eram passados conversando com a mulher alta sentada bem à sua frente. De repente, Ing baixou o olhar para a elegante vela no centro da mesa, o que tornou a atmosfera entre eles e o ambiente ainda mais romântico.","Ela passava os dias com Napatr e era bom estar com ela. Ing interrompeu imediatamente aquele fluxo de pensamentos, que começava a divagar por um território estranho e fantasioso, embora parecesse mais palpável do que qualquer um de seus devaneios anteriores. Ela franziu os lábios e olhou para Napatr, que já a observava. \"Você ainda não quer se casar?\" \"Ainda não. Prefiro dar um descanso ao meu coração.\"","Ela havia dedicado todo o seu amor e esforço a alguém que só se importava com bens materiais, durante anos, até se esgotar. Ela não queria mais correr atrás de alguém e implorar por amor daquela maneira.","\"...\"","\"Amei de forma unilateral por tanto tempo. Quero me amar antes de amar outra pessoa.\"","\"É verdade. Eu te disse para se amar muito, não disse?\" \"Você também deveria, Patr.\" \"Eu já me amo o suficiente.\" \"Perdão?\"","Antes que Napatr pudesse explicar, a comida que ela havia pedido começou a chegar. Ela havia pedido sem consultar Ing primeiro, mas eram todos pratos que Ing havia mencionado que gostava quando ainda conversavam pelo aplicativo. Apesar de ter passado um mês, incluindo a semana em que não se falaram, Napatr se lembrava. Era um nível de atenção que Ing nunca havia recebido de ninguém, exceto de sua família. O músculo do peito dela deu um salto, e Ing sentiu-se incomodada com as sensações estranhas e persistentes que cresciam dentro dela. Não era que ela não tivesse sentido seu coração acelerar por outras pessoas antes, mas desta vez, parecia que a pessoa à sua frente não estava fingindo. Ela observou o leve sorriso nos lábios de Napatr. Era um sorriso gentil e sincero, que combinava perfeitamente com o olhar dela. Tão suave... tão acolhedor. \"Você gostaria de um pouco de vinho?\" \"Você gostaria de uma bebida?\"","Napatr se virou para perguntar à mulher franzina, que ofereceu um sorriso doce tanto para ela quanto para o garçom.","Ing recusou suavemente, e Napatr fez o mesmo. \"Ainda não, obrigado.\" \"Você tem que voltar ao trabalho. É melhor não beber, não é?\" \"Você está preocupado comigo?\" \"Claro. Vou almoçar com você, não é?\" \"Suponho que sim.\" Ing não respondeu, mas seu coração não parava de bater descompassadamente. Ela se perguntava desde quando havia começado a se importar com essa pessoa mais do que se costuma importar com um mero conhecido. A relação entre eles era completamente estranha, seus gestos, suas expressões e a profunda conexão física. Era tão peculiar que ela não sabia como descrevê-la.","Mas Ing teve que admitir que não se importava com isso.","\"Quer que eu te deixe em algum lugar?\" Napatr perguntou. Observar Ing comer era um espetáculo agradável; ela claramente frequentava muitos círculos sociais, pois até mesmo a maneira como lidava com a refeição era encantadora. \"Como assim? O que você quer dizer?\" \"Você quer voltar e descansar em sua casa?\" \"Podemos simplesmente seguir caminhos separados aqui.\"","Ing não sabia se Napatr ainda a queria por perto, e sentia que já a tinha incomodado o suficiente. Além disso, a mulher alta tinha que se apressar para o trabalho. Dirigir até o apartamento ou voltar para casa só faria com que perdesse mais tempo.","\"Não é que eu não queira estar com você, mas não posso faltar ao trabalho.\"","\"Ainda não disse nada.\" \"Seus olhos estão fazendo barulho.\" \"E sabe o que meus olhos estão dizendo agora?\" Ing encarou o rosto da outra mulher, encontrando aquele olhar brilhante. Mesmo com o coração acelerado e o rosto corado, ela não queria desviar o olhar nem ceder.","Napatr balançou levemente a cabeça com um sorriso. Ela apoiou o cotovelo na mesa, descansando o queixo na palma da mão enquanto observava a mulher pequena lhe lançar um olhar fingidamente ressentido e corado, que era incrivelmente cativante. Ela não sabia dizer se era porque gostava de Ing, mas tudo o que aquela mulher fazia parecia encantador. \"Não me olhe com esses olhos.\" \"Por quê? Você não gosta?\" Ing não respondeu. Ela sabia que estava corando, e era bastante surpreendente que o olhar de Napatr por si só pudesse fazê-la se sentir tão tímida. \"Coma sua comida. Você tem que ir trabalhar.\"","\"Você ainda não me respondeu.\" \"Qual pergunta?\" Napatr hesitou quando Ing usou uma voz ainda mais doce que o normal. O jeito como Ing a olhou com aqueles olhos brilhantes a fez endireitar a postura, sentindo-se repentinamente um pouco perturbada. \"Onde você quer que eu te deixe?\" \"Na verdade, tenho uma reunião com um cliente às sete horas no meu apartamento.\"","Ing encontrou o olhar da mulher alta. Napatr assentiu e continuou a comer casualmente. Ela não interrompeu, mas ouviu atentamente. Até mesmo a maneira como manuseava os itens na mesa, delicada, limpa e composta, era a mesma, tanto em um restaurante chique quanto em uma barraca de rua. Limpo, calmo, educado e atraente. \"É um pouco longe, então prefiro ir sozinha. Não quero te incomodar.\" \"Não sei a que horas terminarei o trabalho hoje.\" Napatr disse. Ela tinha uma cirurgia importante agendada e não sabia quanto tempo levaria. Ela queria deixar Ing lá, como já havia pedido duas vezes, mas entendia que Ing tinha um compromisso importante. \"Você pode pegar um carro na minha casa.\" \"O que?\"","\"A garagem. Eu não a deixei aberta, mas você pode abri-la, é uma porta automática. As chaves estão na garagem. Pegue a que você achar mais confortável.\"","\"Qualquer um deles?\" \"Bem, ainda tenho um tempinho. Vou deixar você escolher um.\" \"Escolher?\" \"Sim.\" . . Ing estava ao lado da alta dona da casa, que a levara de volta para casa em tempo recorde. Ela arqueou uma sobrancelha ao ver Napatr colocar um par de óculos de sol estilosos. O rosto de Napatr já era marcante e bonito, mas com os óculos, ela ficou ainda mais deslumbrante.","\"Qual você quer dirigir?\" \"São todos seus?\" \"Exatamente. Eu mesma comprei. Não pedi para a mamãe nem para a minha mãe.\" \"Eu não estava te acusando de nada.\" Ing riu, olhando para a fileira de carros estacionados na garagem enquanto a porta automática terminava de se abrir. Ela estava atônita, mais uma vez se perguntando o que a outra mulher fazia da vida para ser tão rica.","\"Que tal um Mini? Combina com você. Você também dirige um Mini, não é?\" \"Quem empresta o carro assim tão facilmente? Você nunca ouviu o ditado 'não empreste seu carro para qualquer um'?\"","\"Já ouvi isso. Não se deve emprestar o carro, e não se deve emprestar a esposa.\"","Pela segunda vez naquele dia, Ing ficou boquiaberta. Virou-se para Napatr e tomou a liberdade de tirar os óculos de sol da outra mulher. Napatr pareceu um pouco confusa, pois acabara de proferir aquela frase com uma voz monótona e sem emoção, como se estivesse recitando um poema na escola.","\"O que é?\" \"Quem te ensinou isso?\" \"Me ensinou o quê?\" Napatr estava genuinamente confusa, olhando para Ing, que parecia chocada com suas palavras. \"Já ouvi pessoas no trabalho dizerem isso. E você até deixou sua amiga pegar seu carro emprestado.\" \"Isso foi roubo! Minha mãe está tentando descobrir o que aconteceu.\" \"Nossa, você contou para sua mãe?\"","Napatr provocou, com os olhos fixos na mulher pequena. Ela estendeu a mão para acariciar suavemente os cabelos macios de Ing antes de soltar uma risada. \"Ou devo lhe contar em vez disso?\" \"Eu não sou sua mãe.\" \"Então, o que você deveria ser para mim, Patr?\" \"Ser seu Patr é a melhor coisa que posso ser agora. Ah, mas nunca emprestei minhas coisas para ninguém.\" Ing aceitou as chaves do carro que Napatr lhe entregou, erguendo uma sobrancelha enquanto aguardava o restante da frase. Napatr olhou para o relógio, franziu os lábios e então se virou para esboçar um leve sorriso.","\"O carro ou a esposa?\" \"Ambas. Mas não tenho a segunda. Mesmo se tivesse, não a emprestaria a ninguém.\" \"Ótimo. Continue leal.\" \"Eu sou do tipo que ama de verdade, Ing. Estou indo para o trabalho agora. Dirija com cuidado.\" Eu te ligo quando terminar. Mais uma vez, Ing ficou imóvel, observando as costas de Napatr desaparecerem até ouvir o som do carro saindo da garagem. Só então ela recobrou os sentidos.","O jeito como a outra mulher falava ultimamente estava cheio de significados ocultos, o olhar ligeiramente mudado, a seriedade em suas ações e palavras, e então aquelas palavras agora há pouco. \"Amor de verdade? Por que me dizer isso?\" Ela não queria pensar muito. Não queria ter dúvidas. Deixaria apenas que esses bons sentimentos os envolvessem por enquanto.",". . \"Se tudo estiver correto, você pode assinar o contrato aqui mesmo.\" Ing sorriu ao entregar os documentos de venda do apartamento para a amiga sentada à sua frente. Este era mais um ramo dos negócios da família no qual ela trabalhava desde a formatura. Na verdade, ela ajudava a mãe desde o ensino médio. Agora que estava no comando, percebeu que nada era realmente fácil. Ela admirava a mãe por conseguir administrar tudo sozinha até que a mamãe pediu demissão do emprego para ajudar. Foi aí que os negócios da família realmente cresceram. A partir de um único resort, minha mãe abriu vários outros na região: hotéis, bangalôs e, eventualmente, empreendimentos imobiliários, como o que ela estava gerenciando naquele momento. Ing já havia conhecido muitos tipos de clientes. Ela sabia que o cliente nem sempre tem razão, mas, felizmente, sua cliente de hoje era uma amiga da universidade. Ao ver a assinatura no documento, Ing deu um largo sorriso para sua velha amiga, que agora transferia os fundos pelo celular. Assim que o valor combinado caiu na conta, o trabalho de Ing naquele dia foi oficialmente um sucesso. Foi mais uma boa notícia para somar à sua recente sequência de sorte. \"Obrigada, Cherry.\" \"Obrigada também pelo desconto e por todos os brindes. Se eu soubesse, teria entrado em contato diretamente com você há muito tempo. Você está sempre viajando para o exterior.\" Ing franziu a testa, guardando os documentos em sua pasta antes de olhar para a amiga, que havia se casado no início daquele ano.","\"Estive na Tailândia o tempo todo. Este ano não viajei para nenhum lugar além do norte.\"","Ela não tinha ido a nenhum outro lugar, exceto para verificar o negócio do hotel no qual a mãe havia investido com a tia desde pequena. O hotel estava sendo reformado para um estilo contemporâneo, com Ing ajudando em alguns dos projetos.","\"Espere, sério? Seu querido amigo Amp disse que você foi ao Japão.\"","\"Talvez um Japão imaginário. Só estive na minha casa em Chonburi ou aqui no apartamento.\"","Bem, havia outro lugar, mas ela só tinha ido lá pela primeira vez ontem à noite.","\"Seriamente?\" \"Será que eu pareço ser o tipo de pessoa que gosta tanto de viajar?\" Cherry riu. Ing podia parecer elegante, moderna e em constante transformação, até mesmo sexy e acessível, mas essa não era a sua verdadeira essência. Ing não era uma garota festeira. Além de frequentar seu próprio bar, ela raramente saía de casa. \"Você não mudou nada. Mas sim, esse amplificador...\" \"E quanto a ela?\" \"Você já superou isso? Arranje logo uma nova namorada para que a Mind possa trabalhar em paz.\" \"O que você está falando?\" \"Ela está preocupada com você. Eu vi a Mind semana passada, ela estava com um cara muito bonito. Ela estava solteira há um tempão, e agora você é o único que sobrou, Ing.\"","\"Quanto a mim?\"","\"Ter alguém em quem se apoiar antes de dormir é a melhor coisa do mundo, sabe?\" Cherry já tinha ido embora, mas não sem antes lembrá-la mais uma vez de encontrar um marido para descansar a cabeça antes de dormir. Ing recostou-se no sofá do seu apartamento, encarando o celular, ainda aberto na conversa com Cherry. Na tela estavam os preços da vacina contra o HPV, a versão nonavalente que todas as mulheres eram aconselhadas a tomar. Cherry também a incentivou a fazer um exame interno.","Apesar de Ing insistir que já fazia exames médicos regulares, Cherry não desistiu e enviou-lhe mais detalhes para ler. A vacina era bastante cara. Ing refletiu sobre a desigualdade social. Somente aqueles com dinheiro suficiente podiam realmente ter acesso a essa proteção. Os que não podiam ficavam vulneráveis a doenças graves no futuro.","\"Ter alguém em quem se apoiar antes de dormir é a melhor coisa do mundo, sabe?\" As palavras da amiga ecoaram em sua mente, sobrepondo-se à imagem de alguém em quem ela havia se apoiado durante toda a noite. Ing franziu os lábios. Ela sabia exatamente como era bom se apoiar em alguém, dormir nos braços de alguém. Na verdade, ela nunca tinha namorado ninguém seriamente o suficiente para passar a noite assim.","Com exceção de uma pessoa: Napatr. Napatr ultrapassou todas as barreiras que Ing já havia estabelecido. A mulher alta, silenciosamente, mergulhou em seus pensamentos e sentimentos sem sequer perceber.","O telefone, ainda aberto no chat de Cherry, vibrou. A pessoa que ligou às 20h era justamente aquela em quem ela estava pensando.",". \"Patr.\" [Terminei o trabalho. Onde você está?] \"Por que?\"",". O outro lado da linha ficou em silêncio, fazendo Ing abrir um largo sorriso. Sua mão delicada pegou a almofada ao lado e a abraçou, escutando os sons do outro lado da linha. A única coisa que ela conseguia ouvir era o ritmo suave de seus passos no chão. . [Está com fome?] \"Um pouco.\"","Vamos jantar? Eu te busco. \"Você sequer sabe onde eu estou?\" [Meu carro tem GPS.]","\"Patr!!!\" . Um risinho suave e profundo se seguiu. Ing revirou os olhos, sabendo que Napatr estava brincando. A mulher adorava provocá-la sempre que tinha a oportunidade.","Às vezes ela ficava em silêncio, às vezes apenas sorria, e às vezes era brincalhona assim. Mas Ing nunca se incomodava com isso. Porque Napatr era Napatr, a mulher que fora 'especial' desde o princípio. .","[Ausente.] \"Sim?\" Você vai ficar comigo de novo esta noite? \"Estou no meu apartamento.\"",". Ing desligou o telefone depois de dar aquela pista sobre onde estava, o que serviu como resposta à pergunta se ela voltaria a ficar com a mulher alta. Ela largou o telefone, sem se importar mais com ele. Pegou outra almofada para colocar em cima da que estava no colo, afundou o rosto nelas e riu de pura timidez. Mais uma vez, ela queria estar com Napatr. Se algo íntimo acontecesse ou não, não importava. Ela só queria estar com a mulher que havia desligado o telefone menos de um minuto antes, todos os dias. . sunyan"],"wordCount":2979},{"title":"10. Derrotado","paragraphs":["Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026","Cópia: . . O som da campainha assustou Ing, fazendo-a virar-se em direção à porta. Provavelmente era Napatr, que havia desligado o telefone com ela uma hora antes.","Ing não sabia exatamente onde a mulher alta trabalhava, mas imaginava que fosse perto da casa de Napatr, já que normalmente ela levava apenas dez minutos para chegar em casa.","No entanto, o apartamento dela era uma história diferente. Napatr teve que enfrentar o trânsito das 20h por quase uma hora, e já passava das 21h. Ing franziu os lábios antes de caminhar sem pressa em direção à porta da frente. Ela não conseguiu conter o sorriso ao ver o rosto sereno de Napatr na tela do interfone.","Sua mão delicada destrancou a porta e a abriu completamente. A primeira coisa que a atingiu foi o aroma limpo e fresco do mesmo perfume que ambas haviam usado naquela manhã.","Então surgiu o sorriso discreto de sempre, um contraste gritante com a expressão indiferente que ela vira na tela do monitor momentos antes.","Napatr ergueu uma sobrancelha ao observar Ing. Seu leve sorriso se alargou automaticamente quando Ing abriu os braços. Napatr não hesitou em puxar o corpo franzino de Ing para um abraço.","O aroma suave e doce da mulher mais baixa fez com que ela fechasse os olhos em êxtase. O estresse de um longo dia de trabalho se dissipou, fazendo-a soltar um leve suspiro de alívio. Ela se inclinou e depositou um beijo no belo ombro de Ing. Você está cansado? Ing sorriu ao sentir o toque suave em seu ombro, perguntando à mulher alta que estava com o rosto enterrado ali, imóvel. \"Um pouco.\"","Na verdade, Napatr queria dizer que não estava mais cansada. Ver o rosto de Ing, receber um abraço caloroso e sentir seu perfume depois de trabalhar meio dia... foi uma sensação incrível.","Ela finalmente entendeu o que seus colegas médicos casados vinham lhe dizendo há anos: que chegar em casa e encontrar a pessoa amada esperando por ela faz todo o cansaço desaparecer. No início, Napatr não havia entendido, mas agora, ela entendia perfeitamente. Ing se afastou do abraço e conduziu Napatr pelo braço para dentro da casa.","Ela ficou um pouco surpresa com o comportamento deles. Mesmo tendo sido ela quem iniciou a situação e Napatr tendo respondido sem hesitar, ela não podia negar que a sensação era maravilhosa. \"Houve muito trabalho hoje?\" \"Não muito. Sou bastante capaz, sabe?\" \"Você é muito exibido.\" \"E você?\" \"Meu trabalho?\"","Napatr assentiu com a cabeça. Recostou-se no sofá, desviando o olhar apenas para Ing. A mulher alta parecia bastante cansada, mas insistia que estava apenas \"um pouco\" cansada. \"Sim. Estava tudo bem?\" \"Eu também sou capaz. Estava tudo bem.\"","Napatr não chamou Ing de exibida em resposta. Ela simplesmente riu baixinho e assentiu em concordância. Ing era realmente capaz. \"Não vai discutir?\" \"Alguma vez discuti com você?\"","Ing franziu o nariz antes de se aproximar, sentando-se em silêncio contra a mulher cansada. O longo braço de Napatr a envolveu e puxou Ing para perto de si.","Ing olhou para a mulher alta, que estava concentrada na TV, e se virou para ver o que estava passando. A tela mostrava a atmosfera de um festival Loi Krathong* em um grande shopping center no centro da cidade. Ao ver os olhos penetrantes de Napatr repletos de genuíno interesse, Ing sentiu uma onda de afeto. \"Você gosta disso?\" \"Gosto de passear por festivais. Vamos?\" \"Tem certeza de que está preparado(a) para isso? Talvez seja melhor tomar um banho e ir para a cama.\"","\"Amanhã tenho o turno da noite, então estou livre durante o dia.\" \"É assim que funciona?\"","\"Isso mesmo. Os turnos são rotativos.\"","\"Entendo. Aliás, também estou livre amanhã. Estarei de volta a Chonburi na próxima semana.\"","Ing não sabia por que queria contar para ela. Talvez fosse porque se sentia confortável e à vontade. Ela sabia que, se compartilhasse sua agenda com essa pessoa, ela não a ignoraria.","\"Se eu estiver livre nesse dia, posso ir com você?\" Exatamente como ela pensava. Não foi ignorada. Não foi apenas reconhecida. Napatr realmente pediu para ir com ela. Não era que Ing não gostasse ou se sentisse apertada; pelo contrário, ela se sentia bem sendo cuidada. \"Só se você estiver livre. Por que seu horário de trabalho é tão irregular?\" \"Porque sou médico.\"","\"Sempre se gabando. Estou perguntando a verdade.\" \"Estou respondendo a sério também.\" Napatr riu, sem saber como fazer Ing acreditar nela. Ela não queria discutir mais.","\"Você quer trocar de roupa primeiro?\", perguntou ela, observando os dedos de Ing traçarem de forma lúdica as veias em seu braço, enquanto também dava uma olhada nos shorts curtos de Ing. \"Posso ir assim?\" \"Claro. Como devemos ir? O trânsito vai estar terrível. Devemos chamar um Grab?\"","Napatr franziu a testa, pensando no enorme engarrafamento. Se estivessem em sua casa, ela teria levado Ing em sua motocicleta favorita, seu meio de transporte habitual.","Mas ali, na casa de Ing, olhando para os braços e pulsos finos de Ing, ela se perguntou se aquela mulher franzina conseguiria ao menos se equilibrar em uma bicicleta.","Ing era tão... pequena e delicada. \"Qual a diferença? De qualquer forma, ficaremos presos nessa situação.\"","Ing riu. Quer dirigissem por conta própria ou chamassem um carro, ficariam presos na estrada do mesmo jeito. Ela estava bastante entediada com a capital, e por isso vivia indo e vindo em vez de ficar permanentemente. Ainda assim, ela não podia negar que a cidade tornava seu trabalho conveniente, dada a riqueza dos clientes e os imóveis que ela comprava e vendia. \"GrabBike?\"","\"Não, obrigada. Não quero ser uma 'esposa de aproveitador'.\" \"Então, de quem você é esposa?\" \"Sou solteiro.\" Ing se afastou do braço de Napatr e respondeu claramente. Embora tivesse fingido estar comprometida por anos, amando cegamente uma pessoa egoísta, a verdade era que ela estava solteira.","\"Ah, é? Então você não é minha esposa? Ontem à noite, nós...\" \"Patr!\"","Napatr riu, segurando os pulsos delicados de Ing pouco antes que ela pudesse lhe dar um tapa no ombro.","O belo rosto de Ing estava corado de um vermelho intenso e sua expressão era carrancuda. Seus lábios carnudos estavam cerrados, fazendo com que Napatr se inclinasse para beijá-los. Mas Ing virou o rosto, o que só fez Napatr rir ainda mais. \"É por isso que não acredito que você seja médico. Você é travesso! E um verdadeiro provocador!\"","\"Essas coisas não têm nada a ver uma com a outra\", resmungou Napatr baixinho, ainda rindo.","Ela observou a mulher franzina entrar no quarto batendo os calcanhares, com o rosto ainda vermelho como um pimentão.","Ter a Ing por perto todos os dias era muito bom. Não importava o quão cansada ou estressada ela estivesse do trabalho, só de vê-la, provocá-la e estar perto dela, tudo isso desaparecia. . . \"Pensei que você tivesse dito que íamos chamar um carro?\"","Ing apoiou o cotovelo no apoio de braço central, descansando o queixo na palma da mão enquanto questionava seu motorista particular. Eles discutiram sobre Grab até que Ing precisou fugir para o quarto para acalmar seu coração acelerado. Ela fugiu porque não podia discutir, porque era a verdade. Mesmo que o relacionamento deles fosse confuso e um pouco problemático no momento, Ing não podia negar que, em termos de intimidade física, ela pertencia a alguém. \"Vamos fugir da multidão da cidade e ir para os arredores. Wan me disse que o ambiente lá é ótimo.\" \"Quando você falou com Wan?\" Ing perguntou, rindo e cutucando a bochecha lisa de Napatr. Napatr estava sorrindo tão amplamente quanto ela. \"Enquanto você se arrumava toda.\" \"Humph! Não tente ser um conquistador.\" \"Você não gosta de pessoas que falam bonito?\"","\"Não vou responder.\"","Napatr riu baixinho antes de lançar um olhar para a mulher franzina ao seu lado. Ela não insistiu na discussão, temendo que Ing pudesse realmente lhe dar um tapa desta vez.","O rosto doce de Ing brilhava, tornando-a incrivelmente cativante. \"Você vai soltar um krathong?\" Ing perguntou. Como a conhecia há algum tempo, sabia que Napatr não gostava de multidões. No entanto, paradoxalmente, a mulher a convidara para um passeio. \"Não. Isso destrói o ecossistema. As tartarugas vão morrer.\" Ing ficou bastante surpreso. Napatr, que geralmente parecia indiferente aos assuntos do mundo, estava realmente se importando com isso? Um sentimento caloroso começou a crescer no coração de Ing, acompanhado por um sorriso que a outra mulher não viu. \"Uma vez fui ao norte com minha família durante o Loi Krathong. Eles soltaram muitas lanternas.\" \"Você queria lançar um?\" \"Não. É perigoso. Eles acreditam que é uma forma de afastar o azar.\" Ing não entendia. Como alguém poderia afastar o azar causando sofrimento aos outros? Todos os anos havia notícias de lanternas caindo em telhados, causando incêndios e até interferindo em voos. \"Além disso, durante os festivais, já vi crianças brincando com fogos de artifício e bombinhas. Algumas perdem as mãos por não terem cuidado. Mesmo assim, as pessoas chamam isso de 'tradição', algo que acontece só de vez em quando.\" \"Mas podemos preservar a tradição sem incomodar ninguém, certo?\" \"Se todos pensassem como você, Ing, seria maravilhoso.\" Napatr sorriu amplamente. Ela estava verdadeiramente impressionada com a atitude de Ing.","Você pode gostar de alguém pela aparência, personalidade, palavras ou até mesmo pelo desempenho na cama. Mas Ing era boa em todos os aspectos, especialmente em sua mentalidade. Napatr gostava cada vez mais dela. Ela sentia que estava afundando cada vez mais no abismo do charme de Ing, sem saída. Mesmo que a mulher de estatura baixa dissesse que ainda não queria ninguém... mesmo que dissesse que primeiro queria se amar, tudo bem. Napatr foi paciente. Ela podia esperar. Independentemente de levar um ano ou menos, ela estava decidida a esperar. Em vez de desaparecer, espere, exatamente como Ing havia pedido. Aguarde, acompanhando de perto o cotidiano de Ing, até que a própria mulher diga que não é desejada. Ou até que Ing encontre alguém de quem realmente goste e ame. Mesmo que não fosse ela, tudo bem. Napatr compreendeu que o coração humano não podia ser forçado. Afinal, ela nem sequer conseguia parar o próprio coração. Era tudo muito complicado. \"O que houve?\" perguntou Ing. Ela vinha observando Napatr e notou que o rosto da mulher alta se tornara preocupado. Num instante, ela tinha um sorriso largo, e no seguinte, seus lábios estavam comprimidos numa expressão fina. Seus olhos, que normalmente fitavam Ing com tanta ternura e delicadeza, agora demonstravam um lampejo de ansiedade. Suas sobrancelhas, antes bem cuidadas, estavam franzidas.","\"Em que você está pensando, Patr?\" \"Deveríamos caminhar um pouco? Acho que não haverá estacionamento por perto.\" Napatr não respondeu e mudou de assunto. Ela encontrou o olhar de Ing, que estava cheio de perguntas. Mas Ing não insistiu nem fez perguntas indiscretas, o que Napatr temia que ela pudesse fazer. \"Eu consigo andar. Mas e você? Topa?\" \"Eu sou forte.\" Ing não respondeu. Ela pressentia que Napatr estava preocupada com alguma coisa. Por mais próximas que estivessem se tornando, ela ainda não conseguia decifrar exatamente o que afligia Napatr. . . O ambiente noturno do festival era encantador. Napatr contemplava as luzes em forma de estrelas e constelações que decoravam a margem do rio com uma sensação de serena satisfação. Seu braço estava entrelaçado com a mão pequena e delicada de Ing. Embora não tivessem conversado muito desde que estacionaram o carro, e apesar da tensão inicial e constrangedora, Napatr percebeu que Ing finalmente estava relaxando.","Ironicamente, a pessoa que fez com que a falante e pequena mulher se calasse em primeiro lugar foi a própria Napatr. \"O ambiente é agradável?\" Napatr perguntou enquanto caminhava pela trilha do parque à beira do rio, que havia sido transformado em um movimentado e vibrante local de festivais. \"É ótimo. Não está nada quente.\"","Tecnicamente, era inverno, mas este ano não tinha sido nem um pouco frio. O ar estava agradável e a brisa suave tornou a noite ainda melhor. \"Você se sente melhor agora, Napatr?\" Napatr arqueou uma sobrancelha e se virou para a mulher que havia feito a pergunta, sem olhar para ela. Os belos olhos de Ing estavam fixos na paisagem ao redor delas antes que ela puxasse o braço de Napatr, conduzindo-a sem esperar por uma resposta. \"Com licença, você tem água?\" \"Ei, eu posso beber o que você estiver bebendo.\" \"É refrigerante. Você não bebe isso, bebe?\" \"Um dia não fará mal.\" Ing puxou-a em direção a uma barraca que vendia refrigerantes engarrafados submersos em um balde de gelo que balançava levemente. Napatr olhou para a placa de vinil à sua frente: Coca-Cola com Gelatina - 30 Baht. Ela não pôde evitar olhar para trás no tempo. Quanto tempo havia se passado desde que ela havia perambulado por um lugar como aquele? Quanto tempo havia se passado desde que ela havia tomado refrigerante? E quanto tempo havia se passado desde que alguém lhe dera o braço entrelaçado assim?","\"Que cor você quer? Roxo?\" Napatr riu e balançou a cabeça. Ela observou Ing aceitar um copo grande de refrigerante, onde o líquido escuro havia se transformado em finos cristais de gelo na superfície. \"Se você queria uva, por que pegou Coca-Cola, garota?\" \"Bem, você disse que queria beber comigo.\" \"Eu disse que beberia com você, não que usaríamos copos separados.\"","\"...\" Ing evitou o olhar cintilante de Napatr. Mordeu um canudo de cor pastel e virou o rosto para longe da mulher alta. \"Não vai compartilhar?\", provocou Napatr. Ela passou o braço em volta da cintura fina de Ing, guiando-a para longe da vitrine até um local próximo a uma longa fileira de barracas de comida. Ing estendeu a grande xícara à sua frente. Napatr balançou a cabeça, encontrando o olhar confuso da mulher franzina. \"Você vai beber ou não?\" Quando Napatr balançou a cabeça negativamente mais uma vez, Ing lançou-lhe um olhar de puro aborrecimento.","Ela pegou um segundo canudo que tinha guardado por precaução, rasgou a embalagem plástica e o enfiou no copo. Como os canudos tinham cores tão distintas, Napatr certamente seria capaz de dizer qual Ing já havia usado. Ela estava ao mesmo tempo irritada e curiosa.","Aquela boca, que agora ostentava um leve sorriso, já a havia beijado quantas vezes? Já havia beijado seu corpo incontáveis vezes, e mesmo assim ela queria usar um canudo diferente? Ing teve vontade de lhe dar uns tapas, bem fortes. \"Agora, você vai beber?\" Napatr riu. Ela percebeu que Ing havia entendido errado, pensando que ela não queria dividir um canudo. Aqueles olhos doces a fuzilavam com o olhar, e aquela mãozinha beliscava a pele do seu braço. Ing sempre conseguia fazê-la sorrir ou rir.","\"Por que você está me beliscando?\"","\"Não seja chato. Você vai beber ou não? Minha mão está ficando fria.\" \"Não é que eu não queira usar o mesmo canudo que você.\" \"Então por que todo esse drama?\" \"Quero que você me dê isso na boca.\" \"V-você não tem mãos?\" \"Eles estão ocupados.\"","Napatr respondeu. Ela puxou Ing para mais perto, passando o braço em volta de sua cintura, enquanto a outra mão permanecia firmemente no bolso da calça para provar que estava realmente 'ocupada'. \"Humph! Se você usasse esse jeito para flertar com garotas, seria muito brega.\" \"É brega?\" \"Praticamente consigo adivinhar sua idade só por isso.\" \"Acho que terei que inventar algo novo então.\"","\"O que é que foi isso?\"","\"Vamos dar uma olhada ali.\" Napatr a conduziu até o lado mais tranquilo do local. Essa área era relativamente calma, um contraste marcante com as barracas do mercado e a área onde flutuavam os krathongs.","Ela ainda conseguia ouvir sons distantes, vendedores anunciando seus trabalhos, música vinda do palco onde Loi Krathong e outras canções antigas conhecidas eram apresentadas, além do ocasional estalo de fogos de artifício. Mesmo assim, a sensação era de estar muito longe do caos. A mulher alta queria aproveitar o festival, mas ainda não conseguia ficar muito tempo no meio da multidão.","Napatr, apesar de não gostar de multidões, havia se oferecido para ir comprar lanches há pouco tempo. O som de passos na grama perto de onde Ing esperava a fez se virar.","Era Napatr, com as mãos cheias de petiscos.","O ar, que antes estava fresco, fez com que uma leve camada de suor surgisse na testa da mulher alta. Ing olhou para Napatr por completo pela primeira vez em dias. Ela era alta e esbelta, magra, porém forte. Vestindo uma blusa clara e calças curtas, tinha uma aparência educada e impecável.","E o mais importante: ela estava bonita. \"Por que você comprou tanta coisa?\" \"Ainda não jantamos. Ou você já jantou?\" \"Eu esqueci completamente.\" \"Isso é igualzinho a uma criança pequena.\"","Ing, ao ser chamada de \"criancinha\" pela enésima vez hoje, só conseguiu soltar um suspiro cansado. Ela tirou um pequeno pacote de lenços de papel da bolsa e enxugou delicadamente o suor do rosto de Napatr. Napatr sentou-se ao lado dela e fechou os olhos satisfeita, fazendo Ing sorrir ao vê-la.","Ing deu uma olhada rápida ao redor. Havia vários casais e famílias espalhados por ali, mas ninguém lhes dava atenção. Ela decidiu inclinar-se e pressionar seus lábios suavemente contra a bochecha lisa de Napatr antes de acariciar aquele rosto bonito e encantador. Ela fitou os olhos de Napatr, que a encaravam com uma mistura de surpresa e choque, antes de se enrugarem quando Napatr sorriu.","\"Obrigado.\" \"...\" \"Por me trazer aqui.\" \"O prazer é meu.\" O coração de Napatr estava acelerado, e por instinto ela pressionou os dedos contra o próprio pulso para verificar a pulsação. Quando a mulher franzina a olhou com curiosidade, ela percebeu o que estava fazendo e fingiu coçar o pulso para disfarçar o constrangimento. \"Você foi picado por um mosquito? Eu tenho repelente.\" \"Como você conseguiu colocar tudo isso nessa bolsa?\"","\"Você tem alergia a mosquitos, não é? Lembrei-me.\" Naquele momento, Napatr percebeu que não se tratava de uma alergia a mosquitos.","Era uma alergia a Ing, e era muito mais forte do que qualquer picada de inseto.",".","N se: Loi Krathong é um festival tradicional tailandês realizado anualmente, geralmente em novembro, onde as pessoas lançam pequenas cestas de folhas decoradas (\"krathongs\") na água para homenagear a deusa da água e simbolicamente libertar-se de sentimentos negativos ou infortúnios."],"wordCount":3063},{"title":"11. Toque","paragraphs":["\"Você comeu bastante.\" Ing recolheu os restos da comida que tinham acabado de comer e colocou-os num saco para deitar fora num ponto de recolha do outro lado. Napatr tinha mesmo comprado uma quantidade enorme, mas conseguiu comer tudo. Ing ficou espantada, um pouco preocupada que a mulher alta se sentisse desconfortavelmente cheia. Napatr ofereceu seu rosto à mulher franzina, esperando que ela umedecesse seus lábios, um gesto que rapidamente se tornara familiar. Ing, por sua vez, limpou cuidadosamente os lábios de Napatr com o mesmo senso de hábito. Foi uma interação natural entre os dois, não forçada por nenhum deles.","Napatr sentiu um calor se espalhar por todo o seu corpo; ela não sabia se Ing sentia o mesmo ou se percebia que alguém estava se apaixonando perdidamente por esses pequenos gestos de atenção. \"Você tem sorrido bastante hoje.\" \"Bem... o ambiente é agradável.\" Ing assentiu com a cabeça. Ela não discutiu porque a atmosfera era realmente tão maravilhosa quanto Napatr havia dito. Ela puxou os joelhos para o peito e os abraçou, o olhar vagando em direção ao rio onde krathongs iluminados por velas estavam espalhados. Eram lindos, mesmo que representassem um fardo para o ecossistema. Uma brisa suave trazia consigo aromas da natureza, incenso, fogos de artifício e comida. Mas o aroma mais predominante naquele momento era o perfume da pessoa.","ao lado dela. \"Deveríamos lançar um krathong virtual? Já que estamos no festival mesmo.\" \"Você quer fazer assim?\" \"Sim. Normalmente, nunca estou livre no dia de Loi Krathong e nunca tive interesse em publicar um online.\" Napatr falou a verdade. Normalmente, ela estaria no hospital auxiliando nos casos de emergência que sempre aumentavam nesse feriado. Ela nunca tinha tempo para passear pelos festivais como queria ou fazer qualquer outra coisa por causa de seus deveres.","Como não havia se interessado por ninguém antes, ela dedicou todo o seu tempo ao trabalho. Mas agora ela tinha alguém por quem estava interessada, alguém de quem gostava. Se ela quisesse passar seu tempo livre com alguém que a fizesse se sentir bem, isso não poderia estar errado. \"Então por que você está livre hoje? Por que você quer fazer isso?\" Ing apoiou o queixo nos joelhos dobrados, observando Napatr, que estava ocupada digitando no celular. Ela imaginou que a outra mulher provavelmente estivesse procurando um site para soltar krathongs online, assim como ela havia sugerido antes.","Ing sorriu ao ver o reflexo da tela nos olhos de Napatr, fazendo-os brilhar.","A luz do celular realçava os traços da mulher alta, tornando-a ainda mais cativante de se observar. \"Eu queria soltar um krathong com você.\" \"Lá vai você de novo.\"","Napatr estava sendo um conquistador novamente. \"Qual de novo? Que tal esta?\" Napatr fez as duas perguntas sem esperar uma resposta para a primeira. Ela virou a tela para mostrar a Ing o site que havia encontrado. \"Este está ótimo.\" \"Você escolhe.\"","\"Por que você não escolhe a si mesmo?\" \"Então vamos escolher juntos.\" Ing soltou um leve suspiro quando Napatr rapidamente se moveu para sentar-se diretamente atrás dela, passando os braços ao redor da cintura de Ing. Ing se virou para olhar para a mulher mais alta, que estava olhando fixamente para a tela antes de lançar um olhar para ela com um sorriso radiante. Ing se perguntou se essa era realmente a posição padrão para escolher um krathong digital.","Napatr poderia simplesmente ter se sentado ao lado dela e inclinado a tela. Em vez disso, ela efetivamente prendeu Ing em seus braços.","Não era que Ing não gostasse; ela adorara estar no abraço quente e seguro de Napatr desde o início. Mas os estranhos sentimentos que cresciam dentro dela a cada dia a deixavam... tímida. Ing adorava o fato de que, sempre que compartilhavam contato pele a pele ou estavam próximas, Napatr nunca se importava com ninguém mais. Ela nunca reparava nos outros. encara.","Era como se a única coisa que interessasse a Napatr fosse ela.","\"Diz que são três passos simples. Primeiro temos que escolher o krathong.\" Qual deles?\" Napatr apoiou o queixo no ombro delicado de Ing, olhando para o telefone nas mãos dela. Ela sorriu enquanto seus corpos se pressionavam um contra o outro. O carinho que compartilhavam a deixou tão feliz que ela não conseguia parar de sorrir.","\"Que tal a de flor? É fofa.\" \"Hum-hum.\" \"Onde devemos lançá-lo? Hum... Chiang Mai?\" \"Aqui está tudo bem.\"","Ing escolheu o local que Napatr havia selecionado para o krathong online deles. Os braços de Napatr estavam frouxamente em volta de sua cintura. Ela podia sentir a respiração da mulher alta em seu pescoço, o que a fez morder o lábio instintivamente. Apesar da brisa suave, Napatr enterrou o rosto no pescoço de Ing, deixando toques leves e delicados em sua pele e bochecha. \"Quer escolher seu personagem primeiro?\" Ing tentou controlar a respiração e o coração acelerado. Tentou soltar os braços de Napatr de sua cintura para devolver o telefone, mas Napatr simplesmente balançou a cabeça contra o ombro de Ing. \"Escolha por mim, por favor.\" \"Foi você quem quis fazer isso, mas está me obrigando a fazer tudo.\"","Napatr não respondeu, apenas deu uma risadinha antes de apertar ainda mais a cintura fina.","Seus olhos estavam fixos na tela enquanto Ing escolhia para ela um personagem masculino de desenho animado vestido com uma roupa tradicional tailandesa.","Então, os dedos finos de Ing digitaram no campo de nome: Patr. \"Não podemos usar 'Patr'?\"","\"Então, o que você quer usar?\" \"P'Patr.\" O rosto de Ing ficou vermelho de vergonha.","Tanto a voz suave quanto a nova forma de ser chamada a deixaram tão tímida que seus dedos tremeram enquanto ela tentava mudar o nome. Mesmo já sabendo que Napatr era mais velha, o jeito como a mulher alta lhe pediu para digitar aquele nome fez seu coração palpitar incontrolavelmente. \"Então, devo usar 'Nong Ing' ou apenas 'Ing'?\" Apesar da timidez, ela não queria perder a brincadeira. Tentou manter a voz o mais normal possível e fez de tudo para que a pessoa que a abraçava não percebesse o quão acelerado estava seu coração. \"Qualquer uma que você quiser.\"","Embora Napatr tivesse dito que ela podia usar qualquer coisa, seus olhos permaneceram fixos na tela para ver se Ing escolheria 'Nong Ing' ou apenas 'Ing'. Ao ver Ing digitar seu nome de usuário no campo, Napatr sorriu radiante. Seu coração começou a bater no mesmo ritmo irregular da pessoa que ela estava abraçando. \"Aperte comigo.\" Apesar de ser tímida e de sentir o coração de Napatr acelerando tanto quanto o seu nas costas, Ing queria que eles flutuassem juntos.","Napatr estendeu a mão para segurar a mão delicada e macia de Ing. Ela sorriu, sentindo os pequenos dedos de Ing tremerem. O coração de Ing palpitava tanto que Napatr podia senti-lo através do seu toque. \"Pressione.\"","Ing tocou em 'Krathong Flutuante', e o krathong digital começou a flutuar pela tela. Ela leu a oração que Napatr devia ter digitado em algum momento, e então se virou para olhar para a mulher cujo rosto estava colado ao dela.",". 'Espero que no próximo ano possamos lançar um krathong online juntos novamente.'",".","A oração, que falava de um futuro onde Napatr ainda queria estar com ela, fez o coração de Ing estremecer. Ver o krathong digital que haviam escolhido juntos, adornado com os nomes de ambos, fez com que ela sentisse uma nova e estranha emoção.","Um krathong de flores digital flutuando em um rio na tela de um celular... mesmo que fosse apenas online, isso a fez se sentir incrivelmente realizada e feliz. Talvez fosse porque estavam imersos na atmosfera do festival, ou talvez fosse porque Napatr não a havia soltado por um único segundo. O krathong deles. O krathong de P'Patr e Nong Ing. \"Vou encerrar agora.\" \"OK.\" \"Seu coração está batendo tão rápido, Patr. Você está animado?\" Ing pediu para que ela escondesse sua timidez. A mulher alta que a segurava sussurrou em seu ouvido, fazendo com que Ing se encolhesse com o hálito quente.","\"Você provavelmente está tão animado quanto eu.\" Ing não discutiu nem deu desculpas. Ela não estava animada, mas se sentia \"tímida\" perto de Napatr. Nem sabia porquê, mas era uma sensação boa, melhor do que qualquer coisa que já tivesse sentido. A felicidade que ela sentia agora era algo que ela realmente podia manter, algo real. E desta vez, ambos estavam felizes. Não era como antes, quando ela era a única que sentia alguma coisa. A pessoa com quem ela queria compartilhar isso não se importava, não sentia o mesmo. Napatr era diferente. \"Já é tarde. Devemos voltar?\" \"Hum.\" Ing murmurou em concordância, mas a pessoa que sugeriu que fossem para casa não moveu os braços. A ponte do nariz de Napatr pressionou suavemente a bochecha de Ing, fazendo-a rir. \"Você pode esperar e fazer isso mais vezes em casa?\" \"Eu posso?\"","\"Eu nunca te disse não de verdade, disse?\" \"Então vamos para casa.\" Mas, ao voltar para casa, Napatr não se limitou a encostar o nariz na bochecha de Ing, como fizera inúmeras vezes uma hora antes. Em vez disso, a mulher alta começou a cobri-la de beijos assim que a porta do apartamento se fechou. As costas de Ing estavam pressionadas contra a porta, seus braços envolvendo o pescoço de Napatr enquanto a outra mulher se recusava a afastar os lábios. Hum... Napatr sugava e puxava os lábios carnudos de Ing, alternando entre a parte superior e inferior, sua língua percorrendo o interior para encontrar cada gota de doçura. Ouvir os murmúrios suaves na garganta de Ing só a encorajou ainda mais.","Enquanto a pequena língua de Ing começava a se mexer em uma brincadeira de perseguição, Napatr apertou o abraço em sua cintura fina, puxando seus corpos um para o outro até que não houvesse mais espaço entre eles. Ing tocou no ombro de Napatr quando começou a ficar sem fôlego. A outra recuou imediatamente, embora permanecesse perto, distribuindo beijos pequenos e repetitivos nos lábios de Ing. Por trás daquela aparência calma e tranquila, Napatr era tão boa em beijar que Ing mal conseguia acompanhar. Ela só conseguia deixar a mulher alta conduzir suas emoções todas as vezes. \"Hum... tomar banho primeiro? Eu ainda não tomei banho.\" \"Você tem um cheiro maravilhoso.\"","Napatr murmurou contra o pescoço elegante de Ing, com a voz abafada. Apesar de protestar que Ing já cheirava perfeitamente, ela acabou se afastando para olhá-la.","Os doces olhos de Ing estavam turvos e semicerrados por causa do beijo. Seus lábios carnudos, levemente borrados de batom, foram delicadamente limpos pelo polegar de Napatr antes que a mulher alta oferecesse um sorriso terno a Ing, que ainda a segurava pelos ombros. \"Vamos tomar banho juntos.\" \"Vamos mesmo tomar banho?\" \"Não.\" A resposta foi clara e cristalina. Ing mordeu o lábio, empurrando os ombros de Napatr ligeiramente para trás, uma distância à qual a outra mulher cedeu de bom grado.","Os dedos de Ing traçaram a linha forte dos ombros de Napatr, seus olhos fixos no rosto belo e expressivo acima dela. Ela passou o dedo pela gola da camisa de Napatr antes de puxá-la para um beijo suave no canto da boca.","Ela deslizou os dedos pelos botões até o cós das calças de Napatr, antes de puxar a camisa para fora. Um zumbido baixo vibrou na garganta da mulher alta enquanto ela se inclinava para beijar o pescoço de Ing, arrancando dela um gemido suave.","Sem querer se render ainda, Ing usou a mão que estava em volta do pescoço de Napatr para erguer o queixo da outra mulher. Sua outra mão, que estava traçando o contorno dos botões, começou a desabotoá-los habilmente. Como a mulher alta adorava usar camisas, Ing já as havia desabotoado inúmeras vezes; não era surpresa que ela conseguisse desabotoá-las tão rapidamente com uma só mão. Ela roçou a palma da mão na pele de Napatr, sentindo um arrepio ao ver aqueles olhos penetrantes ardendo de paixão. Quanto mais Ing a tocava, mais forte Napatr apertava seus quadris. Ing deixou as palmas das mãos deslizarem pelos músculos dos ombros e do abdômen firme de Napatr antes de se inclinar para beijar seu ombro, imitando o jeito como Napatr sempre a beijava. Ela estava começando a entender por que Napatr gostava tanto disso; era uma sensação incrível. Tendo recebido tais toques por tanto tempo, Ing sabia o quão bons eles eram. Ela queria que Napatr sentisse o mesmo. Não se tratava de \"retribuir\" o favor; ela simplesmente queria compartilhar esse sentimento com Napatr, porque realmente desejava. \"Eng.\" \"Sim?\" \"Você ainda quer tomar banho?\" \"Você não consegue se conter nem um pouco, Patr?\" Napatr cerrou os dentes. Quem conseguiria resistir? Não com aqueles olhos tentadores e doces, aqueles lábios sonhadores percorrendo seu corpo e a forma como estava sendo tocada. Talvez alguém conseguisse, mas não ela.","\"Sou bastante forte.\" \"...\" \"Você se lembra disso, não é?\" Antes que Ing pudesse processar aquelas palavras, Napatr a ergueu contra o peito, obrigando Ing a envolver firmemente as pernas na cintura fina da mulher alta para não cair.","Ing mordeu o lábio e se agarrou com força. Quanto mais devagar Napatr caminhava em direção ao banheiro privativo, mais Ing sentia que era ela quem não conseguiria se conter. Napatr a sentou no balcão do banheiro, ao lado da pia. Os braços de Ing não deixaram o pescoço da outra mulher. Ver Napatr tirar a camisa e jogá-la de lado displicentemente fez Ing corar, e ver o torso nu da outra mulher a deixou ainda mais tímida.","\"Sou o único nu aqui.\" Napatr sussurrou, enquanto suas mãos se moviam para remover a camada externa de roupa de Ing, seguida rapidamente pelo sutiã que cobria seu belo busto. Ao ver a pele nua de Ing, Napatr não conseguiu resistir. Ela se inclinou para inalar o aroma da pele de Ing como uma psicopata. Sua cabeça podia sentir a mão de Ing massageando a nuca. A língua de Napatr roçou os mamilos sensíveis e pálidos que já se erguia como se exigissem seu toque.","\"Ah... P-Patr.\" Napatr não fez Ing esperar pelo seu lado direito sensível. Ela se aproximou imediatamente, seu toque rápido e preciso. O contato arrancou um som suave e doce de Ing, cujo corpo respondeu instantaneamente. Sua língua deslizava sobre o pico em movimentos rápidos, enquanto sua mão livre amassava o outro lado, acompanhando o ritmo de suas emoções crescentes. Em seguida, ela alternava entre a direita e a esquerda, dedicando atenção igual a cada lado, sem deixar nenhum deles ser negligenciado.","\"Ei... não íamos tomar banho primeiro?\" Ing olhou para Napatr, que estava com os olhos fechados em êxtase, mamando como se estivesse completamente encantada. Ela não precisava perguntar para saber qual parte do seu corpo Napatr mais amava. Depois do peito, era a vez do centro dela lá embaixo; a outra mulher frequentemente permanecia ali por tanto tempo até que seus gemidos silenciosos se transformassem em respirações suaves e exaustas.","Napatr não respondeu. Em vez disso, afastou-se das curvas macias e fartas do peito de Ing e distribuiu beijos até sua barriga lisa, que ondulava e se contraía sob os lábios que se recusavam a deixar sua pele por um segundo sequer. \"P-Patr.\"","\"Levante os quadris para mim.\" Como Napatr já havia desabotoado os shorts dela anteriormente, Ing não resistiu. Ela removeu instantaneamente tanto a roupa de cima quanto a roupa íntima. \"Você é tão travesso... hum!\" Ing, por reflexo, passou as pernas por cima dos ombros de Napatr. Observou o belo rosto de Napatr enquanto beijava suas coxas, ligeiramente afastadas para acomodar a outra mulher, um gesto feito com total entrega.","Ing sentia o quanto estava pronta. Quanto mais perto a mulher alta a beijava, mais ofegante Ing ficava. Ela mordeu o lábio com força quando Napatr ergueu o olhar para encontrar o seu, no exato momento em que sua língua começou um movimento lento e ascendente, penetrando profundamente seu corpo. \"P-Patr...\"","O encontro com aqueles olhos a fez corar ainda mais. Ver a língua percorrendo seu corpo meticulosamente intensificou o prazer. Observar Napatr fechar os olhos e enterrar o rosto ali sem hesitar fez Ing atingir o ápice rapidamente. Era a prova de quanto ela...","Adorei esses detalhes. Deixaram bem claro o quanto a outra mulher a tentou. \"Você está tão molhada.\"","Napatr afastou os lábios do calor macio e úmido de Ing por um instante, sua língua deslizando levemente para cima e para baixo. Ver o rosto doce corado de desejo a encantou.","\"Por que você parou? Ah!\" \"Você pode se mexer para mim?\" \"Patr!\"","Ela chamou a outra mulher pelo nome, suplicando. Mas a provocadora Napatr continuou apenas com toques leves e agonizantemente lentos até que Ing, que já estava no seu limite, não aguentou mais. Ing puxou o pescoço de Napatr para mais perto de seu próprio calor úmido e sensível, perdendo toda a vergonha. Ela apoiou o braço livre no balcão atrás de si para se equilibrar e pressionou os quadris contra a língua perversa de Napatr. Ing sabia o quanto Napatr adorava quando ela se movia contra seus lábios daquela maneira. Não que ela não gostasse, mas às vezes a sensação era tão intensa que ela não conseguia se mover sozinha. Quanto mais ela gemia de tormento, mais Napatr parecia gostar. Olhar fixamente para o rosto da outra mulher, escondido em suas partes mais íntimas, só a aproximava ainda mais do limite. O coração de Napatr disparou quando seus olhares se encontraram com os de Ing, que agora movia os quadris contra sua língua exatamente como ela havia pedido. Aqueles olhos doces transbordavam paixão. Com os lábios carnudos de Ing mordidos e o rosto incrivelmente sexy, Napatr não aguentou mais; girou a língua e chupou rapidamente até que os gemidos doces se tornaram um refrão constante.","\"Ah, estou tentando alcançar,\"","Napatr acelerou o passo para levar a bela mulher ao seu destino, como ela havia lutado para dizer antes. Ing soltou um longo grito, seu corpo se tensionando e tremendo.","Napatr manteve os quadris delicados de Ing firmes no lugar, recusando-se a afastar os lábios, ainda encantada com o sabor do amor que emanava dela. \"Chega, Patr.\" O protesto pareceu apenas encorajá-la. Napatr olhou para ela brevemente antes de fechar os olhos e continuar a saboreá-la, recusando-se a soltá-la. Ing, que acabara de chegar ao clímax, sentiu as ondas de prazer recomeçarem.","Ela não fazia ideia de quando eles finalmente tomariam banho. Ela não sabia quando Napatr finalmente afastaria seus lábios, ou qualquer outra parte dela.","Naquele momento, tudo o que ela sabia era o quanto apreciava a maneira como Napatr a tocava. . sunyan"],"wordCount":3107},{"title":"12. No entanto...","paragraphs":["Ing olhou para Napatr, que estava encostada na cabeceira da cama, mexendo distraidamente no celular. Isso apesar de, apenas meia hora antes, terem compartilhado uma hora intensa e íntima no banheiro. Mesmo assim, Napatr não parecia nem um pouco cansada ou exausta. Será que foi porque ela era quem recebia mais?","Ing se perguntou. Mas Napatr também...","A imagem da mulher alta no banheiro surgiu imediatamente em sua mente: o rosto anguloso e bonito, repleto de paixão, o queixo bem desenhado e o pescoço forte.","Ing se lembrou de Napatr inclinando a cabeça para trás, soltando um murmúrio profundo na garganta enquanto seus corpos, na parte inferior, se pressionavam um contra o outro.","Seu rosto corou instantaneamente. Ing mordeu seus lábios carnudos, sem batom, enquanto seu olhar se voltava mais uma vez para a mulher alta.","Napatr olhava para ela com um leve sorriso, fazendo com que Ing se virasse e caminhasse na direção oposta para se vestir.","\"Você tomou banho por muito tempo.\"","A voz grave, junto com o som dos chinelos, não desviou a atenção de Ing do creme facial que ela tinha nas mãos. Seu coração batia tão forte que ela mal conseguia acompanhar o ritmo.","De quem foi a culpa por tê-la mantido no banho por tanto tempo?","\"Eu tinha medo que você ficasse doente.\"","\"Vou ficar doente por sua causa.\" Napatr riu e colocou a mão no pequeno ombro escondido sob um robe branco e limpo. Ing a estava culpando assim, sem mais nem menos, mesmo que ambas tivessem comunicado seus desejos com bastante clareza. \"Eu perguntei se você queria desligar o chuveiro primeiro.\" \"Eu... eu não falei sobre isso.\" Foi nesse momento que os dedos finos da outra mulher estavam dentro do corpo dela, fazendo-a se agarrar à parede e gemer sob o chuveiro por um longo tempo. \"Então, você quer dizer quando estávamos na banheira?\" \"Podemos parar de falar sobre isso, por favor?\" A banheira foi igualmente constrangedora. Ela nunca tinha visto aquele lado de Napatr antes, o lado em que Ing estava de fato no colo da mulher alta, mas foi Napatr quem se moveu até que ambas alcançaram a margem de seus sonhos. Foi tão constrangedor que ela sentiu um calor intenso no rosto e em todo o corpo.","\"Você ficou rosa de novo.\" Napatr roçou a face macia da mulher menor antes de se inclinar e pressionar o nariz contra ela, inalando seu perfume. Quando ela estava tocando a mulher pequena intimamente na banheira, Ing ficou com essa mesma cor rosada. \"N-não diga isso também.\" \"Mas você gosta disso?\" \"Não gosto que você fale desse jeito.\"","Porque ela era tímida demais, envergonhada demais para ouvir os detalhes da intimidade deles. \"Gostou do que eu fiz, Ing?\" \"Patr!\" Napatr sorriu e encontrou o olhar da mulher mais baixa através do espelho. A mão que repousava no belo ombro de Ing subiu para acariciar suavemente seu rosto sem maquiagem.","O rosto corado de Ing irradiava um calor que até a palma da mão de Napatr podia sentir, fazendoa rir baixinho do comportamento adorável da mulher no espelho. Ela pensou consigo mesma em como era sortuda por ver aquele rosto bonito e jovial, sem a maquiagem de sempre. Seria ótimo ver isso todos os dias. \"Vou esperar na cama. Você não precisa responder agora, apenas me diga antes de dormirmos.\"","\"Não vou te responder, nunca!\"","Ing lançou-lhe um olhar ressentido para disfarçar a timidez que crescia a cada instante, mas seu desempenho foi pior do que imaginava. Aquele brilho nos olhos de Napatr foi resposta suficiente; ela não conseguiu esconder seu constrangimento da outra mulher.","Ela tentou aplicar o creme lentamente, querendo evitar responder à pergunta. Embora Napatr geralmente dormisse rápido, já fazia meia hora e ela ainda não havia conseguido dormir.","Em vez disso, ela ficou sentada meio reclinada, assistindo a vídeos por um longo tempo, até que Ing aplicou meticulosamente o creme em quase todas as partes do seu corpo. \"Você quer passar creme nas costas?\"","Ing deu um pulo, virando-se para olhar para Napatr, que havia perguntado em meio ao silêncio. Ela não sabia se a mulher alta conseguia ouvir seus pensamentos ou por que havia feito aquela pergunta. \"N-não.\"","\"Vi que você aplicou em todos os outros lugares, exceto nas costas e...\" \"Patr!\"","Napatr deu uma gargalhada. Ela desligou o celular depois de ficar rolando a tela distraidamente até se cansar. Só o tinha pegado porque estava esperando há muito tempo que a mulher baixinha terminasse sua rotina de beleza. Tempo suficiente para perceber que Ing estava sendo intencionalmente lenta para evitá-la. \"Devo fazer isso por você?\" \"N-não precisa. Não quero aplicar ainda.\" Ing expirou para se acalmar e não agir de forma estranha. Ela estava tímida, envergonhada por razões que não conseguia explicar. Mesmo tendo compartilhado tanta intimidade tantas vezes, e mesmo que aquela não fosse a primeira vez que passavam a noite juntos...","Será que foi por causa do Loy Krathong online? Ou será por causa dessas novas e mais profundas formas como eles se tocaram? Quanto mais pensava, mais dispersa sua mente ficava. Ing estendeu a mão para apagar a luz da penteadeira e pendurou o roupão, vestindo apenas a camisola de seda que gostava de usar. Tentou ignorar o olhar de Napatr, que sabia estar fixo nela o tempo todo.","Ela era tímida. Não se sentia desconfortável. Não era a primeira vez que aqueles olhos brilhantes a encaravam com tanto fascínio. Ela era apenas tímida, tão tímida que se surpreendia.","Todas as luzes do quarto estavam apagadas, exceto o abajur ao lado da cama de Napatr. Ela ajeitou os travesseiros e puxou o cobertor macio para que Ing pudesse se deitar confortavelmente.","Seu olhar recaiu sobre as curvas suaves e arredondadas que ela tantas vezes tocara, pressionara os lábios e roçara com a ponta do nariz. A cada vez, ela se perdia na sensação, saboreando cada toque. Elas balançavam delicadamente a cada passo dado por sua dona.","Então, seu olhar deslizou para as longas pernas. Suas coxas se moviam enquanto caminhava, puxando a barra de sua camisola para cima e dificultando que ela não engolisse em seco.","\"Seu pervertido.\" Ing repreendeu-a em tom de brincadeira, mordendo o lábio inconscientemente. Napatr não escondeu o olhar que lhe lançava. O que era aquilo, aqueles olhos penetrantes e brilhantes, tão encantados com seu corpo, como nos tempos em que tinham tido intimidade? Napatr riu novamente da repreensão de voz doce de Ing. Ela abriu o braço do lado onde a pequena mulher se deitaria e não se decepcionou. Ing se jogou em seus braços exatamente como ela esperava. Com a mão livre, ela puxou o cobertor macio sobre eles para lhes proporcionar calor, embora o calor de seus corpos colados um ao outro significasse que eles realmente não precisavam dele. No entanto, preocupados que a pele macia da mulher pudesse ficar resfriada e deixá-la doente, acharam melhor usar o cobertor para protegê-la do ar frio do ar-condicionado.","O toque suave em sua bochecha fez Napatr sorrir. Ela olhou para a pequena mulher aninhada em seu ombro. O braço de Ing sobre sua barriga a fez sorrir ao reconhecer a familiaridade do toque. Era um toque, uma ação, que ela desejava e exigia apenas em seu próprio coração. Era algo que ela prezava demais para deixar que alguém lhe tirasse.","Napatr usou o braço em que a outra mulher estava apoiada para puxá-la para mais perto e, em seguida, depositou um beijo terno em sua testa macia. Ela jurou em seu coração que amaria aquela mulher até que Ing não a quisesse mais. \"Você está com sono?\" \"Hum-hum.\" A voz doce e abafada fez com que Napatr não conseguisse parar de sorrir. Ela se virou para olhar a luz do abajur e suspirou, sem querer se afastar da pequena pessoa aconchegada contra ela.","\"Pode ser ativado por voz?\" \"Não. É ativado manualmente.\" Ing apoiou o queixo no ombro de Napatr, sorrindo ao ver a insatisfação, mesmo que por apenas um instante. As sobrancelhas escuras de Napatr se franziram levemente porque ela não conseguiu o que queria. \"Posso alterar para ativação por voz?\"","\"Você quer?\" \"Você se importa?\" \"Você decide.\" \"Mas é a sua casa.\" \"Como você disse... minha casa é como a sua casa.\" Uma sensação de plenitude e alegria invadiu Napatr, até que ela não conseguiu conter um largo sorriso. Ela encontrou o olhar da pequena mulher que a observava desde o início. Não escondeu o olhar como sempre fazia, mas deixou transparecer exatamente o que sentia.","Ela apreciava muito essa atmosfera, o abraço, o toque e o olhar doce. Ela queria ser a única pessoa para quem Ing olhava com aqueles olhos doces que eram","agora se curvando enquanto a mulher pequena sorria para ela. Um sorriso doce como veneno disfarçado, continuava assim. E além de veneno, provavelmente era algum tipo de poção do amor, porque ela estava incrivelmente enfeitiçada por Ing. \"Vou apagar a luz.\" \"Humph.\" O som, quase um gemido, fez Napatr olhar para a pequena mulher encolhida perto dela. Mesmo só conseguindo ver os cabelos vermelhos que a outra havia tingido recentemente, ela sabia muito bem que Ing não queria que ela se afastasse.","\"Só por um segundo, tá bom? Depois disso, não vou soltar o abraço de jeito nenhum.\"","Ing teve vontade de encarar Napatr com raiva, pois as palavras dele soavam como um truque para enganar uma criança. Era verdade que ela não queria se afastar do calor dos corpos deles, mas a luz precisava ser apagada. Ela se culpava um pouco por não ter decorado o apartamento com um estilo mais moderno. Ou seria porque ela vinha ficando ali com mais frequência ultimamente? Ou seria outra coisa que a estava incomodando? Todas as luzes do quarto grande estavam agora apagadas. Ela ouviu Napatr se mexer antes de ser puxada para um abraço, idêntico ao de instantes atrás. \"Você está bem?\" \"O que você quer dizer?\" Ing perguntou de volta, confusa, enquanto se ajeitava para apoiar a cabeça no ombro forte da outra mulher. Seu braço esguio se estendeu sobre o corpo da outra por hábito, a palma da mão acariciando suavemente o peito dela através do tecido. A respiração quente da mulher alta roçou sua testa. Havia um aroma suave, uma fragrância que emanava do tecido e da pele. Mesmo usando os mesmos frascos no banheiro, o perfume que permanecia em suas peles era diferente.","Napatr sentia um cheiro de limpeza e se sentia aquecida e segura sempre que estava perto dela. Ela se perguntava se a outra mulher sentia o mesmo cheiro, mas não queria perguntar por medo de receber uma resposta maliciosa ou uma pergunta com segundas intenções que pudesse mexer com seu coração novamente. \"Posso te abraçar assim?\" \"Hum.\" Ing enterrou o rosto no ombro de Napatr enquanto o abraçava, um corpo alto e esguio. Ela sorriu com aquele calor suave. Nunca havia dormido abraçada a ninguém além da família, e nunca fora \"fácil\" o suficiente para deixar alguém a abraçar daquele jeito como Napatr a estava abraçando. Ela não conseguia deixar de se perguntar por que havia permitido aquilo, por que havia deixado aquela mulher alta ter tanta influência sobre ela. Seria porque elas já tinham ido longe demais antes? Ou porque Napatr estivera presente em seus momentos de fragilidade, fazendo-a se sentir segura? \"Você gosta disso?\" \"Claro que sim. Seu abraço é quentinho. Seu corpo também.\" \"Eu me referia àquela coisa no banheiro. Você gostou?\" Ing franziu os lábios. A mão que abraçava Napatr bateu com força no peito da outra, produzindo um som. Mas a pessoa atingida apenas riu baixinho até que Ing estendeu a mão e beliscou sua barriga com toda a força. \"Isso dói! Eu só estava perguntando.\" A palma macia que acabara de beliscá-la agora esfregava o local delicadamente até que Napatr teve que se abaixar e segurar a mão de Ing, temendo que não conseguissem o descanso que deveriam. \"Você sempre pergunta as coisas mais estranhas.\"","\"Quero saber. Não sou bom nisso.\"","Ing estava deitada de bruços, apoiando-se nos braços enquanto olhava para o rosto de Napatr, que repousava sobre um travesseiro um pouco mais alto. A luz tênue de fora filtrava-se pelas cortinas translúcidas. Ela viu o rosto belo e expressivo de Napatr, que agora ostentava um leve sorriso naqueles lábios encantadores. Ela ficou intrigada com a afirmação de Napatr. Não era boa nisso? Em que sentido ela não era boa? \"Não saberia dizer se é bom ou não.\" \"...\" Napatr não disse nada, permanecendo em silêncio, esperando que ela continuasse como de costume. Era mais uma coisa que sempre a impressionava. \"Você perguntou se eu gostei. Sim, eu gostei.\" Dito isso, Ing voltou a deitar-se como antes. Ela inclinou o rosto para cima para olhar para Napatr, que permaneceu em silêncio. Então, decidiu esticar-se e beijar sua bochecha, algo que vinha fazendo com frequência ultimamente. Ela era tímida, mas gostava de deixar um toque carinhoso na bochecha de Napatr. O coração de Napatr disparou. Mesmo que Ing tivesse respondido apenas à pergunta sobre gostar de seu toque íntimo, ela sentiu uma excitação inexplicável. O toque dos lábios macios pressionados contra sua bochecha quase a fez esquecer de respirar. A felicidade, a plenitude, a clareza de seus sentimentos, tudo era tão avassalador que ela não queria mais guardar só para si.","Mesmo sem saber o que aconteceria se dissesse em voz alta, se contasse o que estava pensando, o quanto havia ficado abalada, ela não sabia se Ing seria indiferente, fingiria não ouvir ou a interromperia como fizera antes.","Napatr deitou-se de lado, envolvendo o pequeno corpo de Ing num abraço contra o peito, deixando-a sentir o ritmo do seu coração, que batia de forma anormal.","Rápido. Era irregular, tão rápido que ela não conseguia acompanhar, igualzinho ao próprio coração de Ing.","Ela suspirou novamente, respirando fundo para se acalmar, reunindo coragem para dizer à pessoa em seus braços como se sentia. \"Eng.\" \"Sim?\" \"Não sei se devo dizer isso, mas quero te contar.\" \"O-o que é isso?\" \"Eu te amo.\" \"...\" \"Eu te amo há algum tempo. E não quero ser egoísta.\" Ela não queria ser egoísta sempre que estivessem em momentos íntimos, sempre que Ing se agarrava ao seu braço ou beijava sua bochecha. Cada gesto que recebia a fazia se sentir melhor e ainda mais ela mesma do que antes. Ela não queria ser egoísta
