sapatos. Ing estava resmungando adoravelmente sobre querer tirá-los, mas então Napatr apareceu e a pediu em casamento.","\"N-não precisa.\"","\"Eu os carregarei.\" Ing permitiu que seu amante carregasse seus sapatos na mão esquerda, enquanto sua mão direita era segurada e guiada por Napatr enquanto caminhavam pela praia de volta ao resort no crepúsculo que se aprofundava. \"Eu nem sequer tenho um anel para te pedir em casamento como deve ser.\"","Devido ao clima e a tudo o mais, Napatr havia feito o pedido sem uma demonstração física de seu amor, e ela sentiu uma onda de culpa. \"Você já me deu uma.\"","\"Aquele é...\" \"Não nos amamos por coisas materiais. Eu te amo porque você é meu P'Patr, a menos que você tenha deixado de ser você mesmo.\" \"Eu te amo porque você também é minha Nong Ing.\" \"Certo? Então, minha querida, não pense demais nisso.\" \"Amanhã iremos comprar um novo. Mamãe com certeza vai me dar uma bronca se a nora dela não estiver usando um anel de diamante.\" Ing apenas balançou a cabeça com um sorriso, mas concordou mesmo assim. Independentemente disso, o futuro dela pertencia a Napatr, e eles o passariam juntos de qualquer maneira. \"A propósito, troquei a foto da minha mesa.\" \"Qual você colocou aí?\" \"Aquela foto minha com o meu pequeno Papai Noel.\"","O rosto de Ing se iluminou ao se lembrar daquele dia, o dia em que ela encontrou a felicidade repetidas vezes enquanto ainda vestia a fantasia de Papai Noel que usara para o...","fotos. Além disso, Napatr havia emoldurado as inúmeras fotos Polaroid que tiraram, em vez do cartão-postal que comprara na primeira vez que estiveram no resort, exatamente como Ing pedira. Era uma prova perfeita da atenção de seu amado.","O sol havia cumprido seu dever e desaparecido. A orla por onde caminhavam estava iluminada apenas por pequenas lâmpadas. No passado, Ing não teria ousado caminhar sozinha assim, nem mesmo em sua própria propriedade, mas agora era diferente. A partir daquele momento, ela sempre teria alguém para caminhar ao seu lado, alguém para segurar sua mão. Ela não precisava mais ter medo de nada.","Basta que ela tenha uma mão amiga, carinhosa e gentil, para guiá-la todos os dias.","Apenas um abraço carinhoso para segurá-la antes de dormir todas as noites. A partir de agora, com Napatr ao seu lado todos os dias, Ing não precisava de mais nada. O amor e o carinho que recebia eram tão abundantes que ela nunca precisou pedir. E retribuía na mesma medida. Embora o primeiro encontro deles não devesse ter levado a um amor assim... embora tenha sido ela quem tentou romper os laços depois da primeira vez que estiveram juntos... Por não querer que a outra pessoa levasse a sério o relacionamento, ela recebeu apenas sinceridade e devoção, contrariando seus avisos. E Ing ficou mais do que feliz em receber e retribuir esse carinho, sem jamais se sentir forçada. Embora essa fosse a pessoa que Ing jamais esperaria amar... uma vez que a amou, entregou seu coração por inteiro aos cuidados do seu amado. Ela nem sequer percebeu quando isso aconteceu. \"No ano que vem, vamos passar o fim do ano juntas assim de novo.\" Napatr apertou a mão dela delicadamente, falando de planos futuros sem o medo de que as coisas dessem errado, medo esse que ela costumava ter.","\"Seja no ano que vem ou em qualquer outro ano que se avizinha, vamos passar o ano velho até o fim e dar as boas-vindas ao novo juntos, querida.\"","Napatr sorriu amplamente e ergueu a pequena mão para lhe dar um beijo carinhoso. Quer fosse este ano ou qualquer outro, ela jamais soltaria esta mão. Ela o guardaria e o acalentaria para sempre. Assim como o amor que compartilhavam, o qual continuariam a dedicar um ao outro por muito, muito tempo. . . ---------O FIM-------","daphne.shn@gmail.com 11 de junho de 2026","No meu país... as expectativas sociais e as normas religiosas muitas vezes levam os homossexuais a casamentos heterossexuais para evitar o estigma familiar... Fui deixada para trás de novo... dessa vez sem nenhum drama, então pelo menos meus pais podem dormir tranquilos... Amanhã... enquanto ela caminha até o altar no seu casamento, eu estarei tocando (violino) \"Can't Help Falling in Love\""],"wordCount":7080}];</script>
<script>
// ── STATE ──
let cur = -1, paraIdx = 0, rate = 1, voice = null;
let zoomIdx = 3;
const ZOOMS = [70,80,90,100,110,125,140,160,185,210];
let lh = 1.9;
let isMatches = [], isMatchIdx = 0;
let noteParaIdx = -1;
let focusMode = false;

const synth = window.speechSynthesis;
let voices = [];

// ── PERSISTENCE ──
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem('cl_'+k)) } catch(e) { return null } },
  set: (k,v) => localStorage.setItem('cl_'+k, JSON.stringify(v))
};

let bookmarks = S.get('bk') || {};       // {chIdx: paraIdx}
let notes = S.get('notes') || {};         // {`${ch}-${para}`: text}
let readChapters = S.get('read') || {};   // {chIdx: true}
let lastRead = S.get('last') || null;     // {ch, para}
let readStartTime = null;
let totalReadMinutes = S.get('mins') || 0;

// ── INIT ──
function init() {
  buildList();
  loadVoices();
  restoreSettings();
  renderResume();
  updateSbStats();
  autoTheme();
  // Mobile: start with sidebar closed
  if (window.innerWidth <= 768) toggleSb(false);

  // Swipe support
  let tx = 0;
  document.getElementById('cWrap').addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive:true});
  document.getElementById('cWrap').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 60) {
      if (dx < 0 && cur < BOOK_DATA.length-1) loadChapter(cur+1);
      if (dx > 0 && cur > 0) loadChapter(cur-1);
    }
  }, {passive:true});
}

// ── BUILD SIDEBAR ──
function buildList() {
  const list = document.getElementById('chList');
  BOOK_DATA.forEach((ch, i) => {
    const d = document.createElement('div');
    d.className = 'ch-item' + (bookmarks[i]!==undefined ? ' bkd' : '');
    d.dataset.i = i;
    const wc = ch.wordCount ? `${(ch.wordCount/1000).toFixed(1)}k` : '';
    d.innerHTML = `<span class="bk">🔖</span><span class="ch-label">${esc(ch.title)}</span><span class="ch-wc">${wc}</span>`;
    d.onclick = () => loadChapter(i);
    list.appendChild(d);
  });
}

// ── VOICES ──
function loadVoices() {
  const populate = () => {
    voices = synth.getVoices();
    const sel = document.getElementById('voiceSel');
    sel.innerHTML = '';
    const pt = voices.filter(v => v.lang.startsWith('pt'));
    const rest = voices.filter(v => !v.lang.startsWith('pt'));
    [...pt, ...rest].forEach(v => {
      const o = document.createElement('option');
      o.value = voices.indexOf(v);
      o.textContent = `${v.name} (${v.lang})`;
      sel.appendChild(o);
    });
    const ptIdx = voices.findIndex(v => v.lang==='pt-BR'||v.lang==='pt');
    if (ptIdx>-1) sel.value = ptIdx;
    voice = voices[+sel.value] || voices[0];
    sel.onchange = () => { voice = voices[+sel.value]; };
  };
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = populate;
  populate();
}

// ── LOAD CHAPTER ──
function loadChapter(idx, jumpPara) {
  stopAudio();
  cur = idx;
  paraIdx = jumpPara !== undefined ? jumpPara : 0;

  // Track time on previous chapter
  if (readStartTime) {
    totalReadMinutes += (Date.now() - readStartTime) / 60000;
    S.set('mins', totalReadMinutes);
  }
  readStartTime = Date.now();
  readChapters[idx] = true;
  S.set('read', readChapters);

  document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
  const aEl = document.querySelector(`.ch-item[data-i="${idx}"]`);
  if (aEl) { aEl.classList.add('active'); aEl.scrollIntoView({block:'nearest'}); }

  const ch = BOOK_DATA[idx];
  document.getElementById('tbTitle').textContent = ch.title;

  const hasBk = bookmarks[idx] !== undefined;
  let html = `<div class="ch-top">
    <h1 class="ch-title">${esc(ch.title)}</h1>
    <div class="ch-meta-row">
      <span class="tag">${idx+1} / ${BOOK_DATA.length}</span>
      <span class="tag">${ch.wordCount?.toLocaleString()||'?'} palavras</span>
      <span class="tag">~${Math.ceil((ch.wordCount||1000)/200)} min</span>
      <button class="bk-btn ${hasBk?'on':''}" id="bkBtn" onclick="toggleBk()">${hasBk?'🔖 Marcado':'🔖 Marcar'}</button>
      ${hasBk?`<button class="bk-btn" onclick="loadChapter(${idx},${bookmarks[idx]})" style="color:var(--accent2)">↩ Ir ao marcador</button>`:''}
    </div>
  </div>`;

  ch.paragraphs.forEach((p, i) => {
    const noteKey = `${idx}-${i}`;
    const hasNote = notes[noteKey];
    html += `<p class="para${hasNote?' has-note':''}" data-p="${i}" onclick="speakFrom(${i})" oncontextmenu="openNote(${i},event)">${esc(p)}</p>`;
  });

  html += `<div class="ch-nav">
    <button class="navbtn" ${idx===0?'disabled':''} onclick="loadChapter(${idx-1})">
      <span>← Anterior</span>${idx>0?esc(BOOK_DATA[idx-1].title).substring(0,44):''}
    </button>
    <button class="navbtn" ${idx===BOOK_DATA.length-1?'disabled':''} onclick="loadChapter(${idx+1})">
      <span>Próximo →</span>${idx<BOOK_DATA.length-1?esc(BOOK_DATA[idx+1].title).substring(0,44):''}
    </button>
  </div>`;

  document.getElementById('chContent').innerHTML = html;
  document.getElementById('cWrap').scrollTop = 0;

  if (jumpPara > 0) {
    setTimeout(() => {
      const el = document.querySelector(`.para[data-p="${jumpPara}"]`);
      if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
    }, 120);
  }

  updateAudioLbl();
  saveLastRead(idx, paraIdx);
  updateSbStats();
  closeIS();
  if (window.innerWidth<=640) toggleSb(false);
}

// ── AUTO-CONTINUE ──
function onChapterEnd() {
  if (cur < BOOK_DATA.length-1) {
    showToast('▶ Iniciando próximo capítulo...');
    setTimeout(() => { loadChapter(cur+1); speakFrom(0); }, 1200);
  } else {
    showToast('🎉 Fim do livro!');
    stopAudio();
  }
}

// ── BOOKMARK ──
function toggleBk() {
  if (cur<0) return;
  if (bookmarks[cur]!==undefined) { delete bookmarks[cur]; showToast('Marcador removido'); }
  else { bookmarks[cur] = paraIdx; showToast('🔖 Marcado!'); }
  S.set('bk', bookmarks);
  const el = document.querySelector(`.ch-item[data-i="${cur}"]`);
  if (el) el.classList.toggle('bkd', bookmarks[cur]!==undefined);
  const btn = document.getElementById('bkBtn');
  if (btn) { btn.className='bk-btn'+(bookmarks[cur]!==undefined?' on':''); btn.textContent=bookmarks[cur]!==undefined?'🔖 Marcado':'🔖 Marcar'; }
  renderResume();
}

function renderResume() {
  const rc = document.getElementById('resumeCards');
  if (!rc) return;
  const keys = Object.keys(bookmarks);
  rc.innerHTML = '';
  if (lastRead) {
    const b = document.createElement('button');
    b.className = 'resume-card';
    const ch = BOOK_DATA[lastRead.ch];
    b.innerHTML = `▶ <span>Continuar: ${esc(ch?.title||'').substring(0,40)}</span>`;
    b.onclick = () => loadChapter(lastRead.ch, lastRead.para);
    rc.appendChild(b);
  }
  keys.forEach(k => {
    const b = document.createElement('button');
    b.className = 'resume-card';
    b.innerHTML = `🔖 <span>${esc(BOOK_DATA[k]?.title||'').substring(0,44)}</span>`;
    b.onclick = () => loadChapter(+k, bookmarks[k]);
    rc.appendChild(b);
  });
}

// ── NOTES ──
let _noteParaEl = null;
function openNote(pi, e) {
  e.preventDefault();
  noteParaIdx = pi;
  const key = `${cur}-${pi}`;
  const popup = document.getElementById('notePopup');
  document.getElementById('noteText').value = notes[key] || '';
  popup.style.left = Math.min(e.clientX, window.innerWidth-296)+'px';
  popup.style.top = Math.min(e.clientY, window.innerHeight-200)+'px';
  popup.classList.add('open');
  document.getElementById('noteText').focus();
}
function saveNote() {
  const key = `${cur}-${noteParaIdx}`;
  const val = document.getElementById('noteText').value.trim();
  if (val) { notes[key]=val; showToast('📝 Nota salva!'); }
  else { delete notes[key]; }
  S.set('notes', notes);
  const el = document.querySelector(`.para[data-p="${noteParaIdx}"]`);
  if (el) el.classList.toggle('has-note', !!val);
  closeNote();
}
function deleteNote() {
  const key = `${cur}-${noteParaIdx}`;
  delete notes[key];
  S.set('notes', notes);
  const el = document.querySelector(`.para[data-p="${noteParaIdx}"]`);
  if (el) el.classList.remove('has-note');
  showToast('Nota apagada');
  closeNote();
}
function closeNote() { document.getElementById('notePopup').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeNote(); closeIS(); } });

// ── INLINE SEARCH ──
document.getElementById('btnIS').addEventListener('click', () => {
  const s = document.getElementById('isearch');
  const open = s.classList.toggle('open');
  document.getElementById('btnIS').classList.toggle('on', open);
  if (open) document.getElementById('isInput').focus();
  else closeIS();
});
document.getElementById('isInput').addEventListener('input', function() { runIS(this.value.trim()); });
document.getElementById('isInput').addEventListener('keydown', e => { if(e.key==='Enter') isNav(1); });

function runIS(q) {
  clearISMarks();
  isMatches=[]; isMatchIdx=0;
  if (!q || cur<0) { document.getElementById('isInfo').textContent=''; return; }
  const ch = BOOK_DATA[cur];
  const rx = new RegExp(escRx(q),'gi');
  ch.paragraphs.forEach((p,i) => {
    const el = document.querySelector(`.para[data-p="${i}"]`);
    if (!el) return;
    if (rx.test(p)) {
      isMatches.push(i);
      el.innerHTML = p.replace(new RegExp(escRx(q),'gi'), m=>`<mark>${m}</mark>`);
    }
    rx.lastIndex=0;
  });
  document.getElementById('isInfo').textContent = isMatches.length ? `1/${isMatches.length}` : 'Nada';
  if (isMatches.length) scrollToISMatch(0);
}
function isNav(d) {
  if (!isMatches.length) return;
  isMatchIdx=(isMatchIdx+d+isMatches.length)%isMatches.length;
  document.getElementById('isInfo').textContent=`${isMatchIdx+1}/${isMatches.length}`;
  scrollToISMatch(isMatchIdx);
}
function scrollToISMatch(i) {
  const el = document.querySelector(`.para[data-p="${isMatches[i]}"]`);
  if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
}
function clearISMarks() {
  if (cur<0) return;
  document.querySelectorAll('.para').forEach(el => {
    const i = +el.dataset.p;
    if (BOOK_DATA[cur]?.paragraphs[i] !== undefined)
      el.innerHTML = esc(BOOK_DATA[cur].paragraphs[i]);
  });
}
function closeIS() {
  document.getElementById('isearch').classList.remove('open');
  document.getElementById('btnIS').classList.remove('on');
  document.getElementById('isInput').value='';
  document.getElementById('isInfo').textContent='';
  clearISMarks();
  isMatches=[];
}

// ── AUDIO ──
document.getElementById('btnAudio').addEventListener('click', () => {
  const ab = document.getElementById('audiobar');
  const on = ab.classList.toggle('open');
  document.getElementById('btnAudio').classList.toggle('on', on);
  document.getElementById('fab').classList.toggle('show', on);
  if (!on) stopAudio();
});
document.getElementById('aPlay').addEventListener('click', togglePlay);
document.getElementById('fab').addEventListener('click', togglePlay);
document.getElementById('aStop').addEventListener('click', () => stopAudio());
document.getElementById('aPrev').addEventListener('click', () => { if(paraIdx>0) speakFrom(paraIdx-1); });
document.getElementById('aNext').addEventListener('click', () => {
  const ch=BOOK_DATA[cur]; if(ch&&paraIdx<ch.paragraphs.length-1) speakFrom(paraIdx+1);
});

function togglePlay() {
  if (synth.speaking && !synth.paused) { synth.pause(); setPlayIcon('▶'); }
  else if (synth.paused) { synth.resume(); setPlayIcon('⏸'); }
  else speakFrom(paraIdx);
}

function speakFrom(i) {
  if (cur<0) return;
  stopAudio(false);
  paraIdx = i;
  speakPara();
}

function speakPara() {
  const ch = BOOK_DATA[cur];
  if (!ch || paraIdx>=ch.paragraphs.length) { onChapterEnd(); return; }
  const utt = new SpeechSynthesisUtterance(ch.paragraphs[paraIdx]);
  utt.rate = rate;
  utt.lang = 'pt-BR';
  if (voice) utt.voice = voice;
  utt.onstart = () => {
    hlPara(paraIdx); setPlayIcon('⏸');
    updateAudioLbl(); updateAProgFill();
    saveLastRead(cur, paraIdx);
    bookmarks[cur] = paraIdx; S.set('bk', bookmarks);
  };
  utt.onend = () => { clearHL(); paraIdx++; speakPara(); };
  utt.onerror = () => clearHL();
  synth.speak(utt);
}

function stopAudio(resetUI=true) {
  synth.cancel(); clearHL();
  if (resetUI) { setPlayIcon('▶'); document.getElementById('aProgFill').style.width='0%'; updateAudioLbl(); }
}
function setPlayIcon(ic) {
  document.getElementById('aPlay').textContent = ic;
  document.getElementById('fab').textContent = ic;
}
function hlPara(i) {
  clearHL();
  const el = document.querySelector(`.para[data-p="${i}"]`);
  if (el) { el.classList.add('speaking'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
}
function clearHL() { document.querySelectorAll('.para.speaking').forEach(e=>e.classList.remove('speaking')); }
function updateAProgFill() {
  const ch=BOOK_DATA[cur]; if(!ch) return;
  document.getElementById('aProgFill').style.width=(paraIdx/ch.paragraphs.length*100)+'%';
}
function updateAudioLbl() {
  const ch=BOOK_DATA[cur]; if(!ch) return;
  document.getElementById('aLbl').textContent=`Parágrafo ${paraIdx+1} de ${ch.paragraphs.length}`;
}
function setRate(r) {
  rate=r;
  document.querySelectorAll('.aspeed .sbtn').forEach(b=>b.classList.remove('on'));
  event?.target?.classList.add('on');
  if (synth.speaking) { const i=paraIdx; stopAudio(false); paraIdx=i; speakPara(); }
}

// ── ZOOM ──
function applyZoom() {
  const pct=ZOOMS[zoomIdx];
  document.documentElement.style.setProperty('--rs', (1.05*pct/100).toFixed(3)+'rem');
  document.getElementById('zVal').textContent=pct+'%';
  S.set('zoom', zoomIdx);
}
document.getElementById('zIn').onclick=()=>{ if(zoomIdx<ZOOMS.length-1){zoomIdx++;applyZoom();} };
document.getElementById('zOut').onclick=()=>{ if(zoomIdx>0){zoomIdx--;applyZoom();} };

// ── LINE HEIGHT ──
function setLH(v) {
  lh=v;
  document.documentElement.style.setProperty('--rl',v);
  S.set('lh',v);
}

// ── THEME ──
function setTheme(t) {
  document.body.classList.remove('sepia','light');
  if (t!=='dark') document.body.classList.add(t);
  S.set('theme',t);
}
function autoTheme() {
  const h = new Date().getHours();
  const saved = S.get('theme');
  if (!saved) { setTheme(h>=7&&h<20 ? 'sepia' : 'dark'); }
}

// ── FOCUS MODE ──
function toggleFocus() {
  focusMode=!focusMode;
  document.body.classList.toggle('focus',focusMode);
  document.getElementById('btnFocus').classList.toggle('on',focusMode);
}
document.getElementById('btnFocus').addEventListener('click', toggleFocus);

// ── STATS ──
document.getElementById('btnStats').addEventListener('click', openStats);
function openStats() {
  const total = BOOK_DATA.length;
  const read = Object.keys(readChapters).length;
  const pct = Math.round(read/total*100);
  const totalWords = BOOK_DATA.reduce((a,c)=>a+(c.wordCount||0),0);
  const readWords = Object.keys(readChapters).reduce((a,k)=>a+(BOOK_DATA[+k]?.wordCount||0),0);
  const mins = Math.round(totalReadMinutes);
  const bkCount = Object.keys(bookmarks).length;
  const noteCount = Object.keys(notes).length;
  const remaining = BOOK_DATA.slice(cur+1).reduce((a,c)=>a+(c.wordCount||0),0);
  const minsLeft = Math.ceil(remaining/200);

  const bkItems = Object.keys(bookmarks).map(k=>`
    <div class="bk-list-item">
      <span style="color:var(--accent)">🔖</span>
      <span>${esc(BOOK_DATA[+k]?.title||'').substring(0,38)}</span>
      <button onclick="closeStats();loadChapter(${+k},${bookmarks[k]})">Ir</button>
    </div>`).join('');

  document.getElementById('statsModal').innerHTML = `
    <h2>📊 Estatísticas</h2>
    <div class="stat-grid">
      <div class="stat-card"><span class="stat-num">${read}/${total}</span><span class="stat-desc">Capítulos lidos</span></div>
      <div class="stat-card"><span class="stat-num">${pct}%</span><span class="stat-desc">Progresso</span></div>
      <div class="stat-card"><span class="stat-num">${readWords.toLocaleString()}</span><span class="stat-desc">Palavras lidas</span></div>
      <div class="stat-card"><span class="stat-num">${mins} min</span><span class="stat-desc">Tempo lendo</span></div>
      <div class="stat-card"><span class="stat-num">${bkCount}</span><span class="stat-desc">Marcadores</span></div>
      <div class="stat-card"><span class="stat-num">${noteCount}</span><span class="stat-desc">Anotações</span></div>
    </div>
    <div style="font-family:var(--fu);font-size:.72rem;color:var(--muted);margin-bottom:8px">Progresso geral</div>
    <div class="stat-bar-wrap" style="height:6px;margin-bottom:20px"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
    ${cur>=0&&remaining>0?`<div style="font-family:var(--fu);font-size:.75rem;color:var(--muted);margin-bottom:16px">⏱ Tempo estimado para terminar: ~${minsLeft} min de leitura</div>`:''}
    ${bkItems?`<div style="font-family:var(--fu);font-size:.78rem;color:var(--muted);margin-bottom:6px;margin-top:4px">Seus marcadores</div>${bkItems}`:''}
    <button class="modal-close" onclick="closeStats()">Fechar</button>`;
  document.getElementById('statsOverlay').classList.add('open');
}
function closeStats() { document.getElementById('statsOverlay').classList.remove('open'); }

// ── SIDEBAR STATS ──
function updateSbStats() {
  const total=BOOK_DATA.length, read=Object.keys(readChapters).length;
  const pct=Math.round(read/total*100);
  document.getElementById('sbStats').innerHTML=`
    <div class="stat-row"><span>${read} de ${total} capítulos</span><span style="color:var(--accent)">${pct}%</span></div>
    <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pct}%"></div></div>`;
}

// ── SIDEBAR TOGGLE ──
let sbOpen=true;
function toggleSb(force) { sbOpen=force!==undefined?force:!sbOpen; document.getElementById('sidebar').classList.toggle('collapsed',!sbOpen); }
document.getElementById('btnSb').addEventListener('click',()=>toggleSb());

// ── SIDEBAR SEARCH ──
document.getElementById('sbSearch').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  document.querySelectorAll('.ch-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';});
});

// ── SCROLL PROGRESS ──
document.getElementById('cWrap').addEventListener('scroll',function(){
  const pct=this.scrollTop/(this.scrollHeight-this.clientHeight)*100;
  document.getElementById('rdprog').style.width=pct+'%';
  // update last read para based on scroll
  if (cur>=0) saveLastRead(cur, paraIdx);
});

// ── LAST READ ──
function saveLastRead(ch, para) { lastRead={ch,para}; S.set('last',lastRead); }

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key==='ArrowRight'&&cur<BOOK_DATA.length-1) loadChapter(cur+1);
  if (e.key==='ArrowLeft'&&cur>0) loadChapter(cur-1);
  if (e.key===' ') { e.preventDefault(); togglePlay(); }
  if ((e.ctrlKey||e.metaKey)&&e.key==='f') { e.preventDefault(); document.getElementById('btnIS').click(); }
  if (e.key==='+'||e.key==='=') { zoomIdx=Math.min(zoomIdx+1,ZOOMS.length-1); applyZoom(); }
  if (e.key==='-') { zoomIdx=Math.max(zoomIdx-1,0); applyZoom(); }
  if (e.key==='f'&&!e.ctrlKey) toggleFocus();
});

// ── SETTINGS ──
document.getElementById('btnSettings').addEventListener('click',()=>{
  const s=document.getElementById('settings');
  s.classList.toggle('open');
  document.getElementById('btnSettings').classList.toggle('on',s.classList.contains('open'));
});

// ── RESTORE ──
function restoreSettings() {
  const z=S.get('zoom'); if(z!==null){zoomIdx=+z;applyZoom();}
  const t=S.get('theme'); if(t){setTheme(t);document.getElementById('themeSelect').value=t;}
  const l=S.get('lh'); if(l) setLH(+l);
}

// ── TOAST ──
let _tt;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2600);
}

// ── UTILS ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

init();
</script>
</body>
</html>
