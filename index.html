 ao receber aqueles toques enquanto fingia não sentir nada, quando seu coração disparava a cada vez. \"Patr.\" Ing fechou os olhos, encostando o rosto no peito da mulher alta, onde podia ouvir claramente o coração dela acelerado. Estava descompassado, rápido e frenético, assim como o seu. Ela suspirou novamente, repassando mentalmente os vários acontecimentos do último mês. Repassou também seus próprios sentimentos confusos, que ainda não haviam se dissipado.","\"Não sei se você se sente desconfortável comigo, mas não precisa sentir nada agora. Posso esperar. Eu entendo.\"","Ela compreendia bem que a mulher menor devia estar bastante confusa. O relacionamento delas tinha sido apenas físico, e Ing deixara claro desde o início que não queria nada além disso. Foi ela quem, teimosamente, se apegou a esses sentimentos pelo outro. mulher.","Ela entenderia se não pudesse ter esses sentimentos correspondidos naquele momento. Ela entenderia se Ing não sentisse o mesmo. Mas queria que as coisas ficassem mais claras, tanto o relacionamento delas quanto a situação entre elas. \"Nunca te senti desconfortável. Mas...\" Napatr prendeu a respiração instintivamente ao ouvir aquele \"mas\". A voz doce que ouviu estava carregada de uma confusão que ela podia sentir. Napatr esboçou um leve sorriso no silêncio e na escuridão do quarto espaçoso. Ela fechou os olhos enquanto apertava um pouco mais o abraço, porque não sabia se, depois daquilo, voltaria a poder abraçá-la ou estar tão perto dela novamente. \"Por favor, não me ame.\" Ela mordeu o lábio, um sorriso de desespero surgindo em seus lábios. Mesmo sem ter grandes expectativas desde o início, receber uma resposta que não fosse uma rejeição direta ainda lhe causava uma dor profunda e oca. Napatr não respondeu nada. Ela encarava fixamente o quadro na parede do quarto oposto. Sentia-se entorpecida da cabeça aos pés.","Embora seus corpos estivessem pressionados um contra o outro e aquecidos, ela sentia como se seu próprio corpo tivesse ficado gelado, e não queria mais sentir nada.","Ela não conseguia ver a imagem na parede com clareza por causa da escuridão. Estava turva e fraca, assim como seus sentimentos naquele momento. Escuro e turvo a ponto de ela não saber o que fazer. Ela só conseguia continuar segurando Ing como antes. Ela não a soltou, mas o toque não...","A sensação de calor é a mesma de antes.",". sunyan"],"wordCount":2784},{"title":"13. Aconteceu mesmo","paragraphs":["Napatr abriu os olhos ao som da porta do quarto fechando, sabendo que era o dono da casa. Embora fraco, ela ouviu claramente, e um sorriso surgiu em seus lábios ao ouvir a porta da frente do apartamento abrir e fechar. O sorriso que surgiu não era de alegria, mas sim um sorriso fraco, de autocomiseração. Ela olhou para o relógio de mesa do outro lado da cabeceira. Eram 7 da manhã. Ela não tinha dormido nada esta noite. Aliás, simplesmente não conseguia dormir. Ela tinha medo de que, se acordasse, teria que encarar a mudança entre eles. Tinha medo de que, ao acordar, não encontrasse ninguém além de si mesma, exatamente como estava agora. Na verdade, mesmo sem ter dormido e estando ciente de cada movimento que Ing fazia, a sensação era ainda pior do que acordar. Se ela soubesse, teria preferido adormecer, porque, acontecesse o que acontecesse, a mudança entre eles já havia ocorrido. Napatr se sentou encostada na cabeceira da cama, levando a mão ao rosto por causa da tontura causada pela noite em claro. Ela se virou para olhar as chaves do carro que havia emprestado a Ing outro dia. A pequena mulher havia caminhado descalça até lá para colocá-las momentos antes, deixando um toque em sua bochecha que provavelmente não receberia novamente, daquele jeito que ela gostava de fazer, antes de sair do quarto. Ela pegou as chaves e as apertou com força, olhando fixamente ao redor do quarto espaçoso em que já havia se hospedado inúmeras vezes.","Uma hora antes, Ing havia gentilmente afastado o braço de Napatr, que a abraçava. Napatr sentiu a ponta de pequenos dedos traçando seu rosto. Ela ouviu um suspiro suave da pequena mulher antes de Ing sair da cama lentamente por volta das seis horas.","Era estranho que, mesmo de olhos fechados, seus ouvidos funcionassem incrivelmente bem. Ela ouviu Ing se trocando no banheiro, colocando algumas peças de roupa em uma mala, antes de ir até o carro para guardar as chaves, deixando um toque prolongado que deixou Napatr confusa sobre o motivo, e então saindo do banheiro. sala.","Ela estava curiosa e queria saber, mas não quis perguntar mais nada porque as ações de Ing já eram claras, mais claras do que as palavras ditas na noite anterior.","\"Por favor, não me ame.\" Napatr queria muito dizer que tentara conter seu coração desde o início, mas não conseguira impedi-lo. Ela não conseguia evitar ficar hipnotizada por aquele sorriso, aquele toque, aquela voz, ou mesmo aqueles gestos. E mesmo que pudesse voltar no tempo, Napatr ainda assim gostaria de dizer a Ing como se sentia. Ela entendia se Ing estivesse confusa. Ela entendia se Ing ainda quisesse apenas amar a si mesma, e sabia que contar isso a ela poderia deixá-la desconfortável.","Mas as ações deles e a maneira como se expressaram deram a ela um vislumbre de esperança, embora ela repetisse para si mesma todas as vezes que não deveria esperar nada.","Napatr talvez tivesse que esperar, mas agora estava claro que Ing nem sequer lhe daria permissão para esperar. Um suspiro pesado escapou de seu nariz. Ela olhou ao redor do quarto uma última vez antes de decidir levantar-se da cama, sem se esquecer de pegar as chaves do carro que a outra mulher havia devolvido intencionalmente.","Ela foi juntar suas coisas, suas roupas e pequenos objetos pessoais, em uma sacola de papel, sabendo exatamente onde a guardava. Ela olhou ao redor do luxuoso e espaçoso apartamento mais uma vez antes de fechar a porta suavemente, embora seu corpo estivesse pesado. Napatr sentia-se à deriva, solitária de uma forma que não conseguia descrever. Era como se lhe tivessem tirado o fôlego. Ing tinha levado o seu coração consigo. Antes batia de forma constante, mas agora acelerava por causa dela; era por isso que o seu peito se sentia tão vazio. O vazio era tão grande que se transformou em lágrimas, que Napatr se esforçou ao máximo para não deixar cair, recusando-se a demonstrar sua própria fraqueza. Após passar uma hora dirigindo, Napatr abriu a porta de sua própria casa. Embora o trânsito não estivesse tão congestionado quanto o normal, ela não tinha certeza se o atraso se devia à sua distração ou ao fato de o assento ao lado dela estar vazio.","O leve aroma de um difusor de aromas e de um produto de limpeza para pisos atingiu seu nariz assim que ela entrou. A empregada doméstica devia ter terminado a limpeza e acabado de sair. Ela suspirou ao fechar a porta e usou o controle remoto para abrir as cortinas blackout da casa, deixando a luz natural das 9h da manhã brilhar através das cortinas transparentes.","Mamãe projetou e construiu esta casa para ela porque ficava perto do hospital onde trabalhava, embora ela tivesse discutido com a família que poderia descansar no hospital ou voltar dirigindo para a casa principal da família. \"Caso você queira que alguém fique aqui com você no futuro.\" Naquele momento, ela só conseguiu rir, pois jamais sonhara em ter alguém com quem ficar no futuro. Ela nunca pensou que amaria alguém além de si mesma e de sua família. Ela nunca imaginou que usaria o pouco tempo livre que tinha para conhecer...","alguém.","Mas se pudesse voltar no tempo, Napatr faria exatamente o que fez, porque acreditava ter dado tudo de si. Ela nunca se fechou para o mundo e se esforçou ao máximo para conter seus sentimentos. Ing não estava errada em fugir. Ela não estava errada em dizer isso a ela. Ambas estavam sendo honestas com seus próprios sentimentos. Se alguém tinha culpa, provavelmente era o tempo. Ela havia entrado no momento em que Ing não queria ninguém, ou talvez quisesse, mas não era Napatr. Napatr afundou no sofá bege em frente à TV, colocando a sacola de papel contendo suas roupas usadas e pertences pessoais sobre a mesa de vidro, junto com as chaves do outro carro que Ing havia trazido de volta para o apartamento outro dia. Ela encarou fixamente a sacola de papel que acabara de colocar sobre a mesa. O cheiro do apartamento, o leve aroma de suas roupas lá dentro, tudo era familiar, algo que ela sempre adorara. Ainda impregnava tudo dentro da sacola de papel, talvez até a própria sacola, que absorvera o perfume. Ela gostou, embora nunca tivesse contado à outra mulher. Mas talvez fosse melhor assim; bastava que Ing soubesse o que ela sentia. Para alguém que não sentisse o mesmo, saber o quanto Napatr amava seu perfume provavelmente pareceria estranho ou trivial. A mulher alta suspirou e inclinou a cabeça para trás, apoiando-a nas almofadas do sofá, encarando fixamente o teto branco e brilhante. Ela vinha suspirando com frequência desde a semana passada. Aliás, hoje já havia suspirado mais do que em toda a semana anterior. Wan havia dito que, durante aquela semana, Napatr parecia uma pessoa de coração partido, distraída e desorientada. Mas Napatr pensava que, desta vez, ela estava verdadeiramente de coração partido, talvez pela primeira vez na vida. Ela descruzou os braços e colocou a mão na almofada do sofá, acariciando-a suavemente. Seus olhos penetrantes fitaram o espaço vazio ao seu lado. Será que foi ontem que eles estavam encostados um no outro, sentados tão perto, ali mesmo?","Será que foi apenas há alguns dias que eles compartilharam um beijo apaixonado e profundo, e ela recebeu esses toques carinhosos repetidas vezes exatamente neste mesmo lugar? E será que foi apenas na noite passada que ela recebeu aquele doce sorriso e olhou para o rosto da mulher por quem se sentia atraída, a pessoa que ela 'amava', com um olhar que não escondia nada? E será que foi só esta manhã que a sua bochecha direita recebeu o toque daqueles belos lábios, pressionando-a suavemente? Napatr suspirou, exausta. Não estava fisicamente cansada como de costume, mas seu coração estava pesado além das palavras. Seu peito parecia oco e trêmulo, um vazio tão profundo que ela não conseguia explicar. Seu coração batia tão fracamente que ela precisou levar a palma da mão ao peito, sentindo-o através da blusa, apenas para perceber que estava usando a blusa de pijama da outra mulher que havia pegado em casa. Ela soltou um suspiro novamente. Isso seria mais uma coisa pendente entre eles, sem mencionar o cartão-chave do condomínio e o carro dela que ainda estava estacionado lá.","Napatr não tinha como dirigir os dois carros de volta. Ela não queria incomodar mais ninguém, e muito menos Ing. Ela se endireitou, pegando a sacola de papel para ir em direção ao quarto. Seus olhos se fixaram em seus pés descalços enquanto caminhava. A frieza das tábuas do assoalho pressionando as solas dos seus pés não era nada comparada ao seu coração... que batia tão fracamente e se sentia tão solitário. Ela olhou para os próprios pés porque não queria olhar para cima e ver cada canto da casa onde imagens de alguém de quem sentia falta estavam sobrepostas. A sensação era mais triste e solitária do que antes. Desta vez, a saudade era mais lancinante do que nunca, incomparável. Pensar que entrar no quarto seria melhor do que ficar sentado lá fora foi um erro. Foi um fracasso ainda maior. Porque o quarto, o","As almofadas e o banheiro estavam todos repletos de vestígios daquela mulher pequena. Napatr sentou-se na beira da cama, sentindo-se perdida. Seus olhos se voltaram para o criado-mudo com uma gaveta escondida. Ela a abriu. Dentro havia uma coleção de cartões-postais que comprara no resort de Ing. Outra parte estava em sua mesa de escritório, evidência de quanto ela se importava e tinha interesse na outra mulher, provavelmente há muito tempo. Naquela época, ela pretendia guardá-las para se lembrar do toque doce, para se lembrar da mulher que um dia a fez esquecer tudo ao seu redor e se concentrar apenas nela. Mas desta vez, a saudade a atacou com mais intensidade do que antes.","Seus dedos traçaram delicadamente a imagem da praia onde haviam compartilhado o mesmo ar tantas vezes. Um leve sorriso surgiu em seus lábios, mas seus olhos brilharam de emoção ao se lembrar daquele momento. Embora seus sentimentos naquela época não fossem tão claros quanto agora, ela ainda tinha Ing, mesmo que tivesse sido ela quem se afastou primeiro depois. Talvez fosse o destino, ou algo que a fizesse perceber. Certa vez, ela fizera o mesmo com Ing: virara as costas, desaparecera e a cortara pela raiz. contato. Napatr recolocou o cartão-postal e fechou a gaveta. Suspirou mais uma vez antes de se deitar na cama macia. Sua mão acariciou o travesseiro, acariciando o espaço vazio ao seu lado como uma louca, sabendo que não podia fazer mais nada além disso.","A sensação calorosa do seu beijo suave e intencional naqueles lábios lindos ainda estava vívida, sem que eu soubesse que poderia ser a última vez. Embora tivesse prometido a si mesma que cuidaria daquela mulherzinha até que ela não fosse mais desejada, não conseguia acreditar que tudo tivesse acontecido tão rápido, tão rápido que havia sido apenas algumas horas atrás.","A lâmpada ativada por voz que ela havia pedido permissão para instalar, e que o proprietário havia autorizado a modernizar para facilitar o uso quando não quisessem se separar, ainda nem havia sido instalada. Tudo aconteceu tão rápido que Napatr não teve tempo de se preparar. \"Minha casa é como a sua casa.\" Ing disse, exatamente como já havia dito antes.","Napatr compreendeu e percebeu de verdade que \"lar\" tinha um significado muito mais profundo. Sua casa, onde ela estava agora, ainda era uma casa, mas em seu coração, ela sentia como se não tivesse retornado ao seu lar. Sua casa agora era solitária, à deriva e sufocante. E agora, sua casa fazia seu coração bater tão fracamente que ela mal conseguia ouvi-lo. Ela havia retornado para casa apenas fisicamente, mas seu coração havia partido para alguém por quem ela ansiava a cada instante. Ela tirou o celular do bolso com hesitação. Napatr o segurou por um longo tempo, a tela fixa em um número que ela havia memorizado após ligar apenas algumas vezes. Seus dedos tremeram levemente antes que ela decidisse, após muita deliberação, apertar o botão de chamada. O primeiro tom de discagem longo fez seu coração, que estava calmo, acelerar. Não era o ritmo de nervosismo de antes, mas um ritmo frenético que ela reconheceu desta vez como \"medo\". Napatr deixou soar assim até a quinta vez. Ela se lembrava claramente daquela voz doce dizendo que, se fosse ela, Ing jamais a ignoraria dessa forma. A mulher mais baixa tinha dito isso. Mas agora, não era mais a mesma coisa. Ela havia se tornado outra pessoa completamente diferente, em menos de vinte e quatro horas. Sua mão, que já tremia, estremeceu ainda mais. Ela apertou o botão vermelho para cancelar a chamada. Ela ainda tinha coisas a discutir. Não era nada vital, mas Napatr só queria combinar um horário em que a outra mulher estaria livre para buscar o carro e devolver o pijama.","estava vestindo no momento.","Mas parecia que Ing não queria falar com ela de jeito nenhum.","Ela percebeu, sentiu e compreendeu agora que talvez, em certas situações, os sentimentos devessem ser guardados para si. Mas também sabia que todas as suas ações naquele momento representavam mais do que as ações comuns de pessoas comuns.","Eles não eram meros conhecidos, devido aos toques profundos e doces que trocavam.","Elas não eram irmãs; nenhuma irmã faria uma coisa dessas.","Eles não estavam \"se vendo\" . Embora tudo parecesse indicar o contrário, Napatr sabia que não era verdade.","Um relacionamento temporário provavelmente foi o que melhor se adequou a eles durante esse período. Não por ela, que queria um relacionamento de verdade, mas pela outra mulher. Ela não tinha certeza do que se passava na cabeça de Ing. Ela não se atrevia a pensar nisso, e tinha medo de fazê-lo.","Seus dedos fecharam todas as abas abertas na tela. De repente, seus olhos pararam no site que ela havia pesquisado na noite anterior.","O site online do Loy Krathong.","O desejo que ela digitou de forma opressiva quando Ing não estava olhando, o desejo que ela esperava para o futuro.","Ela não conseguia acreditar que o futuro que havia imaginado fosse tão curto.","O celular fino estava sobre a cama, pois ela não se importava mais com ele. Napatr encarava o vazio, respirando lentamente pela boca porque seu nariz não estava funcionando direito. Sua visão ficou turva, perdendo o foco até que seu rosto, antes calmo, se contorceu. Seu coração parecia estar sendo apertado violentamente por uma mão invisível. Um nó na garganta se formou em seu pescoço, um soluço que ela não conseguia engolir.","O calor lhe percorria as orelhas repetidamente. A decepção e a dor a atacavam enquanto a história do passado se desenrolava em cenas em sua mente. Aquele rosto doce, aquele sorriso doce, aquela voz doce, aquele toque doce e aquela intimidade profunda — ela sabia que tudo aquilo realmente tinha acontecido.","Mas, daqui para frente, provavelmente isso não acontecerá mais. .","sunyan"],"wordCount":2518},{"title":"14. Medo","paragraphs":["\"O Dr. Napatr não está no turno da noite hoje?\" \"Sim, por quê?\" Mind, uma jovem enfermeira, respondeu à sua colega próxima, erguendo os olhos do trabalho para encontrar o olhar de Fai com uma expressão confusa.","O ambiente no hospital hoje estava agitado; havia mais pacientes do que o normal, provavelmente porque o festival de ontem causou alguns acidentes. Embora em menor número do que no Ano Novo ou no Songkran, as pessoas ainda estavam imprudentes o suficiente para beber e dirigir. \"Já vi o Dr. Napatr passar por aqui com uma xícara de café pela terceira vez.\" \"Bem, este é o hospital dela. Não é estranho que ela esteja aqui.\" \"Mas nas três vezes, as xícaras de café não eram as mesmas.\" \"Talvez ela beba devagar.\" \"Dr. Napatr? Andando sem rumo com uma xícara de café na mão? Isso é totalmente fora do comum.\" A mente silenciou, absorta em pensamentos.","Era realmente incomum, exatamente como sua amiga havia dito. A Dra. Napatr era sempre serena. Nunca era vista bebendo café, exceto em seus aposentos privados, e jamais demonstrava qualquer expressão que não fosse um olhar calmo e firme.","Ela podia parecer inacessível ou indiferente, mas, na realidade, a herdeira do hospital era bastante gentil e amigável. \"E sabe de uma coisa, Mind? O Dr. Napatr está fazendo visitas desde o meio-dia de hoje.\" Mind franziu a testa, pensando na mensagem que seu \"parceiro\", com quem ela havia reatado há pouco mais de uma semana, enviara naquela manhã. Dizia que sua melhor amiga tinha ido visitá-la em seu apartamento. Ou talvez os dois estejam se desentendendo? E quem foi a incompreendida? Mesmo amando sua amiga, Mind se viu tomando o partido do médico. \"Tem certeza de que o Dr. Patr já tomou três xícaras de café?\" \"Quatro.\"","\"O que?\" \"Olhe ali...\" Mind seguiu o olhar de Fai enquanto ela se virava. Ela avistou o Dr. A figura alta e esguia de Napatr caminhando em direção à sala de descanso dos médicos, do outro lado do prédio. Ela não viu nenhum café na mão dela, como Fai havia dito, mas a pressa com que ela se movia a surpreendeu. Normalmente, a Dra. Napatr não era alguém que se apressava, certamente não alguém que andava meio correndo daquele jeito. \"Há algum caso de emergência?\" \"Não. Mesmo que existisse, não seria do Dr. Patr.\" Era verdade. Embora Napatr fosse uma cirurgiã habilidosa, talentosa e calma como sua mãe, a Dra. Pleng, a equipe conhecia a agenda de todos. No momento, Napatr não tinha outras obrigações além de acompanhar os pacientes, que, aliás, eram pacientes de outros médicos. Não havia nada para ela fazer hoje.","\"Esqueçam isso, vamos voltar ao trabalho.\"","Apesar da curiosidade, Mind optou por se concentrar em suas responsabilidades. Ela ignorou tanto suas próprias suspeitas quanto as de seu colega próximo, Fai, que geralmente era quieto, mas que hoje falava mais do que o habitual, provavelmente movido pela mesma curiosidade. Não era que eles nunca tivessem visto Napatr agir como uma viciada em trabalho, mas ultimamente ela não vinha se sobrecarregando incessantemente como alguém tentando pagar uma dívida. Estava assim há quase um ano, desde que sua mãe a repreendeu no meio do hospital. Uma notificação de bate-papo soou suavemente enquanto a tela se iluminava. Mind desviou o olhar do trabalho para checar o celular. Ela leu uma mensagem da melhor amiga, que provavelmente era a causa do comportamento estranho de Napatr hoje. Nesse mesmo instante, o telefone interno do escritório tocou. Fai atendeu com uma voz doce que contradizia completamente sua personalidade habitual.",". [Vou ficar na sua casa hoje à noite. Não estou pedindo permissão. Só considere isso um aviso prévio, ok?] . Mind encarou a mensagem de Ing com uma expressão vazia. Não era que ela estivesse irritada com a amiga, mas sim porque a mensagem confirmava suas hipóteses.","\"Atenção, o Dr. Napatr está chamando você.\" \"Huh?\" \"Ela está irritada. Você fez alguma coisa para chateá-la?\" \"Não seja bobo. Já volto.\"","Mind nem sequer tinha levantado a mão para bater, como costumava fazer, quando a porta castanha-clara deslizou e se abriu. Mal teve tempo de oferecer um sorriso a Napatr. \"Cheguem em primeiro lugar, Mathura.\"","\"É a mente.\" \"Mente.\" Napatr esboçou um leve sorriso ao ouvir a forma como a enfermeira se dirigiu a ela. A jovem enfermeira era uma amiga íntima daquela mulher franzina que significava tanto para Napatr. Ela já havia perdido a conta de quantas vezes Mind lhe pedira para usar seu apelido em vez de seu primeiro nome. Mas, como Napatr a chamava de \"Mathura\" há muitos anos, ela achava difícil mudar da noite para o dia. Como todas as mudanças, Napatr sabia que tinha que aceitá-las; só que às vezes era pega de surpresa, como naquele momento. . \"O senhor está bem, doutor?\" Mind perguntou porque acabara de notar o cateter intravenoso no pulso de Napatr. Ela não sabia se a médica alta o havia inserido sozinha ou pedido a outra enfermeira, mas Mind suspeitava que Napatr provavelmente tivesse feito sozinha. \"Não tenho dormido muito. Estava com medo de não aguentar o turno da noite.\" Napatr explicou. Ela viu as sobrancelhas de Mind se franzirem enquanto seus grandes olhos fitavam a agulha no pulso de Napatr. Napatr fez um gesto para que Mind entrasse antes de fechar a porta.","Ela havia notado várias enfermeiras observando com curiosidade e tinha certeza de que rumores estranhos surgiriam. Talvez por ser a única filha de Mamãe e Mamãe, e a única neta de seu avô, tudo o que ela fazia parecia estar sob supervisão.","escrutínio constante. \"O senhor bebeu todas essas quatro xícaras, doutor?\" Mind viu as xícaras de café enfileiradas na mesa da médica, exatamente como Fai havia descrito. Ela se virou para olhar para a médica, que estava arrastando o suporte do soro para se sentar em seu lugar de costume. Então, os olhos desobedientes de Mind avistaram algo que não deveria estar na mesa de Napatr. Ali estavam expostos dois cartões-postais de uma estância balnear muito familiar. Ela os reconheceu não só porque já se hospedara lá, mas porque aquele lugar pertencia à sua melhor amiga. \"Que...\" \"Hum... eu os comprei.\" Napatr disse, sentindo uma inexplicável sensação de constrangimento. Ela se sentiu desconfortável por Mind ter visto os cartões-postais do resort da amiga emoldurados e colocados em sua mesa, bem ao lado das fotos de sua própria família. Isso revelava o quanto aquela pessoa significava para ela. \"Oh, elas são muito bonitas.\" \"Por favor, sente-se.\" \"Há algo em que eu possa ajudá-lo, doutor?\" \"Bem, algo assim. Será que você poderia, por favor, devolver algo para Ing?\"","Mais uma vez, Mind percebeu que a voz de Napatr estava muito mais rouca do que o normal. Além disso, a médica parecia não estar ali, aplicando soro em si mesma; ela tinha a aparência de quem deveria ser internada como paciente.","Seu rosto, antes belo e expressivo, estava estranhamente pálido, e seus olhos tão vermelhos e inchados que Mind preferiu não arriscar um palpite. Seu olhar era vago, solitário e desprovido do brilho habitual. Um saco de papel pardo de tamanho médio foi deslizado pela mesa. Mind franziu a testa antes de olhar novamente para o médico alto. \"Por que você não espera e dá para o Ing você mesmo? Hoje.\" Mind quase deixou escapar que Ing estava hospedada em seu apartamento hoje. Ela viu o olhar vago nos olhos da médica oscilar visivelmente. Os lábios finos do médico, desprovidos do batom claro habitual, estavam firmemente pressionados um contra o outro, um hábito do qual a dona provavelmente nem tinha consciência. \"Ing provavelmente está ocupado. Posso incomodá-lo, por favor?\" \"Vocês dois não conversaram?\" Mind sorriu, tentando provocar a Dra. Napatr como fizera antes. Mas quando viu a médica baixar ligeiramente o olhar e balançar a cabeça negativamente, Mind apenas assentiu sem jeito e ofereceu um sorriso forçado. A suspeita dela estava correta. Havia um problema entre os dois, sério o suficiente para que tivessem devolvido os pertences um do outro. \"Claro. Vou entregar para ela.\"","\"Muito obrigada, Mind. Está tudo bem com seu ex?\", perguntou Napatr com um sorriso.","Desde que se conheceram, Mind nunca havia aberto seu coração para ninguém. A primeira vez que Napatr a viu caminhando de braços dados com uma mulher alta e loira, ficou bastante surpresa e genuinamente feliz por Mind finalmente ter se aberto.","Ver alguém com quem trabalhava desde o início tão feliz, com a alegria estampada nos olhos, fez Napatr se sentir feliz também.","Para Napatr, o amor era uma maravilha. Podia trazer tanto felicidade quanto dor. Embora não fosse a única coisa que as pessoas buscavam na busca pela felicidade, ela não podia negar que, para muitos, desempenhava um papel significativo. \"Ela é minha atual\", respondeu Mind, com o rosto corando. Ela riu baixinho ao ver a expressão de surpresa do Dr. Napatr, antes de abrir um largo sorriso. \"Você parece muito feliz.\" Mind não disse mais nada. Ela sabia que não era o momento certo para falar sobre sua própria felicidade. O que ela realmente queria dizer era que, antes, quando vira Napatr sorrindo para si mesma depois de ligar para sua melhor amiga, a médica parecera igualmente feliz. Mas hoje, Napatr demonstrava apenas tristeza e solidão.","Mind sabia que Napatr estava tentando esconder isso, mas, tendo trabalhado juntas por tanto tempo, ela conseguia perceber na hora. \"Bem, vou deixar isso com você, Mind. E espero que você sorria assim todos os dias.\"","Mind voltou ao trabalho com o saco de papel contendo o pijama recém-lavado que Napatr lhe pedira para devolver a Ing, como se quisesse romper qualquer laço que ainda restasse entre eles. Para Napatr, quando ela se esforçava, dava o seu melhor absoluto. Se gostava de alguém ou sentia algo profundamente, nunca se reprimia. Mesmo que não recebesse nada em troca, estava tudo bem. Ela sentia que tinha se entregado por completo, sem reservas, e não havia mais nada a lamentar. Embora a resposta de Ing não tivesse sido uma rejeição direta, Napatr também não a considerou positiva. A outra mulher não queria começar um relacionamento desde o início, mas Napatr tinha sido teimosa o tempo todo. Ela não conseguia interpretar as palavras \"Não gosta de mim\" de outra forma.","Seu olhar recaiu novamente sobre os cartões-postais em sua mesa. Ela soltou um suspiro suave antes de abrir a gaveta e guardar os dois cartões-postais lá dentro. Sua mão delicada deslizou a gaveta, fechando-a. Assim que conseguisse parar de pensar na pessoa que tirou aquelas fotos, ela as pegaria de volta e as colocaria sobre a mesa sem hesitar. O celular estava sobre a mesa. Dois meses atrás, não passava de uma ferramenta de emergência para o trabalho, amigos e família. Agora, havia voltado a ser apenas isso, um aparelho que ela usava para contatar apenas algumas pessoas. A pessoa com quem ela costumava conversar todos os dias simplesmente sumiu, não retornava as ligações, não entrava em contato.","Napatr sempre aprendera que nada dura para sempre. Ela acreditava nisso, mas nunca imaginou que enfrentaria uma mudança tão repentina e drástica.","A doce voz que outrora sussurrara em seu ouvido ainda era nítida. A voz que implorava: \"Só não desapareça.\" Essas palavras fizeram Napatr assentir firmemente, depositando um beijo naqueles belos lábios como um voto silencioso. Mas agora, a pessoa que havia feito aquele pedido estava fazendo exatamente o oposto, se distanciando, fugindo, deixando Napatr em um vazio, presa em um sentimento unilateral.","Não, Napatr não a culpava por não sentir o mesmo. Ela entendia tudo e sempre tentara ser compreensiva, mesmo se sentindo abandonada, como se a outra pessoa tivesse levado consigo a felicidade de Napatr.",". . Ing usava uma máscara cirúrgica branca na pequena sala de reuniões ao lado do grande salão de conferências, onde acionistas e executivos da família estavam reunidos em caráter de emergência.","Embora fosse uma das executivas e herdeira do presidente da empresa, ela não teve permissão para entrar. Quem a impediu foi ninguém menos que sua própria mãe.","Embora o assunto não a envolvesse diretamente, a situação interna dizia respeito a uma ex-melhor amiga que havia causado inúmeros problemas. Foi a própria Ing quem teve a bondade de permitir que essa ex-amiga trabalhasse com ela.","Ela havia confiado nela, oferecendo-lhe várias oportunidades porque a amiga havia pedido. Ing sabia apenas parcialmente o que essa ex-amiga havia feito pelas costas. cenas.","Sempre que surgia um problema, sempre que havia reclamações, era sempre ela quem intervinha para resolver as coisas, solucionando problemas durante anos sem receber reconhecimento. Talvez alguém soubesse. Ing achava que só a Mamãe Nook sabia de tudo o tempo todo, mas ela nunca se envolveu, dizendo que era um assunto pessoal. \"Fui eu quem contou para sua mãe sobre o Amp.\" Enquanto falava, Ing olhou para outra pessoa que amava, e o silêncio tomou conta do ambiente, assim como seus próprios pensamentos. Nook acomodou-se no sofá ao lado dela antes de colocar uma xícara de seu café favorito, o primeiro que Ing aprendera a beber. Quem a ensinara era ninguém menos que a Mamãe Nook, que agora a observava com preocupação.","\"Você não está bravo comigo, está? Se estiver, eu entendo. De verdade.\" \"Não estou zangada com você, mamãe.\" Nook sorriu. Olhou para sua única filha, a quem criara com puro amor e benevolência. Ing era uma menina gentil e compassiva, que jamais guardava rancor. Nook sabia que, mesmo se tivesse contado à mãe de Ing antes, a menina não teria ficado zangada.","\"Você não vai ligar de volta, querida?\" Nook percebeu que sua filha estava olhando fixamente para o celular desde o início. Ela não conseguia ler o nome claramente, mas o texto em vermelho indicava uma chamada perdida. Sua filha ficou olhando fixamente para a tela por um longo tempo até que Nook, que estava atrás dela, finalmente se pronunciou. \"Eu... eu não me atrevo.\"","Ing nem sequer se atreveu a atender. Ela sabia que não sabia o que fazer. Nunca houve nada claramente definido entre eles desde o início. Talvez a culpa também fosse dela, um mau hábito seu, deixar as coisas entre eles irem longe demais sem nunca dar um nome à situação. E quando Napatr expressou seus sentimentos tão claramente, ela hesitou e os reprimiu, apesar de nutrir fortes sentimentos por Napatr. \"É a mesma pessoa da praia?\"","Ing assentiu com a cabeça.","Naquela época, a mamãe havia pedido a ela que trouxesse Napatr para uma refeição, e Ing planejava convidá-la para casa assim que ela voltasse e terminasse seu trabalho, exatamente como havia dito, se Napatr estivesse livre, como ela havia perguntado certa vez. Ela queria que Napatr conhecesse a mamãe e a mãe, assim como Napatr havia apresentado Ing à sua própria família, mesmo que apenas por meio de fotos. \"Você não sente por ela o mesmo que sentia por Amp?\" Ing ficou em silêncio, com os olhos fixos no chão. Ela não ousava encarar a mamãe, pois sabia melhor do que ninguém que seus sentimentos por Napatr não eram os mesmos que os de Amp. Era algo muito mais profundo, e não superficial como antes.","\"Quando estou com ela, me sinto seguro. Não preciso me esforçar para ser alguém que a impressione. Não preciso me preocupar com nada. Estamos satisfeitos um com o outro.\"","Em todos os sentidos, incluindo, hum...\"","\"N-Não diga isso. Senão, vou começar a me sentir muito protetora com a minha filha.\" Nook franziu as sobrancelhas.","Ela sabia o que a filha queria dizer e sentiu o rosto corar ao imaginar a profundidade da relação entre elas. \"Mamãe, agora eu sou adulto.\" \"Quando olho para você, ainda vejo a menininha de cabelos trançados, vestida de fada rosa, andando de bicicleta com rodinhas.\" Ing não conseguiu evitar revirar os olhos. Ela não sabia como fazer a mamãe esquecer aquela imagem. A mamãe até tinha ampliado uma foto dela naquela bicicleta e colocado na parede. Apesar de a mãe lhe ensinar a se vestir de acordo com a sua idade e a usar maquiagem, a mamãe ainda estava presa a uma lembrança de quando Ing tinha sete anos. Nook riu e estendeu a mão para acariciar os cabelos ruivos da filha. Ing estava em Bangkok havia quase uma semana e já havia mudado a cor do cabelo.","Ing é tão bonita quanto sua mãe, tanto que elas parecem quase idênticas.","\"Se você não gosta dela, simplesmente diga. Não a deixe pensando demais sozinha.\" Antes de se tornar parte da família, a mãe de Ing havia se isolado da mesma forma que Ing estava fazendo agora. Nook percebia que sua filha, que agora tinha idade suficiente para ter uma família e um namorado, sentia algo profundo por essa pessoa, mas simplesmente hesitava. \"Mas não goste dela só porque ela gosta de você. Não goste dela só porque ela estava lá quando você não tinha ninguém. Entendeu o que eu estou dizendo?\" Ing olhou para o chão.","O rosto de Napatr me veio vividamente à mente. O toque gentil, a doçura, o calor, o leve sorriso que ela sempre tinha. O cuidado silencioso, oferecido livremente sem que fosse pedido. Com ela, Ing podia ser ela mesma, sem esforço ou fingimento. Só a presença dela já bastava para se sentir segura. Mesmo sem uma única palavra de conforto, ela conseguia sentir, conseguia perceber. Ing conhecia o próprio coração. Ela sentia o mesmo pela outra mulher. Mas, por medo, ela deu essa resposta ontem à noite, mesmo com o coração acelerado. A felicidade que a invadiu, o calor que subiu ao seu rosto ao ouvir as palavras de Napatr, tudo era real. No entanto, sua boca dissera algo diferente, contradizendo seus verdadeiros sentimentos. Os dedos da mamãe roçaram seu rosto, enxugando as lágrimas que Ing nem sequer percebera que estavam caindo. Ing não ergueu os olhos para encarar os da mãe. A última vez que chorou na frente da família também foi por amor. Naquela época, ela amava, mas não era correspondida. Desta vez também. O medo pode fazê-la perder Napatr. \"Dói-me um pouco o coração ver a minha filha a chorar de amor outra vez\", resmungou Nook em tom de brincadeira. A mãe de Ing já sabia sobre a pessoa misteriosa da praia. Sua esposa apenas franziu a testa e a repreendeu por manter segredo, mas não se intrometeu na vida privada da filha. Nook também não se intrometeria, embora não estivesse disposta a deixar Ing fora de sua vista.","\"Mamãe, você não vai me deixar ficar com ninguém?\" \"Ninguém está te impedindo. Você é quem está se impedindo.\" Nook caiu na gargalhada quando sua filha, cujo rosto estava molhado de lágrimas, tirou a máscara e deu um tapinha brincalhão na coxa de Nook.","Nook percebeu que o belo rosto, tão parecido com o de sua mãe, estava sem maquiagem, e compreendeu a enorme influência que aquela pessoa exercia sobre sua filha. \"A reunião terminou. Se você não sente nada pelo seu amigo, não há motivo para ficar triste.\" \"O que você quer dizer?\" \"Amp foi demitida da empresa. Sua mãe está processando-a por fraude e reaver tudo, inclusive as ações. E vamos registrar uma queixa sobre ela ter pegado seu carro sem permissão.\" \"É só vender.\"","\"?\" \"Esse carro... venda-o. Não vou mais usá-lo. Não quero.\" \"Você é tão assustadora quanto sua mãe.\"","\"Mamãe!\" Nook sorriu e acariciou suavemente os cabelos de sua única filha. Não havia choque nos olhos de Ing, como ela e sua esposa temiam. Tudo o que se via era hesitação e uma tristeza que nada tinha a ver com sua antiga amiga. \"Vou mandar um carro te levar até o apartamento da Mind.\"","\"Obrigado por me compreender.\" \"Bem, você é minha filha.\" Mamãe tinha saído, e Ing pediu que ela dissesse à mãe que ela tinha voltado primeiro. Ela não queria que a mãe se preocupasse ou a visse chorando.","Ela refletiu sobre seus sentimentos novamente, desde o início até aquela manhã. Ela havia se comportado mal, escapando antes mesmo que a outra pessoa acordasse, algo que ela mal conseguia se perdoar. Ela se sentiu culpada.",". . Mas quando ela voltou ao apartamento, não havia ninguém lá. Até mesmo os pertences da outra pessoa haviam sido levados. Ela se comportou de maneira ainda mais imperdoável quando Napatr ligou. Não ousou atender. Temia que Napatr a abandonasse de vez, enquanto ela mesma parecia estar a afastando. Ela sabia que nenhuma dessas ações era boa; na verdade, elas estavam piorando as coisas. pior.","Nunca houve um momento em que ela estivesse com Napatr e se pegasse pensando em outra pessoa. O que antes ela considerava apenas uma vulnerabilidade passageira, fruto da entrada de alguém em sua vida quando ela estava frágil, havia se tornado algo mais, porque sempre que chorava, Napatr estava lá ao seu lado. Mas, na verdade, ela já havia se deixado influenciar desde o início, desde o primeiro encontro, até mesmo desde o momento em que trocaram apenas palavras. Mas ela se isolou, reprimindo todos os seus sentimentos. Talvez fosse porque tudo o que ela sabia antes era falso. Aquele medo a dominara tão profundamente que, mesmo sabendo, tudo o que a outra pessoa lhe oferecia era algo que ela podia sentir e ao qual podia se apegar, algo real, não a falsidade que sempre recebera. O medo a cegou.","Os braços de Napatr, envolvendo-a com carinho, ainda estavam vívidos em sua mente. O brilho intenso em seus olhos quando seus olhares se encontraram. Os lábios macios e saudáveis que nunca perderam o sorriso sincero. O calor, a gentileza. Ela ainda conseguia senti-los com muita clareza.","As lágrimas caíam, uma após a outra. Ing soluçava, seu corpo tremendo enquanto estava sentada sozinha na sala ampla e vazia. Quando percebeu que havia feito a escolha errada, já havia se afastado muito de seus próprios sentimentos. Ela sentia falta daquele abraço caloroso, dos braços aos quais podia se agarrar. Pensava no toque suave e adorável que roçava cada parte de sua pele. Ela não sabia se Napatr voltaria a ouvi-la, depois de tê-la rejeitado duas vezes. Ela não sabia o quanto Napatr havia sido magoada por suas ações.","Nesse momento, Ing sentiu como se uma força invisível a estivesse apertando, dificultando sua respiração. E agora ela sabia... se fosse honesta consigo mesma, amava Napatr tanto quanto Napatr a amava. .","sunyan"],"wordCount":3719},{"title":"15. Dez minutos","paragraphs":["Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026","Cópia: . . \"Onde está Blue?\" \"Ainda dormindo.\"","Mind sentou-se em frente à sua melhor amiga, a mulher baixinha na cozinha com as pernas encolhidas junto ao peito. Ela olhou para o relógio de parede; eram seis da manhã. Ela havia acordado mais cedo com o som da porta do quarto abrindo e fechando. Quando viu o lugar vazio onde Ing costumava dormir, soube que sua amiga já estava acordada e a seguiu até a porta. Ing tinha vindo passar a noite lá, como combinado. Embora tivessem bebido e conversado até tarde na noite anterior, Ing acordou ao raiar do dia. Na verdade, foi o amante de Mind quem mais conversou com Ing. Mind percebeu que, embora Ing demonstrasse sorrisos e risadas, seus olhos não acompanhavam o ritmo. Sempre que a conversa se dissipava, sua amiga olhava fixamente para o vazio, aparentando estar sobrecarregada por muitas preocupações. Essas preocupações provavelmente giravam em torno da Dra. Napatr, que terminaria seu turno da noite em cerca de uma hora.","\"Vou preparar um café para você.\" \"Sua namorada vai sair para um beijo matinal?\" \"O quê? Do que você está falando?\" Ing suspirou enquanto observava as costas da amiga. Mind vestia um roupão escuro sobre um pijama de seda, muito parecido com os que a própria Ing costumava usar.","De repente, um certo rosto bonito e marcante surgiu em sua mente. Napatr sempre lançava olhares sedutores e significativos para Ing quando a via de pijama assim. Isso sempre a deixava sem jeito, então ela geralmente preferia desviar o olhar e fingir que não notava. Mesmo assim, o coração de Ing sempre dava um salto quando aqueles olhos, cheios de significados não ditos, a fitavam.","\"Eu estava tão ansioso ontem à noite. Tinha medo de ouvir um filme com atores reais.\" \"Você está louco?\" Mind resmungou, mas com indiferença. Ela então percebeu que sua amiga devia tê-la visto, junto com seu amante, trocando suspiros e cochichando por um bom tempo, pensando que Ing já havia adormecido. \"Pensei que você estivesse dormindo.\"","\"Não consegui dormir.\" Mind apertou os lábios, o rosto corando de vergonha. Quem diria que Ing a veria trocando um longo beijo de boa noite com seu amante?","Ela se virou, segurando a xícara de café que acabara de preparar na máquina, e a colocou delicadamente sobre a mesa para Ing. \"Não sabia que você tinha começado a tomar café.\"","Ing notou que Mind acabara de usar a máquina automática. Suas mãos delicadas envolveram a bela caneca de cerâmica, com a intenção de tomar um gole para espantar o sono, mas a resposta de Mind a fez suspirar com um misto de irritação e brincadeira. \"A Blue comprou. Ela vive para o café. Além disso, ela tem vindo aqui com frequência ultimamente. Ah, e o Doutor,\" Ing ergueu as sobrancelhas quando Mind parou de falar abruptamente, como uma máquina que estava funcionando e de repente teve a tomada desligada. \"Qual é o seu problema?\" \"A médica com quem trabalhei ontem bebeu tantos copos. Suspeito que ela tenha brigado com a esposa.\" \"Por que ela não bebeu álcool em vez de café?\" Ing respondeu em tom de brincadeira: \"Se eles brigaram tanto, por que se preocupar com café?\" Não seria o álcool uma escolha melhor para afogar as mágoas?","\"Verdade. Vou sugerir isso da próxima vez\", Mind riu ao ver Ing assentir e tomar um gole de café.","Como ela poderia não rir? O \"médico\" de quem ela havia discutido com sua esposa era ninguém menos que o Dr. Napatr. Quanto à esposa do médico, era \"sua amiga\" que estava sentada ali, completamente alheia a tudo. Só me restava imaginar que tipo de mal-entendido as duas tinham. Mesmo trabalhando no mesmo lugar que Napatr, sua melhor amiga não sabia de nada.","Mesmo assim, Mind não achava que importasse muito se eles estavam se conhecendo através de seus verdadeiros eus; pelo estilo de vida deles, era óbvio que nenhum dos dois estava enfrentando dificuldades na vida. \"Já resolvi as coisas com a Amp. Não nos falamos há dois ou três meses.\"","\"Finalmente viu a luz, hein? Fico feliz por você. Quem será que te tirou da lama? Que santo!\"","Ing apertou os lábios, olhando para o café em sua xícara, que agora estava quase pela metade. O gosto era amargo, não diferente de sua vida naquele momento, que tinha gosto apenas de amargura e vazio. A doçura e a felicidade da vida haviam desaparecido, e fora ela quem se afastara delas sem pensar nas consequências. Agora que refletira sobre isso, lhe faltava coragem para buscar de volta a felicidade que um dia tivera.","Quando ela se deu conta da sua covardia, já não sabia se não era tarde demais.","\"Então, você está triste por causa do Amp? Eu vi você chorando\", disse Mind.","Ela ainda não havia mencionado nada sobre o médico porque não tinha certeza de quem realmente exercia maior influência sobre o coração de Ing. Será que foi o bondoso e quase santo Dr. Napatr, ou aquele egoísta e ganancioso Amp?","\"Não sinto mais nada pelo Amp.\" \"Hã? Desde quando?\" Pelo que Mind se lembrava, sua amiga mimava Amp desde os tempos de estudante, chegando a deixá-la morar em seu apartamento como colega de quarto sem pagar um centavo , já que Amp alegava não ter condições. No entanto, todos os outros viam que a colega de quarto de Ing gastava dinheiro para mimar diferentes calouros, nunca a mesma pessoa. \"Acho que já faz muito tempo, mas nossa história como amigas ainda me faz sentir pena dela.\" Por causa daquela palavra \"amigo\" e do laço de amizade, ela ainda queria manter Amp em sua vida. Mesmo tendo chorado recentemente, foi porque se sentiu traída e explorada o tempo todo.","Foi a própria Amp quem confirmou, com suas próprias palavras, que só se associava a ela por causa do que Ing possuía, e não pela amizade que Ing lhe oferecia – uma amizade que Amp usara intencionalmente como mera fachada durante todo esse tempo. Era verdade que a entrada de alguém novo em sua vida poderia tê-la abalado e aberto seus olhos para o fato de que aquilo que ela antes chamava de amor era uma farsa. Era verdade que a entrada de Napatr em sua vida a ajudou a se enxergar com mais clareza e a seguir em frente. Mas isso não era tudo. Napatr fez com que ela percebesse como era se sentir perturbada, como era ser cuidada. Quando o desejo de agradar alguém é genuíno, isso acontece naturalmente; não há necessidade de esforço. Napatr havia se tornado uma parte vital de sua vida, assumindo tantos papéis e exercendo uma influência silenciosa, porém poderosa, sobre seu coração. Mas o que finalmente permitiu que ela se libertasse foi o próprio comportamento dela e de Amp. \"E ela alguma vez teve pena de você?\" \"Minha mãe já está processando a Amp.\" \"E você não se opôs? Naquela época, você não dava ouvidos a ninguém. Hum, fico pensando por quê.\" \"Ei, você está passando dos limites.\"","\"Só quero saber. Então, por que você está triste? Você parece ainda mais distante do que quando descobriu que Amp tinha seu centésimo quadragésimo milésimo marido.\" \"Não são muitos?\" \"Ah, Ing, são muitos mesmo. Se você tivesse gasto o tempo que perdeu procurando um namorado para ela, talvez já tivesse um filho por aí.\"","Ing ficou boquiaberto com o que Mind disse. Casamento e namorados estavam longe de seus pensamentos. Ela nunca havia se aberto verdadeiramente para ninguém, nunca tinha tido um encontro de verdade, apesar de ter tido alguns casos de uma noite só. Ela não tinha pensado nisso em momento algum.","Exceto quando se tratava de uma certa pessoa. Essa pessoa a fazia sonhar acordada e imaginar um futuro juntos, porque a felicidade que ela sentia naqueles momentos era imensa. \"Viu? Distante de novo. Será que é aquela pessoa?\" \"Qual pessoa?\" \"Eu sei que você só conversa com uma pessoa de cada vez. Quem mais poderia ser?\" Mind sorriu discretamente quando sua amiga assentiu, mas então Ing soltou um suspiro tão pesado que assustou Mind. \"Ela me disse que gosta de mim.\"","\"Não é bom? Ou você não gosta dela?\" \"Não é que eu não goste dela.\" \"Então?\" Mind não entendia. Sua amiga parecia tão confusa e perturbada. No passado, Ing era quem a ouvia e a guiava, ajudando-a a sair do ciclo de um ex-parceiro que ela não conseguia esquecer. Agora, era a vez de Mind ouvir Ing.","\"Nunca estive com ninguém e me senti tão feliz e seguro como me sinto com ela.\" \"Qual era o nome dela mesmo? Quero dizer, da sua mulher.\"","Mind sabia, mas perguntou mesmo assim. Pegou o suco de laranja da amiga, que tinha ficado fora da geladeira até esfriar, e bebeu. Seus olhos não se desviaram do rosto da melhor amiga.","\"Patr. Napatr.\" \"Por que hesitar? Você também gosta dela.\"","\"Estou com medo... de que ela esteja apenas brincando. Ela parece tão perfeita, tão madura. Tenho medo de me machucar de novo.\" Ing sabia que estava apenas se assustando, pensando demais. Parecia um sonho, e ela não imaginava que alguém como Napatr pudesse gostar de alguém como ela, alguém com tantos problemas e questões mal resolvidas no passado. Ao ouvir aquelas palavras especiais saírem daqueles lábios macios, porém firmes, ela ficou ao mesmo tempo radiante e inexplicavelmente aterrorizada. Ela havia fugido por medo e para organizar seus pensamentos, mas não esperava que, ao retornar, Napatr não estaria no apartamento como ela havia imaginado.","Napatr foi a primeira pessoa que não se aproximou dela por causa do que ela possuía. Eles se aproximaram por outros motivos, talvez primeiro pela aparência e depois pelo sexo.","Ela admitiu que eles eram muito compatíveis nesse aspecto; eles eram exatamente o tipo um do outro.","Eles já conheciam as preferências um do outro desde que começaram a conversar por mensagem. Eles se deram bem em todos os aspectos desde que se conheceram e se tornaram mais próximos. \"Não quero ficar triste de novo, Mind.\" Mind ficou sentada em silêncio e pegou um lenço de papel que estava por perto, entregando-o à amiga que agora deixava as lágrimas escorrerem pelo rosto. O choro de Ing fez com que os olhos de Mind se enchessem de lágrimas de compaixão. Ela compreendia tanto a amiga quanto a médica.","\"Vocês dois precisam conversar.\"","Ing balançou a cabeça, enxugando os olhos repetidamente com o lenço de papel. Mas, por mais que enxugasse, parecia que suas lágrimas eram infinitas, jorrando sem parar.","\"Ela desligou o telefone. Ela ligou ontem, mas eu não tive coragem de atender.\" Tenho medo que ela diga alguma coisa porque quer desistir de mim.\" Ing disse com grande dificuldade, a voz embargada pelos soluços incontroláveis.","Ela estava triste e mais decepcionada consigo mesma do que jamais estivera por causa de Amp. \"Já volto.\" Mind suspirou antes de entrar no quarto para pegar a sacola de papel que alguém havia deixado para sua amiga ontem. A Dra. Napatr estava em péssimo estado, e sua melhor amiga não era diferente. Embora se sentissem da mesma forma, faziam exatamente o oposto, o que resultava em ambas estarem infelizes. \"Onde você conseguiu isso?\" Os olhos de Ing se arregalaram, embora fosse difícil abri-los devido ao inchaço. Ela não conseguia respirar direito, o nariz entupido de tanto chorar. Mas quando viu o saco de papel e reconheceu imediatamente a quem pertencia, as lágrimas estavam prontas para cair novamente. \"Alguém me pediu para devolver isto a você.\" Ing baixou a cabeça, cobrindo o rosto com as palmas das mãos enquanto seu corpo tremia com soluços. Ela sentia como se uma mão invisível estivesse apertando seu coração, deixando um vazio indescritível em seu peito. Ao ver aquilo e ouvir que a outra pessoa estava devolvendo suas coisas, ela foi pega de surpresa.","Ela só conseguia chorar, com o rosto entre as mãos, como alguém que chegou a um beco sem saída, incapaz de seguir em frente e restando apenas lembranças. Ajustei o espaçamento entre parágrafos, mantendo o texto original inalterado:","\"Ing, se acalme. Não chore.\" Mind não suportava ver sua amiga chorando daquele jeito. O rosto de Ing estava corado, seus olhos inchados e seu nariz tão vermelho que escondia sua beleza. Seu rosto estava contorcido de tristeza. Ing chorava mais agora do que quando aquela garota Amp havia trocado de namorado. \"Olha, eu não consigo suportar isso.\"","\"Eu entendo. Chore o quanto precisar, depois me escute.\" Mind sentou-se ao lado da amiga. Ela olhou para a amante, que acabara de sair do quarto, e lhe dirigiu um sorriso. Ela entendeu perfeitamente e voltou para dentro para lhes dar privacidade, sem dizer uma palavra. Sempre que Mind estava triste, Ing estava lá para ela. Ing era uma boa conselheira e uma boa amiga. Agora que Mind tinha um amor que a compreendia à primeira vista e finalmente estava feliz, ela queria o mesmo para Ing: que ela fosse feliz com alguém que a amasse de verdade.","E ela acreditava que o Dr. Napatr também levava muito a sério a amizade dela. \"A Dra. Napatr mantém o celular desligado enquanto trabalha.\" \"O quê?\" Mind suspirou, olhando para o ombro, agora molhado pelas lágrimas da amiga. Ing havia empurrado de volta a sacola de papel que Napatr pedira a Mind para devolver. Ela só conseguiu revirar os olhos para aquele casal.","\"Sua patr é médica no meu hospital. Você acha que está em mau estado? A médica estava tão exausta que precisou se aplicar soro na veia porque não tinha dormido na noite anterior. E ontem à noite ela teve o plantão noturno de novo. Isso significa que ela também não dormiu.\"","Mind olhou para o relógio antes de voltar sua atenção para a amiga atônita. \"Ela já deve ter saído do turno, provavelmente em cinco minutos. O telefone dela deve estar ligado. Ligue para ela. Vou encontrar a Blue.\" Mind deixou isso para lá, levantou-se e caminhou em direção ao quarto onde seu amante provavelmente a esperava para o beijo matinal diário. Ela deixou Ing sozinha para decidir como lidar com o problema. Ela havia ajudado o máximo que podia. O resto dependia de Ing e do Dr. Napatr. Ing observou a porta do quarto da amiga fechar-se antes de voltar sua atenção para o saco de papel à sua frente, com uma sensação de vazio. Será que Napatr estava devolvendo esses objetos como uma forma de dizer que iria desaparecer, assim como Ing havia fugido primeiro? Quanto mais ela pensava, mais desanimada ficava e mais lágrimas caíam.","Sua mão delicada pegou o saco de papel, que exalava o aroma de detergente para roupa e amaciante que ela se lembrava bem de serem os mesmos que Napatr usava.","Como eles costumavam estar próximos, sentados lado a lado com os corpos se tocando, não era estranho que Ing se lembrasse. Ela abriu a bolsa lentamente para olhar dentro. Só percebeu que suas mãos estavam tremendo quando as viu, tremendo assim como seu coração que temia ser abandonado, tremendo como seu coração que estava pensando demais. extremo... Ela não podia culpar ninguém além de si mesma por suas ações insensatas.","Dentro da caixa havia apenas o pijama que ela havia deixado a outra pessoa usar naquela noite, lavado e cuidadosamente dobrado para ser devolvido.","Ing os retirou e procurou por um bilhete, pois Napatr gostava de escrevê-los, mas não encontrou mais nada. Ela apertou os lábios enquanto as lágrimas voltavam a brotar, e então olhou para o celular que estava por perto.","Um som de notificação acabava de soar. A mensagem informava que o número para o qual ela havia discado na noite anterior agora estava disponível.","Ao conectar isso com o que Mind acabara de lhe dizer, Ing imediatamente deixou as lágrimas rolarem, um testemunho de sua própria tolice. Com os dedos trêmulos, ela discou o número de dez dígitos de Napatr e o levou ao ouvido sem hesitar.","Ela não hesitaria nem teria mais medo de nada. A única coisa que ela temia agora era não ver Napatr. Enquanto o toque continuava, Ing fechou os olhos, usando a mão livre para cobrir os lábios e abafar os soluços.","Assim que o toque parou porque a chamada foi atendida, Ing falou imediatamente, fazendo o possível para que sua voz não tremesse, embora fosse difícil controlá-la. . \"P-Patr?\" [Ing, há algo errado?] .","A voz rouca e profunda perguntou assim que ela chamou. Isso fez com que Ing enterrasse o rosto na mesa e chorasse sem vergonha. Embora a outra pessoa parecesse estar longe do normal, ela ainda perguntou por Ing com preocupação. Napatr nunca mudou, mesmo que Ing tivesse se comportado terrivelmente com ela.","[Não chore... um sorriso combina muito mais com você.] As palavras que ela costumava ouvir, a frase reconfortante de que sentia tanta falta, a faziam chorar ainda mais. Ela soluçava tanto que não conseguia respirar.","Ouvir Napatr dizer para ela respirar devagar só a fez chorar incontrolavelmente.","\"Desculpe.\" A outra extremidade da linha ficou em silêncio, fazendo o coração de Ing disparar.","Ao seu redor, ela não ouvia nada além de silêncio, um silêncio tão profundo que ela só conseguia ouvir o próprio coração acelerado de nervosismo, a respiração escapando por seus lábios e os soluços suaves que ainda não conseguia conter. Ela não sabia quanto tempo havia passado, mas seu coração estava dormente devido ao silêncio. Ing forçou um sorriso patético para si mesma. Toda vez que ela se apaixonava, sempre acabava assim. Decepção, tristeza, lágrimas. E desta vez, foi ela quem fez isso consigo mesma. Ela realmente não deveria amar ninguém além de si mesma, assim como havia dito certa vez à outra pessoa.","\"Patr?\" ela chamou para verificar se a outra mulher ainda estava na linha. Ela nem sequer se atreveu a olhar para a tela, apenas emitindo um sussurro fraco para chamá-la. [Mm.] \"Poderia desligar para mim, por favor?\" [...] \"EU...\"","[Onde você está? Vou te encontrar.] \"Patr.\" [Você provavelmente tem coisas para discutir comigo. Eu também.] \"Se for algo ruim, não quero ouvir.\" Ela ouviu Napatr rir baixinho, como costumava fazer. Isso trouxe um sorriso pequeno e tênue ao rosto da mulher teimosa. Ela enxugou as lágrimas antes de olhar para sua amiga íntima, que estava emburrada e sentada no colo de Blue, ali perto. Ela teve que desviar o olhar, pois não queria ver pessoas apaixonadas.",". [Minha querida, não vou perguntar se você está chorando por nossa causa. Mas quero perguntar uma coisa: você sente alguma coisa por mim?]","\"Venha me buscar primeiro, e então eu te conto.\" [Se for algo ruim, também não quero ouvir.] .","Napatr retrucou, fazendo Ing morder o lábio em frustração. Em sua mente, pensavam em muitas palavras para dizer indiretamente. Ela não as diria diretamente porque estava envergonhada com a amiga que estava ouvindo...","Não, na verdade, Mind já estava ocupada beijando seu amante; provavelmente não estava prestando atenção. \"É algo bom. Sobre nós.\" Ing não ouviu resposta, mas ouviu Napatr chamando um táxi e perguntando ao motorista se ela poderia ir até o condomínio onde estava naquele momento. Isso a fez olhar para Mind novamente. E, como de costume, Mind ainda trocava suspiros com seu amante alto e loiro e não se afastava.","Ing só conseguiu passar por eles em silêncio, com o telefone ainda no ouvido, para pegar sua bolsa como antes.","Ela saiu silenciosamente do quarto sem se despedir, pois não queria perturbar os dois.","Além disso, ela sentia inveja e falta do toque carinhoso da pessoa do outro lado da linha.","\"Será que Mind me traiu?\", perguntou ela assim que saiu do quarto da amiga.","Napatr sabia onde ela estava sem precisar de uma resposta. Ing caminhou pelo corredor deserto. [Isso me fez parar de me preocupar com você.] \"Mas eu também estou preocupado com você, Patr. Me desculpe.\"","[Chego aí em menos de dez minutos. Sem mais desculpas. Até lá.]",". Napatr desligou o telefone, deixando para trás palavras reconfortantes. Isso só fez com que Ing sentisse mais falta dela e chorasse incontrolavelmente de novo.","Em apenas dez minutos, ela veria a pessoa que amava. Em apenas dez minutos, ela já não conseguia mais guardar seus sentimentos para si, sem dizer nada, ou dizia algo que não correspondia ao que sentia. Em apenas dez minutos, seu coração encontraria o caminho. Em apenas dez minutos, ela não soltaria Napatr nunca mais. .","sunyan"],"wordCount":3409},{"title":"16. Lar","paragraphs":["Exatamente dez minutos depois, um táxi amarelo-esverdeado parou em frente à entrada do condomínio.","Ing levantou-se imediatamente, agarrando a pequena mochila que havia carregado ontem até Chonburi e de volta à capital. A porta traseira se abriu e um par de pernas vestindo calças familiares saiu de dentro dela. Um rosto expressivo, belo, porém cansado, encontrou seu olhar por um breve instante antes de Napatr se virar para dizer algo ao motorista e, em seguida, voltar a olhá-la. Pernas longas e esbeltas caminharam em sua direção com uma confiança tranquila. Aquele rosto belo e marcante prendeu seu olhar. O coração de Ing começou a acelerar, e ela abriu um largo sorriso quando Napatr lhe ofereceu um sorriso discreto. \"P-Patr.\"","Napatr sentiu um peso enorme no peito ao olhar para a mulher franzina à sua frente.","Mesmo com Ing ali presente, e parecendo que se entendiam sem palavras, a visão daqueles olhos geralmente doces agora vermelhos, irritados e visivelmente inchados deixou Napatr extremamente desconfortável. \"Não chore.\" Napatr estendeu a mão, e a mulher menor a segurou imediatamente.","Ela falou baixinho porque, embora Ing tenha assentido em resposta, continuou a chorar.","\"Vamos para casa.\" Mais uma vez, Ing assentiu com a cabeça sem dizer uma palavra.","Ela tentou usar o dorso da mão para enxugar as lágrimas que começaram a cair assim que viu o rosto de Napatr. Ela não conseguiu se conter; estava ao mesmo tempo radiante por vê-la e profundamente arrependida de suas ações do dia anterior. \"Eng.\" \"Desculpe.\" \"Está tudo bem. Você não precisa mais chorar.\" Ing foi envolvida num abraço. Napatr deu o destino ao motorista do mesmo táxi que a havia levado ao apartamento de Mind.","Ing enterrou o rosto no peito de Napatr, permanecendo nos braços da pessoa de quem sentira tanta falta, a mesma pessoa que ela tratara tão mal.","No entanto, Napatr não pareceu estar nem um pouco zangado com ela.","\"Por que você ainda está chorando?\" \"Porque estou triste.\"","Napatr soltou um suspiro suave, não por frustração, mas por afeto pela mulher pequena aconchegada contra seu peito. Só de olhar nos olhos dela já era de partir o coração, ver o quão longe do normal ela estava, especialmente aqueles lindos olhos que Napatr tanto amava, agora machucados.","e inchado.","\"Você já está entediado comigo? Você já está entediado comigo, não está?\" Ing ouvira o suspiro claro da mulher mais alta. Ela se afastou do abraço e encarou o rosto de Napatr. Ela retirou a máscara cirúrgica, que estava encharcada de lágrimas, e desviou o olhar daquele rosto cansado para procurar um lenço de papel para enxugar o seu próprio. Napatr deu uma risada suave. Ela cruzou o olhar com o taxista quando ele lhe devolveu um lenço de papel. assentos.","Ao encontrar o olhar dele pelo retrovisor, ela lançou um olhar silencioso de agradecimento antes de se virar para a criancinha que se transformara em uma menina chorosa e teimosa, agora remexendo em uma mochila de grife. Os dedos finos de Napatr seguraram delicadamente o rosto de Ing, inclinando-o para cima para que ela pudesse vê-la claramente.","Seu olhar, repleto de preocupação, percorreu a pele lisa e pálida, agora marcada por manchas de lágrimas. Com um sorriso fraco e cansado, ela enxugou cuidadosamente as lágrimas.","O nariz arrebitado de Ing estava vermelho vivo; Napatr pressionou os lábios na ponta dele e sorriu. Ela recuou para olhar os olhos inchados de tanto chorar. Não conservavam nenhum vestígio de sua doçura anterior. Os cílios, que não estavam curvados nem cobertos com rímel como de costume, estavam úmidos e grudados, fazendo Napatr suspirar mais uma vez. \"Você suspirou novamente.\"","\"Nunca mais chore por minha causa.\" Quanto mais ela proibia, mais difícil ficava. As mãos de Ing, apoiadas nos ombros de Napatr, agarravam firmemente a camisa da outra mulher. Ela fechou os olhos e chorou, como se não conseguisse compreender o pedido suave nem o olhar preocupado. Napatr riu ao ver o rosto da mulherzinha ficar vermelho como um pimentão. Aqueles olhos doces estavam inchados e lacrimejavam como se por comando, enquanto seus lábios carnudos faziam um biquinho adorável em meio ao choro. Napatr puxou-a para perto, abraçando-a contra o peito. Ela acariciou os cabelos e as costas de Ing para confortá-la, mas quanto mais a consolava, mais Ing soluçava. Ela recuou um pouco antes de pressionar os lábios contra a testa lisa com grande ternura, usando as pontas dos dedos para enxugar carinhosamente as lágrimas em suas bochechas.","\"É normal que casais tenham desentendimentos. Faz parte da vida a dois. Como a senhora gostaria de pagar? Transferência bancária ou dinheiro?\" Napatr enrijeceu antes de olhar pela janela. Ela viu a cerca familiar, indicando que o táxi havia chegado ao seu destino. \"C, Cash, por favor.\" Ing entregou duas notas vermelhas a Napatr para pagar a corrida antes de sair do carro. Ela estava envergonhada demais para ficar sentada no carro enquanto Napatr terminava de pagar. Seus olhos inchados não suportavam a luz do sol, então ela ficou ali, semicerrando os olhos, esperando o dono da casa na sombra de uma árvore perto do pequeno portão.","Napatr fechou a porta do táxi e procurou por Ing. Encontrou a mulher franzina parada perto do portão, com a mochila nas costas. Ela parou um instante para observar o traje casual de Ing, um lado dela que nunca tinha visto. Seu belo rosto estava completamente sem maquiagem. Normalmente, a única vez que via Ing sem maquiagem era quando ela estava dormindo. A mulher mais baixa havia lhe dito certa vez que jamais sairia de casa sem maquiagem. Mesmo quando ia passar uns dias na casa dela, sempre carregava uma pequena nécessaire na bolsa. Agora, era evidente que não a havia trazido. A réstia de esperança que quase se extinguira reacendeu-se no instante em que Napatr viu as mensagens da mulher franzina que tentava ligar para ela. Aquela pequena faísca de esperança se intensificou quando Ing ligou novamente menos de um minuto depois de Napatr ter ligado o telefone. E agora, ela ainda se agarrava a essa esperança, sonhando que talvez fosse por causa dela que Ing estivesse agindo de forma tão diferente de si mesma. \"E quem é essa garotinha? Esperando a mãe vir buscá-la?\" \"Humph. Não vou esperar pela minha mãe.\" \"Então, quem você está esperando?\"","Ing lançou um olhar fulminante para a mulher alta que caminhava em sua direção com um largo sorriso. Napatr inclinou-se até a altura de Ing. A ponta do seu dedo tocou a ponta do nariz de Ing tão suavemente que Ing não resistiu e imediatamente deu um tapa no ombro largo da outra mulher. \"Você não vai me deixar entrar na casa?\" \"Claro que sim. Afinal, temos coisas para discutir.\"","Ing apertou os lábios enquanto observava as costas de Napatr ao abrir a porta. A mulher mais alta se virou e ofereceu seu habitual sorriso discreto.","Era como se eles não tivessem tido nenhum problema antes, como se Ing não tivesse chorado de tristeza e como se Napatr não tivesse precisado de soro intravenoso, como Mind havia dito.","Sempre que estavam juntos, concentravam-se apenas no presente. Nunca traziam à tona outros problemas que pudessem perturbar seus corações, e sempre foi assim. Mas não conseguiam evitar essa questão em particular, porque era um problema que realmente dizia respeito aos dois. Ing sentou-se no mesmo sofá de antes, mas hoje a cor dele havia mudado. De um sofá bege largo, agora era um sofá cinza claro um pouco menor. Ela olhou ao redor da casa de Napatr, onde havia ficado apenas alguns dias antes, com surpresa.","Havia um novo aroma de ambientador, e alguns dos móveis que antes eram brancos foram quase totalmente substituídos por vidro. Ing olhou para Napatr, que voltou e sentou-se ao lado dela. Ela colocou um copo de água na mesa de um jeito que nunca tinha feito antes. Normalmente, Napatr era muito mais descontraído e tranquilo. Mas agora, até a menor mudança era notada por Ing, e seu coração começava a disparar de medo.","Ela encontrou o olhar da mulher alta que, como de costume, estava recostada no sofá, e virou o rosto na direção de Ing. As olheiras e a vermelhidão nos olhos fizeram Ing se aproximar imediatamente. \"Você não dormiu nada, não é?\" Napatr balançou a cabeça negativamente. Isso fez com que Ing se sentisse ainda mais inquieta e culpada.","Sua mão delicada, que pretendia tocar aquele rosto cansado, caiu de volta em seu colo. Ela não se atreveu, então só pôde sentar e observar de lado.","Napatr observou a mão delicada de Ing retornar ao seu colo. Ela suspirou antes de diminuir um pouco a temperatura do ar-condicionado, pois o sol lá fora estava bastante forte. Isso aquecia a casa, embora não excessivamente.","Ela estendeu a mão e pegou a de Ing. Os olhos inchados da mulher franzina se arregalaram ligeiramente em surpresa. \"Posso te beijar?\" Ing assentiu com a cabeça antes de virar o rosto. Seu rosto sem maquiagem ficou vermelho intenso, fazendo Napatr sorrir amplamente. Ela depositou um beijo no dorso da mão macia e puxou o corpo delicado de Ing para mais perto. Ela a abraçou levemente, fechando os olhos para absorver o calor que tanto sentira falta e desejava. O calor de seus corpos as aqueceu ainda mais. Enquanto Ing acariciava suavemente seus cabelos, Napatr sentiu lágrimas começarem a brotar em seus olhos.","Por mais que quisesse desistir, Napatr não conseguia escapar da verdade sobre o quanto gostava da outra mulher. Só de ouvir a voz dela, seu coração tremia. Ouvir Ing chorar só lhe dava vontade de chorar junto.","Ing era tão preciosa. Ela tinha um significado para Napatr que as palavras não conseguiam descrever. \"Não vou perguntar porquê nem por que motivo. Só quero fazer uma pergunta.\" Napatr não queria saber os motivos pelos quais a mulher mais baixa havia decidido deixar o apartamento, deixando-a com dúvidas durante todo esse tempo. Todos têm seus motivos, e Ing não era exceção. Mas Napatr não queria conhecê-los.","\"Você... sente algo por mim? Quando estamos juntos, sou só eu para você? Você pensa somente em mim? Você se concentra somente em mim, da mesma forma que eu me concentro em você?\" \"Hum, essa não é apenas uma pergunta.\" Napatr esboçou um sorriso cansado, olhando para o rosto doce que estava corado de um vermelho intenso até o pescoço e as orelhas, que espreitavam por entre seus lábios.","Cabelos ruivos soltos, presos de forma frouxa. Ela não disse nada, deixando o tempo passar enquanto esperava por uma resposta.","Ela podia esperar. Contanto que Ing estivesse ao seu lado para responder, não precisava ser agora. Tudo o que ela queria era que Ing ficasse, que não desaparecesse ou a deixasse com mais perguntas. Ing apertou os lábios. Olhou para a mão de Napatr, que ainda segurava a sua com firmeza. Em seguida, desviou o olhar para o rosto belo e expressivo, abatido pela falta de sono, e fitou os olhos cheios de significado e expectativa.","Ela se aproximou de Napatr antes de se apoiar no colo da outra mulher, sem se importar se era pesada para ela. Suas duas mãos acariciaram levemente as bochechas da outra mulher antes de pressionar seus lábios contra os lábios finos e ligeiramente ressecados, pois Napatr não havia aplicado nenhum batom neles. \"Eu... será esta a resposta?\" O coração de Napatr disparou com a adorável ação da pequena mulher. Não que ela nunca tivesse recebido um toque assim de Ing antes, mas os doces olhos que a encaravam tinham um significado muito maior do que nunca. Eram tão ternos que Napatr se sentiu... tímida.","Ing balançou a cabeça. Encostou a testa na de Napatr e sorriu. Ao ver Napatr perturbada, com o rosto corado, Ing gostou ainda mais dela. Ela adorava ver Napatr sem palavras assim. \"Tenho algo para lhe dizer e também quero responder à sua pergunta.\" \"Se não for algo bom, não vou ouvir. Não quero ouvir.\" Napatr falou com total sinceridade. Ela não queria ouvir palavras que ferissem profundamente alguém como ela, que sentia tudo com intensidade. Ela não estava preparada e não suportaria ouvir outra rejeição. \"Eu já não te disse que é algo bom? Algo sobre nós.\"","O coração de Napatr disparou, uma onda de excitação a invadiu. A sonolência, o cansaço, a exaustão desapareceram de repente. Não era apenas por causa do que ela esperava ouvir da pessoa em seu colo. Sinceramente, seu sono e cansaço já haviam desaparecido no momento em que viu o rosto daquela mulher pequena. \"Seu coração está batendo muito rápido.\" Ver o coração de Napatr batendo forte só fez com que Ing quisesse provocá-la, embora seu próprio coração estivesse acelerado na mesma proporção. \"EU...\"","Os lábios de Napatr estavam cobertos por uma mãozinha. Ela só conseguia esconder o rosto no peito da mulher em seu colo, se perguntando por que Ing simplesmente não lhe contava de uma vez.","Mas então, com o ouvido pressionado contra o peito de Ing, ela pôde ouvir claramente as batidas do coração da outra mulher. Ela apoiou o queixo no peito macio e olhou para o rosto corado de Ing com um sorriso. \"Seu coração também está batendo rápido.\" Estava tão rápido que a preocupou. \"Você está cansada? Ou seu coração não está batendo normalmente?\" \"Patr,\" Ing a chamou com uma risada suave, sem saber se devia se sentir impotente ou feliz por ela se importar tanto. \"Você vai me contar agora?\" \"Você está me apressando?\" \"Assim podemos ir descansar um pouco.\" Ela sabia que Ing provavelmente não havia dormido, assim como ela. Mesmo que a pequena mulher tivesse dormido em seus braços naquele dia, fora um sono agitado. Napatr a segurara o tempo todo, observando-a a noite inteira; como ela poderia não perceber?","Mais uma vez, Ing acariciou o rosto de Napatr. Seus olhos fitaram o rosto bonito e suave, encontrando o olhar de Napatr enquanto ela retribuía o olhar com a mesma intensidade.","Então, essa era a mulher... que sempre a fazia se sentir à vontade, que a ajudou a compreender o próprio coração, E quem fazia tudo parecer fácil. \"Eu te amo. Me sinto tão, tão bem com você. Me desculpe por ter dito aquelas coisas. Me desculpe por ter tomado aquela decisão sozinha. Me desculpe por ter fugido. Eu só estava com medo. Patr, por favor, não fique bravo comigo. Ou, se for ficar bravo, por favor, não fique bravo por muito tempo.\" Ficar sem Napatr por apenas um dia deixou seu coração em turbilhão. Não ver seu rosto por apenas um dia a fez sentir-se sozinha e indescritivelmente perdida. Não ouvir sua voz suave por apenas um dia fez com que a saudade fosse tanta que ela não conseguia funcionar. Napatr era alguém por quem Ing jamais pensou que se deixaria influenciar. Ela era alguém por quem Ing nunca teve a intenção de se apaixonar. Mas quando foi que Napatr conquistou um lugar em seu coração? Nem mesmo Ing sabia. Quando finalmente se deu conta de seus próprios sentimentos, Napatr já havia ocupado cada canto dele. Napatr ficou sentada em silêncio, atônita com o que ouviu. Superou tudo o que ela esperava ou imaginara desde que Ing falara ao telefone. Seus olhos não conseguiam ver claramente o rosto da mulher em seu colo por causa das lágrimas que brotavam. Não era porque ela estava triste; era porque ela estava feliz. Feliz porque a outra mulher pensava o mesmo, sentia o mesmo. Não era só ela que se compadecia de Ing; ela não era a única que se deixava influenciar.","Parecia um sonho, melhor do que qualquer coisa que ela pudesse ter sonhado. \"Ing, sabe? Eu nunca fiquei com raiva de você. Nem um pouquinho.\" Ing não disse nada depois que Napatr falou aquilo. Napatr realmente não estava zangada, como havia dito. Mesmo assim, ela estava triste por nunca ter havido clareza entre elas.","Os doces olhos que ela encarava se arregalaram um pouco antes de ela desviar o olhar. Provavelmente, Ing estava com vergonha. \"A Mind disse que você tomou quatro xícaras de café ontem?\" Ing mudou de assunto, sentindo-se aliviada por a outra mulher não estar zangada como temia. Ela se sentiu grata por qualquer coisa que lhe tivesse permitido conhecer Napatr dessa maneira.","Talvez por a outra mulher ser madura o suficiente, ela fosse paciente e sempre esperasse para ouvi-la quando tinham algo a discutir, ou quando Ing lhe contava algo.","\"Na verdade, cinco xícaras.\" Napatr sorriu. Endireitou-se e pressionou o nariz contra a bochecha macia de Ing. Os braços finos que Ing a envolviam se apertaram quando a mulher menor a abraçou contra o peito. O aroma suave e as batidas irregulares do coração dela fizeram Napatr se sentir tão aquecida e feliz.","\"Minha colega de trabalho disse que uma médica bebeu quatro xícaras de café porque brigou com a esposa. Eu perguntei a ela: por que ela não bebeu álcool? Por que bebeu café?\"","Ing afastou o rosto da outra mulher do seu peito para provocá-la, querendo ver o olhar gentil que a outra mulher sempre usava. Ing sabia que o médico que sua amiga havia mencionado era a pessoa em cujo colo ela estava sentada naquele momento.","\"Bem, provavelmente ela realmente brigou com a esposa.\"","Napatr sorriu para a pessoa falante e conselheira sentada em seu colo. Seu nariz permaneceu perto da bochecha de Ing porque sentia falta daquele aroma suave e do toque doce. \"Provavelmente não foi você, Patr. Você disse que bebeu cinco xícaras.\" \"Talvez eu tenha comprado um a mais.\" \"E quem é sua esposa?\" Ing perguntou em tom de brincadeira, enquanto suas mãos acariciavam as orelhas da outra mulher. Ao ver o brilho em seus olhos, ela não quis mais encarar Napatr. \"Você.\" \"Não, não sou.\" \"Você não é?\" \"Não me provoque.\"","\"Bem, você está?\" \"Patr!\" \"Você quer se casar comigo?\" \"Eu já sou, não sou?\" Napatr riu da resposta, que pareceu dominá-la silenciosamente. Ela se inclinou mais para perto da mulher em seu colo, e Ing pareceu já saber o que ela queria dizer.","Aqueles olhos doces e sedutores a fitavam com um sorriso cúmplice. Apenas com o olhar um do outro, eles se entenderam instantaneamente. Napatr pressionou os lábios contra os lábios carnudos que se entreabriram em expectativa. Ambos fecharam os olhos, recebendo o toque um do outro com anseio. O beijo agora era mais doce, mais suave e mais repleto de emoção do que nunca.","A sensação era tão boa quanto a de seus corações, que agora batiam no mesmo ritmo. Esta casa, que antes era solitária e abandonada porque seu dono, Napatr, não suportava ficar sozinho, agora estava cheia de aconchego e doçura. Esta casa estava repleta do som de seus lábios trocando respirações, de risos e de conversas divertidas. Uma casa que era um verdadeiro lar, não apenas um lugar para morar.","Um lar com Ing. Um lar conosco. . sunyan"],"wordCount":3145},{"title":"17. Um Doce Sorriso Recheado","paragraphs":["de Veneno Livro: CASUALMENTE Autor: miww_ss Lançamento: 01 de junho de 2026","Cópia: . . \"Patr...\" \"Hum?\" \"Suas mãos.\" Ing segurou o pote de creme na mão esquerda e, em seguida, usou a direita para puxar o braço de Napatr, cuja mão se movia como um polvo, para longe de seu quadril.","A outra mulher a puxou para o seu colo, aos pés da cama, para cuidar da sua pele depois do banho, um banho de verdade, inocente. \"Eu só estava... te apoiando.\" \"Maldoso.\" Napatr sorriu, com os olhos fechados em paz, enquanto sua pequena Ing estava sentada em seu colo, aplicando creme noturno, mesmo já passando das onze da manhã.","Um toque suave pressionou os lábios de Napatr, fazendo seu sorriso se alargar antes que ela abrisse os olhos para olhar para a mulher que acabara de espalhar o creme em seu rosto. Um sorriso doce e olhos brilhando de afeto foram as primeiras coisas que Napatr viu. Ela se endireitou para pressionar o nariz contra as duas bochechas macias de Ing, permanecendo ali até ouvir um pequeno protesto afetuoso. \"Aff, Patr. Vai dormir logo.\" \"Eu gosto mesmo de você.\"","\"...\" Ing mordeu o lábio. Colocou o frasco de creme na cama ao lado delas antes de envolver os braços no pescoço da mulher mais alta. Ela encostou a testa na de Napatr de forma carinhosa, dando um beijo na ponte do nariz dela, que era tão perfeitamente alta que despertou sua curiosidade. \"Onde você fez a rinoplastia?\" \"Minha mãe.\" Ing franziu o nariz quando Napatr insinuou que era natural. O formato era lindo e combinava perfeitamente com seu rosto, fazendo com que a mulher mais alta parecesse ao mesmo tempo bela e descolada de uma maneira indescritível. \"E você? De onde tirou esse narizinho teimoso?\" \"Você está me insultando?\" \"Só estou perguntando.\"","Napatr riu, enterrando o r
